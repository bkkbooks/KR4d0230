body:
  text: 方舟集卷二宋李石撰七言古詩次張益州芝草十二韻紹興己卯武成廟廟殿之棟三秀芝學官奔走暨多士日繞百匝不暫離欲奏九重望恩幸寒餓水火如切肌先期到堂白宰相宰相曰可甚易為樂工伶倫飾金玉擬薦清廟裁歌詩石時官忝博士職豈敢立論超等夷曰此五行金沴木木不曲直嘗聞之將軍鷹揚兆異氣弄兵往往憂潢池矧今裕民民未裕聖慮日軫天下饑斯言一出自拭目再召再逐彌嵗時山東山西將與相一天雨露均無私喜聞謀帥用鄉士乖崖以來無此竒目之所覩世有異口不敢言人更知頃年喋血岷峨下啓此厲階端自誰種芋從今我田喜漚麻却得吾水滋中和薰蒸感瑞物雪山增重隂雲披昔人佳政喜傳授便謂子産勝子皮江南諸子識我語帳下未忍驕羣兒商山一曲似可作出處恐笑山翁癡不如去學赤松子掉舌三寸為帝師山舫毋廷老作船齊窗間兩小湖山甚佳因以山舫名之君家屋中作山舫開窗看山篷背上兩峯髙並玉玲瓏大孤小孤無此樣主人釀酒書滿船讀書飲酒酣且眠應笑周郎赤壁下龍驤萬斛風動天馮震野航蓬萊弱水三萬里片帆風便一日耳世間衆水集枯溝蛙黽自誇河伯秋况於平地鑿户牖此豈有水仍推舟先生彈鋏太不惡昔人野航今改作明知此意不為魚船頭船尾千卷書笭箵活計大如斗欲駕雷電凌空虛白波漲天須少待小劫未遲蒼鬢改安排去作踏浪兒幾度桑田變成海送僧南遊天下香火如東林雷劉勝迹猶可尋阿師跳出矮屋下萬里抱被雲水深汝家老演舊行處江梅樹樹前時吟可憐此老今已矣門户久冷懷語音去年送圭今送汝演子兩虎不易擒吾詩最慳亦何用且為向來衣鉢重逢圭問我强健時猶抱黃經戀虀甕次韻何思召求中江縣學額九州多士各有貢大小之物隨土宜養材學校此其本背本逐末寧不悲偏將土木奉釋老盡室奔走愚無知君子居鄉有宓賤小人願學如樊遲聖門二者今戰勝文星不用天盤推一朝化出孔子廟唾手如有神明司文翁以來節度府羽翼此邑天西維春秋俎豆列二祀晝夜几硯嚴十師荀卿許從異户入子貢只得肩墻窺我生一官五講席所至凍雀栖寒枝自從上庠吏外學行德自謂心無欺眼看旄頭拂紫彗左文右武今何時塗侯居鄉足領袖金橐相與傾其私自聞盛事喜欲舞出力敢後吾人期黃庭細書不足道籠鵝尚可尋羲之淡臺斬龍由搏虎書成有似二子為髙山仰止不無意鵬翼九萬雲天垂王家亭池涪川勝處城之西萬松直上王家池池心有亭無四壁五月菡萏生淪漪向來城中望山上但見一抹深黛眉却從山中望諸處雲霧平野光參差飛鴻羣往山數㸃陳馬萬匹江東馳眼前景物費酬答中有隱几無言師題詩他日要人識君家有叔良不癡次韻唐立夫永川五柳堂堂李齊年所建十年間三易名立夫作令為復之我與李侯初不熟但聞弦歌政聲速永川雞犬數山外迄今語言猶可録向來官舍卜清疏把酒橫琴僅容足眼前可無起豫者故作斜川著行録不妨奄有靖節名此堂岌岌栁英英易名伐樹公則去名尚可復栁易生唐侯初來理前事收拾神名還舊地坐令軒冕爭奪心各有田園蕭散意古人陳迹那復論丈夫志氣髙入雲因知特起豪傑士不待西伯還明君張紹賢以詩索佩刀次韻復還之喜不至流怒不悲句中銛鋒解人頥氷霜凛凛笑一吷三尺有喙金玉詞二惠肯來但獨步明光殿中文繡具便當攜此上青雲天子方深南北慮吾今老矣君可思吹毛之珍何所施和詩反刀三歎息莫把神槌困鈍錐題金馬碧雞神祠持節使者來自天玉皇遣問金碧仙蜀山嵯峨九折外瓊樓絳闕迷風煙騑騑蹴踏長楸道喔喔下鳴芝草田漢家一瑞恐難致殺人自要身長年麒麟鳯凰不知愛仙物未忍隨拘牽至今滇昆水含怒怒迸海脉浮平川資中男子文章伯執筆金鑾殿中客碧雞飛去却飛來此地遂為金馬宅金馬神祠俗傳以為諌議大夫王子淵也按子淵宣帝時持節祝三神於益州韋齊休云拓東城兩山對峙東北為金馬西南為碧雞昆池水出兩山下北折東注而滇池自嶲以西與昆合而東注蠻人槩以滇池目之不復云昆河也二水皆出三危蜀江所本一云兩山時出光怪山形如二瑞一云雞出水中未知孰是子淵移文云持節使王褒敬移南崖金精神馬剽剽碧雞處南之荒深溪回谷非土之鄉歸來歸來漢德無疆廣乎唐虞澤配三皇華陽國志云青蛉縣禺同山濮水所出子淵資人墓在資陽年月日李石書謝楊夀卿惠香木拄杖夜郎溪中七香木長身一握如紫玉向來蠻村已自竒恥與龍涎鬭餘馥誓將膂力奉君子度越山巖走窮谷夫君得此不自珍要當助我扶衰獨憶昨與君騎竹馬健力隨羣走黃犢看看四十老形具此物胡為苦催促世間行險豈吾徒且卧方舟同結足三藏梨沉黎㕔前三藏梨老虎鬚牙龍甲皮我來與國惜喬木尚幸出屋繁孫枝春風千花玉葉碎秋日萬子金圓垂問禪誰是柏樹子聽訟漫逐棠隂移雪香樓頭終日坐紙尾自書三百顆他時若問相公槐我為改名羅漢果俗多諱梨以梨為三藏刀豫欲改名為羅漢果以便俗諱徐童子彈琴極聰慧詩勉其學髧如丫角垂兩耳口誦黃庭調緑綺諸公拂榻乃肯留疑是前時徐孺子我琴掛壁久不彈浙聲分作蜀聲看但得古人指下趣轉覺良工心事難欣然過我同一笑舊曲重聞如再少咸韶本自鳯凰鳴筝笛任誇蚯蚓竅孺子孺子年更癡十三大勝陶家兒阿端不識六與七隨分牽衣覓梨栗贈墨手道人寄朝子止即用子止韻夷門道人墨為手藝如巫咸日中走逢人便與墨糢糊西里自妍東里醜不須更相邑中黔面比烏鴉色未深為擡墨手髙處問我手何如君子心挽船羣兒生長輕江湖上船下船誰使驅江牽百丈沙水澀岸上風雪兼泥塗下循枯葦鵝鴨亂上控絶壁猿猱呼可憐進寸得退尺挽腳不住頭欲扶均之兩兩窮性命我自有罪非爾辜二年學省一不補天子幸赦憐其愚一船放歸小如葉滿載豈有海上珠琴書之外求長物去時未有來時無爾曹憐我共努力歸路尚逺天西隅泊船且醉花柳岸為爾尚肯滿眼沽喜雨謡春氷搖凍春水肥小風卷沙梅雪飛東皇勸人作耕織天雨粒粒機中絲田家喜說新年話苔青映門竹枝亞有錢輸官官不嗔滿地黃金不論價次韻趙彥膚柏梁體送張道録煬銅作梁劒棧編峽江百丈青雲緣峽山鳥道飛翩翩蜀仙自得壺中天丈人口訣誰與傳青城青城一名赤城一炷心香烟縈藤絡蔓紫翠牽清河鍊師天上仙玉華樓髙瞰平川白日下界黑鬼纒玉華樓髙處見平川人境出沒塵氛也帝曰汝往豫詳延鼎轉九丹書八篇清風來翔明月前夏日不暍冬不綿青騾白鶴忘嵗年是家仙種張祖先張開光乘青騾至資州玉案山張四郎在卭州白鶴山椒子紅熟丹浴泉釀成白酒斗十千先生日日貪醉眠為我寄語來日邊遊銅梁縣雲巖我來雲巖夏初吉巖洞向晚開新蟾晴空飄飄雨花坐護此燕几垂飛簷老僧閉門一榻外但有瓶鉢雲火奩人間日車手可熱道上火繖官爭炎不知此地䕃氷雪崖花石蔓駢濃纎傳聞仙人有蛻骨玉塔未許窺幽潛行人各走記名姓浪費粉板相黐黏不知蘇黃巖上字端有妙處垂緗縑至今巖泉瀉千仞似與二老爭森嚴斯游與子固不薄一餉喜遂清賞兼稽首林間古石佛面目慈悲雄鬚髯狐狸騎項鼠繞膝蒼苔蘚剝侵裙襜我願石佛須少忍欺善怕惡神所殱君不見邇來石佛勝銅鬼㑹煮翁仲烹飛亷余所藏李文才畫鶴甚竒偉嵗久縑爛各缺一趾偶有善工為補之髙軒得意翔雲間妙畫匿迹縑素殘柱頭老丁留語後兀兀無趾如叔山不妨萬里戢六翮顧步下啄芝田寬方舟惜鶴並惜畫一䕫之足萬金價莫將凡筆補丹青謬作身輕一鳥下郭宰生朝汾陽家世郎官星百里隱隱聞雷聲德人所至有别樣不向尺箠求能名上官嗔罵吏束濕日下廩庾堆如京此時桃李出談笑溪邑井井山風清東林香火逺公社長官得暇來尋盟雲間春茗試新瀹月裏禪心須細評今朝還有夀者相松椿龜鶴紛喧爭髙人著意供一默富貴浮雲雙眼明夏旱四月旱火坤西維湫潭百丈滄江湄潭中老龍帝所御偃蹇不任世俗羈招呼頻費香火誠去則甚速來何遲炎官火繖日輪午一塵不動天琉璃火光之中興白霧風伯鼓鞴雷奮椎黑雲壓城白晝暝倒瀉銀漢傾天池帝敕九烏以震死血飽龍吻紛淋漓再拜謂龍曷少霽龍與我職均有司商霖儻可通帝夢正直炯炯唯龍知贈開元觀李法師以射虎得官棄官入道年九十射虎將軍鬚髮白老作三茅洞中客羣仙呼去問姓名謂是前時李八百天孫乞與雲錦衣白日化為仙鶴飛赤城山下百花市賣符賣藥沽酒歸放魚三年計日作放生薄俸時分及魚鳥别來湖山幽絶處下者遨遊上輕矯西歸短棹送春波忍見長魚困縈繞修鱗戢錦紛半破健尾舒紅時一掉不惟咫尺迷藻蘋正恐須臾觜葱蓼吾曹仁術隨所用圉圉洋洋誰不曉恥與雞蟲較得失况乃牛羊分大小只今命脫猛火燃不用口銜明月皎臨流祝魚從此去彈指寃親一時了要將頭角動風雷未厭藏身且深渺周公禮殿漢人祀周公為先師故鍾㑹記云周公禮殿范蜀公鎮云屋制甚古非近世所為秦漢以來有也內翰王素云其屋制絶異今制後之葺者惜其古不敢改作蜀侯作頖錦水湄先聖先師同此室巍然夫子據此座殿以周公名自昔聖人兩兩如一家均是周人先後出想見東家中夜夢猶與公孫同衮舄斯文授受乃關天不為漢唐加損益我時來視俎豆事重是漢人斤斧迹漢宫制度九天上散落人間此其一多因豐屋起戎心獨此數椽綿嵗厯規模􅰕嵲東魯似氣象縹眇西岷敵竹松猶是斯干詩風雨方知隆棟吉雖然漢獻來至今閲世已多駒過隙中間豈無鳥鼠慮妙斫不知難輒易工師不揆亂如麻敢向般門言匠石詩書譬彼尚闕文後學如何補遺逸祖龍非意竊登牀蝌蚪有心來壞壁舊章僅在命如絲誰勒吾詩勝丹漆禮殿聖賢圖耆舊傳云西晉太康中益州刺史張收畫而東晉王右軍已有書問蜀中事知有漢時講堂在知畫三皇五帝以來人物畫文精妙欲因摹取得廣異聞則疑非收所畫當是自漢以來畫至收輩遞增益其數耳然畫之後前既無可考則當以收為正嘉祐中王素命摹寫為七卷總一百五十五人為成都禮殿聖賢圖蜀守席益又嘗摹其容貌名位可别識者一百六十八人於石經堂又按元豐郭吉虛圖畫見聞志云漢文翁學堂在益州昔經頽廢髙眹復繕葺圖畫古來聖賢之像及瑞物於壁未知孰是則與耆舊傳小異成都名畫窟所至妙宫墻風流五代餘軌躅參隋唐其間禮殿晉畫為鼻祖未數後來鴻鴈行畫者果誰歟或云名收人姓張右軍問蜀守墨帖求縑緗乃知前輩人不愛時世粧范瓊杜措李懷衮仙荒佛怪驅喝雷電筆意窺渺茫不若收所畫上自皮羽之服下至垂衣裳盤古衆支派帝霸皇與王君臣分聖賢有如虎豹龍鳯殊文章視之若有見日月星象空中垂耿光聽之如有聞衝牙玉佩鳴以鏘三古以降歷今世視聽所感猶一堂乃知此畫自神品碌碌餘子非所望吾道久已屈二氏爭頡頏豈唯牧也見絀餘子下而有公議老我雙鬢蒼蝦蟇碚水晶宫中玉蝦蟇多年栖息嫦娥家忍饑不及一夜啖明月天帝怒爾謫下三峽腳手猶爬沙婪酣大肚飽清氣但見瓊流珠液百尺垂唅呀峽人只作泉水看不知元和潄咽猶是月之華從來至味不可說陸羽只作第四誇可憐提瓶肥羜子强飲百斛莫救肝膽邪我聞老蟾之酥乃仙藥能使風草化作黃金芽何如閉口自潤澤換爾醜質生角牙㑹當騎爾却上月宫去下看桑海渺渺凌蒼霞題隂山七騎圖回巖客子賣墨人諸孫賣筆筆有神墨翁已入蓬萊殿筆孫有愧中書君邇來小孫兼好畫兩幅溪藤七匹馬虎狼避路狐兔藏朔風吹沙霜滿野卭崍關頭大渡河使君五馬千丈坡獵將一圍看蠻走醉敲銅鼓蠻踏歌急收此畫人莫識矍鑠之翁誇筆墨不如再泛洞庭船袖中一劒隨飛仙問趙有方乞琴公子年時尚竒偉大劒橫腰髮衝起自言學道晚有得心靜無波古潭水平戎萬卷喑不吐蟠向胸中作宫徴眼明慣識嶧陽材手製教成古緑綺人生㑹費幾兩屐巧處才容一張紙許多黑瘦肯忍饑枵腹悲鳴聒人耳公子公子贈我來明珠白璧遭沉埋我家老馬解仰秣渠家煮鶴充枯柴宇文子友以詩來覓酒玻璃江深麥初熟引水細舂比炊玉老守齊鉢自有餘端為吾民憂不足荔枝堂前紅數栽倚樹讀書門不開收麥入厨催釀酒客問遣騎何時來彭州行邑道中四月少雨百草熱山中小麥皆乾枯溪水不流牛缺飲連耞未動妻典襦布榖催耕鳩婦怨早得一雨淋汝面老夫枕書卧晚凉農自忍饑官飽飯贈楊尉送湫水天上妥雨水鳴渠一龍任責固有餘今年水來雨不集彭民不及江中魚以堰致水髙百尺靈湫在淵爍紅日彭民怨龍不怨人龍則有職誰之失九峯仙官梅子真豢龍有術龍不嗔去年作堰今請湫二者兼得蘇彭民東湖别駕但捧腹卧聽蕭蕭響疏竹往來莫便輕泥塗軟腳有酒為君沽東山行龍池山頭喚龍起見說花開龍亦喜喜將一雨洗山光曉漲初分兩溪水東山渡橋煙霞簇山半亭臺艷桃李入門一徑海棠花紅玉為枝霞作蘂仙花自有龍麝氣拂拂晴風香十里木蘭髙下色不同青紫朱緑黃白紅遊人隱映錦繡谷山鳥動搖霜雪叢我來酌泉弄花樹花光正在水影中君不見三碉城邊百草熱渡瀘將軍不得歇何似兩仙樵斧郎一局坐忘春晝長爛柯之地在黎州資聖看畫資聖名藍妙畫窟前佛峥嶸連後佛栴檀級上金琅璫五月寒風吹佛骨我來看畫瞻仙容丹青古殿開天龍薝蔔花開日亭午妙音破睡聞鳴鐘送叔規鳯臺却望桑麻川殘僧孤客同一年我窮自取君更苦只有布襪青行纒松楠隂隂水邊寺一餉欵尋香火緣筆端落盡蔬笋氣胸次不留荆棘田窮冬衣褐露黑肘半夜風雪寒詩肩時於連牀乞被卧睡到日午鐘魚傳今朝别我眉色好得得西謁騎鯨仙自云老矣世塗熟獨有此老無人憐更須南去共舟楫竹火江茶談夜禪送范頴胄君之家為䕫龍氏龍之威神爪牙利豈肯因人下求食拏攫風雷隨所嗜問君世學今幾傳翰墨諸仙侈名位後來諸孫穎與路元祐衣冠相整治春秋大易蜀有師我獲升堂時問義江邊喬木殊未改重來忍唾成都地感君遺文逺相訪凜凜髙風今不墜梅花道路寬作程瓠葉杯盤同此味少年赤手弄霜雪想見倚門遲嵗餽還家莫道囊槖空客子夜寒仍少睡送新趙宰身作涪江未歸客更送行人出南陌行人磊落髙皇孫桃李賨城看朱白髙才觸事無不爾百里莫嫌民社窄魯恭卓茂意何者豈有居官名赫赫不須打鴨驚鴛鴦抵几疾書呼五百阿奴公退在眼底可以彈琴把書册此時尚及詩筒來談笑千山萬山隔贈張聽聲人言鼻聽無如龍聽不以耳乃反聾未若水母本無目隔水響應相鳴雄我持此理問張瞍廢目任耳偏能聰忍聞此聲亦憒憒俗囂政在羣鳴中枉將蟻動作牛鬭妄遣蚊聚成雷公昔人樂歸瞽其職五音六律詩人矇我琴三尺玉橫膝欲廣舜孝歌時雍游魚舞獸解人意此意憂樂斯民同瞍乎洗耳試一聽莫似北客歌南風石經堂僞蜀廣政七年其相母丘裔按雍都以舊本九經命平泉令張德釗書而刻諸石是嵗實晉開運甲辰也蜀守胡宗愈作堂以貯石經席益增葺為記我來一登石經堂從以諸生行兩廡諸生讀經半白頭問以始終箝不語我聞此經昔中都郎中所𨽻乃其祖邇來離亂已亡失楷本僅能傳蜀土蜀王閏位供掃除獨此仍為盛時取為將嚴鐍守重扃護以繚垣崇邃宇列之學官豈無意不但闕文存夏五大開明鏡别妍媸時扣洪鐘諧律吕後生不復事丹鉛抵死唯知守藤楮字音隨口妄霓霓㸃畫分毫謬魚魯日月當天空委照盲俗相欺紛莫覩石經雖古奈爾何人競傳今不傳古行行矧肯捩眼覷蘚剝苔封費撐拄堅鑱僅免飽蟫魚隘道爭來宅狐鼠此間鄒人儻借問為問石經誰是主憶昨敲門肆訶斥幾度循墻誇傴僂登登閣閣隱金槌耳聒散空垂雹雨蠟薰煤染連作卷玉軸錦裝如束杵豈無一物媚權豪幾紙才堪博圭組爾之所得固么麼我則何由寬擊拊一槌只作一字訛訛至萬千那復數石經之害此其大縱有鬼神誰可禦憶昔嘗為博士官首善堂中容接武心知不是世間書雲漢森然城百堵恢恢帝所有餘地忍使石經留外府便當連舸下瞿塘飛上三山如插羽縑緗舛謬鐘鼎暗天罅豈容無一補巍巍玉帝殿中央河洛東西翼龍虎雖然斯文屬興廢帝既有心天亦許作詩未用擬韓公考篆庶幾追石鼓謝楊夀卿送雙鴨用香木拄杖韻我家羣雞真似木君家雙鴨重如玉情知此物不敢烹未忍戛羮求剩馥傳聞深村水田裏翠羽成羣蔽溪谷喬仙兩舄不用多尺紙長鬚慰幽獨墻頭瓠壺舍下筍喚作蒸鵝烹健犢前時饞客錯歡喜益水添薪費煎促主人此外北窗風飯後乳甌初睡足舟中示開并寄圓三年獨客思親淚灑作錢塘大江水却乘此水得西歸兩淚急收成一喜庾公樓下江月春拍手中流逢小麟駸駸逼人出瘦骨懍懍似我今長身夜船燈火無乃是猶似夢中論夢事小鵬有翅未能來獨學膺門想憔悴一官外物等去留來未足喜去莫憂虀鹽敢有去國恨菽水未免還家羞峽江之人走雲雨送船迎船聞疊鼓君不見並舍紫薇郎頗願生還見鄉土我今歸來四壁空兩窗萬軸南北風杜門忍饑吾與汝文字穮蓘祈年豐同韓子東賞牡丹嗚嗚曉角春風送日日官身隨鳥動但知敲榜負佳辰縱有芳菲難入夢起尋北郭新雨後愁見西山含雪凍茅茨雖暖豈宜花笑我此行真鑿空向來洛下定真譜只許姚花充物貢只今老病陪少年駑騎何能追駿鞚便將花祴問天女欲返田園尋二仲此花含笑我不言且插一枝風帽重
