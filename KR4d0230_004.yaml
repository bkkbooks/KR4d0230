  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0230_WYG_004-1a, image: WYG1149/WYG1149-0560c.png}
body:
  text: 方舟集卷四宋李石撰七言律詩長松奉寄鄭察院漢使西來雪瘴深龍蛇窟宅費披尋只知笻竹通中國何似長松種上林槐省銜杯䝉舊識楓庭躡履聽歸音昔人九折回車地笑我何由慰母心木蘭大渡河邊瘴霧濃卭崍關下木蘭紅得州自昔連江雨杜牧之得州最荒僻更值連江雨此地仍多出竅風沉黎多風云有風穴一笑萱花親念逺廨舍前後萱草甚盛三生藜杖子心同三藏擔母取經今㕔前藜其植杖成樹莫緣險阻欺方寸忠信元來處處通謝人惠新火六龍杲杲看推移也有分光蔀屋時作古逺知燧人氏至今猶說介之推扣門自此人皆有暗室從來我不欺冷竈無煙知幾日憑誰乞米試晨炊題捫參亭林盤谷轉走縈紆兩腋乘風上太虛塵世似將𤣥圃隔仙宫元在赤城居著鞭欲跨鸞凰去䑛鼎曽嫌雞犬餘尺帚何當上霄漢夜捫星斗步庭除至喜亭歸路巴人處處逢巴人舟楫語音同雪霜寒谷殘年後雲雨陽臺昨夢空沙水清能延月白峽林香欲試春紅飯山雖瘦無竒語至喜亭中著醉翁羽扇亭十里山光紺碧圍瘴煙收盡溢春暉黃紬睡美聞衙唱白羽風髙入指揮樓角片雲隨鴈去溪頭驟雨送龍歸君王若問安邊䇿苜蓿漫山戰馬肥蠻王妻俗呼縣君來黎州錦領烏氊自跨馬而至一自昭君向北遷花魂千載却南旋歌聲不動先含笑粉面無施任自然羞整雲鬟多戴笠欲呈錦袖漫開氊夜來大渡河邊過青蓋金羈穩上船禱雪堋口廟岷峨皎皎玉千峰只缺平川一尺融土霧不成雲外霰江沙半雜夜來風針頭可惜丘中麥堋口來祈應上公飽死侏儒果何意連年調度戰聲中雪羡他雪色一般同㸃綴蒼蒼滓太空白比蝦蟆終蝕月輕如蝴蝶亂隨風不容著跡無人處漫借餘光似我窮翠竹疏梅成佛地未嫌凍立此山中又大地纎毫色色空寥天望極一鴻濛夜凝冷浸梅魂月朝拂輕回縞帶風身世密移塵境外乾坤收入玉壺中虛堂瑞草瓊林合壓盡蓬萊第一峰同王䕫州探梅莫因紅紫媚樓臺潔白光中處處栽香骨未應春雪妬素心偏向暖風開清樽妙賞今誰健曉角年光不用催别後西歸玉堂約詩筒只有月邊來送牟堯文别久無辭道路難敝裘依舊據征鞍五湖我已遭風逆三徑君能犯雪寒下榻莫嫌烹瓠葉倚門正及頌椒盤一杯少味仍相送折得梅花帶笑看一笑一笑真成亟負余可人懶散費招呼忘言摩詰元無病健倒盧同不用扶野葛三餐莫豫毒桃花幾度約吾徒杜門人與春偷老風雨聲中長白鬚送虞樞密還朝一官齒髮老侵尋金馬當年博陸沉樽俎笑談人不見璣衡造化我無心曾瞻玉鼎三嵎近便覺朱門百仞深忍使王陽行九折囚山未敢廢南音次韻賈文學見贈方舟不似逆風船船上燒香穩坐禪五鼓紞如隨鳥動一春老矣學蠶眠黃梅半熟雨不止白髮也應天見憐賴有比鄰賈詩老醉中相對聳詩肩和楊子土牛之什陌上花開又一春起來酒伴覔南鄰煙霞笑我雖成疾霜雪於君恐不仁柏葉殊思金馬舊栁枝偏向土牛新相忘已約形骸外老守先能墮醉巾禮殿雨老苔荒墨色昏漢人兩序姓名存六經絲竹升堂後千古衣冠此地尊但使髙文無廢祀只今揚馬未招魂寥寥蜀學誰為倡東去江流注海門送周行可國風惆悵黍離離只有周郎五字詩得見大巫今索矣可憐小子孰裁之心如廢井慿誰汲語到修門未可期此别更須留好句梅花窗外見相思東湖感事二首桃李洲中别一春雪山肯為障紅塵鬼神半夜應憐我魑魅今朝不喜人煙雨晦明窗外眼風霜來去樹邊身細思只合歸耕好並舍何由笑我貧一官職檄冷秋氷盡日量書接夜燈老去髭鬚無可染秋來面目自生憎湖通堰尾聽泉激日出山尖見雪層結習未除江海客不忘回首夢觚稜黃筌畫屏屏已失其左右二幅獨中一山水屏在耳石到官驗問所失月日申府蓋紹興三十年三月二十九日府下兵馬司捕賊不獲阿筌千頃本胸中學道分明畫手同筆削來追麟獲後丹青為洗馬羣空登堂欲與修遺履穴户何由返大弓尚有滄溟垂素壁且防蠅誤汚屏風逺去親側浩然歸心再用韻指㸃西來海上峰此間魑魅我能逢果何所補身先老豈不懷歸意已濃騏驥羣中憐短褐龍蛇窟裏倚長松一堂四相經行處灑掃雲烟覔舊蹤彭門春日不似閒人立道傍豈將老眼眩韶光溝塍緑漲春容潤籬落紅披曉吹狂薄有生涯隨處是苦無心緒逐人忙西歸官路成遷次回指江湖似故鄉又送馬氏兄弟歸彭門山程趼足肯相從未厭﨑嶇易道東二馬仙風還舊觀六鼇香餌看新功北田夜誦披蓮蘂東閣春歸折桂叢努力錦衣雙拜手夀杯堂上雪髯翁食枸杞貓頭筍一毛沼沚未宜輕甘脆提携慰客情仙狗吠林堪小摘乳貓蹲竹得春萌齒牙風露雖云美口腹朝昏只旋營尚獻一芹裨玉食天庖回首隔重城再次韻計教授糟丘盡醉國人狂誰似東家禮義鄉萬卷短檠磨嵗月一生寒硯敵氷霜飯牛坐待扶桑白戰馬初歸塞草黃奏牘三千君未晚殿幃正要上書囊春水倚杖河邊記水痕眼明喜見白鷗羣雨聲夜向九峰瀉江勢朝來三堰分窟宅蛟龍元自擅鄰家雞犬要相聞我師一飽關天意收拾晴風放密雲次韻李判官見贈鬚髯殘雪兀陳編煬者何由更避煙榮宦君方收晚嵗論交我亦得忘年佐州相與營杯水有路從今出甕天一日尚能千里駕此間老驥不須鞭寄知來弟霏霏寒日隕清霜勃勃隂風出土囊尺木未階龍久蟄銜蘆不穩鴈斜行仕塗田舍成三已世態江湖合兩忘無術憂民緣底瘦一杯豆粥爇心香市進馬寒甚邊雲寒色與愁濃酒味何由入頰紅眼看飛鳶來墮水心隨去騎欲追風親朋立望千山外笑語殊思一餉同問舍求田吾已决不於湖海較窮通到沉黎舉家瞶氣上如聾者踰月乃愈醫人云此瘴氣也儋史之孫病耳翁人佯謂我與真同蚊飛鬢外年時事鵲噪愁邊晚更空老去鹿皮終可隱聽如龍鼻反能聰昭文不鼓非無意勉為慈親奏凱風天彭得解一第楓宸嵗月深槐花杯酒喜同斟真成冀北空羣馬便作雙南滿地金計上八人才子數筆端四海狀元心蜀天九萬看鵬運側耳潮頭駕捷音李新仲圭同遊醮壇歸以詩告别次韻别去名場歎滯留肯來空谷話清幽知君有約趨金馬笑我無心對白鷗千頃量陂能却老一編家學莫他求相將杖履題詩處跨鹿山頭記舊遊苦胃不出二首眇小酲醲總見欺顛狂苦訴有誰知五音鶯自調歌舌百藥蜂能釀蜜脾世態只堪春睡美鬢絲偏與落花宜欲因耆舊尋鄉路投劾翻然恐未遲鳴禽百囀栁三眠窗户隂晴任雨煙芍藥櫻桃春殿後芎藭麥麴病爭先奉親滿眼缺一飽去國憂心今五年南北風塵江兩岸不妨明月釣魚船邊州警報翠圍矗矗亂山稠蛋雨蠻烟凍不收赤白囊來逢此嵗青黃榖熟又深秋一官忍恥隨人後數口全生敢自謀蟣蝨有心空地上蒼生難答兩宫憂謝處道貺墨用與德醇韻十八公家四十圍凌烟勳業在臨池掌中烏玉勞分餉世上𤣥經只自知頗覺陳人空面目誰能閙處損心脾又須什襲牢藏苦共看河沙指後期處道惠蒲墨蒲膠易敗而此殊可喜石本以書求墨得又不忍使東坡云非人磨墨墨磨人此可嗟嘆陳希夷送紙筆與張忠定忠定云驅我欲閙處送蘇漢傑萬里來歸道路長兩年身寄水雲鄉僅餘文字縑緗富猶帶湖山草木香從此定應懸箔去卑之且說踏槐忙逢君客地成乖隔相送江干問草堂送處道上馬挑書束破裘宦情薄處不宜秋二年拄笏山雖好十舍浣花江合流此處移文尋舊社尚因竒字憶方舟西川儻有東來鴈莫道曽無截鐙留重陽得得浮家帝里遊西歸節物共南州羣鷗自得水空闊逺客肯因船滯留千頃白蘋風掠岸一年黃菊雨深秋醉名未忍成狂率任脫烏紗笑白頭再用九日韻答何邵卿二首老蝶凌風作晚狂小春爭得媚寒鄉池邊團碧擎殘雨林末輕紅拒薄霜笑我何時書竹帛似君依舊踏槐黃相尋一醉能來否枉費公家壓酒囊習氣仍餘酒後狂十年坐斥醉中鄉讀書窗外千堆雪利劍床頭一匣霜收拾微吟追李杜研摩小楷逼蘇黃他文消遣隨兒輩頗笑翁癡作一囊挽沈提刑金馬堂堂有陸沉斯人出處可重尋豸冠議論回天力繡節平反念母心一代師承無别𣲖百年朋舊託遺音便當佳傳磨蒼翠桐桂森然欲出林挽何與時留滯周南隔要津尚餘家傳付堅珉才髙未覺儒冠誤句好仍傳樂府新諸子尚能頻屈指一門今有幾朱輪吾鄉水鏡君應恨聳壑昂霄㑹有人公寓城西日恨未識李石也留别何十五修程雲水繞蒼茫馬上春風薜荔香此去雞豚思舊社且憑魚鴈到他鄉窮途逼仄風波惡客路消磨嵗月長别後空階聞夜雨令人還憶水曹郎九日與一飛諸友飲菊五年去國若為歡九日逢秋强自寬樹攪氷霜驚嵗晚山圍霧雨試朝寒不關烏帽隨風落只把紅萸對俗看惟有東湖無可遣一杯香泛落英餐送王應祥進取雖狂我不狂跨鼇今日鄭公鄉未偕西蜀三年計來訪東湖九月霜桃李山城漫紅白橘橙峽路看青黃修門萬里逢嚴助剩剖琅玕出錦囊次韻誼夫九日憶去嵗共遊東林菜飽無期嵗已侵髙談何處著幽深二年旅寄不堪說九日盟寒那復尋此地有時容醉玉寒花無數吐秋金與君豈是無詩句聞道西山似竹林夷叔醇臣約九日泛舟是日往集西山展峰亭起來蛛網罥茅簷脫葉飛飛却倒粘十月風光成嫵媚一林霜氣自深嚴幽花已老何人摘村酒無多喜客添收拾江湖閒望眼展峰亭上數山尖禱雨吾家何必自耕耘淮上新添戰馬羣聖水洑流天漢永顛風扇雪地爐焚但教東海無寃氣便可西郊放密雲浪遣蛇醫與龍鬭邈然天聽若無聞次韻喜雨雲色垂軒潑墨深夜聞蕭瑟振枯林自憐一榻清凉意想見千畦饜飫心共道蘇天私此澤後來商旱更誰霖公歸還記田田葉坐看荷珠自勸斟公實公衍伯仲相訪云木犀再花香橘新摘也併以為惠且將以佳篇因次韻桂屏立壁杳難攀畫舫層層碧玉欄未覺香風披蘂晚向來白雪避花繁秋深犀子仍奔殿夜迥珠星得走盤二妙沓來成伯仲恨無瓊玖出毫端石䝉恩召還以病留滯度嵗賦此詩道别呈諸同官三馳旌聘合翻然萬里君恩荷記憐肯許老叨同守嵗且因春酒介新年風傳鷁首五湖浪雪漲蟇頥一脉泉他日堂中元祐腳只堪誦說學蘇仙謝彭守送花别去名園走路塵啼粧猶浥露痕新且陪東閣諸侯客粗了西湖一半春試與清泉召魂魄已驚黃蠟損精神回頭却憶風流守金粉珊珊墮舞茵古柏二首古柏原委具成都古今記趙次公詳其事於東坡詩注有妄庸人請於府恐壞屋欲去之石曰屋壞可修伐此柏不可復且祠廟古跡林木條禁甚明併舉東坡柏堂詩爭之得全驕榮落盡雪霜浮偃蹇空貽社櫟羞濡染東家雖借潤風烟西爽亦宜秋皮災已覺神明露心在猶懷剪伐憂鐵鎖何當絆龍腳夜深雷雨捲潭湫石欲作鐵索絆之以防風雨之暴未果僅能纍石作籠固其足思人誰復念婆娑窟室崖隂未易磨四十圍間看溜雨三千年後數恆河不堪與世供狙杙尚許遺民占鳥窠從此便名夫子樹匡人斤斧奈豫何監者王朝辨進士年八十餘矣學官憫其老不忍易之秋月望崖相送欲凌虛未擬邊州作陋居法令牛毛紛可笑使君馬尾自能書白雲度嶺愁方寸黃瘴埋沙費掃除列㦸橫琴果何擇一窗秋月竹踈踈除夕又是投閒嵗欲除閒中因得著工夫園林香雪梅先透庭院清風竹自呼未厭夜寒燒榾柮已貪曉色進屠蘇巧名尚喜新年在碌碌人應笑阿奴陪韓守劉村看牡丹洛陽舊譜隔芳園姚魏尋香作返魂端為名花肯迂路定知春色落深村日中半醉如含恨雨後幽姿未忍言上苑分明有餘地野芹何獨遡金門用之相訪忽憶漢孫不得一脉以死用前韻漢孫禱羅漢而生故以僧目之畫孔明像事之目為卧龍公柱上作鳯山堂大字有古意垂盡之語云五六醫人何得無一藥可漢孫之疾乎猶意用之一臨也叩門剝啄涕霑襟忽憶僧孫病骨侵壁上卧龍香線斷柱間題鳯墨痕深倉皇不瞑思君眼輾轉猶希住世心真意自天渠信否贈篇聊當閣中針到䕫門呈王待制手挈東風上水關鳯書迎日看新班五湖家世烏衣巷三峽樓臺赤甲山畫㦸門開春晝永卧龍帳穩海波閒安危大計須公等天定應知即賜環
