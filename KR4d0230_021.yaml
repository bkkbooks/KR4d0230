body:
  text: 方舟集卷二十一宋李石撰左氏詩如例上詩之有例杜預之說也吾夫子刪之子夏序之又與子貢親聞其言於夫子例之說如預者舊矣預之立例曰詩人之作各以情言君子論之不以文害意春秋引詩不皆與今說詩者同他皆倣此此如例也嗚呼此說舊矣凡所援據緣情為類左氏所載一件一事裒拾之得一百六十八篇作詩如例孝子不匱永錫爾類大雅鄭莊公以弟太叔誓其母姜氏然孝心不忘不然一羮之頃亦自難以激其終身之誓太叔不絶於其兄如春秋則潁谷封人誠有力於莊公為不盡之孝也風有采蘩采蘋雅有行葦洞酌謹始之傳母子用誓君臣用質人道悖甚矣其曰交質子不及二伯是也且周君也鄭臣也此君臣用質也人道不順而以忠信責之可乎四詩出君子之意忠信之責也蘩蘋薄物之可羞葦者牛羊之不踐洞酌之潦可供祭祀也商頌曰殷受命咸宜百祿是荷頌者詩之盛德況商頌之難得者乎穆公以姑息小仁以禍其國殤公立十年十一戰杜預以兄終弟及飾其說君子亦以頌美宣公非所䝉也公子馮不帥父義何所逃罪然以商湯武丁美宣公君子之言亦過矣碩人衛風國之儲二天所建也天下之望在是矣莊公娶齊女賢淑無子以桓公為子早定其位以明天所建而係人望可也不然嫡庶之分繼及無序國本亂矣州吁之弒君是也莊姜以桓公為子莊公又寵州吁母賤而嬖子寵而好兵賢母不能制嬖妾賢兄不能制寵弟碩人之賦衛人逆知其然知桓公之必不免託碩人以憫莊姜為賢不見答故無子於州吁書為弒君又以殺臣下為詞此春秋微意杜預乃以州吁未列於㑹故不稱君妄矣自求多福大雅詩叙狂狡之刺鄭忽皆不足以當之何也狂者進取不已之謂也狡者如狡兔三窟之謂也鄭忽以救齊敗戎成功乃矜伐自居戍齊之餼又以班後鄭為有郎之師固辭齊婚是禦福也乃援文王大雅之賦曽狂狡之不若也卒之三公子爭立受權臣之欺失大國之助君子以為善自為謀則可謀國則不可也君子屢盟亂是用長小雅鄭莊公後忽突爭立鄭以宋女之故突入忽出宋執祭仲為竒貨連年於此矣十一年惡曹之盟宋與盟而不書杜預以為缺文意者忽猶在位也忽出突入然後宋人得以橫役鄭人故為折之盟至榖丘之盟凡再盟矣其為㑹者四曰夫鍾曰闞曰虛曰龜至伐宋而戰宋則宋絶而鄭得以小瘳君子以小雅屢盟譏之本支百世大雅本根也支葉也文王子孫百世相傳以長久享國者本根盛支葉從而茂也衛惠公播越七年於此矣魯莊公㑹齊宋陳蔡之兵伐衛而納之非天子意六年書王人子突救衛則惠公朔失國以國逆為文當納與不當納情可見矣朔既得入放新君黔牟放大夫寧跪殺公子泄公子職然後即位君子譏二公子之立黔牟為不度者以本之不强而支之不足自芘非文王所以傳世之意然惠公之惡亦不悛矣翹翹車乘招我以弓豈不欲往畏我友朋逸詩帝舜明德百世之祀也其後之人賢不肖何足以廢絶其後之祀哉陳殺其太子春秋以國討為文曰陳人者不與其殺也公子完奔齊齊侯使之為卿此則八世之後敬仲開國於齊之符也至桓子而陳始大至成子而陳得政皆天也方子完之奔齊也有賢霸主為之依歸子完亦能雍容遜順降其色詞於俎豆之間其賦詩可觀矣弓招之禮士之聘禮其不欲往者天意於明德子孫尚有待乎豈不懷歸畏此簡書小雅文王以辛受之命遣兵以守中國以西北夷狄為慮其職猶諸侯霸主之職也東遷以來夷狄之患日熾齊桓公圖霸之始管仲相之肯置西北之慮於度外者乎小雅之賦文王為西伯時勞來諸侯西有昆夷北有玁狁所謂簡書之畏不敢一日即安以辛受之命為畏也邢者武王之子孫為狄所伐霸主之所當憂管仲一言之贊齊桓得以九合諸侯實發軔於此矣閔公元年正月書齊人救邢僖公元年書齊師宋師曹師次于聶北救邢前人後師人者微而不及事師則將尊師衆所以大邢於中國以夸耀霸主之威於諸侯也曰次者勉而進之於懷歸簡書之畏也至於遷邢城邢以明狄人之勢方盛齊人之於邢不可緩也載馳衛風婦人女子知有國家患難亦其義槩之激於中此載馳之所為作也許穆公夫人衛女也父母之國為狄所滅曹邑之遷幾不祀其曰歸唁於禮有不得者父母既終無歸寧其兄之禮也許小不足以救衛抗狄徒憂之而作況諸侯為伯主而不一動心乎此則齊桓公攘戎楚丘之封文公他日再造之業歸夫人魚軒之張本彤管靜女之章亦出衛志有不及此清人鄭風鄭受楚敵而輕於授鉞推轂之任其亦難乎為兵矣春秋書鄭棄其師鄭自棄也非將之罪也故吾夫子於論語微發其端曰不教民戰是謂棄之不以罪髙克也夫以髙克之罪正典刑誅戮之可也孰有憎惡於其將而猶假以兵柄哉子夏序詩乃曰久而弗召自莊公二十八年楚入鄭以來今閔公之二年凡七年矣髙克奔陳不書者非春秋與吾夫子之意懷德維寧宗子維城大雅申生死于女戎之譛方其蒲屈之築也申生已游魂新城矣夷吾尚以置薪為訴重耳以不校父命幾不免斬袪僅能奔翟然重耳霸業有異於夷吾者其用心大小有間矣士蒍之諫非獨為蒲屈之城亦知申生出伐羣公子皆不免維城之詩先見之明乎白圭之玷尚可磨也斯言之玷不可為也大雅獻公得罪國人雖其諸子親出肺腑如異類也荀息不量力欲保奚齊以一死抗三怨以一嬖敵輔晉之諸侯不狂則愚矣晏子曰君為社稷死則死之奚齊之死里克殺之其平生許君宜矣已非社稷之計而又從里克逆謀立卓子里克又殺卓子荀之死已非向者許君之志明矣其與溝瀆之經何異大雅白圭之玷非所以責荀息不識不知順帝之則大雅又曰不僣不賊鮮不為則秦伯之問公孫枝之對惠公求入之情僞盡矣唯重賂以求助則忌克之情見矣秦伯豫防惠公之反噬是以他日重耳霸業而望夷吾非所宜也不識不知者文王所以順天之法不忌克者可以為法矣惠公忌克適足以資吕甥郤芮背秦之謀啓㔻鄭賣國於秦以納重耳者天所以開霸圖於晉似有冥數愷悌君子神所勞矣大雅齊桓公以鮑叔一言忘其平生之讎舉管仲而用之一則仲父二則仲父君臣相信不復有疑雖三代直道不過如是也乃曰仲尼之門三尺童子羞稱管晏至有廢其所長而求其所短不知所以絶管晏者果何罪後世以是洗垢吹毛以瑕疵士人者不知吾夫子自管晏以下如子産子西皆有定論管仲以平戎之功辭髙就下君子有大雅之賦如吾夫子之意世祀者以其平戎之功可以格神也下民之孽匪降自天噂沓背憎職競由人小雅韓之戰秦獲惠公以獲書如俘囚無異甚易之詞也晉以女女秦其資秦德非一也三施不報以負秦史蘇之占尚何尤乎史蘇能以象數占天之吉凶而不能變吉凶者以人事召之也僔沓面語而背相憎疾韓簡所以告惠公惠公不悟以死此豈非人為哉刑于寡妻至于兄弟以御于家邦大雅宋襄公不度德欲以仁義之師圖伯於春秋子魚又以文王降崇侯于因壘之間刑于寡妻及兄弟以太姒為教推此及家邦以無禮責曹而執鄫子殺之如犬豕然果仁義之師乎孔子商人宋商之後也其書曰執宋公以伐宋其亦隱忍為恕詞矣公爵執之而人楚告捷不許夷狄執中國之君也又書諸侯而不書楚猶曰諸侯自釋之此吾夫子恕於鄉人之詞也豈不夙夜謂行多露召南諸姬盡於楚人吞噬有日矣非特漢東諸姬憤之中國之人亦共憤之矣楚人日熾隨日削者有由矣楚自武王以來隨絞州蓼欲伐其師有不能得今又叛之如䝉露夜行不免濡衣汚辱之病此君子之重為隨惜召南行路之賦有㫖哉協比其鄰婚姻孔云小雅王子帶惠王之子也時襄王在位帶召揚拒泉臯伊雒之戎伐京師欲行篡襲賴秦晉伐戎以免子帶因是奔齊齊使仲孫湫欲復之諸侯戍周王室之不靖者至是十年矣富辰力諌襄王以子帶為言協比其鄰以齊為婚姻也兄弟即襄王及帶也王信富辰之言可矣然王子帶介恃夷狄與齊之援勢不兩立王子帶入則天王出居於鄭矣春秋意罪襄王顧匹夫小節以天下之大避其母弟天子無外而以出為言譏之也王子帶居溫富辰亦不免戰戰兢兢如臨深淵如履薄冰小雅又曰敬之敬之天維顯思命不易哉周頌邾者魯附庸小國也恃宋以抗魯故魯伐之且其執鄫子以畀宋宋殺之於社僖公伐之又伐而取其須句邾肯忘之遂有升陘之戰內不可言戰言戰則敗此春秋內諱也臧文仲預以雅頌諷公不悟大抵魯奔馳大國之郊無嵗不兵無嵗不役重外輕內其藐邾久矣兜鍪之辱何怪乎河水逸詩六月小雅重耳復國楚秦及狄之功也自楚之秦納之晉二詩之賦可以見其志矣皆子犯趙衰之力也古者享禮賓主賦詩見意其賦全章則以首章為重此杜預之說也然預以河水為逸詩而又以朝宗于海為義則沔彼流水朝宗于海見於詩非逸也六月則以佐宣王北伐為義以贊重耳復國尊周也此又賦全章之例常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于墻外禦其侮小雅周鄭交惡自入春秋不君不臣胥失之矣周寡恩無御臣之方鄭念德失事君之略今又以一滑之小而執二王人欲以狄伐鄭者以忿兵加鄭亦胥失之矣小雅常棣召穆公燕族人於東都閔管蔡而念周公此富辰舉之以戒襄王也彼其之子不稱其服曹風自詒伊戚小雅甚矣子臧之為惡不悛也其兄子華以嬖寵殺身而子臧奔亡宋受其奔反以鷸冠自侈所以殺之者鄭伯鄭伯不自殺使盜誘而殺之何也自詒者自取也國人惡以寵嬖出奔長惡不悛兄死而弟繼之宋鄭不相平又恐其介恃宋人反禍其國不然一冠非法小人之服何足深誅惠此中國以綏四方大雅春秋賞罰之權詩者著春秋褒貶所自出其於聖之經則一也是以君子貴之晉文公圖霸之始必有大號令以尊天子令諸侯者此三罪民服雖舜受堯禪誅放四凶以收天下之心不過如是也然帝霸之業所以不同者去取之異也文公始入伐曹衛以地主失禮而以兵伐人不過假公義以復私怨而已旌僖負羈之忠可矣顛頡魏犫同罪異罰可服人乎祁瞞風于澤亡左旃不登時戮之於軍既敗楚而又殺人可服人乎舟之僑奔亡之餘而俾為戎右濟河先歸輕用之而輕殺之可服人乎君子大雅之賦曰賞曰刑權春秋之法著之於詩者欲以廣霸主之德於天下文豫而實不豫也采葑采菲無以下體國風父子罪不相及堯舜之仁用此道也郤芮畏逼謀殺晉侯以至焚宫以求晉侯不獲豈自知重耳之霸哉胥臣但知其子之賢而舉之文公信而用之以縣賞胥臣之舉讎而復命以父之舊邑此霸者盛德事也葑菲下體雖惡無以惡而棄其美此胥臣之說詩者小異大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖大雅晉負秦曲秦亦念德不忘殽之役穆公違蹇叔而用孟明三年之間三敗之辱晉則曲矣秦亦未免以責於晉為貪也故舉芮良夫刺厲王之詩以自警卒得孟明之用雪殽師之恥者以信任孟明為終始而不以兵家之成敗為作輟也若夫汪之役以晉宋陳鄭四卿之貴書曰人者將尊師衆不能舉一秦夷狄之勝中國之恥也而左氏反以人四卿以尊秦不知人四國之卿亦以人秦也風之有隧者君貪間可乘故無形之風得以入之聽言者悅耳諛詞也誦言者雅正逆耳之言也良而悖之謂蹇叔也此詩乃人主聽言之法君子如怒亂庶遄沮小雅王赫斯怒爰整其旅大雅萊駒以斬秦囚失職狼瞫代之遂以為右箕之役先軫黜之以續簡伯代之狼瞫怒其友誘之為亂不從以未獲死所也竟死于彭衙之師晉襄公得以幸勝秦師君子不多晉襄公之用狼瞫不罪先軫之失士而有取於狼瞫者以其不尤其君不信其友不妄用其勇踐夙昔之言以求死所也君子以狼瞫為君子舉二詩以證之至比之以文王之怒嗚呼匹夫之勇而有六師止亂之氣其亦勇於義乎毋念爾祖聿修厥德大雅嗟夫秦穆公悔過以不用蹇叔之言孟明自以屢敗不死必復雪其國之深恥以答穆公之知此念爾祖之說晉趙成子所以取之也毋念者念之深也念祖考之德以自修其德晉未可以輕敵也春秋匪懈享祀不忒皇皇后帝皇祖后稷魯頌問我諸姑遂及伯姊邶風臣繼君位為先後義猶父子也僖兄閔弟以兩臣言之則可以兩君言之則義有先後一君一臣不以兄弟也臧文仲之不仁夏父弗忌成之也其曰新鬼大故鬼小此巫祝之見其何以為廟社典禮之官乎仲尼春秋以大事書之何也明其躋僖抑閔失後先之義以時以月以曰為謹不及為內諱也又舉二詩以明其非義曰鯀曰契曰不窋雖無君位猶當以祖禮推配矧僖公以郊禮祖稷魯有禮之可法乎諸姑伯姊亦以先後父子先後之義也杜預謂微子父帝乙鄭桓公父厲王二國不以為不肖肖之與不肖以子肖父乃倒置其意乎于以采蘩于沼于沚于以用之公侯之事國風夙夜匪懈以事一人大雅詒厥孫謀以燕翼子大雅聖人立言足以為世重也秦穆公悔過吾夫子取之今之秦誓是也不逺復無祇悔於顔子謂庶幾近之以其不二過也子路聞有過則喜不與此也至於穆公悔違蹇叔之言則録之為誓幾與三王之誓無異因以成霸功左氏取之蓋吾夫子好之丘明亦好之三詩者皆君子之意也一人悔過一人舉善一人效力雖天下受其利可也况一秦之霸乎菁菁者莪小雅嘉樂大雅及者上及下之詞又為汲汲之詞其一直壓以及為文其一危出以汲為文卒之晉侯自悔二年之無禮又踰年公如晉懼其無禮而改盟公其屢盟之書前之及猶後之及無以異也晉侯賦菁莪取既見君子樂且有儀之義公賦嘉樂取顯顯令德受祿于天之義然文公降拜賦答亦兢兢然矣文公二年之冬如晉四年之春飲至告廟不已遲遲其歸乎畏天之威于時保之周頌女子在塗稱婦卿以國逆之以吾君故尊之也今不書卿而以逆婦為文是無祔姑之禮以其始為不令終之卜曰出姜可也畏天之威以配夫為天也君子謂之曰不允者以不信也不信則不保卒之文公死而歸此其兆也維彼二國其政不獲維此四國爰究爰度大雅齊桓公之伯力足以尊周而服夷狄也貫之㑹江人黃人以蕞爾小國能自通于中國二國者楚之與國服江黃者斷楚右臂也桓公死楚滅黃以報宿憾江人所恃以立者以晉為伯者之可依勢亦岌岌矣楚伐江晉力欲芘江有不得者至秦穆公既敵晉霸西戎江人既同盟而楚滅之此霸者之深恥恥齊晉之不若也降服出次徹膳過禮君子援大雅之詩者美秦穆公不唯自反已之不能芘江思其政事以自警也湛露彤弓小雅衛侯鄭楚之姻親也寧俞衛之忠臣也衛棄同姓之懿婚於夷狄之楚此重耳所以討而分其地賴寧俞以得復國者凡三衛侯被執京師俞納槖饘一也晉欲殺衛侯俞貨醫以薄其鴆二也不肯祀相以全成王周公之命祀三也負三大節孔子以為有道則智無道則愚何也來聘於魯魯衛兄弟非無道之邦杜預遽以不答二詩之賦為愚似未盡其愚其節在晉楚爭衛之間耳湛露天子燕諸侯之禮也諸侯敵愾則賜弓矢然後征伐魯人失賦以欺衛非所以為愚知也黃鳥秦風人之云亡邦國殄瘁大雅秦穆公以三良殉究非穆公之過三良自取之也桑與棘黃鳥猶知所止而止之今不擇死所而止於桑棘曽鳥不若也此其與嬖幸何異君子舉大雅之詩以哀其死罪穆公之用殉似未盡也晉小臣夢負晉侯登天晉人亦以為殉亦自取也孟子罪象人而用曰備象俑猶不可不知三良之殉豈特象俑而已乎葛藟周南宋成公卒穆襄之族以昭公之立因攻之以殺公孫固公孫鄭昭公不平於二族而欲圖之故樂豫以為言而有及於葛藟之詩也昭公不聽自作弗靖以及二族書曰宋人以衆殺為文者惡其首禍於公以誘成衆人之亂也曰右師曰左師曰司馬曰司徒曰司城曰司寇六卿之去皆公族也樂豫雖有言疑若自為容身故以司馬讓與昭公弟公子卭也卒之六卿和穆襄之族然後公乃安葛藟之芘本根效矣此詩本平王東遷棄其族人故詩以葛藟尋斧枝葉為刺板之三章大雅晉人以姑息一婦人之故立靈公靈公不君晉鬼幾不祀秦師以晉使而來秦晉相讎不靖纍嵗而先蔑士㑹之奔皆趙宣子失於聽言昧於託孤禍可勝諱哉板之三章以詢于芻蕘以負薪者之語尚有可採此荀林父以曉先蔑之使秦也士㑹在秦不見先蔑非特誤其身以其誤國也嗚呼伊尹相太甲立之放之復之不動聲色措天下於泰山之安古今一人而已剛亦不吐柔亦不茹大雅毋縱詭隨以謹罔極大雅楚小宋大其不敵久矣宋聽華御事之言示弱以納侮勢之必至也夙燧之載何足以辱國君宋公承命於始而違命於終可乎子舟自以當官而行是亦牽牛蹊田之說而乃援仲山甫之詩以自文又曰詭隨罔極者將軍之令一至此乎其恃大國欺小國聖人所不豫也宋人卒殺子舟以雪國恥曰楚子曰蔡侯以子敵侯狄楚國蔡春秋之微意宋孔子所生長之國也孟諸宋之大藪澤厥貉之次楚距宋亦不逺矣鴻鴈小雅四月小雅載馳四章鄘風采薇四章小雅鄭衛得罪於晉者以恃楚而蔑同姓也魯文公如晉欲因公為根柢以請平於晉公皆成之故明年為新城盟其叙晉趙盾於七國諸侯之下亦以抑趙盾之專晉而喜公能成兩公之託也沓與棐衛鄭二君異地為㑹然獨鄭伯禮公賦詩也以公子歸生之文故以賦詩答盛意也鴻鴈求哀季文子以同憂答之又以公久在行賦四月為詞子家又以載馳為賦以明急欲求助於同姓之國文子賦采薇以許其情宛然賓主之禮形於俎豆酬酢可觀也哉胡不相畏不畏于天小雅畏天之威于時保之周頌齊魯之不睦以邾之爭也趙盾隂制晉侯俾受齊賂扈之盟自陷於無能之地其何以表率諸侯哉謀伐齊者八國諸侯各以爵書魯文公初不與此書諸侯之盟于扈不唯為內諱其不能終事於齊者亦魯之深恥也齊人又有西鄙之侵以曹之來朝于我又伐之季文子援二詩以明其不畏天道何有於人事哉欺魯之小是欺天也以行賂求免於晉而逞志於魯魯不得已有畏於齊公子遂明年卒盟之始齊侯不及盟卒為郪丘之盟郪丘齊地入其國而盟之不幾要盟乎人之無良小雅飲食之人人賤之矣子公之染指嘗黿羊斟不與食羊悻然顔面以敗國事事固有大於此者乎小雅以不遜之詞以為犯上之漸本於飲食以及夫爵祿也不然何至懷一食不與以宿怨殺人乎宋華元之御者耳君子援小雅之賦譏之又曰敗國殄民又曰殘民以逞者以言其怨也甚微其害也甚大嗚呼百乘之車百駟之馬與一食之羊孰多有以見宋華元無統衆之才杜預釋之以華元寬而容衆非也靡不有初鮮克有終大雅衮職有闕惟仲山甫補之大雅晉國之禍以靈公其得立者皆天也趙盾初無曲突徙薪之謀於先乃欲圖之於焦頭爛額之後果何及哉二詩皆諌詞也既失於初又安知其終又曰補衮之缺如仲山甫能補過也庸君不悛雖鋤麑之賊有不忍者以盾之不正其始而欲效忠於終區區全身於狂猘之口而卒不免惡名者人謀不臧天報之也弒君趙穿而史氏書之以為趙盾兹非天乎君子惜其不能越境免禍非其說也此可以為人臣欺天之戒二詩與今說詩大異我之懷矣自詒伊戚逸詩春秋書許世子弒父不嘗藥也晉趙盾弒君不討賊也皆出史氏直筆孔子採其意以作春秋為天下後世亂臣賊子之戒防微杜漸非一朝一夕易之所謂履霜堅冰者早辨之術也然則趙盾逸詩之賦心則知之蓋趙穿自出其族已為晉卿內不能制之於家又縱之於朝吾夫子曰趙宣子為法受惡古之良大夫此一語可以贖宣子之罪也於春秋之書略不少恕者於以公天下大法民之多辟無自立辟大雅春秋者聖人直筆詩者聖人雅言皆聖人之經也泄冶書大夫以殺又援詩之大雅以證其死其亦惜其人之忠而骯髒於淫亂之門也歟紂殺王子比干武王封其墓孔子仁之與微子箕子比其為仁則一也杜預乃以泄冶不為春秋所貴反以孔寧儀行父道楚入陳討賊為能補過失聖人懲勸之義因并正之文王既勤止周頌狄為周患自太王以來有之不獨文王也周公方且膺之東遷之後春秋赤狄最强吞噬衆狄欑函之盟衆狄始服者潞子娶晉之女為甥舅之國幾於和親也赤狄侵侮齊晉非一日如先縠之不忠以邲戰之敗往往賣國於狄赤狄日熾欑函之盟狄之支黨既已翦去赤狄有必滅之勢故欑函之盟以文王之勤自比者文王事狄不絶愠問成周室之業也子孫忍忘諸乎晉師滅赤狄潞氏以潞子嬰兒歸近在五年之後以晉女歸以狄臣千室賞荀林父者欑函之盟始之也汋曰於鑠王師遵養時晦頌武曰無競惟烈頌晉楚爭鄭久矣鄭伯肉袒牽羊以請命於楚人晉人之恥也猶欲救之楚人乘勝為邲之戰以至敗績者晉之自取也荀林父士㑹本以中上二軍之將初無必戰之意固欲其還先縠以中軍佐不從三帥之謀此主令不一必敗之勢也尚何以追鄭於既勝之楚哉然楚人初甚憚之亦屈而求成二詩為諌有取於武王汋武二頌欲回先縠之意而卒不從遵養以須晦昧者惡積而後取之兼弱攻昧以成周家無疆之業杜預所釋經意也元戎十乘以先啓行小雅晉楚戰陳之形元戎者楚趙旃魏錡二子皆晉之不得意者怒楚師楚王以左廣親逐趙旃適與苟林父遇林父親鼓已不知所為氣先敗矣舟中之指中軍下軍蓋趙括趙嬰齊士季先縠之軍行也一鼓則狠愎而甚怒再鼓則怯懾而先奔晉軍罪人三人者同三帥果何恃哉十乘元戎以明楚子之以身率人善陳也是役也晉倉皇易師而行是以甚敗載戢干戈載櫜弓矢我求懿德肆于時夏允王保之周頌武之卒章曰耆定爾功周頌鋪時繹思我徂惟求定周頌綏萬邦屢豐年周頌楚子縣陳定鄭席纍勝之氣與晉為邲之戰又幸勝焉楚子自反而知之曰晉罪無所而羣臣侈心初未知之也如潘黨欲收晉尸以為京觀夫楚狄也如莊王不幾王者之仁乎詩頌以武王自許豈潘黨所能以諛悅取媚者七德之賦詩頌武王之德也其三其六三六之數楚樂歌次序與今詩篇次不同杜預云亂離瘼矣爰其適歸小雅鄭以小國介乎晉楚必爭之地已不幸矣又有重不幸者內有怙亂賣國之臣以利自封而求市如子服者死有餘戮矣子服先入楚師欲分鄭以立魚臣楚莊王前後滅九縣曰息曰鄧曰弦曰黃曰䕫曰江曰六曰蓼曰庸又曰武王克權使鬬緡尹之文王縣申息故子服以是生心鄭人殺之君子以史佚怙亂之語又以詩小雅闢之言禍亂至此不晉則鄭果何所歸陳錫哉周大雅周人所以禦夷狄者歷世出一法無有二也狄之種性所欲於我者太王以來子女玉帛文王不殞厥問竭力事之是豈有二哉計赤狄者衆狄之長雄者也潞氏甲氏一姓而異族晉人初以女女之繼即滅潞氏又滅甲氏服二赤狄於二年之間此天運關夷狄盛衰乎不然何其威懷之得術也庸庸祗祗用可用而敬文王也晉人賞荀林父因及士貞子蓋士貞子進荀林父故貞子受進賢之賞陳錫哉周之詩言文王以惠利錫天下無間夷狄造周家無窮之業其子孫遵用之晉始事狄而終滅之其家法如是也此詩與欑函之盟専以文王為言以明春秋雖亂其禦夷狄之法未之有改戰戰兢兢如臨深淵如履薄冰小雅傳曰苟子之不欲雖賞之不竊此孔子教季康子禦盜之法也穿攻靈公而有桃園之弒賊也靈公使鉏麑殺趙盾不克亦賊也先縠召外狄以禍其國亦賊也士㑹受繞朝之策遁秦而歸其心蓋知盜矣一旦以獻狄俘於天子請命於周晉以為中軍將以代荀林父林父方受狄臣千家之賞曽不旋踵士㑹挾狄俘之寵中權之遷得以攘其政柄豈不欲之賞哉晉盜之奔秦不知士㑹止盜之術何以感之也戰兢淵冰之戒不善人者果何如人哉君子如怒亂庶遄沮君子如祉亂庶遄已小雅齊晉與國二伯之流風餘澤未逺也一郤克何足以煩諸侯哉屈晉求齊出於輕舉雖無婦人其笑宜矣跛眇之疾豈蕭同叔子之為哉郤克必欲讎齊以傷人子之心其悖禮害義甚矣原郤子之意不過欲速取政柄幸士㑹之老而求代之耳士㑹則知之故以詩喜怒為言昔人以喜怒已亂也孝子不匱永錫爾類大雅質子可也質母可乎郤克幸於一勝矜其豕突之氣於齊以婦人之笑還以辱人子之母可乎徒言何益其何以今於諸侯哉齊人援孝子不匱之詩非所施於無類之小人也漢髙祖曰吾翁即汝翁必欲烹太公幸分我一杯羮蜀姜維之母曰千頃之地豈計一畝王陵之母伏劒以送使者三人者以私恩害公義今則非其說矣晉人徒言之左丘明徒載其事纍說詩者之㫖多矣此與頴谷封人一詩二義我疆我理南東其畝小雅布政優優百祿是遒商頌先王之命諸侯各有分地物土之宜以修職貢或南或北經界正榖祿平也齊南而晉東也春秋以來大吞小强并弱壤地不明職貢不修晉以鞍戰幸於一勝欲使齊之耕者盡東其畝不唯意在無齊其亦無周天子矣夫以紀甗玉磬者器之從名紀國之寶也地從主人則汶陽之田者魯田也齊以悖取晉亦悖得復以歸魯故魯衛之諌晉侯足為盛德之舉也欲質人母欲併人國徒以空言喝齊然亦凉薄矣小雅商頌二章皆齊人求哀之詞也故為爰婁之盟三帥既各受命服既歸郤克自以得意皆以不伐為功豈亦有所愧耶濟濟多士文王以寧大雅蜀之盟以公㑹楚人以下十一國于蜀楚之卿至是始列於中國故以公㑹壓之人其卿而不名以微者告也不欲以夷狄之卿而公為㑹也是嵗楚共王年十二三强冠之子重與為陽橋之役以救齊者以晉楚爭齊也共王之弱不如莊王子重之賢不如子玉故以用衆為安文王以寧者以濟濟之衆也是役也蔡許二君皆弱强冠而行不書者乘楚車失位嗚呼君弱臣强夷狄盛而中國衰一至此乎不懈于位民之攸塈大雅蔡許之君二孺子也强冠之與為蜀之㑹乘楚人之車如兒弄爾責在師傅之臣不在君也伊尹之於太甲周公之於成王可以任此責二孺子何足道哉朝廷表著之位如山不動君思其尊臣思其卑如是則大雅之詩謂之不懈民賴之以息肩無失其所可也何有於蔡許之君哉君子必援此為賦者以為有位之戒攸所也塈息也敬之敬之天惟顯思命不易哉周頌成公即位之年臧孫許及晉侯為赤棘之盟以魯卿而晉侯也乞師以備齊楚鞍之戰因以歸汶陽之田三年如晉拜田之賜又受荀庚之聘而盟之矣成公至是欲二心於楚者恐晉不能終芘之晉侯亦疑之故不加敬於公季文子因援周頌為賦者何也盟㑹者神天之質信也可不敬乎今晉侯輕易之非所以敬天命也敬人則敬天命矣不弔昊天亂靡有定小雅春秋有進夷狄之法聖人嘗以有君許之有戎有荆楚有秦有狄今又有吳其睥睨陵跨相屬也自周公膺之征之孔子有取於管仲者取其可以繼周公之志也吳之始入中國也郯因以成其惡何也郯內受魯晉齊邾之師郯已疾矣何敢與吳為抗不得不請吏於吳以申公巫臣之教侵楚近地諸國吳始大矣季文子有賦於小雅之篇哀郯受吳之兵以禮義之國䝉夷狄之侵莫適為主欲號天告亂有莫獲者不相弔恤也女也不爽士二其行士也罔極二三其德衛風猶之未逺是用大諫大雅汶陽田魯之分地為齊所侵晉以忿兵不義而取之齊魯以無功而復故疆於晉人之手何也以吳楚為急也楚取鄭吳取郯魯與齊晉同為馬陵之盟其欲歸汶陽田於齊者齊事晉且為吳楚之備也凡田曰取言易也今又曰言許其言而不許其取其言又易於取也七年之中一豫一奪魯不能自有而屬之齊齊又不能有而失之晉晉齊爭以市道魯人因以俯仰避就于一田之間蓋女晉而士齊二三之行可恥也謀之未逺人臣當諌之此大雅之君臣也韓穿之徒何足以責此愷悌君子遐不作人大雅君子之於言也必有已信之效故上之人得以信之此平生之言也繞角之役欒書從知莊子范文子韓獻子不與楚戰之言此已信之效也且欒子得政嘗用三子之言以為可信而終身信之不復有疑侵蔡侵楚侵沈未嘗無獲者以三子之言也君子因取文王之詩以為上之人愷悌樂易以來天下之言而作成之於必信以收其必信之效其言之可從者豈唯三子之言而已哉又非特三國之獲也韓奕之五章大雅緑衣之卒章邶風宋共公之立使華元來聘欲娶魯女以厚為援也納幣來逆宋公無主婚皆華元為之故稱使也衛晉皆來媵同姓姬也魯遣季文子如宋致女復命公賦大雅韓奕之五章取莫如韓樂穆姜出拜樂詩賦緑衣之卒章取其實獲我心宋魯二姓之好宛然成文婚禮之隆也雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱逸詩莒之不量力凡三也以小敵大一也殺貴公子二也恃城無備三也渠丘城莒城二城皆惡鄆又無備振螳蜋之臂以當楚之車轍十二日而楚克其三都君子賦詩以為譏絲麻菅蒯絲麻為貴而自棄於菅蒯之賤也以姬姜之妍而忘其蕉萃之醜也渠丘而至莒莒而至鄆次叙進兵三日克渠丘三日克莒三日克鄆十二日而莒國去矣尚敢以不量力之莒抗大國之楚哉吾夫子刪詩止有三百五篇尚有逸詩如新宫之篇此篇不知其孰風孰雅要在三百五篇之外夫子之所刪去左丘明傳春秋與聖人同時豈在未刪之前乎
