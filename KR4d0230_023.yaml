body:
  text: 方舟集卷二十三宋李石撰左氏詩如例下綿之卒章大雅角弓小雅節之卒章小雅甘棠召南魯以周公之故以諸侯之邦而用天子禮樂魯之所有而諸侯所無者韓宣子之聘觀太史所藏之書則周天子禮樂盡在魯矣魯之所有晉之所無則他諸侯之國亦無書矣此韓宣子之詫見也或曰楚之左史倚相能讀三墳八索者今之易也五典九丘者今之書也古者入國知六經之教何獨二經哉猶今以堯舜三代之典孔子所祖述憲章者大鳴於天下何啻左史倚相楚人之讀哉蓋孔子之所取三絶編於易象始隱終麟於春秋者本韓之所見太史所藏周天子禮樂盡在是矣是嵗孔子甫十嵗童而讀之幼學之年也韓子以二經知周公之德者述文王重易之心行天之四時以繫日繫月為春秋天子禮樂備於魯晉無此書則諸侯之邦亦無此書也昭公享韓子季武子賦綿之卒章以晉比文王以韓子比四輔也韓子以角弓答賦兄弟同姓親親也季武子又賦節之卒章以晉德可以惠養萬邦非特魯之私也季武子又賦甘棠召伯所憩之木以比韓子所玩其國之木以答角弓之意大哉周天子周公之德備於此詩則禮樂之聲音也韓子初知晉政為平公如齊娶婦納幣因修聘於魯汲汲於太史氏之觀此晏子知其為君子者有以夫淇澳衛風木瓜衛風子夏之序淇澳曰有文章又能聽其規諫入相于周韓宣子聘魯以其觀書太史一事足以見其文矣其與魯季孫宿酬答之賦輕重適宜今之深於詩者有不能窺其趣也淇澳之詩美衛武公之父子也是行如齊以其子須逆少姜父子偕行淇澳之賦義取諸此北宫文子蓋善言詩者豈茍而已哉其子須亦晉之上大夫也木瓜衛人報齊桓公之賦其取意逺矣敬慎威儀以近有德大雅晉之使美使也魯之報聘亦難乎其才矣晉來而魯往之國大小之不敵也韓宣子以知政而來叔弓以叔老之子而往無乃强弱之果不敵乎晉以宣子之舊於禮有加叔弓惴惴遜避不暇今之循牆降階之容可觀也每每先君後臣先國後已其曰無敢為賓又曰下臣來繼舊好自審其小强弱不敵叔向大雅之賦許之以知禮近德豈誣乎人哉嗚呼春秋之亂襄昭之世晉楚齊魯鄭衛之間何其君子之多天運至此以生聖人任斯文之責其亦層衆山以為太華積衆流以為溟渤吾未嘗不歎息於斯君子如祉亂庶遄已小雅威福者喜怒之謂也威則其怒也福則其喜也威則刀鋸甲兵刑之屬也福則錫賜爵祿賞之屬也齊景公濫刑而晏子能感之以一言福齊國君子小雅之賦以晏子為君子也為仁人也祉者福也其喜也以其所以福喜者止齊景公之刑所謂以祉已亂者乎晏嬰如晉請再以齊女繼室張躍知之幾於逢君之惡矣嘗與叔向語而稱之杜預以傳護晏子不與張躍同譏者以其請繼室以成晉平公之過也鄭子太叔曰張躍有知猶在君子之後謂此平公在位二十六年至是三娶晉將分於六卿而不悟也悲夫是嵗魯昭公之三年晉平公之十八年齊景公之八年人而無禮胡不遄死相鼠有禮者無禮之别禮之所始以義起也然則義者其禮之本歟州縣欒豹之邑也欒氏以此邑亡范氏韓氏趙氏皆欲之有義不當得者晉侯以賜印段以印段之相鄭伯可以得州之田故以䇿賜之三卿則各有縣田義所不當得也印段鄭之臣楚靈王之妻黨子豐則印段之父也鄭雖小國以印段之忲以楚圍新立晉侯録子豐舊勞賜印段以田以其禮足以得田也以忲聞於鄭而以禮如晉晉方畏其忲乃能自屈於禮不以圍之勢驕晉食父舊德此受州田之曲折也相鼠之詩君子意譏三卿義不當得州田而印段之不以其忲而失禮一章之刺其嚴矣乎吉日小雅芈圍之惡子産既知之於數年前矣始娶鄭之豐氏欲以兵逆婦子産使子羽折之一也游吉聘靈王新立既歸謂子産具行器子産期以數年二也至是鄭伯如楚以子産相靈王賦吉日以宣王自比子産探其意具田器待事與田江南三也夫以靈王侈心始末子産皆知之以鄭小國立於楚大國之間以子産而與惡人處鄭亦多君子哉不然印段之忲逢圍之惡鄭且不免矣七月之卒章豳風春秋書昭公之三年冬雹又正月大雨雹者冬雹則周十月正月周十一月也宜雪而雹隂盛陽微以災書雹也季武子欲求禦災之道申豐為言以藏冰之道何也冰者至隂之積以救陽疾隂陽相和則雪而不雹矣唯聖人可以感此禦災之道也七月豳詩周公作之鑿冰窖之凌室祭祀百官之用取給焉夫有冰則隂氣致用於陽不為災矣隂盛陽衰則夷狄盛而中國衰之象是嵗昭公四年楚靈王主申之㑹率十一國之師而徐戎淮夷並在就㑹而執徐子又生八國之師因淮夷以伐吳夫夷狄之盛中國之衰也隂氣之盛陽氣之微也禦雹救災如周公之詩其可乎禮義不愆何恤於人言逸詩子産以惠愛見稱於聖人著於後世蠆尾之謗足以纍其親雖子寬之賢不能不疑者何也周公之典什一之賦井田之法也鄭以小國介乎晉楚無嵗不兵無日不役加丘賦之數一牛三馬以備車乘雖魯之田賦履畝而稅者何知於周公哉春秋亂世也無一國不富無一國不貪何獨子産之尤民各有心而議其上非豪傑之士也周公之心召公不知子寬不知子産之心亦宜矣逸詩之賦禮義所存萬世公議以聖人為重足矣有覺德行四國順之大雅大哉吾夫子之言也公賞公罰不徇其私君子以此為德行修身之具豈特為政以順一國人情哉雖天下之大四國之衆亦將順之而不敢有違也仲尼以下七語者吾夫子援其所聞於先達者本之周任之言又本之大雅之賦髙明博厚與天地同其大叔孫昭子一何幸哉豎牛既殺兄又囚父餓之三日而死不孝不悌則梟首寧風之棘上有餘戮矣叔孫昭子之立牛之功牛又相之牛之死以昭子之請於國人不以其私以公天下賞罰此吾夫子所以大之也是嵗昭公四年孔子甫十三嵗蓋春秋追述之也儀式刑文王之典日靖四方大雅儀刑文王萬邦作孚大雅子産於襄公末年得政褚衣冠伍田疇教子弟已獲民譽仲尼曰人謂子産不仁吾不信是國人既謂其慈惠循良不特他人如叔向之詒書也自伯有公孫黑之死二族奔亡多謗幾欲以刑止亂也其答叔向書曰吾以救世是矣其曰不及子孫而乃鑄其言於鼎名之曰書以為鄭不刋之常法此豈三代亂政作刑之意乎叔向援二詩以文王望之夫文王之刑則周公三千之屬成康措而不用無一人之獄者四十餘年三辟之作果此意乎不然則子産當任此謗矣宗子維城毋俾城壞毋獨斯畏大雅坎用牲埋書此漢人造蠱類也寺人栁欲以是殺華合比以撼太子佐太子佐幸免而合比以此奔衛傳坎牲埋書以盟書如漢人之蠱書皆詛祝也宋太子幸免衛太子不幸者宋平公漢武帝明不明之别也平公僅逐華合比武帝用此殺衛太子寺人栁江充皆起於畏他日太子之立故為此以疏間人父子也嗚呼華氏之族左師向戍之言是矣逐兄而弟代之兄奔亡而弟代右師之位其不義於其族一至是耶向戍大雅維城之賦知右師之必不免矣爾之教矣民胥效矣小雅諸侯賓客以禮相酬酢為重輕豈止語言笑貌之間為哉贈遺幣帛如紵衣縞帶報復可也晉楚之敵以讐為交其使命通聘自宋之盟以來未久也楚公子棄疾如晉者報韓宣子之聘也宣子之使不逆於楚晉欲以不逆復棄疾此輕重人情之常也叔向乃以是矯之者蓋芈圍以來楚强晉弱欲不逆客不可得也况棄疾有欲王之理乎叔向小雅之賦不欲效楚人之辟而以大國使命待棄疾曰國君者其畏之之詞歟普天之下莫非王土率土之濱莫非王臣小雅楚之君臣不君不臣兩失之矣築章華之臺為離宫竭民力而實罪人靈王不君之失也闌入王宫自執其閽不為有司所與乃自請諸王此芋尹無宇不臣之失也王飲酒以慢無宇芘一閽而慢令尹其失之尤者芋尹以王匿盜器與盜同坐而以紂比其君其失之尤者夫以楚夷狄也獲敘進於中國僭稱王號不君不臣何足深責而無宇乃以小雅之賦以周家全盛大一統之勢自况何不度德量力哉彼日而食于何不臧小雅夷狄吳楚之僭進之於人而謫之於天人不勝天久矣春秋末年吳楚之盛人不能抗之晉侯之問蓋有感於此也尚何魯衛分地之拘哉衛君諸侯也叔孫豹上卿也日者人君天子之象也如魯衛何足以盡天變晉侯有問於小雅十月之交之詩三務之答臧不臧之政此詩人本意何有於魯衛哉癰疽膏肓心腹洞潰一方病一方痛士文伯非所答也周之四月夏之二月周之十月夏之八月前以分地而後以政之不善乎春秋日食例三十六宜廣以此意可乎哉䳭鴒在原兄弟急難小雅死喪之威兄弟孔懷小雅晉衛兄弟同姓之國也晉受孫林父之奔又受其戚田之入晉以大國欺衛小國晉負衛曲者二尚何以為同姓兄弟哉當親者疏其疏者可知也已是時吳楚偃然抗衡上國晉力不能支反更疏所當親以自取削弱者職此之由也夫以衛襄公之卒人知哀其喪况同姓兄弟乎范獻子因是以告韓宣子有小雅䳭鴒之賦其曰逺人誰敢歸之意謂吳楚桀驁晉非其敵亦人情之易感也弔死歸疆范韓二氏所以分有晉國者兹其漸云君子是則是效小雅左丘明之於吾夫子豈唯好惡同之其助吾夫子多矣且張本之說先經始事是嵗魯昭公之七年距孟僖子卒之年孔子三十五嵗則昭公之二十四年矣以孟僖在鄭相昭公不如儀在楚不能答郊勞既歸魯乃始講學吾夫子是年止十五嵗志學之年而先經所始乃二十年前事此左氏之助吾夫子也曰孔丘聖人之後必為達人一也鼎銘二也援臧武仲之言以重之三也明孟懿子南宫敬叔之得師為同門生四也記吾夫子之言以明孟僖子之補過為君子五也小雅之賦乃二十年後事左氏助吾夫子之意其以此夫或燕燕居息或憔悴事國小雅左氏論日食前後二詩相戾也衛侯叔孫豹果卒魯衛君臣同譴既得之矣燕燕居息盡瘁事國則人臣勞逸不均意指叔孫豹之為人臣始終不常自速天譴也又言日月一嵗十二月㑹合朔曰辰隂盛陽微則日食十二次分野當之此詩意也夫前後二詩折衷十月之交前後相戾如此學者所未曉哀哉不能言匪舌是出唯躬是瘁哿矣能言巧言如流俾躬處休小雅君子小人之分能言不能言之别也君子能言言之嘉也以安其身小人不能言言之僭也以災其身叔向援此以稱師曠為君子而有小雅之賦也石言于晉有無未辨也而乃因此以託諷於晉虒祈之築以召非言之物師曠能言之叔向能知之其曰子野者字之以為君子者以别他人之有言紛紛於世强聒而無補於事叔向非唯知言又知詩杜預以為與今說詩者小異昔之說詩専以為讒言亂聽也哿嘉也巧言者非正言也經始勿亟庶民子來大雅文王創周之業於商之天下三分有二民去商即周去苛俗而即樂土其於靈臺靈沼也芻蕘之采雉之獲文王未嘗不與民人共此囿之樂詩人大雅之賦以歌文王靈德之及不以地為廣不以囿為夸也魯政歸三家三分公室而各有其一郎囿之築公乎私乎叔乎季乎魯史之公豈私之囿叔孫昭子之譏勦民且援文王之詩罪在昭公不在季氏也傳釋之以為書土功之時豈春秋之意乎南蒯欲以費逐季氏歸其室於公必季氏囿也陳錫哉周大雅欒髙陳鮑齊之四族强弱之不侔矣欒髙怙强欲攻陳鮑謀之不密為陳鮑所先能以弱為强者何也欒髙逐六子陳桓子皆反之分三邑益其祿也且以欒髙凡四敗來奔於魯陳鮑分有其室殺之而受其利仁者不為也桓子乃能聽晏子之言致諸公而請老於莒景公豫以莒之旁邑又辭之穆姬君母也以髙唐豫之然後受傳敘其事而以大雅之賦比之且大雅文王創周之業也小白用之猶足以霸陳氏卒有立於齊者能施之心也昭公八年楚滅陳蓋自陳哀公之死陳亂楚滅陳而縣之九年復書楚㑹於陳又書陳災者以明虞舜之後不豫楚滅也德音孔昭視民不佻小雅莒者魯附庸邑也三家分有公室而取其地莒有不服者季平子倡兵柄而二子從之春秋以三人者書之不欲季氏専之以明莒為公室之附庸也左氏乃専之季氏時有毫社之祭執莒俘用之以明示得意是甘心為忍人者臧武仲小雅之賦以周公之不饗為言知魯祀周公以天子禮樂而用人之祭自三家始也然宋用鄫子祭祀楚用蔡侯世子祭山犬豕之牲無異也魯祀周公不應有此莒可殺不可用也悲夫不自我先不自我後小雅齊之欒高二氏同出惠公為二公子也春秋書欒施來奔而不及髙彊彊即子尾之子也慶封之亡子尾多受邑而稍致諸君以示不貪及其將死也疾於公宫輦而歸君親推其車而送之其子髙彊弗克負荷以奔於魯嗚呼髙氏自慶封以來纍世之惡至髙彊尤甚非獨一身之積昭子小雅之賦傷髙彊自以一身集纍世之惡不自我先後者其一身負此惡名也悲夫蓼蕭小雅天子之詩魯非所豫而宋非所受也以周天子之恩澤惠及四海猶零露之被草木也華定以宋元公新立銜命使魯豈懵然於詩之専對者哉既不知所取其不答賦者亦宜也是時魯昭公以莒人取郠之訴畏晉之罪三家亦將不免華定之意輕魯國君臣也蓼蕭之四章出於杜預之釋果當時享禮之所當賦乎宋魯異姓非宜兄宜弟如同姓之親者華定固不免而魯昭公君臣可免乎昭子所謂工於料人拙於謀已者祈招逸詩小人固有終身為惡自悔於一日之善有不得者以天道好還也芈圍之惡極力終身僅乃得國凡十三年豈不知子干之逼助之以晉如抱火積薪求所以逭死者此子革之言所以易感也方其乾溪之次愛周鼎貪鄭田大城陳蔡不羮其勃勃凶焰豈易震撼一聞祈招之音廢寢與食者知一死之不免天理之不容也不然雖百子革摩厲一夕何益哉是嵗昭公十三年吾夫子年甫冠顔子少孔子二十嵗方生之年也其曰克己復禮為仁者當後來追感靈王自克其不仁以成其仁因以教顔子也不然靈王之死距顔子之問仁嵗年亦逺祈招者祭公謀父作祈父為周之司馬以止穆王滿之蕩祇宫則免死之地或曰靈王羽衣執鞭欲以車轍馬跡周四海如穆王滿之長年非畏死也樂只君子邦家之基小雅子皮以鄭國之政授子産交手相付如父子繼述也子皮死子産哭之哀國人徒善其哀知己之死後此無與為善者誠然之說也且以子産德業之美學述之奧改作不失為惠愛剸裁不流為苛刻其曰有德能以寬服民其次莫如猛者此子産心術也吾夫子重之又稱其為惠人又稱其仁以止其不仁之謗子産之所以取重聖門者誰適之自哉知有子皮則知有子産也且以小雅之賦特以平丘之㑹爭承自日中至昏以折晉人之貪雖子太叔亦凜然奪氣於其側子産特以憂國為樂兹所以為邦家之基也其曰合諸侯者齊服於晉為盟也藝貢事爭承也宗周既滅靡所止戾正大夫離居莫知我肄小雅夷狄之患周家八百之業於以啓聖也太王避之文王成之周公膺之至於春秋始終見於書者一一可懲也曰戎曰荆楚曰赤白狄曰秦曰徐戎曰淮夷曰吳曰蠻戎曰茅戎二伯所以成霸功諸侯所以敵王愾者用此藉口成熟也昭公十六年中國無霸主吳楚自相讎敵齊伐徐楚殺戎蠻蒲隧之盟齊人取甲父鼎之賂以夸示雋威兹叔孫昭子所以興無伯之歎而有小雅之賦也幽王時驪戎滅周鎬京舊地為秦奄有東遷以來伊洛被髮而祭皆戎也尚何周文武之業哉其所責執政大夫以訴其勞如昭子之賦者非所恤也野有蔓草鄭風羔裘鄭風褰裳鄭風風雨鄭風有女同車鄭風蘀兮鄭風我將周頌鄭聲者歌聲長言之蓋詩之淫風也吾夫子與顔淵言四代禮樂有及於放鄭聲者惡其聲之淫也若乃以詩言之所謂六卿之賦雖曰鄭詩其曰不以辭害意者斯其别也一别之正烏在其所謂多淫者乎竊嘗以其國風二十一篇觀之大率夫婦男女如溱洧之類簉雜其間至於關乎美刺者不害其正之體也六卿之賦鄭志者皆有擇也野有蔓草者子皮之子子齹之賦也羔裘者子産之賦也褰裳者子太叔之賦也風雨者駟偃之賦也有女同車者子旗之賦也蘀兮者子栁之賦也韓宣子以六卿賦不出鄭志以為君子數世之主者一一隨其所賦審訂其語而答之唯子齹子産子太叔三人耳是嵗韓宣子聘鄭鄭伯享之既畢因六卿之餞以觀其志之向背果何如也是嵗四月宣子聘鄭晉侯以八月卒六子之心所以望晉殊岌岌矣宣子賦頌之我將以馬將意且以天威為畏子産率五卿拜貺賓主之禮粲然可觀矣采菽小雅菁菁者莪小雅竊謂周官三百六十詩三百五篇昔人所為禮經三百無乃通稱之數乎孔子家庭之訓退而學詩退而學禮與周南召南之學非特以授伯魚亦孔子雅言諷誦之常也所謂三百者豈二經之槩乎不然孔子生晚周未有六經以前韓宣子所見於舊典禮經如易象春秋者皆周公制作如之何以辨之其或同或異也小邾穆公朝魯昭公燕之因詩以觀禮者賓主小雅二詩相為獻酬自今視之皆有體要主人求所以重客客思所以報主人者何昔人能之今人不能也嗚呼六經既作吾夫子以來學者有白首不能窮一經者舊典之學今廢矣悲夫亦有和羮既戒既平鬷假無言時靡有爭商頌德音不瑕豳風嬖幸給使與奴𨽻等耳豈可使之與聞政事必不得已如左右僕臣亦必辨其和同二義正人端士之所以事君者梁丘據嬖幸之人耳晏子則齊之執政也景公遄臺之田徒樂其語言軟美而悅之其同者亦未必是也而况和乎二詩之賦可也非所以責梁丘據如曰鬷假大政也曰德音不瑕王言無瑕玷若乃嬖幸奴𨽻之人語以大政宥密則非其職况其人為奄腐寺人與聞德音此豈人君任用美事晏子乃以是望據過矣後世分南衙北衙廢立征伐進退人物至有國老門生天子者其始禍於此乎韓愈贊梁丘據或猶之可也民亦勞止汔可小康惠此中國以綏四方大雅無縱詭隨以謹無良式遏冦虐慘不畏明柔逺能邇以定我王大雅不競不絿不剛不柔布政優優百祿是遒商頌書之九德士德之全也三德而有家六德而有邦然亦難乎其全矣所謂九者曰寬曰柔曰願曰擾曰亂曰直曰簡曰剛曰强皆士之吉德必有以調節宣暢然後用之槩之以寬猛二者寬則濟之以猛猛則濟之以寬不固執以自陋為不該不偏之士此子産所以授子太叔之政也子産以刑書封洫致蠆尾之謗上纍其親人不曰子皮教之何也子皮之舉子産傳之以心知其為吉德君子子産之政則子皮之政其所以取馮簡子禆諶子太叔者合衆德以為全豈特三德而有家者哉逮其告老傳政於子太叔則所賦之詩寬濟猛猛濟寬其曰和曰平者心傳之術即子産所授之術初得之於不言能言子皮則可與言子産不然子太叔以寬德致盜豈心傳之學庸有未盡乎子皮即公孫舍之子也不解于位民之攸塈大雅位者車也道者載也君子以位載道而行如車遵路不可失也一失其位如覆車臭載無以行道也然君子有不得其位者如蔡世子朱豈知所守之位可以君其蔡之民哉自周公封蔡仲蔡之為蔡可知矣楚靈王滅蔡平王之立復立蔡蔡人以失國之久褫魄於此蠢蠢矣自保不暇敢計其位位不自安敢言息民乎如世子朱有不足責矣春秋之責君子叔孫昭子之言大雅之賦足以為有位君子之戒也世子國之儲君平公死朱當嗣位不以適子之位自居何以靖蔡國之民他日出奔不終兆於此矣無念爾祖聿修厥德大雅楚人篳路籃縷以啓山林一同之地方百里也厯四賢君不以拓土役民為事謹守其國以德為險不以城也芈圍憑陵上國滅陳滅蔡城不羮之地乾溪之辱誰適兆之囊瓦之政有懲於此可也欲以城郢效尤此沈尹戍大雅之賦止述四賢君為爾祖之念者可以想見四君以來欲大而反小欲强而反弱城郢非守險持久之術也嗚呼夷狄入中國中國不足以敵之則必有夷狄者更出迭入以勝之吳滅巢沈尹戍又言之郢雖地强且大何能自保乎瓶之罄矣惟罍之恥小雅瓶小而罍大也瓶以為汲罍以為洗此祭祀禮器也王室子朝之亂敬王出居諸侯當任其責主盟者之憂也春秋晚周諸侯自憂不暇何暇憂王室哉鄭子太叔見范獻子言之獻子又與韓宣子言之欲㑹諸侯謀之嗟夫白大人然後救火何益於焦頭爛額哉嫠之於緯也當恤不恤當憂不憂也憂固有大此者乎子太叔小雅之賦瓶罍之喻其言懇切足以聳動獻子之心者兹所謂美秀而文者乎是時子産既死子太叔新知鄭政蓋昭公之二十四年也誰生厲階至今為梗大雅吳楚雖習水軍之利皆不知兵也楚貪吳人之疆以舟師略地者恃越與巢首尾腹背緩急可如左右之蔽彼其兵之出也有輕吳之心吳人襲其後者楚人之所不知越大夫越公子以舟應之而二帥從王則公子倉與壽夢也竟不能出楚地而還者吳人襲其後反喪其所得春秋書曰吳滅巢者如受大兵之滅人國也鍾離楚之附邑皆其所恃以應援者所謂二姓之帥此也杜預以巢及鍾離為二姓之帥誤矣吳人䑛糠及米前日城郢適所以致吳也沈尹戍不能救徒懷厲階之憂不為無罪卒之十年後吳入郢者此其張本新宫逸詩車舝小雅禮樂征伐文武二者天子之權也權出天子猶不免十世之失自諸侯大夫陪臣其世數或五或三可知者非其出而出之孔子之所親見春秋之書所謂禮樂征伐者權出於天消息盈虛之理也詩者禮樂之音生於人心者晚周之世士大夫心術日急一日有不足録者魯叔孫婼之聘宋也為季孫逆婦以卿出境已為非禮安能怪桐門右師之賤其族人為非禮乎宋公享昭子以新宫之詩猶曰新室許以女適季孫叔孫賦車舝以媚宋婦也賓主對泣俎豆間樂祁者桐門右師之諸父行也因佐賓主禮而知其喪心必死卒如其言人之云亡心之憂矣小雅卿為君逆婦而乃用於大夫之家尚何有於君臣之際哉春秋書叔孫婼如宋而不曰聘者以逆婦示貶也且其於人倫有甚悖理者季孫公若季平子之諸父行也乃從昭子行以聘於宋是為猶子娶婦也公若之姊為小邾夫人生宋元夫人公若從行者以其甥之為宋妻其意在敗其猶子之婚曰勿與之說者幾以國事謀之婦人也政在季氏四世昭公朝夕自保不暇公若之敗婚何益於昭公中外之計適所以速魯禍也樂祁大雅之賦蓋傷昭公搖搖將出以臣逐君猶為國有人乎是年公孫于齊以明公之出不復入若遜位然也惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國大雅我無所監夏后及商用亂之故民卒流亡逸詩五星緯天而行其變者彗也其所變之度分野之國當之不必専主一緯之變見不見昏明為候也曰彗曰孛曰攙搶曰蚩尤旗曰天狗皆緯星之變也譴謫示人大者亡國小者覆軍殺將故人君畏之然春秋書彗亦少矣天子弱諸侯强彗不為周出而為諸侯諸侯以凶德相濟分野十二國所次一緯之變雞犬相聞齊變而魯不書者亦理之當然也齊則彗矣齊侯禳之何預於魯杜預乃以見不見為釋妄矣晏子答齊侯二詩之賦蓋明文王基周以德格天而䝉其福夏商末年不能修德格天而失其民亦周之所監乃天下之大也天子畏天之戒豈一齊一魯所能拘之哉晏子言齊當以彗為畏不以彗為患二詩所以勉之也雖無德與女式歌且舞小雅春秋二百四十二年天子諸侯大夫世凡三變矣天子東遷一變也諸侯更霸二變也大夫分國三變也豈唯世數之不免要亦天道消息盈虛之數也春秋末年盟㑹皆大夫専之齊晉楚衛皆有變所變之國無國不為大夫也齊景公路寢之歎景公得之目睫而為後日心腹之慮豈暇計其子孫齊為陳氏景公之憂然以齊大夫視他國大夫一律也景公德不足以芘一國之民而陳氏豆區釜鍾公私異用取豫異數恃其勸分小數以是為德未足多也陳氏用之以移齊民晏子小雅之賦無德與女者義有取此乎至於四民不易業以禮嚴君臣之分景公自以為不能者雖然晏子不能容吾夫子於國何區區禮之足云嗚呼其君千駟之馬無德而稱也其臣聖門三尺之童羞道之其曰禮者君臣徒相䝉也民之多辟無自立辟大雅晉三卿之家橫矣祁奚之善叔向之直乃不能芘其子孫乎祁盈殺祁勝以其淫也家政何預國事楊食我叔向之子盈之黨也荀躒受勝賂反陷之於晉頃公頃公懵然受其訴者以三卿利十縣之地而欲吞噬之如此雖公室有不免矣司馬叔游大雅之賦以世亂為憂卒殺勝以快主心者度知不免一死於三卿之手共利在十縣之地非以専殺也是嵗魯昭公二十八年公在乾侯唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔既受帝祉施于孫子大雅文王周始基之王也三分天下有二猶事商受以福其後之子孫至於平王東遷賴諸侯之伯功以扶持衰緒日已逺矣晉政之在大夫計所得分地比之文王孰多其所積纍比之文王孰得披兩族十縣以自利此魏獻子代韓宣子之政也挾公室之勢封殖親黨以厚其藩牆者凡七大夫乃以舉親賢藉口成鱄以文王之德比之大雅之賦得無以是託諷乎永言配命自求多福大雅春秋立法權賞罰也唯其公而已魏獻子分祁氏羊舌氏十縣以自利私也其舉七大夫公也賈辛司馬烏又以納敬王之功魏獻子舉之仲尼聞賈辛得舉援大雅之賦以為一忠足以與國匹休垂名無窮是嵗魯昭公二十八年孔子已四十九嵗矣其賦大雅以明賈辛之忠者豈徒然哉敬天之怒無敢戲豫敬天之渝無敢馳驅大雅魏獻子不臣之心幸禍於周以挾晉室行南面之禮馴致有國其子宣子其孫文侯其漸於此也敬王出居以子朝之亂至徙洛陽避之東遷至是凡三徙都鎬京以來周不為周矣其曰戍周城成周不過合諸侯大夫為盟㑹以行天子威令如是而已而乃據所非據不唯上欺公室彼知有王室乎南面之位不臣之心以為幸此禍㑹可掩而取也衛彪徯則知之大雅之賦以天戒為言知其一而未知其二也其一者猶若假之其二者不臣之心必然之理也戲豫馳驅豈特慢君令瀆天威而已哉是嵗昭公之三十二年孔子已五十三嵗韓趙魏并范氏中行氏知氏乃在孔子既卒敬王之後元王之立魏已立國遂并晉為文侯孔子弟子子夏猶及為文侯師南面之僭履霜之漸可不懲乎高岸為谷深谷為陵小雅春秋嚴一王之法以大一統也是可二乎一王以下曰公曰諸侯曰卿皆曰王臣諸臣各以官為二可也謂之曰王則春秋大一統之法曰王正月者以天統三辰以一氣統四時無有二也晚周法壞王之有二吳楚之僭春秋抑之曰人曰子不以王書者法在故也趙簡子問史墨意以三家逐君自况其無君之心史墨淫巫也以魯况晉援小雅之賦以媚趙簡子後世亂臣賊子接迹無國無之誰適啓之陵谷遷變天地災異非以王之有二數之當然也史墨之巫三卿分晉之兆也悲夫柔亦不茹剛亦不吐不侮鰥寡不畏强禦大雅吳入郢之禍烈矣然楚王之奔幸以身免者得士之力也吾得五人焉司馬戍敗吳師三戰皆傷竟死之忠也季芈楚王之妹鍾建負之以從王于鄖盜攻王于寢王孫由于以背代王受戈義也鄖公辛之弟懷以楚平王殺其父蔓成然而欲讎之其兄辛止之反欲殺其弟仁也鬭辛兄弟以王奔隨吳人追之間之以隨吳欲復楚纍世之怨勢將不免王之兄子期貌似昭王請代於隨人卒芘楚王而以好詞答吳吳人義之乃退孝悌也嗚呼楚幾亡國而不絶者孰謂夷狄而無士乎大雅仲山甫之賦鬭辛以教詔其弟於此詩可無愧矣無衣秦風楚之伍員申包胥二臣相友善也於君親之義惟忠惟孝春秋之法所當褒之也伍員自楚奔吳教吳兵法因吳兵以復父奢之讎鞭平王之墓此其孝也申包胥初與子胥期曰爾復之我必能興之致秦兵以全楚於草莽播越之餘此其忠也或問二人忠孝孰先曰子胥先吳用子胥之法與楚抗衡上國如創業之臣也吳入郢楚王僅免死賴秦兵以興楚國楚之忠臣羽翼者衆或推或挽非特包胥一人如中興之臣也無衣之賦秦人以答包胥之忠或曰為包胥出師而作則與序詩者意小異秦康公在魯文公十年立無衣之賦則秦哀公也卒葬在魯定公九年靜女之三章邶風竿旄鄘風蔽芾甘棠勿翦勿伐召伯所茇召風寬猛相濟二者為政之德也寬則濟之以猛猛則濟之以寬二者未有偏任而為政者鄭政自子皮授子産子産授子太叔子太叔授駟歂凡四傳政柄矣子皮於子産得之於忘言子産躬行之始鑄刑書不免蠆尾之謗上纍其親吾夫子命之曰仁命之曰惠所以救其猛政之謗而約之以寬也其終也子産明言之以授子太叔曰有德則一之於寬次則以猛子太叔不能用其寬又失其所謂猛以致多盜逮於駟歂之嗣政也幾欲以猛懲太叔之政故有取於鄧析竹刑者刻之竹簡書不知鄭所鑄之刑有不足歟世輕世重之制又當如何竊意駟歂之政亦殺人之政也殺人而攘其善盜其法君子援三詩之賦凡以明其猛政之偏也靜女之彤管三章不以女淫壞史書之法也竿旄取其忠之可以告人也甘棠取召伯之決訟也嗚呼駟歂之忍人如此濫於用刑何益於鄭削弱之政乎杜預釋之以不受君命而私造刑書不知果何所據人而無禮胡不遄死鄘風晉齊爭衛衛之不幸也趙鞅圍衛晉以齊故也兵之曲直可知矣衛人自作弗靖而猶求之其伐邯鄲午是也午晉大夫也助晉為宜衛一朝而受二敵涉他猶挾前日捘衛侯之勇門焉師乃退既而執涉他以求成於衛者以捘衛侯手衛得以藉口叛晉遂殺涉他成何奔燕君子有鄘風之賦不過譏涉他以無禮自速其死也嗚呼晉不能抗齊又不能芘衛又歸罪其國之二大夫晉之無政甚矣猶謂國有人乎揚水卒章之四言唐風縱橫之言所謂鬼谷術者盛於戰國芽蘖於此駟赤之取郈地是也始侯犯以郈地叛叔孫也徒以不從叔孫之謀殺公若公若死侯犯以郈地致齊師者駟赤之謀也且叔孫之言曰郈地社稷之患乃援揚水卒章四言為賦四言者我聞有命不敢以告人心知侯犯之謀而密以圖之可也其反覆捭闔非唯侯犯墮其計中齊人亦為之出兵以逆侯犯卒之郈地入魯侯犯奔齊此不幾於戰國縱橫之言乎其所賦唐詩憂深思逺真唐之遺風歟爰始爰謀爰契我龜大雅衛之父子吾夫子有所不為者父子不正則君臣之分不明其他可知吾夫子言之曰正名者兹其是也靈公有子而逐之欲立郢也郢不應夫人欲立亡人之子輒已不知有蒯聵趙簡子乃欲以兵納之戚之戰曰世子云者以子未忍絶之於父也趙簡子以一衛世子之入戚也一朝而受三敵鄭也范也知也外則立衛君內則并二卿又與鄭為戰兵名之不立尚何卜之問樂丁援大雅之賦且曰謀協以故兆詢者取人謀之同也乃受三敵并二卿背腹為患其取勝者幸也且其誓師之詞簡子則以范氏中行氏藉口蒯聵則生名晉鄭二君以三祖為禱此豈三王誥誓之語乎車下之投與車下之踣不以一死茍免為幸乃振振然以勝為矜其鄙也夫不懈于位民之攸塈大雅不僭不濫不敢怠皇命以多福商頌嬖大夫者君側之佞幸人也一以將順柔媚逢君之惡所謂以水濟水誰能食之如梁丘據者於吾夫子有助焉齊人夾谷之㑹孔子誅齊優其為禮甚嚴齊要魯車三百乘孔子欲歸其所侵田以待命齊人之詞既屈猶欲以禮享孔子孔子因梁丘據以達意齊侯乃不果享據之為嬖庸有益於君不専於佞幸也今駟秦之在鄭為嬖大夫以佞幸而得車服前日戚之戰鄭以敗績書而嬖大夫以富侈聞以致殺身必有以稔成國惡而不知恥者鄭人惡之子思二詩之賦豈無意哉是時鄭方懲敗衄之餘又有晉宋之憂而嬖人乃以侈富自媚二詩所以懲之也
