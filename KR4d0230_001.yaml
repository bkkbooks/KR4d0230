body:
  text: 方舟集卷一宋李石撰賦梔子賦若夫梔子花者薝蔔花也天之生物物各有時時各有職職主一時時主一色威福之柄如君如臣如主如客不可紊也榴花妥簷與鶴頂鬭鮮芙蓉濯水與蜀錦爭魄此非天運之叙乎祝融用威朱鳥奮翼火輪曳空炎炎赫赫異哉詫乎一花纎微東皇刻一氣浩大天皇織而乃與較瑞花虛名為六出乎紛紛披披霧霰爭馳凛凛栗栗圭璧盈尺與陽俱升終嵗取食可以實百果可以瑞牟麥皎皎乎浩浩乎攘汾隂之瓊仙傾夀陽之粉額謬老李之鬚鬢奪蟾桂之標格六氣旋軫六月一息六而六之變化羲畫凡物待之曰此天數也物各有得汝自怙權與天爭力上帝照臨汝不無責言畢夢一道士曰某即風霆之精雲雨之澤也炎黃苗裔皆吾子孫爰自典謨既逺有熊是宅漲風雷之浩渺攀星虹於倐忽巫咸之九神姬旦之土圭所不能測曰戊曰已吾之降聖也繼南離以述志植九土而立極西皥之殺物然洪波之滔天然吾之役使任為妃匹也佐禹治水我即黃魔翊漢帝儲我即黃公傳授兵略幃幄帝師赤松羽化者薝蔔之為梔子乎梔子之為薝蔔乎嵗晚後凋屈意樛陰有不改柯易葉者猶足以侣青青而嫓松柏也四君子湯賦藥固多變味因以殊一出聖人之制四名君子之徒執德而居豈但反隅之舉分方而治足供調鼎之須原夫神農既已著經黃帝因而治已七十毒也我固知味四百病也誰適可使力調造化謂君者為羣善之君心在扶持如子者乃通稱之子肩股具體齒齡可期喬松下兮負仙人之質百草魁兮荷國老之姿權衡自有輕重臭味何敢差池左右前後小人屬饜於此元亨利貞天下咸樂從之且以子桑裹飯兮以不貧為憂顔回飲瓢兮以獨樂為喜酥酪鴈行兮䝉起死之懿膏粱稚子兮有更生之美將軍拔劒自割肉以就烹宰相隔墻悟飲醇於妙理大抵氣之運也或濕或燥人所感也有炎有凉得不按之以脉醫之以方伏羲致無妄之喜宣尼有未達之嘗最調和之得所縱瞑眩以何傷此治人之强弱况醫國之存亡遂令筯下安危因吐哺而歸漢鼎中强弱用滋味以干湯且以六官兮有國醫六職兮為尚藥由中及外為益不少自邇至逺其利甚博方劑之書若繁而簡經濟之用蓋詳而約㕮咀之誠既至刀圭之仙可作化人之國繼周滿之遨遊聖夀無疆邁武王之安樂迹夫造化小兒固有百種膏肓童子豈無一薰常不死者此固有道羡久生者盍尊所聞以標本而為主以佐使之從君五福夀為先兹為皇極十全次為上永馭人羣異哉已然者治於未然有備者愈於無備藏室之抱一聖門之絶四大哉四君子湯乎此吾醫國之本意五言古詩九里松荷花湖上船松影沙外渡松行又九里凉蘚引深步石橋枕溪斜中有入山路意行忘屈曲拄杖扣層户入門已欣然但恐所見阻更須上髙樓霽影䝉薄霧急風層巔起霧破山缺處青林一㸃明炯炯白鳥度獨坐不須禪山水得妙悟山圖丹砂山中期交梨海上約﨑嶇九折坂准擬一丸藥至今山仙翁已跨紫霄鶴鶴去當歸來塵世憶如昨天使自天降招去遊五嶽洞府日月長流水花片落我來似天意一官不足縛道氣迄未充何以痊瘴惡雲霞閟靈蘂霧雨罩仙萼臭稗雜菁英凡草混荃若未免七十毒誰敢試口嚼上焉憂國病下者念民瘼安得如昔人一舉翔寥落同鄧使君賞雙頭牡丹兼金必貴雙珏玉不獨隻嫣然彼叢生佳處亦求匹沙寒水成練雪洞山立壁春回小洛陽淑氣自融液主人似維摩拈花許入室不礙清淨眼粉黛眩青赤聨香颯輕吹並影旭朝日有如猗蘭心相同不相敵偶來飲此酒對花情有激試哦常棣章反經道如一黎墨少休大夫封應夢上公祿向來巖壑姿髙節嫓青竹低徊文繡地自謂遷進速邇者為客卿翰苑文史足炎炎雖可鄙炳炳有足録一朝汙濁流錢劵滿吾蜀黎州嵗應副印錢引墨三千餘斤童山要進取萬石壓車軸通侯寵富民都尉侈搜粟雖䝉須臾榮不蓋平生辱社櫟乃天全不及不才木春秋戒求名吾詩紀山麓王顯之求名其二子曰忠厚曰忠恕有子固可賀無子誰為羞堯聖傳世念厲醜似已憂有子與無子人事天為謀王家烏衣巷葉葉追前修乃翁萬卷書一一手校讎厚恕命爾名萬金美田疇種德日復日藨蓘期深秋字表名所出逺意孔與周陶公責端宣晉人警師仇君家膝上郎有如昔徐侯富貴二雛語豈有卑微休西堂前老松狀如偃蓋或云即摩頂松也松産茯苓為人竊去松今不存因栽數小松補其處書此詩壁上阿師從何來最是兩肩苦一頭載梵書一頭荷慈母至今江上松東西隨仰俯此松豈有情摩頂記佛語松根白衣仙日夜瑞光吐或曰松産茯苓有瑞光見如菩薩像翩然紫霄上蟄龍起雷雨我來悟前緣父老指環堵風花即几席經草隨步武重栽渺生意合抱階尺土他年十八公此地記初祖木芙蓉榮枯一氣內造化本自公春花與秋蒂孰云有不同試看木芙蕖雨露滋芳叢嫣然生百巧秀色傾房櫳婢子有不愜偃蹇霜枝紅溪栁疏其西池荷亞其東等作一物看曽是煩春工開闔寓至理嵗事號秋風惟有桃李場感歎無言中人日集蟇頥視堰大江拆兩股小江分一支秋水七八月老蟇喜持頥往往自誇大未覺海若嗤灌溉雖小惠湮溺已可危父老指水跡棲苴掛林枝髙田混坑谷漠漠沙風吹城堞不數步長堤漫委蛇我非河洛想頗為梁益悲神禹豈不到吾蜀幾為池人日有故事敢後壺漿期野叟餽魚兔鼓舞亦致詞一笑謝父老何由救民饑但得麥早熟眼底無瘡痍老守為爾醉燈火江之湄老蟇亦放光跳月天南垂小桃方春花氣蘇誰忍犯霜曉漫山千樹桃縮頸聽春鳥獨此開數株此桃也不小晨霞碎林霏絳雪壓枝裊梅魂正零落月影夜悄悄陳新接物態俯仰映池沼蓬萊有大桃嵗月較多少自從偷兒得弱水隔浩渺且與傾緑尊乍見喜圍繞尚有芥子微須彌寄毫杪送張道士遊西山至道觀雪打窗外竹共卧窗間床起來忍饑凍對坐唯爐香寫之三尺琴繞屋聲琅琅相從無此好要俶西山裝西山接飛鴻路入雲水鄉六月餘積雪冬木含春芳羣仙競來往御風騎鳯凰我昔曽見之瞳子瞭且光張子長鬛師沆瀣入肺腸為取橋下履仍傳枕中方此時覓刀圭念我雙鬢蒼送浩姪成都學官憶昔官博士所得英俊多斥去典蜀學蜀士煩搜羅二井轉轆轤猶能挹餘波袍子白紛紛有如鏡重磨愛汝似二父此地曽經過分職有十師聖門嚴四科儻非一萬卷難取三百禾我有十詠詩考古煩吟哦鼓鐘樂髙文羽翼崇雄軻似聞禮殿柏久矣尋斧柯古物天為惜蒸薪鬼所呵堂堂公議地嵗月窮羲娥忍此恣橫說後來敢誰何我集四庫書琬琰藏洛河此外有石經參酌正舛訛熟讀懋汝學師友相切磋汝有屋三間竹墅連松坡日夜望汝成門户髙嵯峩我貧自有道一竿釣漁蓑後生問老子守死山之阿病中謝三山問訊我昔擇師友所至多朋儔道義自然合如以膠漆投一官既已得勢利尋戈矛向者市道交日親成日讎僅餘山林士共結方外游一語不及俗自是無悔尤况乃生死事同參無異謀何暇及汝曹惴惴性命憂此間地步窄椰子包山丘三山妙僧傑道眼寬處求憐我本逐客饑凍妻孥羞有如呼雲鶴拍拍青泥溝儻非香火緣詎肯相恤收阿璋栴檀林手挽銀河流便欲洗俗輩歡喜解我愁阿興兩隨我五湖盟白鷗對師思亡友中書爛銀鈎阿鑑殊可人出世依大侯禪學瑄演輩圭峯家法優人人蹴龍象一笑風馬牛死鼠豈鳯食徒然嚇鵂鶹行藏汝自用吾生去來休大水寓武信二首前時布榖鳴早種不入土翻然變隂沴兩旬作淫雨半夜水囓堤一决不及禦貧民無燈火下牀已沒股曉登樹杪呼出沒見屋膂舟車或幸災桂玉豈易煮天數苟有定民患誰適與我窮一席地此憂豈暇汝為汝愁天公閉户不欲語民無穴居智不如彼狐狸奔流决户入尚懷囊槖資倉卒老稚計共此髙樹栖茫茫無舟筏渺渺失陵陂號呼性命急千鈞懸一絲引手幸免魚十五為流尸古今民父母唯有愷悌詩吾詩本不作聊以針厥堤齊人畫禮器齊永明十年刺史劉惔畫殿壁器服如三禮圖席益模本於石經堂惔或作悛或云劉悛所畫之壁今亡矣漆器侈初俗長袖喧都城如何古邃殿天開垂日星竒竒與怪怪惝恍不識名我嘗閲此畫肇自齊永明人間務備物未易窮丹青憶昨因郊丘盛禮嚴天庭器服各異數如此係大成仰瞻萬乘聖逺想三代英蟣蝨容著足鴛鷺參結綪西歸訪江梅鈞天夢初醒心焉感此畫眼角泫欲零所見恐未夥蜀都問君平送吳道明推官并問趙莊叔何公禮兄弟送客涪水上我家珠水湄我適歸未得此别那不思髙才府從事芙蕖映清池堂堂萬卷書樂此簿領卑公退得繞膝戲綵笑脫頥山路宿雨乾籬落黃橘垂歸鞍三百里處處吟酒旗趙子與南陽衡門各棲遲下馬恐問及說與黃梅期尚念鴻鴈行冷落秋風吹送黃安國同年同行先上峽沙水夜仍白江月曉未收聨船共一岸撼枕聞開頭五湖翻然歸鳬鴈蘆花秋低徊弄氷雪笑面㑹有由有如此江波大小同一浮纎花不自惜風捲隨輕鷗誰能徇殘啄五羖肥幾牛我欲知行津上峽詢鋤耰李漕和詩次韻斯文百官富未易衆目窺共此一鳥過誰其補三遺粗能述前輩抗說不敢卑一朝得印可寵若華衮辭神仙㸃金手為脫瓦礫姿微吟氷雪鏤落墨星虹垂老成今幾人縻以嵗月遲未用五字工護此兩鬢絲聖賢無盡藏一一生物滋丐公且藏舌尚結他時知驟雨荒風吼其前大雷擊其後人言黃昏雨此意無乃驟飄飄豈惡聲側耳聽簷溜一睡喜暫凉破窗落星宿明朝看東方老火已復晝起行視畦隴微露泫深秀枯溝澀不流焦塊濡未透看看嵗云秋槁死念誰救濫興桑羊誅妄使土龍鬭彼巫乃誣爾拜舞雜符呪舉頭亦茫茫萬一幸天漏雲行則雨施坎畫自羲后為霖有真源中路困坑竇眼前蒼狗姿津潤豈能潄何當捲江海九萬廣天覆有禱恐未遲帝閽吾欲叩王晦叔許惠歙硯作詩迫之書生總不羈豈是謬進取偶然一舟具初不作出處三年客江湖風浪恣掀舞君門九天上一一守莵虎是間無先容何忍棄外府萬卷久已破一字未及吐歸來賦蜀都筆下帶吳語傳聞兩坑石妙處天可補試遣長鬚來拜賜君已許次韻何景山愛山亭好山在樓頭行人在樓下愛山乃貴名過者豈易假而况主與客君漫我亦且九峯紫閣間可玩不可把嵐光接雲氣溜溜溢杯斚兹山於吾人儻有一日雅從今兩舍地時復枉車馬何必滄洲圖醉語剩揮寫攜子孫到四明洞節叙有感辛丑七月二日四明本山名與洞屹相向取山以名洞足以迎景貺我非濟時才香火三遣放再為玉局吏聖恩覃曠蕩有如鑑湖乞均逸江海上圓也如乃翁歷歷耗心匠三徑同蔣詡五柳比元亮一日培壅力百年基址壯桃李遵舊蹊松竹緣疊嶂林花拂朝晴山鳥激清響園人收果實夏秋各有餉誰云槖駝種已有猢孫藏翁前攜客來未免䇿拄杖﨑嶇到洞門衰病筋力彊洞中亦虛白喜氣含萬象俎豆具倉猝一杯復一唱山果與山花足以備清賞杯盤㫖味薄筆墨醉語妄醉中忽擡眼雲巢仍在望投杯攬衣起涕淚立惆悵雲巢我師友白玉已黃壤相距洞與山風雨燈燭晃有如對牀夜了不隔尋丈他日吾子孫丹青二老像草堂洞山間二老忽來往題三昧泉世傳悟逹國師訪第三尊者於此泉上即袁盎後身人面創朝錯仇也事具山中乳崖霜雪根金地白蓮蘂泉上碧眼師秋月照清泚玉籢開明鏡肝膽兩寃鬼若為人面創如以佛手洗遂解七國仇化為三昧水我來愧塵纓與世無愧喜平生一瓢心屬饜豈為已定知蜀山龍雲雨髙卧裏微絲出游戲僧飯氷入齒灌溉丹穴深窈窕滄海底人怨旱火焦雷公費鞭箠請師拄杖頭攪山喚龍起伊川祠呈程詠之彈我清風絃酌我明月樽栖遲元祐鬼零落伊水魂金玉百世師丹青幾代孫氷雪耀荒谷雲霧迷空村斯人厄衰世吾道誰與論仙人白石溪夫子青山根遊黃州東坡斯文元祐間一代人物好我生嗟已後不及見此老朅來東坡上雪堂亞荒草此州三家村大江流浩浩四海矜重名六丁護殘藁傷心逐客令失腳空山道昔為魑魅憎今作神明禱小橋行吟處風葉付誰掃何司法惠示樂善新編賦詩為謝不讀非相篇人心謂如面隂機蜮窺影巧攫狙伺便誰於牛毛端萬念回一善此間有堂奧次第躬履踐自言不為惡凛凛三語掾世塗多疾人竒藥得瞑眩貽我南陽書補作東平傳魯國焉取斯為語宓子賤三游洞危磴俯寒水隂崖擘蒼烟上開氷雪窟下垂珠玉淵何時雷斧手拓此壺中天自然渾沌竅不受百巧鐫地勝集靈氣木石含清堅三子果誰歟流輩孰後先我來叩玉扃欲訪雲雨仙呼龍龍未醒日髙貪睡眠送王瞻叔總領吳山浮海青蜀山粘雪白兩山相西東渺渺萬里隔一官誰卑髙博士省中客嵗月成後先去住作分拆先生何時來六經尚遺澤衣鉢肯付我頗任弟子責鬚髯襄陽翁龍鳯出窟宅典刑耆舊內卿月耀詞伯歸路入西湖官梅已堪摘好將軟紅書博此千頃窄夷吾王郎孫江左書竹帛臨風失驚呼看刷九霄翮題王氏欵竹亭夏蟲不知氷朝菌不見月吹息天地間隨分了寒熱誰為欵嵗晚久久嫓清節君家小令君千金僦别業不殊山隂宅孫子今幾葉勝取三百㕓共坐六十劫春林扇溫風夏簟落蒼雪重來得更僕千偈不須說湖嶼有序東湖門西偏得小室前揖城堞花木隂茂如突出中址也曰湖嶼我昔泛洞庭白波大如屋水天兩相際渺渺浸坤軸小舟掀簸中嘔眩篷底伏忽然得島嶼便欲縋船宿西歸收驚魂且濯泥土足東湖一席地江脉自渟蓄烟雨相吐吞几席染湖渌汀洲紅白花游泳雜鳬鶩橫流溢四海未暇較吳蜀駭我時世情風波戒平陸海山堂有序湖嶼之右有堂前有小池四時水不竭環以數小山竒怪詭異之觀隱見於疏竹幽花之間曰海山海水際天水海山蔚空青萬里供逺目隨處來户庭庭中森紫翠户內含虛明澄波汲引入螺黛疊甃成空光集雲氣岑碧延日星逍遙等一物大小隨所經髙霞渺三韓衆水涵四溟仙馭來何遲上天跨鯤鯨用意敢自隘萬慮凝秋清夙緣有悟契矯首鴻鵠征蓋公堂有序海山堂對峙有堂東向到官之十日有嵩山異人見訪置榻延之問治道焉頗如蓋公教曹參者僕非其才又恐取名之過聊記所本以從事曰蓋公堂林靜有集鳥水濶多潛魚未能急期㑹乃更談清虛吾家柱下史不讀城旦書偶挾一語契到官十日初仙人氷雪容訪我雲霞居掃地䕃修竹引水澆芙蕖吏最果不足丞負良有餘深文到穴鼠百巧呈山狙從今結繩內只可禁網疏雖非膠西室有此指南車仙巢有序蓋公堂上有小樓以三仙山所在也天下二十四化而彭擅有其三曰仙巢仙人九天上驂鸞紲飛虬飄飄紫霄御下作人間遊二十四洞天海上橫十洲乾門鑿井絡丹梯雲氣浮中有三仙山璫珮鳴琳璆羣仙各分化一笑芳菲留我作招仙詩披風上巢樓仙鳥銜玉書仙花拂人頭手挽北斗柄揖取銀河流六合正泥滓一洗蒼生憂魚相忘亭有序東湖有亭臨水魚游藻荇清泠中公退倚欄對之甚適扁曰魚相忘通塗合西南達人戒同異二魚各自魚是魚豈有二濶處海茫茫波濤適相戲笑我湖上亭鱗鬛紛族類情知我非魚此意魚或是欣然得所適相見不相遇魚行我無心我得魚亦遂藻荇披秋光水與天嫵媚明月貼湖心照見魚不寐我琴無殺聲螳蜋勿余忌九日遊天竺霞影塔觜紅嵐光佛頭緑沙明疏柳外尋路繞湖曲逺客誰與俱斯遊未為獨佳處心自領未易語童僕應接敢憚煩山水相追逐此間有魚鳥怪我來不速都城無閒官旬謁廢休沐幸兹九日臨及此秋氣淑醺酣豈無分登眺寧免俗起行九里松試插一枝菊西風莫欺客破帽雙鬢秃未敢醉向人藕泉潄新馥秋曉床頭窗眼白秋曙溜以光暗蛩亦念曉唧唧話夜長披衣看天東誰與搴扶桑急風吹雲翳髙樹搖青蒼疏疏沍寒蘂散作菊雨凉此景豈虛屬老火候已藏一室清淨緣竹隂覆縑緗手拊霜雪枝隱几待衆芳送范至能制置孔子不到秦右軍念西岷劒關鐵嶺江與世隔紅塵天亦惜祕境我豈世間人天上紫微郎筆端演絲綸跨象桂林郡騎鯨芙蓉津五嶺與三峽緣雲躡星辰憶公玉帳初草木生華春豢龍赤城家長生定前身扁舟載西子五湖浮海濵莫作去來想雪山輕重均况從尺一招甘泉問鬼神廟謨蓍龜舊鼎味桃李新虞衡備編載至能作虞衡志我亦願卜鄰送楊德源葛楠合翠蓋上有菩提坊大江僅一線風動雲氣祥地靈生俊傑醖釀成文章墨池子雲家在蜀無他楊君家好兄弟接武遊名場我昔夢見之青衫水仙郎修亷貫白日孝義感雨暘官滿喜可賀綵衣得升堂遲君臺閣歸侍立香案傍寄書問衰疾老矣慰蒼浪謝馮濟逺惠端硯學道本屢空所積豈為貧我生無長物有輒恐纍身挾塊公子伯陶土帝者仁可惜氷玉姿下與瓦礫親吾子泮林舊文采含青春江湖挹餘波謂此席上珍方正自溫潤玉德如其人潦倒竟何用厚德山嶽均愧非筆札才不堪演絲綸三召已三逐琬琰甘猥塵抆拭置前列濯以天漢津斯文儻未喪六經要鋪陳大易伏羲祖春秋丘明臣琢磨三益友几案增日新定非注蟲魚與世書鳯麟蜂蟻乳蜂十蟻圍小蜂兩翼弱三蟻掣蜂首四蟻曳蜂腳三蟻相後前捍圉行且却蜂母正憑怒有蠆無敢作相視母子心如被蛇豕虐蟻行蜂母隨衆力豈易撥彼嫌大樹小且幸神龍涸自謂無誰何利吻得所嚼蠅虎伺其便儇然才一躍中道取蜂去意外可遙度蟻羣不自量出力互相搏蠅虎跳擲髙細碎紛迸落餘黨尚未解尺寸歸路邈三師本伐戴反為鄭所掠孟明意取鄭二殽遭晉薄世路蜂蟻羣巇險逞攘攫向來騶虞仁未似蟻虎惡吾詩儻可佩捧腹聊一噱次蒲尉韻斯言誠虛筌遮眼漫盈紙冷暖當自知此味如飲水誰肯落驕榮還來共枯悴待渠轉船頭著力與風值最憐氣炎炎可上不可下青天與白日信有覆杯夜空林鳥雀喧村巷牛羊窄童子候簷楹喜此扣門客客來踏青苔曳杖入林薄只許老梅官謂我門無雜我貧無娛客相視笑不止向來諸阮間容我亦與此陶然見天真客亦憐我醉罷休明復來酒賤肯勤置贈楊教授讀書要身榮得祿為親喜端知絳帳華乃在綵衣裏冷官多淡泊有道足甘㫖登堂四壁餘發帙照案几尚有老孟光環以三稚子一笑扶鶴髮相見折屐齒出門顧諸生正事歌錫爾生朝適餘暇湯餅慶弧矢衆客集清辰好語塞兩耳我有海上方剩泛杯中蟻永為萱堂夀勝飲菊潭水送陸務觀近别已不易逺别良更難莫作逺近想便覺宇宙寬聚散與出處等以道眼看君去便鄉國我留為親歡吳蜀視旅亭隨處寓以安誰能詫凡見鷃翮齊鵬摶是家好門地羽儀耀朝端竹西丞相客冀北幕府官清廟瑚璉器仙人承露盤談笑翰墨香芳佩雜茞蘭雪山笏拄頥碧玉髙巑岏鋒車促收召買舟繫江干瞿塘浪粘天怒濤駕風湍西湖軟紅路塔級層旃檀還來捧御床剖腹呈琅玕前修席玉鉉舊事追金鑾潦倒困災患名節空雕殘不假子夏蓋敢彈貢禹冠隔濶如昨夢道義期嵗寒日邊一紙書時煩問加餐楊德彞立春日攜詩逺訪次韻鞭笞土牛子鼓舞勾芒神初開一嵗籥已有五日陳胡為松桂老强逐桃李新自言草𤣥客頗愛鄭子真雖云公卿貴虛名竟成塵况我已三黜素志無一伸遂去田舍畔得與漁樵親奉母缺祿食菜飽不敢嗔夫君亦人子等是我輩人青鞋裹白足烏帽遮長身襟期訪鄭老酒伴尋南鄰吾文天未拯古道日以堙登壇要先㰱更約明年春直方大有序㕔事之右有明窗北向冬溫暑凉公退求所針規之地曰直方大梧桐角可磨江沙玉能錯由來剛强徒未易勝軟弱是在六二坤對病可為藥吾生任天真三者不自度中年坐齟齬出語遭擊搏官居寄委蛇晴窗傍林壑泉乳發深竇竹萌抱新籜不習其在兹玩爻情所託一字得一師聖賢如可作坐待韋編翁為我解禪縛漢孝景時太守文翁始作石室西為文翁稍南為髙朕比文翁石室差大皆有石像蜀守席旦奏秩文翁髙眹于祀典竊疑二室者蜀人所以祀二公之意非必自作來為人所愛去為人所思君看文與髙慈惠蜀之師至今窟中像凜凜建立時知非伯有室定是桐鄉祠蜀人愛二公逺與千載期其間幾灰劫付與一炬吹保此嵗峥嶸不動山四維東家好鄰里豈任惡少窺祠前二古柏外乾中不萎勿作剪伐想恐是神明遺可憐墻壁間峩冠劒拄頥烈士不平氣好在淮西碑憂旱清和氣始交候火未可熾雨師偶失職焰焰使人畏東湖冷如氷捨此誰止沸猊吻呀不吐濁泥㸃枯翠農田不難料焦灼凜生意西南有重屯百萬方振臂自今數秋成一飽儻可冀蛟龍卧慵懶朱鳥誇羽翅吾生老文園肺渴不自慰安得挽天河併為洗兵氣送王郁教授隂山多風埃白日下雨雹君子何必陋士氣見淳朴巴江亦能騷蘭陵善為學斯文隨所化後輩仰先覺褐衣懷美質隱隱含山璞先生來何遲絢秀待追琢板輿行不難雙鴈度雲邈未嫌一簞蔬頗勝五鼎渥教人此其本何異墊巾角我昔困虀鹽為子得妙斫王明躬孝治正要䕫典樂小試臺閣資還來侍經幄次牟朝佐見贈韻郡齊冷秋菰飯客比僧供如何虀鹽厨便謂酒肉夢此間百戰場肥瘠較輕重霜花氣未暖氷澌硯含凍窗梅眩書燈厭聽曉角弄鄉心競節物椒盤已可頌一堂元祐師翠竹忍留鳯取材有成約浮海誰與從翻然著鞭先逸足未易鞚他日仇池書為記小有洞朝佐為石編類拙稿十卷甚有力故卒章及之小有洞郡圃新築芝草邊上秋風生衆芳感蕭瑟何由九地底一氣回暖脉官居類僧坊忽有芝草坼駢跗間紅紫合蓋暈黃白秋菌苦爭氣渠自凡眼窄此理豈人為信我匪天厄年餘竊邊廩菜飽固不擇謬政鬼所笑敢望神意格山中合歡桃隴上六歧麥一年獲三瑞曲水亭芝草分跗合蓋桃麥皆今嵗所得之瑞助我動行色歸來及受釐藉口緩誅責從今歸商山舉手謝樵客次范宰韻三仙白雲鄉地與人境異金巵老翁泉玉盤秋水芰誰歟肯下食三仙入夢寐一笑謂我言隨處類投畀蟇頥霜雪山危步踏森翠山間多君子一飯豈易致詩書寬褐姿曽何問名位家傳元祐學口語自嫵媚頗識李夫子一官若無意善惡政亦殊天心各緣類大哉聖人經春秋不書瑞但得好麥禾風雨煩筆記屢書不一書金玉文彩被物物胡為來根荄異形氣便欲獻天子明時乞宣示斯文儻有作士子歌既醉我亦採民言請付圖牒吏嚴一飛惠余一唯圖書贊其上甚佳石更名忠恕圖置之座右以為居官奉母之規再用眩字韻善水沃沸焦善藥調瞑眩吾豈斯人徒屏開慈母面丹青解人意二字出素練孝哉耘瓜子傷根豈所願升堂致一唯出門成兩見遂令李老書不入韓非傳吾家桃李園力行未敢倦明知政事拙稍覺言語賤四科定誰先袖手氷入硯㑹請無言師寬處著方便覓德醇菊花春秋書不雨十日九日乾向來陳菊根半掃黃葉殘施施蒼松獨耿耿秋竹單仙官轉物手半畝不作難芟籬扶弱幹團翠䝉朱欄一株萬寶釘風露鳴珊珊兒輩凡眼窄詫作舉首看折君清霜枝照我秋水寒年饑學辟穀准擬充朝餐九日同胡子逺攜三子以重陽能插菊花無分韻去年萬里客仰看秋雲孤今年返南畝頗復懷西湖今日果何日淑氣天四隅慿髙送逺目風景未覺殊試問先生菊何如朝士萸莫作去來想渺渺同一區久客負鄰里置酒煩招呼起登舍畔山山色定有無淡烟與晴日醉眼相糢糊我老腰腳頑健倒須兒扶題黃筌牡丹花下貓紅英艷雲霞緑葉足風雨牡丹花未開生意妙誰主丹青强摸索閉目想未睹天巧非人工神凝志良苦竦然花下猫蜂喧聒如鼓醉眼不成睡花氣日亭午黃生與我意盤礡一轉語我老花無情鉛粉付兒女次韻宇文守攜酒相訪宇文守名紹英天雷裂山崖驟雨翻盆盎田畝懷政最草木知治狀使君富經術暫屈乘一障黃堂燕清香比屋醉春釀文章出指授學校均幼壯獨我困樊籠老矣神不王尋醫詩未免勉力追絶唱滔滔原夫輩感此舍人樣旌旗出幽扉俎豆忽迂訪小摘情益親村舂未忍相蜀叟初不識漢墨拜竒貺從今門張羅一任臺無餉
