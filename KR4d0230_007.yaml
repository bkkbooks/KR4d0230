body:
  text: 方舟集卷七宋李石撰奏議論荆鄂兩軍戰守勝勢疏臣再蒙聖恩賜臣御筆知遇訓勉有加伏讀自勵敢不糜捐少圖報稱臣先日與趙撙等論戰守之策撙欲守湖陽其後王宣欲守順陽而王彥以公文欲取重兵於襄陽臣竊疑諸將各自為計凡境上士民軍中兵將曲折詢訪殆盡尋以道里逺近山川險夷繪為圖然後知三將所言未為盡善臣出圖共論議二將辭屈王彥亦以守湖陽順陽為非是當日再議用今日初八日以出獵為名同往新野一帶踏勘勝勢意欲合兩軍之力則戰守俱利也戎事至重社稷安危將士生死之繫若事虛談必䝉實禍無可疑者臣自知智力淺薄每臨一事不敢不盡心憂深而思苦夙夜汲汲類如此仰奉詳審之戒益不敢懈弛俟王彥等回一一議定具圖并劄子奏知伏乞睿照重名節疏臣聞名節者士之所以自重亦以重國也上之人設為髙爵厚祿縻致天下之士士各挾其所養所學趨而赴之所趨者未必得往往失其所自重何也取以金玉棄以菅蒯擇以菁英廢以稊稗朝夷暮跖乍毁乍譽所取於世者重輕相絶矣先正司馬光曰臣不敢惜官職平生粗知名節夫士之所以自期者能以光之言為勸則上之人輕重豫奪當須如何處之苟愛憎毁譽之未决千載論議之未白而一世誣衊鮮有不為風波之民者士亦進退去就於此矣且漢染秦汚俗時君侮慢待士詆訶及於貴近執縳加於士夫至有甘羞辱以就富貴多矣如不職不勝任帷簿簠簋不修不飾故為隱忍諱避之詞賈誼至慟哭太息為帝言之且曰上設亷恥禮義以遇其臣而臣不以節行報其上者非人類也今陛下容直言則循默者勉表亷潔則貪墨者勸旌忠義則怯懦者勇崇孝弟則凶悖者化顧臣何說以贊願陛下令監司帥臣於逐路州縣歲舉亷吏各一二人朝廷籍記與升陟差遣歲舉孝秀之士一人登名禮部以備召試為異時臺閣器使亦養名節風化之一助也豈唯門地科目之重而已哉可以飭士行矣臣久去闕庭不識忌諱惟陛下恕其萬死革冗員疏臣聞有事則有官官所以任事官之增减計事之多寡也昔人謂省官不如省事蓋事煩則官冗必然之理也夏商之官倍於唐虞周之官又倍於二代者事煩而官增也以今之事况古之事凡幾則其官可知矣仰惟國家因事建官以事之不可廢則官之不可省乃今欲為陛下省冗官豈有其說乎將遂廢其事以就官之省乎今官之冗又有出於一事一官之外者官之冗而無其事以處之蓋以貟多為冗也今之吏部姓名之籍皆其員也且以三歲科舉取士之所當得賞賚任子之所當出至於流外推恩錫賞亦其所當授者且以所當得之官使之䝉其名而不得其事可乎官以員為冗又可知矣竊嘗謂用闕以處員量員而制祿闕有數而用亦有數是二者法不可紊也然則求所以為省之道復求所以處之者冝如何也且省數十小吏大吏一人之食小吏數十之食也有可併則併之有可罷則罷之但事不至廢而省於廪稍之給者此省大吏之術也任子之初補與文學之初攝誠能創祠廟百千以處之分省大吏之祿以養之俾得理為考任雖薄其祿無害蓋時異事異入仕既衆而冗濫難革若是而冗員可革矣營田疏天下之利皆生於無所用旱之舟水之車此無用之利也夫有用者人知競而急趨之而無用者則不屑而棄之初不知無用乃有用之資㳂邊不耕之田乃無用之利也今之江漢與巴漢乃昔之人所嘗屯兵其地取其不耕者耕之以為食為息兵持重之計寬取民餽餉之勞國家知之置營田之官於其地蓋得之矣恐言之未盡行行之未盡至願陛下詔有司悉出意而為之今有司所患者不過曰耒耜錢鎛之費耕耘芟築之人耳誠使有司稍借其費又搜汰兵之老弱不任穿帶者募遊手之閒民雜耕於其地寬以歲月之力視其歲入之厚薄而為田官之殿最此誠裕民之一術也且治人之疾則必為之藥而冀其愈陛下既知民之疾取有司寬剩之財以裕之是知其疾而為之也疾未愈而藥不繼陛下將何以憂之乎然則營田者亦裕民之一術也武備疏文武相為經緯之術二者要不可偏廢特所尚有緩急耳且人之身血氣為榮食氣為衛今特以榮氣之強健而廢其衛氣可乎國家弭兵無事既已有歲自以為尚文之世然求所謂輔成文治以裨益政體者則未之聞陛下以神武不殺為威寓六兵於詩書之教廟算深逺非草野所當慮然以臣所慮特其粗者嘗謂虞舜干羽之舞人徒知其為文德不知其以蹈厲之節而寓其擊刺之威以明不輕用武也今之教閲之法亦昔人干羽之意雖曰文德無廢其武可也昔魚朝恩老於兵間已不識郝將軍之陳為李臨淮遺法况不習其教者乎州之禁軍縣之弓手所以為教閲之法者寄其緩急之用耳欲用其人必資其教且小人非居安於無事則必使之為蹴踏蹶張運其筋力馳驟其血脉習為冒險赴危之狀目熟旌旗耳習金鼓而不懾怯者此教之以緩急之用也且自二十餘年之間邊圉綏靜其可擐甲挽强者皆以老簡汰其少壯者已不知戰陳為何等事甚可慮也今之州縣教閲者乃素備耳今又於教閲之法不得專意為之而廢其事所謂禁軍弓手州縣冒法差役趨走指呼與衆人同所謂教之者兵官巡尉以時一出按例為之遇春秋大閲有司未免有損經費而徒為玩習之具此何異棘門之戲哉臣願行下州縣禁軍弓手不得違法差出兵官巡尉教閲之籍時稽考之以示安不忘危之意劄子學校劄子己卯上殿臣聞學校者長育人材之地也如有美材必資之於良匠欲求人材之美而不為擇師雖有材而無所用矣教官者學校之師材之匠也祖宗之法率以科甲髙者為之又以試中學官者為之不輕付也頃歲以來凡有出身官不問可否皆得為學官作為文字語言求丐廟堂往往得之至有甚庸繆者僅曉句讀竊科目者亦得為之服几襲裳竊師長之寄為士子所侮笑有不登講席不說題目書考遷秩以去且師之不擇至此欲望人材之美可得乎陛下比年以來取藩府學之大者為堂除其餘則舉以付吏部依法差注是亦作新學校之意矣蜀逺萬里大郡所得堂除者不過三四人其餘方州則科甲當得者然後赴部今蜀士三歲一舉十名中所得者無幾人且一郡必得一教官蜀之餘郡安能盡得科甲髙者與應格之人且安能人人裹糧萬里取一教官闕於部中乎不若略為之權衡以比其輕重髙下而進退之今欲乞令侍從以上歲薦才可為教官者各舉一二人籍記於吏部以俟堂除又三歲類試亦得試學官嚴其所取之目合格者登其名於吏部以次授之則濫吹之師不容簉迹矣賑濟劄子庚寅上殿臣間賑濟者朝廷仁政之一也要當以實惠行之務為虛文而實惠不至前日邛蜀擾擾是也且昔人荒政所用者常平義倉也頃年所至州郡往往應急那兊平糶之法名存實亡矣今朝廷所謂賑濟云者諸司遵奉行下州縣發陳廪設糜粥循習故事而已此外稍費支吾則束手無策不免臨時科於上戶饑民因執符檄以求飽上戶有不能給則攘竊爭奪之禍生嘯聚殺掠理之必至蓋相夸虛文徒惑民聽反使饑民生心也况乎春夏青黃之不接秋冬新陳之或愆常歲有之萬一更乘以歉艱物價翔貴指常平義倉以為實惠足以寬上户之責慰饑民之心前日卭蜀之憂未見其可懲也仰惟陛下臨御以來軫念全蜀所以豐衣食之源為水旱之具亦至矣然常平義倉明知其僅存虛額而畫餅可足以療饑乎且如增料錢引給降度牒入粟補官此近歲州縣兼足裨補仁政之一也或更指定一項錢物再申明常平義倉糶糴之法如昔人富人倉之類可得一年糧歲備應用無窮而不求之臨時或可為善後計也臣言有可采乞自睿㫖行下戶部詳酌施行邊報劄子伏覩四川宣撫司西陲九月內連有捷音此皆國家威靈逺暨將士久蓄之憤激於一朝取勝為快雖曰可喜而有可慮者敵久懷詐心隱伏二十年其發必不遽第時出以誤我此其計不難破也天下之患曰久曰近而天下之兵曰竒曰正久者期之以歲月之外近者謀之於旬朔之間歲月之兵以其正而旬朔之兵時出其竒可也今敵情尚逺歲月而我以旬朔之竒恐彼未盡奮其隱伏之毒而我之力先屈矣近者敵寨纍纍近邊以為果動則未有必勝於我之術以為未動則屯聚鳴嘯異於常時此其心欲誘我以羸而困我以數我後戰則為其所制我先戰則致曲於我必然之勢也比者劫寨兩勝之又取秦州於一夕之戰皆我先戰而彼之大軍未動兵法所謂出其不意故勝之勝則勝矣不過旬朔之利歲月之外不可不深圖而熟慮之也譬夫以一壯士而與百稚子鬭以壯士之力驅而喝逐之無難乃求一搏而投之於頃刻之快則賁育之技至此亦竭矣今敵情悠悠巢穴幽深所驅者吾兩河之赤子與契丹渤海之遺類以嘗我而致隙而我悉力赴之無算使果攻得其地能守乎此不可不過為之慮也且此特西陲耳其他並淮循江而上我之所以備禦者不可不盡至於敵為無窮而我亦為無窮敵為不測而我亦為不測量敵慮患制勝於廟堂之上而授成算於將帥槩此一方可以類推也今者西陲三帥皆以大兵出有司帑藏隨費隨給更一再舉則纍歲所儲告竭當一取於民民且憂矣敵以多方誤我惟深圖國家無彊之休勿以目睫近效為可常姑以為馴致尅復之漸可矣天下幸甚乞小路蠻都王承襲劄子照㑹本州據小路蠻都王阿示狀乞依卭部川蠻王體例承襲父官統轄蠻部未䝉給降告敕并換印事本州契勘先於紹興三十年十二月據進義校尉小路都王郎即狀為年老願依卭部川都王例令長男阿示承襲官爵統轄蠻部探報虛恨蠻賊作過事所有見用印記係竹林錫窟鬼主朱記欲乞換作小路都王朱記為文本州保明具申本路帥司乞行申奏至紹興三十一年准本司劄子坐准尚書兵部牒凖紹興三十一年九月二十七日樞密院劄子指揮依所乞關吏部出給小路都王阿示承襲父郎即進義校尉付身下本州給付所有印記自合就用元印行使劄付本州照㑹自後未凖降到告敕下本州給付緣阿示係是懷義嚮化專一探報蠻賊往來作過委是忠欵可嘉及應副年額馬數不闕者今照得卭部川蠻都王嘉祐年內酋長牟墨進貢朝廷䝉賜官爵後來牟墨死長子苴克承襲苴克死長子韋則承襲韋則死長子阿菜於政和六年三月承襲阿菜年老長子䝉備承襲父封其䝉備見係敕授金紫光祿大夫行懷化校尉山前山後百蠻都鬼主今來小路都王阿示乞行承襲委有上項體例除已具申尚書省乞早賜施行乞减科買墨煙劄子石比凖檄下本州和買印造七十四界錢引墨三千二百八十五斤石自到官後已節次買發過一千八百斤外尋檢照舊案牘見得日前每界所買墨不過二千七百斤往往買發不足而今次所買過於每界五百餘斤緣本州墨工止有五户又所燒松煙率近生界比年以來燒煙人户多是藉口採斫禁山松木竊慮日久别致透漏見今黎州數十里外一望空山委是於邊防不便欲望台慈特賜指揮檢照舊科所買墨數量行裁减却均敷下諸州出墨去處立為中制貴慿買發久逺遵守豈惟嚴護禁山邊面亦不致透漏矣乞科降鹽本錢劄子照㑹本州今月二十四日凖本路轉運司公牒坐據蒲江井監申契勘黎州乾道四年分冬衣賜鹽一百三十擔半并乾道四年分歲計鹽四百九十六擔零在監至今未見前來打請乞下黎州差人將柴茆錢取撥施行牒州差人前去關請施行契勘本州元凖本路轉運司遞年科降錢引四萬道應副支遣後來節次止以蒲州黑鹽一千七百九十擔零對折上件錢引四萬道今本州自備柴茆腳錢每年計一萬二千餘貫前去搬運歸州科與民間納錢應副歲計支遣常是積壓敷賣不行後來更於紹興二十八年元立科約數外添差使臣二十餘員一年請給動以萬計無可那融指凖又兼運兵衣賜絹帛卭州近年别無正色亦是折支黑鹽每匹不過六十斤上下又令本州自備腳費搬運緣自去年饑歉之後賣鹽遲滯凡百用度並以黑鹽凖折抵去年歲終積下鹽六百三十餘籠變轉不行并有未請去年秋冬季及冬衣賜鹽計一千二百四十餘籠合用柴茆腳錢三千八百九十餘貫亦無指凖至今未曽打請即因大段闕乏其官吏軍兵請給鹽不免自行變賣遂致侵射賣鹽人户月額往往破家逃竄誠可矜憫石竊詳前項蠲除閩山鈔鹽指揮其弊即與本州科配民間賣鹽事體相類在於窮邊尤繫利害理冝優恤欲望台慈特賜詳酌將今年合應副本州歲計鹽住行科支依舊年未措置折鹽已前時暫那融本錢引四萬道降下本州充今年一歲省計支遣所貴少蘇民間變賣急闕困苦之用所有蒲江合支本州黑鹽仍乞自使司均敷應副成都府或附近州縣支遣亦少減兩州支移腳錢之費國子監看詳安鼎補韻略錯誤劄子按禮部韻略同亦作同崇亦作崈疲亦作罷之類並係兩字一義禮部韻更不重出止附注其下今看詳到蠈字蟊蠈之蠈欲下注云亦作賊㸣字虡業之㸣欲下注云亦作業按經㫖雖借賊為蠈借業為㸣即是兩字兩意若更注亦作字於其下如禮部韻例是合兩意為一意兩字為一字也竊見蠈賊㸣業禮部韻自有本注分明只合依本注兩兩分押不合更添入亦作字與禮部韻所注亦作字以相溷亂轉使舉人疑惑委是難以施行表賀冬至表乾用九於天下式顯帝符復來七於地中永隆化國光生黼扆歡動紳緌恭惟尊號皇帝陛下剛健日新聰明時憲觀文察變既望雲物而書齊心服形以待陰陽之定隆五日一朝之養享千秋萬歲之期臣出守邊符再奉召節仰瞻雙闕不違咫尺之威與從八能誓竭㳙埃之效㑹慶節賀表中國其有聖人誕彌厥月大功而為天子於萬斯年舉得歡心同歸慶治恭惟尊號皇帝陛下循堯之道繼文之聲聖德本於好生神武行乎不殺克嗣無疆之厯坐隆有永之期臣出守邊符入奉召節方寸玉陛雖阻奉於瑶觴咫尺威顔行伏瞻於象魏天申節賀表聖人退藏於密益顯重明天子必有所尊親逢盛旦舉歸慶治普洽歡心恭惟尊號皇帝陛下道妙難名功成不處撫二百載中天之運成三十年必世之仁厯數有歸知上皇之乃貴明聖迭作惟文王之無憂臣久去闕廷逺乘邊障屬堯蓂之初度騰嵩嶽之三呼斂福用錫厥民同臻有極大德必得其壽仰祝無疆黎州賀冬至表聖人有作先天而天弗違化國初長御日而日不失歡忭之極率普所同恭惟皇帝陛下復見天心乾行物首慘舒獨運辨六氣以儲神消長得冝協四時而觀妙雲物備書於魯史厯年永卜於周正孚惠而信在中斂福而皇作極臣身縻逺服目遡昌辰老歲月以乘邊未辭蜀道仰雲霄而稱慶尚想漢儀謝厯日表出佩麟符中頒鳯厯大矣帝臨之赫粲然王度之新竊以天道有生育之權難於推測聖人敷簡易之德所以範圍庸示邦條無輕民事恭惟皇帝陛下祈年有永嗣服無疆至誠與覆載相參大信如寒暑不失臣敢不益勤本務恪守遐封齒髮屢新任坤維之留滯毫釐勿爽奉乾造以周旋又測土圭而正影再造慶基調玉燭以分光例頒逺服式循舊貫祇奉新書恭惟皇帝陛下久則生神積而化聖日遲速而有度天後先以弗違法象得堯舜之心律厯糾漢唐之步天下用九而治既底雍熙王者奉三無私靡容僣忒臣敢不周旋邊政勸課農功入奉晨昏視桑隂而自惜出分宵旰無黍晷之或欺眉州謝厯日表王者奉三無私仰承堯運乾元用九而治爰及夏正遵舊貫以敷休拜新書而登受恭惟皇帝陛下賁文曽飭泰治方來淳者表王道之無疵熙者彰帝載之有永執兩端而恭已斂五福以錫民底日以授百官仰飛龍之在御次春而大一統頒治象以維新臣敢不仰對明時誓堅晚節惜奉親之寸晷激事主之孤忠鳯厯改元固以接千歲之統麟經紀事尚可補四時之書又次春而大一統益茂聖時底日以御百官逺頒侯服惟皇錫福與世作程恭惟皇帝陛下天覆堯仁日躋湯德御身以六氣之辨扇物以八風之和協星紀之方周考歲端而布閏陰陽大妙水土克平鳯紀千齡已遞煩於推策龍飛四海足可兆於豐年臣敢不視晷事親勉期奏計夏時協序仰舊貫之足慿魏闕馳神及新年之可賀黎州到任謝表半刺新除濫叨申命一麾改授洊出誤恩既見吏民具宣德意朝廷所以望臣者不薄孤生所以至此者有由祗荷寵靈尤深感涕竊念臣學惟泥古愚不適時偶奏第於乙科免力耕於丁籍間䝉召對叨寸進於上庠遂獲執經陪諸生於下坐教道無術糾率罔功為親補外者已跨十年去國思君者寖歷三任引遡龍飛之日課功馬政之秋許投老以乘邊豈自新之無路此蓋伏遇皇帝陛下沉機獨運聖造無私因壘崇降秉文心而修教舞干苖格躬舜孝以通神知臣之持義或能守邊察臣之不貪或可互市致兹孱陋預有委掄臣敢不移孝為忠悅近來逺勉遂安輿之養不辭叱馭之勞六詔瘴煙誓竭殞身之報九霄日月尚餘奏計之期淵聖皇帝慰表諱承萬里本自流聞義激羣心至於殞越功成不宰法在可傳重惟前人艱難播越之勤用肇今日恢復休明之運日車未返仙馭莫追皇帝陛下性穆堯仁心因周德孝弟旁達雖足貫神明之幽熙洽所鍾更當思社稷之大益寧宸極務節聖情臣限以守藩無緣趨赴狀進易疏論語說狀性入者無形理入者無象性理二者聖人獨得之學述所自得修其語曰詞令以為斯文之懿也堯曰文思以思為用舜曰文明以明為用曰思曰明自內融洽而非外鑠謂不如是不足以發舒純粹敷為三綱五常經緯之具也陰陽象數深之而不精刑名法度述之而不盡蓋徒迹一偏之文而昧於窮理盡性者聖人之道日逺矣顔子之於文欲罷不能其曰雖欲從之末由也已何說也子貢之於文可得而聞其曰不可得而聞者何說也且以六經觀之皆聖之文性理所寓日月大明有目者咸觀雷霆大聲有耳者咸聽不知其所謂不可得而聞與末由也已二子果何所晦昧於其所師承也得非以聖人性理為獨得之學歟循其所自得以求所傳之心則六經之文皆其寓也六經之文易為之深諸子所以紹述於六經者論語又為之藴學者欲有求於無形無象以究聖人之道未見有捨六經門户而造堂室者也曷亦次第量力以馴致其深淺所入於二書者雖未至於聖人忘象忘言之學然求之於帝王之心傳闕里之家法於性理悟入二書者其幾是乎推修身緒餘而措之於天下國家其誰曰不然仰惟陛下以舜之文繼堯之文父子一學授受於六經日新矣巍乎其詞與天無極淵乎其㫖與海同深頒於教條諸侯之慮無所遁播之事物百姓之用莫能窺至其隱於常勝之道庸示不殺之武者積久生神皆此中流出雖使顔子子貢復生委質聖代於金華絶業尚不敢擬議况如臣輩碌碌膚受者哉靜念向者備員上庠以學專席尋即外補以學為職躬自履踐因事施設未嘗一日不學而所與共之者所至羣生徒而教之相與􅊰磨以遊泳聖涯者實不敢欺於心以取愧於天下以流為非聖之習如是而已頃因生徒綴緝臣所說易與論語幾成編次易則取六十四卦彖大象而槩之曰外疏論語則以已見折以諸家所長而為之說不敢自謂於二書有得去朝十年再䝉收召無以仰裨聖治美芹之薦采薪之義或有取焉謹併臣近所撰五針别紙繕寫隨狀上進以聞策問問退之為蜀之日子厚為越之雪夫師至於二子可無憾也然尚以怪取吠是知師道固難矣師固以道教人也學者受其說行之終身非若今之傳授句讀僅能與乳褓爭長雖日更一師初不損益也言師人則亡矣其道果盡無傳乎諸弟子以有若似夫子而曽子有所不從如曽子之意必得孔子復生而後師之則師道廢矣然子夏曽子各以其說教授其所以授學者果出聖人之意乎秦人焚書而賴以不絶者師道在也漢興六經各習其師名為專門如匡衡有師道可觀如張禹有師法可試夫六經亦多說矣而所謂可觀可試者果何在乎諸君之學豈但句讀其必所傅有素試為言退之子厚所以取怪於人與夫曽子所不願於有若而漢儒各知有師傳者願共學焉毋略問賈生董生漢所謂有用之學明於治亂安危者也劉向以賈生比伊管以董生比伊吕夫伊吕王者之佐管仲霸者之佐向舉以許與二子賈生表餌之說人以為疏董生天人之說人以為緩夫二子之學不見試與夫試而未盡固已不幸而疏緩之譏不免於世俗成敗之口今試優劣二子所學與夫所遇之主可以比擬於伊尹呂望管仲者以無輕劉向之言不然漢無士矣問仰惟國家兵興以來無利不􅊰然皆有術不至浚我以生者鹽鐵𣙜酤有取於常賦之外民皆樂然輸之亦知其所不得已自以其力所當勉者也昔漢之所資者巴漢之粟唐之所資者江淮之財尚能各以一方之儲足用天下則欲合二代所資以為今日足用之計茍有可以寬紓吾民而不乏於公上者願聞其術問仰惟國家版圖之舊自河以南半淪敵境邇者天心悔禍以開神聖恢復之運王師所指民相與壺漿先道喜見漢官之臨江淮以北關隴以西復為王土輿地所志可考而知然知所以復之而未知所以守之則悠久之慮廟算亦少勞矣竊計所復境土往來敵衝鋒鏑踐躪荆棘荒蕪亦難乎其為彼民矣户口不足則無兵耕稼不復則無食事力交病計將安出焉欲分兵以守之乎則沿邊之屯勢各有不可分也欲移粟以實之乎則餉道之逺力有所不能支也然則建牧守命將帥重其權委之措置而責效於遲久諸君試迹昔人南北相控制所嘗講者亦一說也問賈誼陸贄之學搢紳先生喜稱誦之謂儒者之文有益於世用不徒為紙上空言莫二子若也竊謂誼在漢猶有縱橫策士之風贄在唐猶有科舉進士之纍不然何所言之多而施於世用如是之落落難合也世之讀二子書者未嘗不追咎時君用之不盡而歎二子所遭之屈抑自有說乎今國家崇尚史學誠欲得如二子者而盡其用使之無空言不遇之歎如昔人者諸公當自得之問天下事成者不可壞而弊者不可不革前後之相因唱和之相應鮮有不出於斯二者易曰幹父之蠱者事之不免於弊而裕父之蠱者則亦無壞其成因其成而新其弊足矣此所謂克家之子舉善去惡堯則知之而以纍舜於耄勤總師之後者舜今日即位而明舉八元去四凶而天下安之如出一人不改其無為之治者天下事弊則新之而成者終不可壞此昔人論損益而不及二帝者有說也仰惟新天子即大位今甫周歲矣仰遵太上皇之政如堯舜父子授受一家未之有改也至於舉善去惡天下顒顒傾耳拭目以仰望於新政者事孰有先於此者乎寬大之令優恤之科以形於詔㫖者郡國奉行相望郵傳皆可考也願與諸生訂之
