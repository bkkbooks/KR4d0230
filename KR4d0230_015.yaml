body:
  text: 方舟集卷十五宋李石撰墓志銘龔漢卿墓志銘龔冠從隴西李石授春秋大易其人專默靜篤謂可與為皇王帝霸之學既而習為古文凡所以讀書一惟文之求其說自先秦古書至遷固以下不論其詞務為深峭險刻絶人數等至使人讀之不能句龔從旁睨之捧腹呐呐亦自不能疾聲乃始快幸以為篇之得意處其為詩尤甚以意立句以句立字以去聲病視他人陳語不啻疥穢著體必欲爬剔灑濯摘去乃已時出之以誇坐人人至捩眼不喜反憎嫉之至其好處又相與思而味之於别後以為可愛嘗謂龔曰文章聖賢中和道德發越於聲音語言而乃格磔聱牙於肝肺如落湍驚濤於砧竇穿穴之中何以自育於清明坦蕩之地乎嗚呼龔之所以不夀乎龔舉進士輒罷宋逺孫賈敦夫教授簡州龔往從之率程其試於舉子為第一死之日大呼自指其腹曰此腹學何所不有才何所不可用以卒聞者哀之年若干卒以某年某月葬以某年某月龔世不仕娶楊氏未及月龔死無子改嫁龔一名齊褒字漢卿父某先卒殯既久龔死貧甚其徒為市棺以殯其父之側不能葬平日知龔者多名人率欲葬之而未果㑹太守鮮于侯侃舊識龔相與告之諾出金又相與賻者勾龍惠趙傳其學徒王珉劉棠王巖與持無服喪以蕆其事舉其父喪而祔以龔愛友以及其親禮也龔之文可傳者百許篇其母老弟弱讀其文必有終哀龔之身後者銘曰文可編貽其世之傳吁奈何乎天王九成夷仲墓志銘君諱九成字夷仲石初因君亡友劉子夷叔而得其人蓋誠厚樂善知好吾輩者也始余與劉子皆居東州少交西州士未甚為西州士所知或足一至西州率睥睨諸公間少有一語合其他可知也劉子從李公璆為辟客舟行碎舟石佛灘下僅以身脫無一人哀之者過二江得君父子館於其家如素所熟劉子心怪之既而果為人排擠卒不合掉臂東歸謂余曰殆哉此行賴王君父子多矣且言君之賢能誦吾二人之文因勸余交其人余官成都君果挾劉子之知以來且自言從臨卭黃源學讀易久矣幸以劉子故得印證可乎自是率四十里間一早來暮去其來遇坐客劇談君抗身揖客坐席上欣欣若有得不出聲以去余固竒君之為人也後二年劉子與余偕官東南時各出一文示人輒聱不能句至使人含怒裂去不顧以是多得唾罵益甚吾二人竊竊自語曰是前日東西州也况萬里吳乎此文王夷仲却知容吾輩也劉子死於館職余亦罷學官以歸官成都君之子知方來泣告葬日謁銘余曰是平日愛吾文者劉子死矣非石誰宜銘按君世雙流人曽祖某祖某父某卒以紹興二十九年某月葬以三十二年十二月年五十八娶袁氏一子即知方也所居竹勝處館有師几有書觴豆琴奕非獨自娛亦以娛客每客至多四方名士相與說學問文章子弟立侍几杖斤斤蓋一義方門也至君沉厚和緩望望若欲有施於世惜夫不工場屋舉子業而樂從吾輩為迂濶左計其卒止此也銘曰佩明月之旗不若紵絮之易衣饜九房之芝不若黍榖之易糜人棄我收爽世所宜二江合流泝海以西匪君曷思惟友之悲有窆其幽請相吾詩王志逺墓志王君諱宏字志逺以紹興二十五年月日卒卒之五年其子謀葬而甚貧作貧無以葬賦泣血哀求於人人讀之至有為之出涕者呼為王孝子往往出錢助之又不能多其子得錢即買地既竁穴為墓材工徒皆集事垂十八九成或强家遣人出語怖憾罵言曰是我鄰為青龍臂不應穴堙塞之斥工徒皆散走王孝子又自作書咨聞强家必欲葬葬日益迫不得退炷香於得道山張仙翁求哀仙翁告之未言也李石適遊山見王孝子者癯然咿咿語若含哽不能出時作悲怨聲傍人至為叙所哀以告王孝子者泣石亦泣取其賦與書讀之問之則鄉先生王君之子也嗚呼誰非人子天下之至善極於堯舜之孝天下之至不善極於桀跖之暴今以堯舜之孝雖桀跖不敢以所暴加之至於一禽一魚猶知格心弭耳以聽者况於士類乎因呼王孝子手飯飯之囑之令改卜庶以是日克葬因携賦與書示人共得錢别買地竁穴為墓材工徒如初王孝子乃始拭淚視成事舉柩衣衾而納之壙先是志逺之父母未葬並舉二柩同穴而以志逺附而窆焉實三十年十月二十九日娶文氏二子一女孝子名翔即長子也次曰某女未嫁翔傭以養其母而能自立於文嗚呼志逺為名進士困場屋以死今幸有子如翔者可謂孝矣王氏資中人唐功庭蘭之後因書之為志云勾龍府君墓志惟勾龍持正氏世種德不逢至其孫復成始唾手掇取科第筮官成都撫屬自惟父祖槁項死場屋不振得一官無以致九泉之奉適其祖葬日逼自叙其世所出與其大母行實大軸謁銘隴西李石念與其祖為布衣交諸父為舊游復成則十年前泮林生徒也因謂之曰志其文則復成之文為己華矣何必更求若曰父死以子承重則諸父在以孫承重則二兄在若以已仕父祖不逮以遲於祿養則自言為甚難且至親無容至哀無文至痛發於涕淚聲音足矣復成之文不過徼取他人之文以益其文有餘矣昔叔氏以禮許人人譏其忲且専曽申之於禮曰吾聞諸申之父且以孫文其祖之死不自専而聞有所從借以豫為父祖之執也其言可不可者則有慿則應曰諾持正諱權為舍學名進士卒於某年月葬以某年月袝以周氏子若干孫若干墓在資陽縣某鄉他日併復成狀刻諸壙為志勾龍府君墓志銘君諱某字持國姓勾龍氏昔有令於資陽諱偃者君其後也方三舍法行蚤奮名場屋既升內舍適舍法罷後有㫖免省當出官曰尚可老主簿乎卒低回不試或謂君隱於資初無必仕姑以儒學媚世以育德齎志云耳故其處已也退然若無所營毅然若不可犯其居鄉也以謹恭降其心以禮義和其色惴惴恐人之議其後而以資名衊之也資陽之南為東津東津之西有巨壑巉壁千尺有古鑿崖腹曰佛頭君擇勝處築屋曰此吾莵裘也每時節衣冠杖履長先幼從鄰里往來濟濟睦睦相推敬或客至則爭為具務豐侈為歡客去則巾篚裒率為餞多君倡之也以門孰教同里有文學相輩行者必咨問之為詩文或暮夜推户索酒吟賦喧鬨至挽袖奪筆不醉不去余被丁丑號召携家艤舟訪其居君之內子錢於余之曽祖為姑姪相與團聚俎豆燈燭青熒子弟出屏拜客袖卷口誦近作詩賦求可否君曰吾自覺此是衮衮者差强耳余以是愧君年若干以卒曽祖某祖某父某娶錢氏先卒二子立夫德方皆從余游孫若干人卒以乾道某年月日葬以某月日墓在縣某地余竊自哂君不余負而余負君何也始余以先君子喪居方舟君兄弟携子姪指環曰從賢師為致􅎵瀡恱親可乎君之郎君亦亹亹下筆有序惜其不克卒吾業負老子所期所幸姪孫復成教授廣漢亦吾徒能書翁行實得以藉手為君銘銘曰內之有餘外之不願山林之華髮孰與黃埃之槁面及吾游從詩書履踐嘗欲以資中數君子者為耆舊傳矢銘厥幽一鄉之善支興道墓志銘張子寬先生易師也以小學教授雖童稚勝衣者登其門皆以蓍數授之凡前輩讀易有聲場屋者自其門出石年九嵗與支君興道吳君德駿同遊先生之門先生遇之不以童稚句讀也君長余三嵗率能誦師說退即抗聲作色以鼓舞羣稚人爭竊其說以復於師而幸免者未幾與君各更師他門里巷不逺往來每示題義講說不異向來時然回視昔年淳和朴厚之氣已比比為聲病舉子剽竊之文余則知之君則未知也一日君若有所憂曰親老家貧未即振發可若何余曰勉來相就坐羣兒間提秃筆掖公於敗亡未晚君以為夸而笑之君每試不廢輒不遇余登第興道姪壻趙逵以狀元歸鄉支門爛然自榮君一日獨致僕曰他人飯新先輩禮也某於吾人豈敢泛泛於衆客杯酒僕仕成都學官興道以疾告未幾卒卒以某年月日年若干葬以某年月日石家居其子某兄弟袖卷不敢言而以泣拜出卷則君之從弟全州户曹日中狀云支氏其先出合陽詳仕唐為許州節度子師友官於資為資之祖資祖四世名漸者元祐八年以孝旌其門曽祖諱某則孝子之兄弟也祖成父翊皆不仕娶楊氏先卒再娶馬氏四子皆儒業三女一適侯播一適黃庭一許適侯棫孫五人君孝友溫豫喜慍不見於色龎然福厚君子也長於治生幾以致富四子各占大第以處之病中召諸子誦書曰吾老手未嘗釋卷老病聞書聲則胸次廓廓矣汝曹勉而持之以正學而不成不失為鄉之善人以卒君諱時起興道字也銘曰吾率夢與君遊小學如平生師操撲据坐君從傍也發笈執卷以立吾凛凛以驚夢覺則君死矣嗚呼君夢乎吾夢乎吾俾吾兒與君之子修再世之盟義久則重勢久則輕不忘素交以為君銘王承信墓志銘承信郎王椿卒以某年月日葬以某年月日祔以妻郭氏併其兄堂其長子下班祗應槩之妻田氏凡四喪皆其子令望之舉也令望以左迪功郎合江縣尉狀來告曰屬襁兄弟父死緩葬且以疾不及來繼以其兄鄉貢進士令德書來又繼以其子壻前嘉州峨眉簿尉田俊心親來任令望不來之責且言其故甚有禮則按狀云承信君以其祖文至道間以南夷擾邊募子弟軍守禦朝廷旌其忠賜印名其所守山為青山許世襲為土主以主其子弟軍文之長子堂政和六年又募子弟軍與石泉夷人戰死事賜一子官以無嗣承信君以其兄陳亡恩補官校尉該建炎登極恩轉承信郎知橫江寨未赴丁母辛氏憂登峨眉山一跪一拜事佛以致念母之痛乃曰吾所以執檄致喜者為親也吾縱未能執一矢效死戰陳忍坐視多事之世及鼠雀簿領間乎吾幸不至貧此生一㕓地足矣性倜儻自適孝於親睦於族黨仁於里鄰而厚於賔客人有緩急捐金不惜幾至破産然好客飲酒自適林泉不衰享年若干以卒妻郭氏以某年卒二子槩前長寧軍巡乾道五年五月日卒次曰令望業進士二女長適田俊心次適前資州司理參軍黃思立槩無子以令望之子榮祖為後嘗致論今之邊豪自募鄉丁守其地豈惟其父母墳墓之愛出死力不惜至其知山川險阻利害非他兵之比此李衛公雄邊子弟法也瀘之王氏世守忠義不變青山之褒恩未艾也而承信君其力可以自致而父子一官止此耶吾友正字劉夷叔漢嘉守白麟皆以文誄之其可不銘銘曰一俎之容勇不如陳一錐之舌鋭不如刃吾寧去彼取此對青山飲酒以佩青山之賜印乎吾固知君之豪而銘諸重以客之言為信范叔源墓志銘范氏自忠文蜀國公以名節大其家至猶子榮國公淵深質正不見圭角而太史唐鑑公凛然可畏克肖蜀國凡范氏食之而不盡者非一世之積故蜀之言家法者首以范氏而蘇氏次之石蚤客於范氏獲交其羣從子弟頗多賢而有文不相依藉各欲自立而叔源諱漼以贈太尉鍇為曾祖以榮國公百祿為祖以贈太中大夫祖述為父其世代著於天下人知尊敬而叔源能知上世之可學者以滋其性初以太中公恩得官年未冠頗欲深却以收文字之績始試吏為仙井監録事參軍以鹽法與長史競不屈於勢有識者益知范氏之有子以從兄塤將漕本路換榮州録事參軍其辨金氏獄直數十年之寃金氏素傴以喜故失杖而起一州推其神叔源自挾世學不少與當路要人屈故宦薄不甚進辟監蜀州黑水鎮酒稅監成都府王店鎮酒稅監成都府商稅雖管庫間不為茍計如減虛額核羡緡類不觀大吏顔色故始知叔源者終益不合晚乃用舉者得右宣教郎覃恩轉右通直郎知簡州平泉縣未幾而叔源引疾去矣疾少間轉右奉議郎知雅州廬山縣縣扼制夷蠻以互市略相羈縻叔源增碉門掎角之戍而嚴禁姦民之私為市至今為法未幾疾復作遂以不起凡廬山之民哭之者廢其市實乾道丙戌九月十二日年五十二方叔源年少時欲起榮國太史之絶學以上襲忠文滿口故家典型而問學淵源內有師友蓋所至薄其官若泛然者已有聲如此而乃不克夀其可哀已叔源有子仲黼清苦而甚修久從石游將以乾道辛卯十月二十三日甲子葬叔源於雙流縣宜城鄉諸葛里曹池山之原以其母王氏之命求石書其墓石於叔源父子蓋數世之交且斯文相與不薄石其敢辭叔源二子長仲黼次仲藝鄉貢進士出繼仲兄之後女三人適王晞孟程師䕫餘未笄凡墓志之所不及者仲黼家傳為詳此不復著銘曰世可以髣佛王道者惟故家為然世益久而益有所慿藉宜其孫子多賢如蜀之范蘇誕后稷之穡者蓋踰百年矣文獻可考豈與夫崛起者校其後先哉如叔源氏欲永其世而或勝其天尚有諸子能力於學以大其傳文溪居士墓志銘文溪居士者楊紹肯堂也肯堂資之銀山人文溪銀山之佳處肯堂之隱居也故太史邵公博曰東園公以所居得名肯堂終將隱於文溪雖名不嫌故肯堂得以名始肯堂為進士意行行欲唾手取富貴不得試則又以其康濟皇王帝霸之學移之於樹藝果蓏之細自以當世軒冕之榮不博此丘壑林泉之勝其有取於文溪之名若甚廉凡世人所必爭者在所不屑而世或不信何也初肯堂家所資不薄所交皆豪右聨車馬接杯觴所至人爭後先延納聲稱豈遽甘為山中之癯顧所爭於一試有不獲已者然則隱於文溪而士名之居者於肯堂蓋屈也曽祖翺祖恕父中邵山谷所志寬之墓寬之恕字也肯堂與其兄綰皆及見山谷故肯堂兄弟所藏山谷篇章筆蹟為多交游以經前輩所推許者益歸重焉娶何氏生二子曰璋曰某皆卒二孫曰某曰某方璋未死時謁銘以葬其父甚急念不敢虛人子既往之心於九原也則為銘銘曰我訪文溪溪花始開鳥鳴花間相客酒杯居士拍手顧客以咍曰此過眼如風中埃别日幾何視此溪水人則不遇溪名之侈一經品題斯為可恃彰厥有來棲鳯之址鄭隱君墓志銘美原為虛以鹽為實蓋江溉之市地隔江望葛仙山在拱揖間人騖其市為井故環井以居僅數十主其地以致富多詩書大家惟鄭氏富而學者故以衣冠持世久且不廢其子弟羣從文雅鬱鬱視仙山俱秀為秀民惟鄭氏為石之母太恭人杜有對假兩姨親甫冠獲至鄭氏有簪帽扶杖白鬚鬢狀甚古立受拜問訊諸生學業如前輩不倦其家孰多騷士詞人為教授其後生郎君裘馬鮮明呵喝出入好場屋聲名每每釃酒為聚㑹夜炬火吹竽擊鼓逹旦笑語其一種豪尚可喜其間又有淡然自得几硯不羣則今鄭丞君粹道也粹道於余有十年之長凡至粹道必升堂致拜其母多曉客語或曰向年少郎話有味宜交之後四十年與粹道相視官路各為翁矣一日粹道執石泣曰父母未葬父不及見公而母氏知敬重於公敢請銘則按張緒主簿狀云君諱某字某其先滎陽人唐宰相諱絪生二子曰臯官榮之資遂為榮人曽祖某祖某父某世譜相聨不以仕名唐四姓之一也隱君世儒不善治生業卜别墅美原江上以牢盆致富常恐遂墮素風故雖逾修先業而於什伯錐刀不屑也其家範儀矩付之儒術而教子丁寧委之師友而施豫不倦付之道塗醫巫卜相技藝者之口故視諸人蘊利自封者獨能不衰又有一事甚異一日廣漢得危疾或勸以作大願力可逭死君曰吾鄉之龍灘灘磧髙如狼牙羊角舟不戒多覆溺儻得不死當竭家財除去之後還鄉方興役一夜失磧所在今為平川往來者以為君孝友誠實之感娶景氏後十五年卒年六十八以卒卒以某年月葬以某年月以某氏祔墓於某山子女若干銘曰水鑿鑿盆牢手作山峩峩仙風不磨孰孰利詩書不墜惟父惟兄九原幽竁永世之銘范隱君墓志銘先君子與鄉大夫謝廷直善石每念幼稚時廷直過門先君子呼出侍側誦書及詩文廷直喜之因言其三范甥之賢以相勉且約日携三范甥入城見先君子曰此范君之諸郎也呼石出揖拜如通家子弟禮又指子駿曰此與汝齊年其人才過於汝數等矣可善交之後子駿伯仲連薦石兄弟獨後先君子每舉子駿兄弟以垂勸激訓勵甚至間三嵗場屋未嘗不相逐各叙兩家嚴君責望之意以相警各駭然流汗抱卷屏氣帖息廊廡下既而石兄弟忝一第而子駿兄弟始以恩榜奏名然兩家祿養皆銜痛莫及先君子去世二十年子駿乃始謁其父葬銘嗚呼夙世尚何敢辭按君諱某字某范氏出髙平之系自五世祖居龍水為聞家自成都范淳夫氏令此邑與諸范通譜講學問文章而龍水范亦有纍世科第文鳴當世他人莫及也君在羣從間慷慨風節退然一丘一壑有輕去富貴之意任人之急成人之事闢館以重客推財以恤人孝愛而溫文謙厚而篤實使得遂其志少見其所施於世豈特一鄉士君子而已哉嗚呼君既髙蹈濳伏鋭意於教子其子亦蹭蹬場屋天必有以處此今未可量也卒以紹興戊辰夏五月十七日年六十四後十七年隆興甲申仲冬乃克葬娶承務郎謝天隱之女三子亦辨亦驥皆奏名文學出官鼎四舉不第以卒二女嫁貢士謝時習進士謝時舉孫男九人銘曰惟龍水范以世學名君乃退然廉於取榮曰吾有子人授一經一門三秀捷於飛鳴其種之良其萟之成有來不遲天意豈輕後將大之以韌詩銘范元功墓志銘圭字元功更字信仲以舊字行於黨友間丙午潁冒敵禍敵以元功是年拔解為有名進士乃縛載駝背入燕山厚館之與讀書郎君處時宇文虛中叔通司馬朴文叔朱芾輩皆朝中名流相與說中國學問間得炷香南望慟哭敵欲屈之不能然亦不忍殺又欲更轉入北地乘間脫去入府州折氏可求世襲遵中國正朔義元功為人壻之元功既得婦盡得折氏所藏中國四庫書讀之固非所樂折氏知之因題其所著書曰歸蜀集而名其所生子曰蜀孫居頃之李顯忠自延州擒羅索不殺與盟而縱之欲與借兵西夏俾為內應以恢復五路既而夏人先破麟府二州元功避亂入晉山軍夏人又夾圍晉山軍急外援已絶時中國和議詔適至元功縋城出謁李顯忠曰公所為此舉者為中國五路恢復計也今和議之詔已至願約夏人解甲拜詔公之忠誼豈惟惠此一城因出詔與顯忠讀之泣下夏人果解去顯忠歸國元功亦迤邐至蜀走行在所自列朝廷以顯忠忠節因以及元功也録而官之為右迪功郎監潭州嶽祠郭浩帥金州才其人辟為録事參軍又辟洵陽簿關升從事郎以賞循文林郎知閬州奉國縣以舉主改宣教郎監興元府稅姚公仲欲招而客之元功冒大暑携家赴之卒於梓潼驛舍年四十九元功先蜀人親忠文公之曽孫生於許負汝潁竒氣流落兵間有幽燕豪俠之風至其發為文章和厚清深則元祐子孫家法也方元功西歸石亦客成都時蘇子籍程子揆王子灼談子拂雲與石羣從多俊人日夕文字往來或頃不見折簡遣人杯酒相鈎致酒半能轉喉音作南北胡漢語言至天下事兵家利害所歷山川道里可攻可守此勝此負如析毫髮指掌間能使人意感神馳而恱其言也嘗曰國家能用度外士則大功業成矣長轡短馭而欲求天下馬乎曽祖忠文公諱鎮祖某父某先娶折氏以卒再娶樊氏二子某某卒以某年某月日葬以隆興二年十二月日有文集十卷藏於家銘曰甲戌之冬再見元功於太城已怪其火浮土濁喉中軋軋如逆流挽舟之聲問之則食乾臘飲酒而龎然以重其形此距其死無幾日矣文章功業得失重輕在元功特一瞬目也若雀之與蚊虻嗚呼元功曷難厥生岷山不磨有風吾銘蒲隱君墓志銘閬中蒲氏多父兄子弟各能推其先閥詩書世傳以矜耀於人檢束繩墨自有一種風氣大受自號漫叟仕不進而性學甚明詩甚有句法足以傾時輩凡蒲氏俊少皆習其傳大觀大淵經學義理益邃詩如漫叟之工雖困於布韋而聲名所壓不減王公之貴所至稱為佳士脫去塵外可珍也大觀者諱某中奉公仲子法當得官而推避引去不屑欲自致科第卒不如志隱峨眉山下築室榜曰心逺漫叟為之記許之曰仲氏吾見其止之也大觀亦自信不疑飄然處油然忘林泉勝處淡然如禪人幽子抱被裹帽即往茹蔬飲水落落所至不問真盛時遺逸難進之君子歟年四十七卒於洪雅曽祖某官祖某官父中奉公某娶某氏二子棠槩以年月日葬某地其子槩以其兄懿文修職君狀來請銘石知其人且交修職兄為深銘曰恤焉逸足車下之不屬冥焉竒翼樊中之不畜士有說焉於或進或退者所不能名而銘以志其獨其藏為隱君子之谷馮主簿墓志銘己卯冬石以太學博士罷宰相憐其無罪俾典成都學且寄聲曰此小司業也到官喻以朝廷養育意示以成均舊規生徒負笈至千人以上諸司大吏與一二大將相與贊喜出金助成時吾友馮懋適為錢糧官曰此盛事也吾黨可以餔餟來傾廪以給無難事比之囊槖鼠雀靳靳者有間石以是賢其人㑹懋舉父喪事遣其弟恕躡屩泥塗數百里不憚自其兄官上携其叔中江亟之狀謁銘且恕亦泮林生徒也其忍違諸惟普之馮氏世為聞家其父子兄弟以詩書相頡頏雖甚貧不破業雖至老不廢學其為名卿才大夫者踵武以至代有人也主簿君雖老於縣曹然有子登第能文其季二子亦俊於學問其所得比於諸馮者未可涯也喜藏書至萬卷四庫之目甚富有一錢即惟書之市曰有一不惜蠧淫吾書非儒門子也纍薦晚年乃與郎聨輟場屋以特恩調官人固哀其不遇也年三十五以卒先娶李氏再娶張氏再娶趙氏三子懋為昌州教授季郎曰思曰恕皆李甥也二女嫁牟某六世祖太保公諱知微曽祖某奉議郎祖某父某依雙溪李氏以居今居樂至葬安嶽縣祖域卒以某年月日葬以某年月日銘曰余嘗過主簿君之故居其所以畀其後森然一水一竹足為久大之模想其父子兄弟吟嘯翔步於風雨淡泊之不渝尤恨不及把酒登堂以發其屋壁之書銘其幽竁其忍忘諸塗勉仲墓志銘按元稹傳載嚴礪節度東川沒入居民塗山甫等八百餘家田産奴婢為稹所劾礪與山甫皆東川人豈有怙用其勢以暴其鄉之人如此蓋以素仇所私非一日耶今塗氏嚴氏皆為梓望姓兩家阡陌相接如昔時而詩書家法葉葉相與通姻婭甚歡塗出山甫而嚴出礪無疑也嗚呼退之援同姓於毛仙翁孔文舉記通家於李元禮吾儒以冦為婚以明易之變浮屠氏以平等視寃親痛一念之由失至百劫相讐不悟可悲也夫中江塗勉仲者娶嚴氏兩家有佳子弟多從余游而勉仲尤厚者勉仲之弟端卿於余為同年進士而勉仲兩郎曰森曰柄亦得以藉口意愛如通家骨肉余為學官成都勉仲嵗遣兩郎修執經禮逮倅彭至閒居資中兩郎子往來不絶森柄得於二禮大小戴氏學亦出父之親授也森以治禮兩預賔薦柄更從余讀春秋勉仲倉卒得腹病森留侍父病柄適留資未知也勉仲且死執森手曰汝力學無以怠惰汝等李氏門終可依以卒森訃書詞來資速柄歸云爾也端卿狀云勉仲兄葬有日森視竁辦大事不及來舁柄挾狀以謁銘余固不以森為不敏而痛柄之請詞苦苦再三為得禮也縣有塗使君祠則勉仲世為中江人曽祖某祖某父某三世業儒不仕勉仲儒者於生事不疏而有理以自給其所樂豫則里鄰吉凶緩急佛道祠廟橋梁營造首倡悉力不吝惜至焚劵市義又不知幾何人然其人剛介有守凌轢非意如丘山欲壓者一毫不挫也至今牛翁爭蹊與里胥之珥筆者猶佩勉仲髙誼以自懾伏其晚進鄉校小生服膺善訓於勉仲者可忘哉年五十六卒葬以某年月日銘曰兒日讀書翁喜傾耳兒今嗚嗚哭翁淚洗垂盡之言兒奚不知清懷之葬使君之祠陳次雲墓志銘次雲陳氏生資中下邑少為學不若章句儒獨好春秋喜說王霸縱橫大略家業雄於財次雲因纍世之資施與四方遊士頗襲關中大俠名迹是時敵再入中原張甚次雲謂功名可致日與其客雜論史漢形勢復間以春秋談劇索酒歡呼顧一邑若不足容我其英槩凛然聲播國中有聞士多遊其門賢卿大夫過者願交不得交者率以為恨士之聚㑹嵗中數十百人不惟此客之死喪婚祭學之未有成與寃之不伸者皆以望次雲獨身任之必滿其望以成我之能事乃已坐此資益落然猶假貸其族以為義不悔也次雲博衣大袖過市人無少長拱立屏氣以過其車蓋尊敬之如此其或少爭語必取訂焉有隱惟恐次雲之知也故所居人無越禮踰檢一鄉率賴以多修護之士次雲蚤以春秋薦上凡三登名輒外省報罷以為是不足溷我嵗戊寅辦舟東去且裒所有書欲扣闕下舟具夜與客飲縱談萬里所欲為者霜月清洌脫帽解衣得酒豪甚不知寒氣之侵人深也以是得疾越七日死適嵗除矣士友聞之失聲其里中至為端月廢相慶次雲有祖母栁年髙供養甚備次雲死栁鬱鬱不樂援太母恩得封太孺人以慰其心後亦卒次雲父母未葬欲營寬敞地以待置守塜有念甚大而不幸死矣次雲名泌年四十二曽祖可之祖翺父奎皆不仕子仲郜一女適李圓次雲有弟濤亦卒兩房孤孀以乾道辛卯十二月己酉舉三世五喪葬於資陽縣三江鎮丁山之原次雲久與石游石謂次雲氣宇不碌碌真可託而次雲亦謂石可為好者故以吾子圓娶次雲之女石老矣屏居田園思得與次雲把酒論文追道少年逸氣以為樂而不可得矣其尚忍銘銘曰以氣養學擴之浩然豪邁不羈其才可賢屈折下士其性則天與之以彼靳之以年天地之大而人有憾也亦不容言乎
