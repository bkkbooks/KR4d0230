body:
  text: 方舟集卷九宋李石撰論釋老論天下之人可與為善也久矣聞釋氏之寂滅老氏之清淨則慕之蓋將誘天下之人而納之於善雖聖人不能破也且以中國聖人堯舜文武周公孔子之道三綱五常可以修身可以治人粲然人倫具矣二氏者本物外為已之學初絶意於世然不即人而人即之何也人性之樂於為善二氏者適以為聖人之助甚多凡趨福而避禍惜生而惡死人情之所同其徒因此求售曰我可以致福我可以得生凡有求者無不獲於是始抗衡吾道有從之而熾其說者紛紛多吾儒矣佛氏者起於秦漢之金狄而其書肇於張騫傅毅蔡愔譯梵音以為華言其書則中國之書其真妄有無不辨也老氏者起於黃帝孔子猶及問禮其文五千言孔子未嘗及之至秦漢之君其徒得以簧鼓天下二氏之教因以流傳誠使中國倣其教以立治寂寞而自樂清淨而無為無亂兵以擾其耕稼無煩刑以濫其誅戮驅天下之民而納之於善雖堯舜文武周公孔子復生無以易此說也何至與之相矛盾而乍興乍廢乎悲夫或曰佛生於魯莊公之世昔人謂常星不見夜明是也老子孔子相先後以生皆周之末年三聖人者幾若並生間世一何盛也曰斯三教相抗也歟誠使三聖人易地而出必不默默忘言皆能倡教為百世師也孔子六經祖述憲章皆大中至正之道純帝而帝純王而王亘天地窮古今萬物共由出入之塗也老氏為周藏室史與彭籛相望史官也雖孔子知有其人列子莊子相與羽翼其說其流為虛無者非老氏本心也若乃佛氏左衽祝髮其棄五常廢人倫非與世大戾乎而舉世安之其徒今皆吾民則奈何文中子曰佛西方聖人亦以書為信也大抵窮理盡性使學者入道與周易頗合誠能去其不合而用其合則教通矣孔子以六經述堯舜文武周公之道以輔成中國之治其曰攻異端者恐其害治也漢唐諸子以六經所出尊孔子之教併取二氏者排斥之韓愈是也其曰今之言性者雜佛老而言之也二氏者導人以惡為性乎將以空寂虛無為雜也又曰老子之言道德吾有取焉若其絶滅禮樂捶提仁義吾無取焉嗚呼墨翟尚同兼愛而愈取之佛不尚同乎佛不兼愛乎徇偏曲之私而忘其公持瑕疵之小而廢其大取墨去佛則愈於論性亦偏矣祠廟象設黃帝周公孔子以來有之不獨釋老寺觀也佛氏有祠起於鴻臚寺以待四夷賔客其流為白馬寺像則銅狄之遺也老氏有祠起於周穆王化人之宫成於蓬萊三山金玉之闕至唐以李氏所祖為𤣥元皇帝廟曰太極曰洪禧散之郡國各以其徒實之曰道士曰僧祇其教因以大振於世非特丹青金碧之美而又取山川嶽瀆勝處以敞其居唯人主之好惡去取不常至於風雨不動俎豆以時獨吾夫子之祠視二氏有間矣按唐六典道士觀總一千六百八十其號曰法師威儀師律師鍊師居之僧寺總五千三百五十八其號曰禪師法師律師居之僧道男女以别以有行業充住持主其事官給五戒祠牒有違教者官糾之以法方外離俗斷愛名出家至麗之於法其於二聖人可羞乎或問佛以寂滅老以清淨為治氣養心之術以之修身則有餘矣其曰息門桑門息為胎息之息桑沙則息之訛音本佛氏出也曰神人曰至人曰異人其流為神仙轉丹煉氣按摩導引老氏出也渾之以鬼神行之以福業老氏本以靈寶十齊為度世曰三十三天二十八天三清上境三十六宫無極至尊不可思議果何說乎佛氏以六波羅蜜為戒定三千大千世界一十八天八萬四千由旬無有是處果何說乎凡此二氏欲用其教去其空虛詭幻無益於身而有害於教者可也朋黨論上朋黨立論嘗起於小人而無預於君子何也君子者無心之心小人則有心之心也無心之心則於是非利害勝不勝無較焉小人則有心之心一切反是睚眦於錙銖頡頏於毫髮力以取勝勝以求鬬鬬不得其敵則如狂猘如蝮蛇不得一肆其毒則必嚙土木噬草棘以發其怒乃已此有心之心也故鬭不已則勝常在小人不勝常在君子此小人之指君子而為說出於有心之心也君子端不以是疑小人以幸一勝處以無心之心也在易渙之為卦渙散也君子不立黨以處小人而主於散也馬則乘之逃其黨於方來也機則据之拒其黨於適中也躬則安之求免其身以無悔也至於六四則曰渙其羣渙有丘匪夷所思何也不得已君子與小人並位內不招權外不幸名居髙明之地綽綽然於是非利害無所决擇不以小人為險陷而疑之處之以無心而已由是以知朋黨之論嘗起於小人以陷君子也向使君子亦以是指小人是敵也世之君子少而小人多鬭心一萌則讎君子者多而小人嘗勝君子嘗不勝是以勝不勝為分别也善乎箕子之言曰惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食此威福之大柄不可一日假之臣下然則為小人竊弄所以兆成朋黨之禍誠使人主執其大柄於上以分别是非利害雖隂陽不得用其變矧小人乎夫如是則防萌杜漸漢唐之禍可不作矣朋黨論下以治生亂兆於無形以成有形者朋黨之論也方其治也豈自意其必亂也哉其所謂無形者君子小人之不辨也君子指小人為黨小人亦指君子為黨其始也好惡是非之名異朋起而附和之日寖月淫因無形以兆有形而天下受其患而命之曰朋黨者好惡無別而是非得以相雜揉於無形之中此治之所以生亂也逮其既亂也天下後世有公議者出焉曰此君子此小人君子無黨小人指君子為黨則亦已晚矣方其隱於無形也離婁不能以目視師曠不能以耳聽而孟賁不能以力奪唯人主能操威福大柄而公其君子小人之辨以明是非之塗如堯舜禹湯文武之代則未始有朋黨立名者威福大柄獨攬之於上耳馬與鹿有形之物至易辨耳趙髙乃指鹿為馬取其疑似者以為之形以收秦人之權而用之御史不敢訶諫官不敢議者其兆在於以橫議殺處士杜塞能言者之口以至是也漢之田蚡竇嬰各用其黨有首鼠兩秃翁而不敢正言其誰君子誰小人者此秦餘習氣漢黨之萌蘖也𢎞恭石顯殺蕭望之劉向力言以為君子必無黨而漢黨根株矣杜喬李固引頸就戮至使人甘心慕之蹈死以取名何也黨名既出命之曰李杜之黨為黨錮傳漢黨成林矣且自其治以生亂自其無形以兆於有形萌蘖之根株以迄成林尋斧之不及天下皆得以藉口正名曰朋黨之論自漢始至唐世之一治一亂而朋黨輒先之以黨出多門也女德容其姦嬖幸誘其勢宦官怙其威姦則小人以汚君子勢則小人以脅君子君子袖手無術然後流竄誅戮隨之如曰牛僧孺李宗閔之黨唐人凡幾牛李耶張九齡曰小者茍得一變而為阿私大者分義再變而為朋黨又文帝曰去河北賊易去此朋黨難夫以黨比之賊更有甚者難易之别也嗚呼漢以朋黨兆成莽卓之禍唐以朋黨兆成藩鎮之禍皆以治生亂自其無形以兆於有形者然則朋黨之論大矣如之何其去之竊以兩漢唐終其說可使如漢不可使如唐何也漢之正論勝唐之正論不勝二者又從而溷溷焉勝之君子恃之以無恐不勝小人恃之以無恐則歸之曰天待其天定者然後為之謀不然雖上之人亦無如之何時才論天有逆順人有去就逆則去之順則就之豈能以人勝天也哉亦因其時而已時者天之機也君子探其機而用之以為是非利害之擇以明禍福榮辱之由因其機而審其時足矣小人則反是也就逆以為順去順以就逆拂天以求人蓋有幸而得之於其始者故其類靡然下風而從之其終也率至於敗績覆壓卒為天下後世笑唾之不免者拂天機以求勝而自謂彼時此時之不同也然則付之於自然之數各因類以持世足矣傳曰否泰反其類也且泰未必皆君子蓋常在君子而變在小人否未必皆小人蓋常在小人而變在君子彚征吉亨彚貞吉亨曰征曰貞此自然不可執不可易之數也且世豈有常君子常小人也哉各以其勢論之則彼一時此一時人才判然矣堯舜在上十六相與四凶並處文武在上十亂與二叔接迹此常在君子而變在小人也商紂在上箕子比干與飛廉惡來共事漢成在上蕭望之劉向與𢎞恭石顯同朝此常在小人而變在君子也譬夫天之寒暑二氣之運自然之理也當寒不可使起蟄當暑不可使造氷世之所謂時才者蓋亦隨時之去來也孔子曰用之則行捨之則藏不識則謂行藏何事而獨許顔子共之而自曾閔以下不得預何也蓋諸弟子之從吾夫子也或仕或否不繫用捨非所以為行藏也若夫子與顔淵我爾一間不能以寸有道以處此其變者此道也其不變者亦此道也又非時彼此所可繫也孟子亦曰行天下之大道又曰得志與民由之不得志獨行其道既曰不得志不知大道何如其獨行也此聖賢一轍初不繫時之用捨也若夫所謂時才者時方尚武彼則高談將略時方貴吏彼則鈎考簿書時方言利彼則力𣙜儲積時方論文彼則専事章句時方任法彼則刻意庶獄凡吾道之所謂無偏無黨立為皇極合衆人所長而用之彼隨時變化以幸得富貴君子少而小人多否泰之往來所以治少而亂多也崔浩髙允論君子之於天下事也欲求其通故學欲其博事通而學博則必掩衆取名名之所歸責之所生一身有所未安况欲以此謀天下之事乎所謂通者於文武則曰兼資於儒墨則曰並用於三才則曰無不知於六藝則曰無不習求欲掩衆人而直出其表者好名之纍也殊不知昔之君子有其善而不居故能兼衆人之善棄其智而弗用故能合衆人之智其於名也退然不敢専美卒之天下以名歸之方且泛然受悠然辭若有不得已居此名者斯其所以安其身推其身之餘以及天下事則亦綽綽無難矣崔浩髙允二臣者魏之起燕代而伯中國二臣力居多事通而學博猶一體之人也崔浩不免殺身髙允獨能自全者史氏於浩傳不甚著其事於髙允傳明浩之所以死者加詳愚請合而論之談兵則有敗衄之禍為史則有漏泄之禍占天則有窺測之禍有一於是足以殺身况欲合三者以爭名於三事也欲其無不通於三者之學也欲其無不博而欲以是幸免於亂世之禍乎浩固自取允亦有幸免者魏起燕代用兵中國浩為謀主帷幄坐勝所至䇿勳而允亦參樂平王軍以西破楊難當此其知兵相似也浩以三公領國史允奉詔分掌其事浩雖專其職而允用力居多此其述史相似也浩初以占天精於風角用以䇿敵而允以律厯為淺事以難浩說此其占天相似也夫合三說以相似然浩竟以此殺身而允獨幸免以令名始終者有由矣且二人以儒知兵浩之事魏三君課功居多允視浩為晚進適時少事得以雍容俎豆不由汗馬取名如占天星厯災異五行二人之學非獨相似人謂允過於浩也浩為三公允甫以著作起家同領國史所志太祖以下三朝多出允筆浩主其要而已竟以此受禍允獨恃景穆芘護不死者人固有幸不幸哉大抵以多事為通以多學為博浩則抗之以滿又為郤標之徒所誤如刻國史於石以彰直筆如以五星聚東井不欲東伐又援漢元年十月之占以自亂與允反覆辨論允則雖明災異之學不肯對人言之又知浩之必不免預形於言此其獨保令名夀考以終者得非以其廉於取名者歟浩生平自比子房君臣相諛以為近似使其果有明哲保身之慮則有封留之足從赤松子隱去否則勇退急流不以名掩衆其庶幾乎嗚呼士大夫之心術平昔處學問居富貴者了了於性理不可不自厚也浩不信佛不談老莊未礙也其妻佞佛浩取其書裂投溷中夫佛書者華言而梵學與中國書同文之一豈糞腐之可汚乎又以殘酷殺李順一事其報應亦昭昭矣允心術所感誠有異於浩者幼嘗為浮屠為塞上公詩有齊得喪忘物我浩然世外之意其行諸州獄務矜恤多所貸縱以廉平稱又挺身以明罪多於浩帝怒反免所坐僮吏數十百家五族之誅此何止千人之活而已乎因觀史氏所載崔浩髙允同罪異罰故合二人論之以為君子掩衆取名之戒巧宦論君子之仕也其進曰有道其退曰有命道在人則審已之道深淺大小以為仕之所得於世之軒輊不茍進也命在天則安於天之所以豫我者厚薄不自執以為已之纍曰斯天也我何預焉如是則君子之仕進退之分决矣若夫小人之仕則反是以進為命而以退為道命則曰我當得之道則曰不合則去故為僞為佞為傾為險為幸為術皆巧於宦者也飾虛誕以為真曰僞崇諛媚以為智曰佞掩衆人以取名曰傾啓禍害以自利曰險多端倪以有卜曰幸立機數以罔上曰術六者異名而同巧也得其一二者已足為名世小人矧兼六巧之全者其禍害可勝諱哉何謂僞飾其外而忘其內陟其華而無其實衒死鼠以為璞售蠟箠以為鞭鯀以象恭欺堯少正卯以僞行欺魯此飾虛誕以為真也何謂佞順適逢君而自以為智乏骨鯁之操無忠亮之節祝鮀求容於衛而幸免禍害梁丘據取嬖於齊而無所可否此崇諛媚以為智也何謂傾陷人之尤以爭名於朝者美錦覆穽而欲人不知含沙射影而欲人不寤王導殺周伯仁以博金印禇淵賣袁粲以取富貴此掩衆人以取名也何謂險面狠而愎心凶而戾人知惡之而無以勝之人欲殺之而無以先之如蝮蛇之含毒鬼車之煽怪盧杞姦詭而主不知王莽篡逆而主不寤此啓禍害以自利者也何謂幸其說之晦昧於中其氣之凌蔑於外如甘酒之適口如美色之悅目公孫𢎞多陳事端馮道之脫備位此多端倪以有卜也何謂術挾主以為市不顧主之利害而以身試術也小者亂一國大者亂天下操術之不仁也踊賈則利人之刑棺肆則祈人之疫皆凶術也蘇秦以術亂六國張儀復以其術而轘之於燕朝錯以術削七國袁盎用其術而戮之於漢此立機數以罔上也嗟夫祿仕者名之所在君子小人之所同欲君子則有道以定命小人則巧以自致而唯六者之趨患得患失不顧利害是非營營求所以為干進之塗必有一於此者真天下之小人也孔子致嚴於懲小人者亦凛凛矣戰國遊說大抵多六巧之志思有以大矯拂之曰先進於禮樂如用之則寧為野人不為君子利害是非徇吾道死生以定天命而已其以史魚為直以蘧伯玉為君子又曰三代之所以直道而行者専以懲小人之巧於仕也或曰有君子而猶不免於巧者是亦小人也巧於殺人以爭名當世豈直道君子哉孟子所謂枉尋直尺可也叔孫通以五百弟子自援不能蓋二生之愧董生以儒學名世不能掩殺主父偃之羞姚元崇不死武氏既為宰相僞疾以陷魏知古其巧尚何求故備論之以為小人之戒蜀邊論天地逺近之不可窮乎古今見聞之不可盡乎不可窮而窮之以此之近而况彼之逺曰天地之限也不可盡而盡之以我之聞而接人之見曰古今之事也此四夷之殊宜制禦之異用也且以天地逺近既有一定之限一見之一聞之足矣而古今制禦之道有不可窮不可盡者以此之一隅反彼之三隅者猶是也故逺近復有逺近有不勝其聞不勝其見而欲窮之盡之四夷制禦之變舉積諸此也吾蜀之西南夷特以中國逺近見聞所及者自先王以來端以秦漢為兆亂之始浸淫乎唐人則受亂矣蜀不可無則西南夷不可絶其拓土之得孰與受亂之失哉秦以司馬錯通蜀造意宏大長城備胡以及他方漢初困於胸奴武帝征大宛疏勒畨禺夜郎昆明獩貊則車馬踐蹂鋒鏑交橫於四夷矣中國示以可來之塗服以必爭之氣譬夫操杖而欲殺之彼能不反噬乎且武帝元鼎六年已開西南夷是嵗改元又攻滇王求善馬元封六年越巂為姚州為益州皆夷越之地其國志所謂九能傳實祚者今則雲南六詔或離或合矣且雲南與吐蕃以六城為距離合不常之國也越巂去吐蕃不數山可使之離不可使之合則中國利害之决也唐開元以前雲南未嘗畔漢爰自鮮于仲通李宓貪求邊功以致生事蕃蠻合而讎我者五十六年不解閣羅鳯入冦成都是也大厯間雲南求再納欵張延賞懲前患拒其請至韋臯則開戎州路而許其來且前日越巂唐人封疆之內故臯得以拓土不已仰惟國家棄清溪關外地以逺之此閉玉門之時也如臯復開一路其罅隙如開鼠穴不患其不來矣利其納欵之物而啓其內侮之心禍可勝諱哉嗚呼任生事之人而欲其無事用貪功之人而欲其不貪天下豈有此理當上體藝祖所以棄地懷逺之意擇人而任之則蜀邊可久於無事矣淮蜀論言固有大小也大言之則為迂小言之則為局量其時之安危事之是非而為言大小之制也厥今天下之勢宜何如言之曰淮曰蜀云者是不得已而有言也譬夫考作大室俾子孫世居之葺之以蕃育生養其中悠久分裂破壞撐拄頺垣墮砌者大半則當量其家之力而為日補日葺以求復其初今天下之勢曰淮曰蜀云者是今日可合之勢也小言而不敢太局大言而不敢太迂是亦不得已而為言也且誇誕而無當浮競而無極以茍悅上意而窺中主欲至使目語而心違之口順而腹非之樊噲願得兵五千橫行胸奴而季布欲斬之臧宮願得騎五千以立功胸奴而光武笑之此二子者大言不切於用必有能知其說者賈誼曰聽言之道必以其事觀之况以天下之勢論天下之兵得不量其言之小大而致其聽之可不可乎搖搖中流以幸舟楫之得濟於風濤澒湧之中嗟夫聽者之不審言者得以幸免今士大夫相習為大言久矣不可不折之以其事也所謂攻守者雖兵家預形然守淮守蜀二者可合而不可離亦不可偏舉此一定之論也且借三國之勢論之諸葛孔明之入蜀也曰曹操挾天子以令諸侯難與爭鋒吳孫權可與為援而不可圖荆州連吳㑹巴蜀用武之國益州沃野千里髙祖因之以成帝業如亮之言合吳蜀之勢今日淮蜀一定之論也至曰用荆州以出宛洛用蜀以窺秦川而霸業可成夫孔明之言豈不欲大其言曰中原可復三國可合乎乃局於一方而自守也善夫張華謂羊祜曰吳立令主雖百萬之衆長江未可越此守淮之說也然則天豈限絶南北乎我疆我土枕戈不忘以形為守以心為攻守必以人戰必俟時不徒取人之空言而責其已試之事其成否必有不可掩者嗟夫人意即天意也若以泛泛之言而輕用天下付成敗於一擲不幾於輕舉而失所重哉吾故舉淮蜀可合而不可離以為東西輕舉之戒為守淮蜀之當務云建康形勢論愚謂天下要令有勢而後以道運之譬如善奕用棊不多而得勢已廣今日之建置他日之補就如絲貫繩聮不見閒隙可乘之處而後大勢定夫惟勢定故四方耳目趨於勢之所重以决其功之可立六朝以來其進取中原者不乏然而知進而不知所以為後顧之計如驅子弟以鬭之通衢不幸力竭反顧其家則逺而無所告訴殷浩陳慶之不足道也桓溫謝𤣥劉裕吳明徹皆有破竹之勢而不知所以委重故一朝渙散前功盡廢世嘗謂項羽既取關中乃退都彭城以成沐猴之譏愚謂項羽不失䇿特悟之太晚故後世得以成敗立論耳方羽之既殺㑹稽假守也使之略建立根本而後遣心腹渡江身據山東以觀中原之困徐起而乘之則伯業已成矣項羽剛躁欲速新得㑹稽客主未定乃驅人之子弟以渡江既得關中自覺其客寄之難乃復歸重於山東顧已無及矣凡今天下之勢所委重者何也長江之南建康為重頻年有望幸之意臨安駐驆已踰三十年兵民井邑卒未可動搖而應接江淮則疑於迂緩愚常觀太宗皇帝新一天下之心首以真宗皇帝判開封府事非徒使之知民間利害而已也監國撫軍以緩養急聖謀深逺其孰敢議又惟宋元嘉中王𤣥謨以彭城要兼水陸請以皇子為刺史至魏佛貍聲言渡江而建康列戍至於亘七百里所使佛貍不敢輕進者臧質在盱眙武陵王駿在彭城也方今建康左控姑孰而右引京口古來守禦勝䇿如膠柱調瑟茍非其人言之何益恭惟修復陵寢自是天家大事親王既出閣願付之以建康留鑰之權內增帝室之重外繫民心之一徐觀晉宋所以經營彭城之勢使其他日可以用山東而臨中原則廣陵淮隂以東可以列戍相望而制之於此矣凡天下之事圖之於目前者未若先定其勢之為不可勝也我有不可勝則彼欲求勝者所以成吾必勝之勢內法太宗之神謀近取彭城之制勝歸重建康其為先乎以守養戰重方面論愚聞之東晉有弱中之强故江淮分守禦之勢李唐有强中之弱故河朔養腹心之憂夫外視弱矣而守禦有定論則未嘗不强外視强矣而制馭不自我則未嘗不弱夫知守而後可以謀戰茍惟守之無地則戰者雖百勝其能久乎東晉雖戰不足而守則固是以聰勒苻堅之强不能逞南渡之欲李唐雖戰有餘而守則不力是以趙魏之地常鞠為盜賊之囿天下之勢其根本在守而其應在戰是知逺攻者必近守不可忽也劉宋元嘉七年到彥之等以舟師自淮入泗泝河西上碻磝滑臺虎牢金墉四鎮列兵分守魏主命悉衆北渡諸將莫不稱慶而王仲德獨以為敵人仁義不足而凶狡有餘今斂戍北歸必并力全聚若河氷既合將復南來至十一月而四鎮復陷以檀道濟之威略亦不過全軍而已此前事之鍳也往者北人之歸河南五路也或傳北人之謀謂要得入川不難將陜西棄下三五年南兵决來守之道路已熟一發决去必取川蜀是知示弱以致吾之驕佯北以誘吾之進遺我以殘破之地使吾取之以分吾兵勢約我以和好之言俾吾信之以出吾不意我之前日所以失者猶元嘉也夫鞭雖長不及馬腹而强弓之末不能穿魯縞六朝之際河南之地隨得隨失蓋地既平曠敵通其內淮南隔其外而制勝之重或又遙决於大江之南藉使得河南之地多置兵則糧運難通少置兵則不足以自固大軍稍逺士心便怯此宜可慮也愚謂今日悠久之慮要以守而待戰兩淮之地形勢不相為應者願倣六朝兼督之制以重臣分臨之多者不過數州使諸將有以分屯而聽其節制如慶厯各以分委韓琦輩重其方面之權而申以春秋責帥之義無事則謀守有事則總之於府此所謂以守養戰而以弱養强也分重地以委心腹論愚聞之用意於悠久者視目前為輕而意外為重是故智者不以其所重易其所輕凡人之有所甚愛與夫有不欲者情也情用於所愛故目前之輕或享其逸情忽於所不欲故意外之重或廢於勞豈特人情之不自覺亦私欲勝而不自知耳孫武斬宫人穰苴刺莊賈魏絳戮楊干此所謂激之使奮蓋善權輕重而深明勞逸者也夫居其輕且逸而不自憂此孫武穰苴之所不堪也方今天下輕重之權制之於上目前之所憂或不分任天下之重而意外之憂嘗以施之所不欲之人故任其重者或無激昻之意竊嘗羡慕於安逸愚嘗怪東晉其清談風流如溫嶠庾翼謝尚謝安父子其於廟朝未嘗無蕭然出塵之意至於臨戎制勝率先武夫而使之信服溫嶠能制陶侃謝尚能撫姚萇庾翼能知桓溫謝𤣥能御牢之彼豈無所以素折其心哉六朝守禦要地如淮隂雍丘合肥鍾離歷陽雖外迫彊敵多以輕裘緩帶臨之而今顧盡以責踈逺之臣或遙𨽻於大府此於輕重勞逸或有可議也六朝之重地亦不常其重在鎮守或自江陵而移上明或自巴陵而移武昌惟因地制重耳今侍從而上豈無昔人溫庾王謝之望者特其功名未建耳愚願今日之重地分以委之許之各置親兵各假以兼督之權以分邊方之憂數年之後必有卓然可觀者此其所以權輕重勞逸也凡今天下有所謂重且勞者臨事之急而後託於非腹心之人則彼不怨必惰矣用意於悠久則先託於吾之素愛而後可也持戰守之勢使之定論愚聞之明主所以制俗非制於俗也大臣所以持勢非持於勢也挾大有為之心而制於俗則無以其憂輔大有為之功而持於勢則無以立事凡天下之俗喜於安靜之名而養成姑息之實則勢因以不振是故以治軍則弛以治民則惰以興化則玩彼必有流於俗而不自知者又相與持天下之勢以幸吾之不立此聖明所宜禁而大臣之所當治也天下無事用兵之問雖至於廟堂而未嘗遍動於有位者之聽故不習而聞者必駭不樂而用者必憂發言盈庭誰肯執其咎其稔積則有自矣夫制俗之道無大於無私而持勢之權莫審於無心蓋天下之所守者民也而與民為守者士大夫也喜怒不行則聽覽公毁譽不入則取舍定凡今之說未能盡一士大夫之心則天下之耳目必有所惑而不信今之所以欲致於富彊者非必决之戰勝而後為富彊也望之隱然有不可測之威而即之隆然有不可犯之勢譬如富家大室壯子愛弟彊奴悍猾各當其處則雖開門延冦誰肯輕入其奧哉愚願制異同之俗而使之一持戰守之勢而使之定天下之人茍有所見使之各盡然後養成可用之才以成不變之論則人心自得而天意自復此非所以保勝乎合四勢以强天下論愚聞之天下之大亦恃吾有勢而已民者所以保此勢也財者所以養此勢也兵者所以持此勢也將者所以用此勢也合四者而一之則在於上是知有勢者彊無勢者弱天下有天下之勢一國有一國之勢一城有一城之勢諸葛孔明不鎮漢中而﨑嶇於梁蜀之郊不善法髙祖也劉裕置東秦州而負西北之望不善鑒項羽也天下之事既得此勢則因其民用其財役其兵取其將要皆有推赤心置人腹中之術貪則失其財怯則棄其民私則離其兵暗則敗其將是知勢之所在莫若一其歸重之地唐之藩鎮議者謂之授人以太阿之柄愚謂不然勝者所用敗者之棊使今而能復唐藩鎮之勢則分地而守得寸則付之寸得尺則付之尺將賴其守以成吾之事而何疑之有昔者漢髙祖之語張良也曰吾欲捐關以東棄之誰可與共功者大哉此言不曰捐關以東付之而曰棄之此其視刓印不授者成敗相去豈特目睫之間乎愚嘗謂唐人之法如宣歙池之為觀察嶽鄂之為節度小者或不過三四州而自用其民率有以自固今江淮用武之近者權望俱輕若稍倣唐藩鎮之勢而無盡制其權使之有以自用其兵民則他日之能復中原視其有功者以髙祖之為心可也今江淮之州相去或七百里而僻小如蘄黃者緩急無以為固必其有事而後大將出於其郊則民心固已驚危矣如欲合四者之勢以强天下其可不慮此乎
