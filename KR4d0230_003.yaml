body:
  text: 方舟集卷三宋李石撰五言律詩訪范師山房野步山圍合春生物自欣溪聲如聽雨松色欲摩雲謝客推門入支郎半坐分林間擕小隊不敢散鴉羣送客送客川原路憐渠田舍秋沙晴分野徑林斷出溪流馬瘦諸公後鴟夷一醉謀泮林無酒伴頗為老兵留送勾龍教授廣漢川原迥重江秋水多橋邊金作鴈湖上酒如鵝豈有雒書出轉添巴字訛泥塗滯行客之子惜經過宿鍾陽僧寺逺客來投宿高人已閉門白沙分逺水紅樹帶煙村僻徑逢僧覔登山見佛尊清風惜秋稼積雨掃雲屯謝劉韶美送酒别恨連湖海驚心閲嵗年思君愁北闕將母上西天更酌鵝黃酒如浮鴨緑川不須憂九折忠孝得雙全與程端卿相别峽中共繫船瀼東留一日宦路隨驚鵲家山隔斷鴻荒椽秋雨過疏竹暗泉通千騎尋城北雙舟憶瀼東我詩雖未好聊為使君窮送程榮州被召二首客向江南去人言冀北空賈生前席念嚴助薦賢衷畫舫搖澄緑飛車近軟紅舊遊應未改尺紙問歸鴻出處人情異寒暄節物殊腳輕貪逺路眼轉隔重湖近例占郎宿近例自郡守召皆除郎頻年已守符盛時人與地尺一費招呼感懷五日轉一候百年能幾春雨苔堆碧色風蘂委紅塵神晤又何説交疏莫強親杜門誰是伴杯酒聖賢人眉州鹿鳴宴大比周三嵗登名蜀一涯聖賢元祐學父子老蘇家類省登槐市清秋艷桂華生平朝董業親䇿對褒嘉六六成鱗次呦呦賦鹿鳴三仙隨勸駕千佛要題名俎豆初筵秩衣冠習俗榮例須煩舉送我亦魯諸生五更一點月照窗几以為曉也披衣視之雪厚至尺許喜甚賦詩雪片成孤立蟾華與共遊從教驚蜀犬曾是喘吳牛蹲石依松瘦寒溪映竹流遙知明嵗稔擕酒上南樓諸葛菜郡圃鋤荒雪家山斸淺沙只今諸葛菜何似邵平瓜小摘情何厚長齋氣自華官烹與私炙隨處即生涯韋齊休記孔明南征種菜於此名諸葛菜問黎人士皆不之識因閲本草即今之白芥郡圃日給此菜甚美亦一幸也次韻馮涪州見寄寄語巴中客頻頻鑷鬢霜峽雲春夢逺江月夜珍藏才刃應多暇詞鋒恨太剛僧鄰雨花地何日再升堂寄賈元鎮并問楊似賢談德稱客子推移地聞雞敢晏眠酒樓春夜雨柳岸早行天龍卧風雷宅蠶叢錦繡川談楊兩州教記我别時年題鹿頭關石鄉祠并序石鄉祠白馬武安公龎將軍之祠也祠在資之銀山後因守黎見道中有祠土人云武安公為下馬炷香乃祀武侯以龎將軍配榜云武興非武安也過綿之白馬關關上有廟乃將軍為蜀守隘之地廟榜忠烈乃祥符所賜額碑亦可辨武安之稱無謂要之興安之誤耳或云姚萇入蜀避家諱改名地志鹿頭白馬二名同出也山高八十丈下瞰平川蜀險盡此亦高崇文擒劉闢之地龎將軍之墓在焉古戍經秋暮危梯迸野泉鹿頭關上廟驥足縣中仙山疊疑無地江寬欲放天英雄今已矣自喜慣風煙題白塔古迹二首境物三禪勝叢林十里村寺僧晨掃地樵客夜過門瑞像西山映乾文北斗翻寺有三朝御書名場薰竈突悵望塔中尊塔倒峰巒影寺有古塔其影倒現于壁間鐘埋澗谷音掘溪得古鐘二賢苔像古寺側有王褒董均之祠四虎竹泉深寺有四虎井炬火攜歸路詵和尚初入寺山神以石炬照路經臺喚隔林有唐和尚譯經臺人頭連地脈人頭山名古迹備幽尋天彭行縣公館靜寥寥園亭景物饒溪光明短彴樹影蔭危譙山鳥忽雙下池魚時一跳主人王事簡文酒日逍遙過永夀縣驅馬上危坂暮鞭搖客愁峯巒驚滿目咫尺擬回頭紅樹映野店白雲藏縣樓須知此北下地底見豳州杜老有豳州入地底之句謝勝老惠胡桃浮海黃池近還山白雪高禪如石佛樣學帶楚人騷我欲懷金橘師能遺木桃釣魚船上客此句可連鼇金山驛晚泊金山驛風生玉宇秋荒苔蝕佳句喬木惜名流鼠穴飛泉入蛛絲積雨收何須嘆人物華屋與山丘送澄師還昭覺逺出蒙霜雪重來歷嵗時贈師拄杖子似我簸箕兒芳草隨西度巖花向北垂莫忘香一瓣滄海白鷗期夢西曹夜直再任雖祠祿多年本為親青縑猶夢寐綵服困風塵老境人情變韶華物色新只堪擕茗碗禪觀對幽人雪二首客宦成分戍人誰笑牧蠻三碉橫塞外兩澗拆雲間鳥與花爭樹春隨雪入山功名成索寞何以慰親顔嵗事頻年惡心知一飽難只愁無此雪得句不言寒酒薄何妨聖梅清合進官老兵憐我意赤腳唱平安寒食夜泊依漁市天寒問酒家燼餘缸吐粟澌合硯生花月浸江妃冷波喧海若誇漂搖隨水宿鳬雁寄生涯間居二首七嵗投間日渾如未第初牛衣困襤縷鶴飯愧粗疏聖有杯中露朝無别後書溫尋皆舊學風雨嵗時餘畎畝三畨聘林泉一客逋君方借唇吻我自惜頭顱日月松偕老江湖橘可奴昭文雖未鼓洗耳即良圖黎州鹿鳴宴聖化如時雨吾門自教風文翁來蜀郡常衮在閩中夔足無多用鼇頭只獨雄諸君擕手上名姓廣寒宫九日類試院雨中制司送酒關子二首學省三年别文闈九日同登高遲麴蘖避濕到芎藭田舍飄零後江湖震蕩中忍將憂國淚滴向菊花叢老去輕時節憂來稔嵗年黃花關上戌青草渡頭船望眼知誰屬歸心只自憐僅霑微祿在未敢計良田周參政惠書唁及亡兒開二首顙馬非才具蝸牛惜弊廬嵗時甘伏枕風雨阻來車藥裹衣巾內梅花酒盞疏江湖慰寂寞一紙故人書取士平軒鑑吾兒死布衣招魂荒草墓寃鬼泣松扉推挽無遺力擠排已覺非存亡佩陳誼舍此更誰歸沉黎四首民俗瀕蠻詔邊城異土宜竹筒連水脈板屋怯風吹藥叟鴉隨噪樵童虎不窺愛山來九折人笑此翁癡蜀相披荒壘唐人拓密林四川襟帶重六詔霧雲深鹽米成民業珠犀作吏針官間無一事閉閣念親心古屋雲栖洞深湖水拍橋吏間知學稼民樂自歌樵官監頻添牧創監名龍淵蕃商不費招老夫便午睡風惡任飄搖九折山圍市雙溪水浸田號風吹客袖落雪舞蠻氈塞上尋歸馬波間畏跕鳶此生隨所適老去合乘邊雙鶴積雨催寒早江湖渺障川黃花到十月白髮已三年酒盡遲村餉詩成得晝眠低回看雙鶴鎩翮欲摩天天彭受代遷靜正堂以代者未到漫興二首客宦去未得山風來不遲東湖霜後冷北斗夜深移老檜新翻葉狂花故著枝憂時恐無補祇益鬢絲垂罷戍成遷次投間想故居風霜欺老大書信卜交疏黃葉頻供掃青山炯自如斯文身健在歸及嵗之餘拌毫筆管城無别𣲖毛族競分支公子兔三穴大夫羊五皮端能開句眼未肯畫愁眉若問結繩祖先從六畫推方舟二首有序山有泉因障之以為池種藕養魚築室其上其伏流作瀑布而落勢可五六尺許其下别為小沼作李子溉硯學書之所李子居室中聽潺湲聲作江湖想屋四角故名方舟云易曰利涉大川吉此聖賢濟世之具也李子於世習不甚曉故動輒齟齬從此乘流遇坎而後止天下未有臻於斯者期以此舟濟之遂賦詩二首云頗笑方舟拙聊因拙自誇家無三日穀園有四時花池靜魚吞墨松高鶴護砂著書逢好處快癢得仙爬物我相軒輊乘除只自知兒臨池上字母養鏡中絲竹靜泉生乳花深地産芝舊時雙燕子來往亦儀儀山亭三首春日山亭飯青枝古樹隂親朋知老病田舍豈初心月白水泉瑩花多煙霧深酒邊防惡俗醉語費披尋人誰憐老子我自類癡兒愛草留荒徑疏泉入小池春風隨處是晴日與花宜好客能相貸擕鋤出短籬小圃依山入危亭隱磴斜林塘掃寒雨籬落卧疏花處士七松宅先生五柳家柴門何所待倚杖數昏鴉舟次湖口追憶任明府重來又十年山水故凄然獨鴈仍為旅雙鳬已作仙濁流分蜀𣲖青色聚淮煙石上罾魚者猶言縣令賢
