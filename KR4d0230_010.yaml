body:
  text: 方舟集卷十宋李石撰書上宰相書某聞之天下之勢藏於天下之風俗而風俗之變成於士大夫之好尚勢有不可以偽為而風俗不可以驟革聖人非難乎革也以為首之之難也蓋天下事物之理惟其不能以相一則必舉其不一者而求於至神至密之地以激成不變之勢夫勢之所激是果何以致此太平之世明聖垂衣拱手於上而宰相率百執事於其下習於寬緩和易之域以期天下之無擾心意之所積口語之所宣將以是納一世於君子長者而後已此其用意豈不甚善然天下之所樂與夫一世之所安則必將有不慮之變藏於其間而勢遂已成天下之人惟見乎勢之宜為此也則求其故而不能得獨不思向者之所樂與今日之所安皆習久而玩熟放弛而不力則稔成必然之勢也固宜君子處此惟其素所抱負求以振起天下之勢則將有不言而風行不動而雷聲者靡然變其前日之故以使之一新而又慮所樂所安之既熟蓋樂至於過而安至於弛則誰與任事而循名責實至於使之蹙額不寧則又非盛世道德密庸之意恭惟真宰造化天藏而神運則今日之勢有不知其然而然者以自革於偷懦茍且之俗石雖不肖何敢議及此然重惟今日之治天下士大夫宜各竭精殫慮曰小曰大隨所處以自力於事功之急顧狃於所樂所安之習而視景偷日一切相戒以無為多事則吾君吾相未必肯許其如此而無害也蓋聖人之於天下也非習俗風氣為憂在乎紀綱法度之不立紀綱法度之在天下其所寓甚微而毫髮不戒則勢之所以養成者多有不虞之悔異時熙豐之盛以極於宣政之大過執事惟不知紀綱法度之所在而一切從事於虛文以侈天下之耳目勢既稔成而風俗如平川大波放潰發泄求其所以至此而不能得相激相作非一朝一夕之故也恭惟申興以來三十餘年矣生聚教訓忠厚之澤所以浸溉天下之肌肉者不為不至石之私憂過計獨不及於天下之勢而以原於風俗者何也蓋昔漢文之世在位者皆以長者得名而天下無事亦有可憂之勢賈誼故獨喻以措火積薪火未然而謂之安誼之通達國體必有見於此矣夫以文帝之寬厚而大臣皆以長者自處誰肯與天子任其嚴以存天下之法蓋長者似仁而長者流於鄉願不可不畏也今日天下之風俗所以作成天下之勢似不可忽也通其變使民不倦或者士大夫今有倦者矣齊威王所以賞罰阿即墨者雖非盛世忠厚之比而於今日天下之勢似當如此而後興起也石孤逺小官議輒及此不任死罪然一官晼晚垂垂五十飢寒凍餒之恤所不宜言而出其言則似非茍然也天下之事思之於山澤而或明於市朝石尚有敢言者執事其察之上蔣丞相書憂大忽小急先緩後人之常情明者見之則其小者在所憂緩者所當先也石到沈黎有可言者事皆沿邊利害他日有識者來此則曰李石嘗用此州不略出一言為此州久逺慮是仰負朝廷與相公委寄之意竊見沈黎為州空城仰食卭雅鹽米日計一日官吏軍民僅能支撑城雉不葺器械不修糧無一月之儲為可憂至於禁軍弓手可以團結入教閲者三四百人此又可憂也渡大渡河即有土丁二三千家習險阻之地形知蠻人之動息力足以抗變而敵之此外黎為州蓋搖搖也蕃蠻日有四五百人在城市每每市馬則相與傲睨知州廳事前守倅率買馬官坐廳事與互市左右編欄不過持梃嚴衛而已城堞甲仗兵籍倉猝可倚仗乎所賴者土丁隂制之於後而已石用此大段優恤土丁不他役以擾其家無追胥以廢其時土丁户下稅米每斛舊理一十三貫估石與每斛減五貫其對折之錢以吏人之未請兵籍之詭名酒務糟水錢之羡湊合對減刻板列之廳事以示久逺申諸司照會此寬土丁之一説也至其他城堞甲仗兵籍提刑鈐轄日檄本州增葺顧窮邊塞壘何力可辦欲從朝廷依前太守馮某所乞支降度牒二千來道為三事之費在相公介意即辦矣又兩蠻王甚向化其諸蠻如虛恨一族間有不測往來嘉黎兩州作過抄掠小路都王伺察來報意亦甚勤求有答其意本州何敢創例亦欲朝廷略有賞賚如衣服官封爵虛名之類此事亦與申朝廷看如何照見便民五事此間民事絶少有二三要節關沿邊大體若蒙廟堂略賜主張豈惟一州受賜折衝壓難威德所被豈曰小補之哉不宣答鄭運使書論蜀中事體置中伏辱報答寵賜和篇方此申詠佩歎於作者不已專人又被誨劄副以乘尊且承巡問還臺風雪良苦台候勝健欣慰欣慰榮經一事特荷鐫警非照愛不及此但石所言豈為一夫曲直利害計邊面郡體要當如是不然太守逺不過二年近則朝來暮去特未可知何苦去其循習之易而求改作之難此可以理曉也數年前朝廷議行分𨽻偶有鄉官者在東郡求差遣謁執事謬沮之今此又鼓率計會不知天子之士天子之民在彼在此於渠何有割與不割皆不免移榮經之食飽黎之民移地不移民曷為此懷土紛紛耶矧以割𨽻縣邑古今有之吾蜀懷安石泉皆自國家割傍州為控扼之會取一時增損耳黎本三縣廢二雅管下五邑榮經便黎而於雅為贅黎受六詔諸族蕃蠻之敵雅特蕃人碉門一族蕃人往來互市仰食所求悉出於黎乃以無所統攝之邑責之辦事如所轄輸賦不特馬路不修雖迫於上司行移誰肯為動心哉此特其細耳邇來兵馬日急蕃蠻日驕萬一有如唐人西戎尚可南蠻殘我之説黎雅二州之守肉可食乎五七年前虛恨籠篷之禍可鑒也黎因山為城如斗進則薄大渡河退則阻九折若不少展腳當有事時為棄城拱手就縳可矣石自到官面調而心折之諸族頗知畏愛適以卭部都王蒙備死馬路幾絶殊費招來其讎曰保賽蠻都王欲來市因言曰卭部我讎也向殺我人欠我骨債為其所阻與漢絶十二年不通特來理會公事而卭部亦怙衆以拒其路保賽者與蕃姻婭介恃以逞蕃嫉卭部卭部畏蕃之反也因説與朝廷接待諸族恩意惟一宜體悉世世與漢互市不必因是相為猜間今此就城下打話椎牛為盟可保無虞也然自今視之蜀之多事民心搖搖孰與無事時微隙小罅自當長慮却顧何忍憒憒於道塗聾盲之夫言行則事立言不行則事不立昔人所共患石則非所患也度朝廷未必從誠如台諭但兩收宣樞書云諸司有異議尚當不一言之制帥亦云頃問張憲亦以為然終不知諸司果何所去取誠如沮者之説是石以一言之輕與雅人為聚訟可笑黎衣食卭鹽雅粟粟唐以來有之非創行也卭鹽理納錢今則正色又復減半而州自請一如丐然兵之一衣折黑鹽七升雅粟八斗之數計逐月支遣外尚闕兩月則州自那兑此外應副諸司窠名不缺然軍民久困且弊只可吝用省費既已寬土丁米估之半又勸上户和糴賑濟不唯備此艱嵗而軍食比常年可寬兩月借兑且以義倉一事雅之士孤寒關節兜攬攜斛而輸每斛九斗五升如義倉鼠雀之耗將安所取黎受兩州支移之弊類此此外民夷帖帖盜賊日衰獄圄日清皆威令所及不即敗曠幸也苐以私計瓦裂災患頻併已露懇丐求便親養雖八改月於此不敢以私廢公粗糲度日僅如一僧襆被待去矣一二事稍似疚心若不布之左右是負屈沈寃於九折風雪中果何以自白於幽冥蒼蒼也言之忉怛春寒伏乞以道素倍保台重酒力甚健可以驅黎之風伯此去有燒春更得數酌以洗邊瘴如何不宣答趙道源秀才為僧書趙君足下昨袖詩見訪對坐客讀詩知欲祝髮為浮屠事垂成欲謀于僕謂僕有學校一日之知故不逺三舍地以來僕可無詞乎甚矣足下之未喻也伐國不問仁人斯言何為至於僕哉僕為人師以行道解蔽為業在成都時足下所聞僕教諸生以何等言語乃欲相望以此乎僕固未嘗絶浮屠氏而不知有其説也特以朝儒而暮釋絶先世之祀信汗漫不根之説以流為茍且幸免之民如足下者僕所深諱也雖釋迦氏復生亦將絶足下而不友况僕乎足下家不至飢寒有田舍作業父母止一子傳世教之為儒亦駸駸乎成矣不幸父母死便欲裂冠而髠毁服左衽以敗父母所遺之髮膚廢趙氏之後為餒鬼可乎足下無乃喪心失志而錯謬至此乎僕觀足下舉止語言不至是也父母死隻身不堪人類中多有之所貴人子者以能竭力負薪任父母之責為孝乃欲宅心事外自逭其死以去將遂作佛度世乎將逐逐而羣碌碌而遊與庸者曹居族處如今之僧也足下年方二十餘誠能自悔以卒儒業娶妻有子以無廢趙氏然後徐議之未晚也退之之於賈島魯直之於俞清老皆返釋為儒者畢豫承議棄祠牒再長髮入學與僕為同舍友涇已具祠牒欲去僕留之學校三年今登第方娶此近事足下知之不待僕言數日前吾友王迥有書云成都朋友多勸止至力爭不能回足下之意乃翻然以來見僕足下非尋常間謬人何可不徐徐思之論養生書辱書并十詩詞勤而禮厚誠專而意達斥逐西歸思見朋舊得此如面也僕丱角從鄉曲之師與士子遊處至百十不少其能自託於道義使人惙惙於心不忘如足下者才一二輩耳喜慰蒙教以養生之説且欲有所資問於僕僕則不然也僕儒不知道者於易性命有得知中庸大學誠明止靜蓋出入呼吸間服其言而躬踐之也自少孱病而貧藥食不足自給而氣血筋骨欲有所用誠得不夭橫自殘於一支不舉一脈不伸為全人以不辱為人子不虛生一世足矣此僕所以聞道之始也家苦貧甫冠逐食諸所至得一榻每每幽深窮寂少年所願樂初不能無思思不即得隨即灰冷不復燼於念慮也始而學學而習習而熟熟則入入則久此僕所以得道之堅也身多作客家居日少自丁先人憂出居廬既除喪不忍復寢內近二十年安然如一日體中寒暑小不佳不臥不呼醫靜以遣之大者一二日愈小者隨即愈官太學三年東南海瘴毒厲蒸濕薄人膚肉不過閉目靜坐或小不安為之一二日不食亦即愈性嗜書於雜交悠悠者一絶去不省用是得擯斥於朝買舟西泝風濤萬里幸此生還拜母顧兒女相拊存不復出州府且漸漸收魂魄入書卷中不知其為得喪榮辱之有二於我也此僕所以信道之誠也來書所謂水火坎離龍虎僕都不曉不知足下從何人説僕無乃誤足下之聽聞乎愧恐愧恐所須辰砂僕於草木尚不嗜食况金石乎在東南日遇一道人不説話在關市中以手指胸出一藥贈僕索筆題云二月一日歸去半塗見我僕得之置香奩中蓋去年之春也今年春偶發奩視之適二月一日僕之舟已在江峽間方悟西歸之兆已前知於道人矣細看其藥則丹砂也僕尚不敢服亦足以見僕之勇於道學而審於從人如此餉果子荷逺意空書為報勿罪答遂寧傅燮秀才書伏承傳訪三百里而逺意則勤矣袖出長書勢舉業以見其學意則厚矣僕得非所宜姑就所欲言者略陳之文章先立機杼機杼不立而欲組織成文章亦良難矣五行出於天者為天時施之於人者為人事孔氏疏子思之説甚詳禹之彞倫箕子大法其實一也費秦二誓孔子已自見大槩恐不專主兵法朝錯舍聖人之術欲教太子以術數聖人之道皇極之道王道也安有術哉戰國以術亂秦以術亡朝錯者猶術士之遺類卒以誤國殺身此等題目不必作吾友不過失解後熱中憤憤歸咎有司以其所業之工求速化倚僕一語為重過矣欲學古文讀先秦古書與韓栁文取科第看應舉時文一唯吾友自擇貧寒嵗久無一物以塞行槖所業卷復歸納衰病無由面别道逺力學自愛答胡龍學干紀瑞雪書伏辱惠示長箋至數百縱筆誠悃流出不倦教以所不及望以所不能教以所不及幸也望以所不能於石則何敢執事之文自然之文也而以下教俾追學之是猶䇿跛希駿而以小支小川擬放於溟渤之大不敏者尚有意焉若謂有所撰述而以之望石則必吁喘僵蹶濫吹門牆間所未敢也况乎所書比希世絶塵之事他人選愞所不為執事為之循默脂澤所不言執事言之人主所知天下所知書之國史著之令甲况施之蜀人有以格天瑞世駭心悅目者吾民欣欣如解縛弛擔不自意其生死肉骨以食息此稔嵗也甚惠甚惠且石自以為文者有嵗矣丱角篤好皆根本六經中來詩書求其聲氣禮樂求其制度春秋求其嚴易求其深如先秦古書聱牙有不能句者精微乎衆妙會融乎一理者往往得之人或以古文期之由此也加之師承血脈出前輩大老無疑極以心所自得如頃者唐文若張震劉儀鳳趙逵劉望之相與指摘一瑕一疵不許入紙孫樵所謂句句欲活者可見其苦澀艱棘於遣語成篇不易得之雖然某官獨欲以是假借而幸教之誠能寬期旬日後可耳石自冬至後入室打坐唯不敢廢學所謂學性命道學也人誤以謂學神仙其説未必知知之未必是也伏惟坐進此道寒暑如傳置過目昔孔明治蜀二十罰以上身親之日啖飯二升半嗟嗟蜀非無事之國也惟尊生自重羊酒餽嵗旨味及親矣且謝草草戰灼回新繁李尉書専人示書以駢緘為禮甚異敢泯默受此棄流俗乎唐盧肇以畫一咨目稟事節度府至其流為纍幅已過矣陸贄奏議為榜子集取便文之義今變為劄子非臣下通用至乃與公文參雜州縣行移有曰官員士人白劄子者抑又過矣如此細細未免流俗老僕將不得已當致皇恐百拜以答吾友無怪也德秀失解而以難弟居官一家休戚同之不必分彼我如何人一家所積有淺深士人發迹有早晚一門三秀固佳似未可驟致以激貪得之心也向來石先忝第知來猶困布衣老僕寢食必祝至與許修黃壇告天逮兄弟偕仕心願未有知來僅脫選調死矣幸而浩姪以世科踵其後老僕得以少蘇息也甥姪屈指內外二十許更無一上進羞出面顏老僕招與飲眊矂而勉以天定勝人事在如是而已繁上子真仙風當無負否時樣與鬼爭工吾輩底處立腳後跟勉之惠及茶紙皆蜀珍紫紗何用耶老僕近製深衣用十五升布極如法又向與亡兒服縗一領布衫冬溫夏涼不忍易之過眼輕細殊覺長物耳圓羣父子赴類省德秀云在衮臣處甚便其他三日送迎尉司一二得力照管之可乎德秀自奉書餘惟宦學自愛與景浚卿書辨德行堂銘洊蒙貺書溢紙辨説如奔江放海老氣矍鑠所以教病瘁不肖之友甚至感感浚卿以顏子所得易之德行閔子以下不得與則四科德行為二德行矣故不得不辨今浚卿公持所得有淺深石亦得以畢其未盡之説也顏子不二過聖人詳之有素其讀易至復初九不逺復無祇悔元吉此亦不二過之意不待牽而後復敦而厚復甚者不至迷而不復此孔子所以感歎顏子也其殆庶幾乎以顏氏之子近復之初九也若乃復其見天地之心則又别一意乃復之全體若喬嶽滄海其一又如嶽之一石海之一波顏子售用不盡處在初九一爻而全體者尚有説在不可便説破文王周公孔子之於彖象其指一卦一爻以稱謂聖賢尚有數處泰之九五帝乙以是歸妹明夷六五箕子以是利貞升之六四文王以是享岐革彖言湯武明夷言箕子文王皆聖人讀易感寓三致其意其於顏子亦猶是矣今便謂其殆庶幾一句閔子以下不得與此吾輩尋常遊戲設等級疑難以病餘子不是著腳處也若謂顏閔入道有淺深是具體而微孟子之説盡矣德行一科凡三人如曽子之孝不得列此豈可便謂曽之德行不如閔子德行乎四科特陳蔡患難相從者尤不可以是窘諸子其升堂入室次序自不紊若妄議其間則孔門投牒求試糊名考校又鬨然爭前矣來教云德行便是著實處不是鬼神虛無之説此浚卿顧僕厚令得出其臆見多荷多荷石以病廢日遮眼不過數行秋夕燈火青熒窗户兒曹咿嚘昨夜半不覺蒙被坐聽萬卷心願猶未填還得盡空老我枵腹耶念此浚卿亦當惻然向冷珍愛序西江集序士之所養關諸盛衰之運方其養之也氣類感召薰沃浸漬若有所受於天大小廣狹安於所賦不可強而得不可攘而致也雅頌之體博大洪深紆徐豐衍怨而不至誹喜而不至溢浩乎其和厚溫恭之氣不可及也至於國風二南以降過則淫佚流蕩其不及則悲噫憔悴分量局促若一日無以自容豈其聲音語言以相絶為異哉蓋繫其所養關諸盛衰之運也國家嘉祐熙寧以至於元祐名輩金玉之音雖不及見其人其聞而知之亦異矣其大者尚何敢議其小者亦自燦然一家蓋其所鍾厚矣西江集蒲誠之文也其學雖不盡施而見於空言者唯此朴而雅深而明約而通近而理其左右所資者想見其人矣唐末司空圖自以其文出皇甫湜推而上之以及於退之以驗其所傳之自然則圖之文退之之末流但時有後先耳今江西集所載如李才元鮮于子駿文與可皆同時所常往來至東坡父子熟矣後世欲知其文所自與夫一代作成粹美尚考信於斯言李晉壽詩敘君子之所恃以為學者至大至剛之氣氣之所藴不躁不競不欺不隱寬然一褐巽愞如無能雖三尺孺子得以狎而奪之至舉其所不得施於世發於語言文章者如雷厲山壓此何物使之曰此氣也學而知之其積習憂患非驟馳於一朝一夕間也至若少而鋭老而衰初而狂終而怯如春華秋潦榮枯虛實之不同得失汨其中哀樂怵其外此氣之所謂客者強梁好鬬者足以摶而勝之非君子之所養也吾兄晉壽蓋豪於氣者也其發為語言文章充然肆毅然立沛然不可禦其所為詩特其一耳非世之所謂窮人之詩也孟郊盧同終身盡力於詩其才不足當世之取舍故其憤悱鬱屈輸寫於詩者蓋窮之實吾晉壽則有不窮者迫之以事而不亂怖之以威而不奪所謂剛大之氣浩然盤結胸次蓋學道君子也晉壽抱負所學困於場屋老得一官為諸侯重客而經濟功名之念慷慨睥睨未嘗一日忘之及再被召官朝著不嵗許罷逐往來道夔子晉壽初不作世俗高下出其所為詩卷相與把酒篤敘族屬説學問纍日不倦故敘記其所得於晉壽之詩者於詩卷首而還其卷晉壽名喬年時為鈐司屬官何南仲分類杜詩敘雅道不復作至於子美太白天下無異議退之晚尤知敬而仰之唐人多工巧退之以為餘事其有取於李杜者雅道之在故也近世楊大年尚西崑體主李義山句法往往摘子美之短而陋之曰村夫子語人亦莫或信何者子美詩固多變其變者必有説善説詩者固不患其變而患其不合於理理茍在焉雖其變無害也詩記十五國之風而吾夫子取其不齊者而齊之上而王公大夫下而庸散僕𨽻上而性命道德下而淫佚流蕩此豈可一説盡之哉吾友南仲取子美之詩句分為十體體以類聚庶幾得子美之變者也南仲曷嘗以是為子美詩之盡然説詩者可以類起矣僕不敢求其盡試援此以從南仲家譜後序祖父望子孫者甚厚吾為子孫而自薄其身是薄祖父也其可乎吾宗譜系先御史府君始修之一行之善一藝之長必為之傳而登官籍致饒給者則載其志銘焉所以從善勸後其意厚矣迄今二百年子孫益衆富若貴者志銘多夸詞處約者家傳亦或缺焉故稽志銘之所載求故老之所傳斂華就實自御史立傳之後皆續傳焉而志銘之實亦在是矣有不及載者則其後凋落無所考訂故不敢強為之辭大抵續傳之作皆本先御史崇善勸後之美意而其要則以行義為先而宦達次之致富饒者又次之欲使族人皆自力於知行並進之學而汲汲務外之習或稍息聿修厥德毋忝爾所生吾族之人尚其勉之代家德麟作重修家譜序家有譜所以别生分類以著不忘非欲相誇以門地也吾宗得姓受氏自洛而歙而睦蔓衍四出至於源同派别有不可考者故先御史府君實自玄英以下定其可知者為譜而先監場府君又續修之今踰百年生齒日繁昭穆失紀耆年宿德問之茫然後生晚出將為途人譜其可不修乎德麟不揣輒因舊譜訪問諸族補其未備者而續書之尊卑之序瞭然在目天理未泯或可以起其敦睦之良心焉嗟乎今吾為兄弟子姪者多至數百人逺或千里外原其所自皆出於一人之身也且以吾一身而子若孫或數人數人之愛吾未嘗有異也以吾愛子孫之心推之父祖則父祖之愛吾兄弟子姪者詎有異乎父祖之心未嘗異而吾蔽有已而越秦其視甚者或戕之以自厚則於父祖之心何如也吾族之人亦嘗有思於此乎故又併著其説於譜後云自敘方舟子甫冠筮易得需之夬曰吉哉吾事濟矣需有所待而孚其兆也以夬為決決無疑也以姤為遇遇小人也需與訟對變乾下坎上需坎下乾上訟夬與姤對變乾下兑上夬巽下乾上姤需訟曰涉大川者利涉與不利凡十有一多以水為險君子進退取焉隂六六年陽九九年此進退也兑澤巽木舟楫之用膏澤下民如需夬焉可跬待也於是築書臺作方屋為方舟曰方舟子者石隱名也李姓知幾其字也方舟子九嵗舉童子幼逮老不一日不讀書病患寒暑不易或稍廢日補之第進士乙科成都户掾被召官太學循遷博士執政薦其文似黃庭堅而秀潤過之上皇曰朕知之是讀書至夜分者以多士鼓倡從之自試院論罷執政導意欲留官近州答以虎死不臥負琴書徑登舟還蜀太學之士數百扶送爭曰陽城去國矣除成都學官左右生至千二百員諸司增給學廩西邊二三大將相與義助倅彭州知黎州蕃蠻曰是天子學官來乎眼色不可犯再被召官都官權仇者每見泚然面顏好言如飴而險穽乘之果再論罷知合州又罷知眉州嵗餘仍被旨召還以母老懇辭就除西漕又論罷家居七年艱貞彌厲會吾兒開喪亡一慟曰天乎吾豈私吾子乎開好學能為古文長於楚詞訃聞生徒所至慟哭之老夫追縗每每涕淚薰炷無他度日作世系手記三卷一百篇者如漢人百兩篇之義出入六經網羅百氏學以易春秋為本蓋嘗統之曰易者春秋之天春秋者易之人天人合統而皇極立矣至於詩者春秋之世書者春秋之事二禮者春秋之制實則原於一也或問二經之學曰以易而讀春秋則嚴而理以春秋而讀易則潔而通問師曰心又問則曰易則探象數於釣道先生而出伊川之門人和靖先生尹焞焞之門人范淑自洛陽以經侍和靖入蜀時春秋廢於新學久矣岌岌乎絶業之餘也淑亦有經樞三卷行於世先是入官太學胥問經業曰易春秋矍然又問答如初諸生曰吾負笈十五年今得師矣嗚呼使吾生果窮稿死田畝亦復不恨俾尚有立於世宋魋魯倉今猶古也天乎人乎後之君子吾有藉口者乃為詩曰惟吾之學世先大夫大夫之隱邃於詩書手抄經説如哺小雛雛飽而嬉趨師於隅其長維舟舟衆羽翼誰弟誰兄雁行其習次參軍君孝弟以質次郪兹君有文甚力小者谷弟稚鳴嶷嶷惟郪兹君其學多通大夫曰汝維舟睦從先秦古文述其服膺不蹈陳言惟經是承扣牛永歌豈不律吕流為狎説嘔噦糞土人兄我師十九踵武有誤孔艱以文覔舉雕冰鈒雪有損無補舟顧曰巢歆向同異春秋一經父父子子向出公穀歆出左氏同為尊經異不殊軌人廢我興睽車載鬼衆目何疑從其師傅舟誦所聞元祐諸公歐陽盟寒蘇黃朝張一齊衆楚捨我誰憑孔孟以降不顏則韓聖訓可稽攻乎異端􅰕嶫岋屼忍揮我門小舟一兒自善一家愛汝助豫易與春秋倣豫以馳派别江西有徒執經斤斤其儀小舟不幸夭死莫追雲巢小舟道不喪時衆子及孫藩其閈閎籯書未貧詔我後人自贊附老君諸孫西佛東丘神巫好看莫錯眼漲天之波一方舟黑風鼓海白波漲天鯨乎舟乎六爻鐵編日高睡眠幸此堯舜之年氣以守神心以運目默以掩口或作緘口靜以止足不竿而漁不繩而牧自放於無涯之津如不繫之舟人或謂之曰僕
