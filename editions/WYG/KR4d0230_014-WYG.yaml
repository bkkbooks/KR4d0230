body:
  text: 方舟集卷十四宋李石撰銘大成井銘外學吏李石作二井於成都先筮得㢲揲之六九而老之坎焉曰井祥也陽摇其精隂開其明木湛乎深土溢乎津順所汲以免於險吾井其濟乎乃闕甃三尋有咫得食焉分東西為亭以大成名据象辭也嵗大荒落日清明大餘一十二小餘一千七百七十一銘曰一竒而精六偶而盈此天地合水所未形我浚其源如海之溟派挹華滋分注以清我則不驟待其淵渟爾綆之修此險之行爾汲爾學無敗其成誠齋銘子思子誠明似二事為聖賢入道深淺之候學者豈可躐至如人飲食量口腹所受有不可强而誠之淺深見矣令狐大受以誠名齋景浚卿為之記資人李石作銘曰彼孰為物執摶形似彼孰為誠於身則是夫豈不知是有四體一指不伸隠憂厥中是中有誠執摶則空彼空非物守以吾躬躬之所基忠信孝友人且有疑日用引久豈無水旱曰嵗其有父母師保倚為輟作試歸此齋舉束髙閣斂之毫芒散之山嶽何必讀書以身為學思誠堂銘學子勾龍復成作誠齋求銘懼其汰也敬為益一字曰思誠其銘曰以指指空空本未立説空向人信指所及吾性如空空中有誠引性説誠如指空名水之方諸火之陽燧本諸日月空則不匱爾盍不思誠厥有因思以自導渺乎爾身馬則思馳鴻則思射誰無父兄貽我一室聖門幽深性天之師為弟為子淵冰其思著存堂銘古渝王令徳作著存堂以思親取禮記著存不忘乎心之義銘曰心極則思目極則睹心目兩極何恃何怙始終惟一永肩慈慕感心泣目滴滴后土誠敬自中覿焉笑語豈不四時遷變風雨齋祭以孝親天芘汝曷著曷存燕此寢宇藝林銘藝猶技也自道已降技等爾學其技君子不可不擇作藝林銘曰學必有師誠心所寓心固有傳以學為聚大小髙下靡不畢具藝乎林乎材以待取戲綵堂銘為趙扶以其親賜髙年爵作人子之仕以祿致美親年之髙子心則喜萊也此心誰不人子其爵伊何一級自天白髮華簪三壽之先子學而仕綵戲蹁躚色笑之養昔人未老父前子後樂此華好扶也勉諸詩書共道葛仙井銘仙猶蜕也蟬以殻蜕蛇以皮蜕至於龍獨以骨蜕者得非江海靈物儲蓄既大不為蝡小技以幸速化顯晦動静與元氣合一出入生死唯氣之存其於形也若將遺之故能玩息古今踔躍天地翻波濤走雲霧是氣也而形從之人因鍊形以仙者猶龍乎乃今執蜕以議仙縛之故棲索之環堵塵滓之市謂其陳迹在此且仙者之形尚不可執况其居處作止之細乎是窺潭洞竅穴以求與龍戯也天彭大智僧坊昔謂葛璝之宅井故在焉汲者甘此井謂仙嘗浴丹此水疾者飲之平疥者飲之清或云兹大葯餘馥伏龍眢井也住持惠祖淘井郡丞李石銘銘曰仙棲千山今葛璝是也而亦宅夫塵滓之市有不為市人所洿者泠泠乎仙人之泉歴梁宋以來刼灰變遷井不改也渺莫記其嵗年嗟夫雲霞獨往仙躅上天彭民愈飲而愈有味者兹非其鼎中之餘瀝而大葯之九還者乎靈泉寺慈氏閣銘靈泉寺僧了緣始以紹興己卯建慈氏閣其徒覺普逺來東南乞銘李石合掌作禮敬為銘曰昔有化人來云是西方佛提掖周天子足躡雲雨上怳若鈞天居俯視人宮殿如累蘇積塊化人云此幻與王特神遊大哉佛一心廣大包四極我以一心觀諸佛等虚空誰令作宮殿臺榭如祇園金碧丹砂青荘嚴具五色幻中益以幻形容諸佛心耳目所見聞何者為國土而况慈氏閣空中樓一塵佛身無邊雲無數諸眷屬有幾多羅樹八萬千由旬如何于一塵便作見佛想緣師老比丘一念重山嶽辛苦成佛事只以此心觀袈裟裹虚空無一不是佛云此毗盧舍磊落古道塲權輿自唐人父老斤斧跡層雲起傑觀繪出華嚴境香火諸梵唄隠隠鐘磬聲一粒與一衣檀度歡喜捨穿井得甘脉誠非一日事以此布施力報佛父母恩梯級登上方隨方即見佛我喜縁此事隠忍如我心頭目及髓腦一痛皆可捨佛事倘可作先以此心觀名世堂銘為馬潼川作湯湯之江赫赫之文吾蜀吾文與江東渾我相西南孕離至坤火虚而明土静以敦麗照通中二義斯存長卿君平曰雲曰淵涪潼並流金華之山子昂故居髙鬰天藍誰主盟之有嚴列藩帝實命之爾昔代言相此蜀宇三蘇後先爾去我取扶築隠垣丹青昔人凛乎面顔此天誰欺盜食人肝越人章甫施於髢髠堂堂吾道𨽻乎益尊聖人不作誰習其傳名之翹之吾詩可絃桂林硯銘方以堅其操平以礪其心硯於墨圃惟谷惟深兹為桂之林用拙堂銘成都黄瓌作拙賦隴西李石以用拙名瓌之堂且為銘銘曰百巧不如一拙有餘天地之拙寓有於無生物不測雕鎪榮枯吾拙孰用通天地儒渾沌未死妙樸誰模以拙用巧蟄龍深居以巧用拙捷中以狙吾於黄子擇此二塗晚食當肉安步當車孔拙則黙顔拙則愚不用之用褐蔵空虚吾斯人徒亦拙矣夫遁菴銘其出為揚其入為伏一出一入誰絆風足聲不見形拔山之木象罔兩間日月燈燭自顧可憐相背而逐我食我薇我飲我谷佛則避佛俗則避俗二人相同相語相目心遊天關脚峙山軸菴中之人以遁為卜義砥銘黎州學土不沉根則深磨而不磷嶷乎士林金砥其刃義砥其心自牧齋銘潼上喻謙以謙名以為未足又以自牧名其讀書之室曰非敢躐取也於謙願學焉李石嘉其果於謙也為銘諸銘曰唯謙能尊唯尊能卑本自不尊曷卑之為爾學之初自謙之基自之一身以繫以羈如彼牛羊勿佚勿遺爾學爾牧恐然來思汝今誰自驁乎四支空腹説食罔罔渴饑曷不多學盈其嵗時是之既尊牧以自持未卑而牧謙自誰欺六畫之一謙學之辭誠樂堂銘夫物之生大哉天覆惟天能誠惟誠能有人物之一對物以偶物致號萬身曷盡取朝暮衆狙徇物以走君子憲天不息在久九竅玲瓏誰則户牖物物塵沙誠虚而受忍此為役日與心鬬人憂我笑夷則不陋誰出誰處䕫龍牧守一堂坤維日月星斗社稷司之如臨俎豆我固天全其樂不茍曾子子思孰先孰後蜀山吾文吾師孟叟量庵銘為慧海師作世有幾刹刹有幾塵一塵大地風水火輪中藏虚空廣大由旬敢以籧篨邊畔四鄰區區釡鍾尺丈寸分滄海幾斗須彌幾斤無量唯佛有量唯人有量無量同一法身贊明覺大師贊世界無有魔誰以魔自礙是故名魔者浴我香水海觀音贊華蔵世界香水海清凉山上功徳林白衣大士阿毗曇六度萬行亦如是十六羅漢贊第一賓度羅跋羅墮尊者雙垂足兩手横楖標据膝二鳥銜花一飛一墮給園三千我為第一垂足不言横据楖標此法付誰不請而得飛飛雪衣委花近席第二迦諾迦代蹉尊者趺坐右手執爐左手拈香胡奴發香以進闡帙在側貝葉誰書粲釋迦文枯木誰香布功徳雲我坐爾立湛兮中存扣以兩邊内修外薰第三迦諾迦跋梨墮闍尊者龎眉袒右結跏左手托梵夾左顧二白猿獻果一禮一立大士心相兩足甚尊拈起句子河傾海翻瞬目問誰是二王孫因華成果莫忘本原第四蘇頻陀尊者左手執麈尾右手置膝若欲結印雙垂足坐童捧經侍側我觀我身兩足兩手手既執攫足欲馳驟童子捧笈是中安有八萬四千弗如閉口第五諾矩羅尊者盤右足加左膝上右手支頥若有思左手按足指而坐崑崙奴從左炷香爐中我取我與不吝不貪一炷薰心萬法和南我為汝思非五非三知風之自鼻觀先參第六跋陁羅尊者收足曲右膝抱之加其左臨水坐崑崙奴蹲挹水於琉璃浄瓶水性本空不風自渙湛然鬚眉誰使汨亂挹彼注兹一派天漢無言阿師抱膝永觀第七迦理迦尊者龎眉碧瞳朱衣趺坐右手按膝左握拳據之如結印作呪鉢水湧沸中有小龍出頭角燕坐冥心靈源自在其中有物蜿然濤瀨雄其牙角能小能大收之一鉢放之四海第八伐闍羅弗多尊者趺坐右執如意左手托之膝上以身循手脈絡支節以手循心如雲蔵月心上起意三者黑業此意自如非玉非鐵第九戒博迦尊者脱履收足右按立膝左盤袒左垂肩握拳按地而坐侍者地上補磨衲我衣自然貼體具相自補自絍采章物象一線無迹是虚空様我足非歟生平幾兩第十半託迦尊者雪眉垂肩收膝左拄曲肘據上盤右足右掌按地猛虎舔掌在側觀空不顧我觀虚空色無有二蹲猛在側有不及視蒼蒼非邪空亦非是汝舔我掌嚥我法味第十一羅怙羅尊者雙跣收右足立膝左執扇据膝上垂左足踐屨上左顧看蓮花池六月火聚宅中熾然是清凉池著芙蕖仙掌中穆如有冽彼泉無垢法身一念現前第十二那迦犀那尊者東面收足立左膝展臂膝上手執金剛數珠圈子崑崙奴西蹲向瀑布洗鉢我法不説心珠自光念念相續如圈金剛垂瀑百尺煙霏露蒼浄洗齋盂聞魚赴堂第十三因揭陀尊者趺坐兩手憑几前有金甲帶劒人捧書加額禮請侍者搭袈裟立若欲可其請燕坐不動如寶玉山雨施十萬雲心自閒龍華諸天任君往還慇懃致詞肯來人間第十四伐那婆斯尊者垂左收右轉眄據几通袖而坐佛趺坐時問有禪句一收一放二義來去不動如如倚几轉踞袖手旁觀無有是處第十五阿氏多尊者收足右立膝斜盼右執麈尾以支頥左袖憑几盤左膝崑崙奴僂而放龜舍爾靈龜觀我朶頥爾智爾用我頥我持思於無思妙鉢闡提龜則靈矣童子何知第十六注茶半託迦尊者定身開目䝉頭趺坐槁木中木旁出小枝身既有根木亦有株身木兩冥誰榮誰枯附枝生春外槁内腴脱然一念渺乎八區石未第時夢所居壁中現一羅漢自言求贊應手贊之曰以手按膝兩足甚尊西天諸宮備聞此言贊畢羅漢即隠入壁久之復出求益數語或曰此聖羅漢也庚午待試信相僧舍日到佛殿炷香讀書瞻十六尊像其一榜曰應夢羅漢與向所夢無異既而石以是年忝第比來假守沉黎風雪瘴煙摧折辛苦子母兄弟分裂災患收恤不及静念所得薄俸嘗恐叨竊致災因令士人王愿同畫師甯煕載以善本橅臨自贊其上以示不忘尊者慈䕶大恩仰以追先世冥福乾道五年八月二十一日先君朝請忌日男石謹跋又眉州圜通閣十六羅漢贊一趺坐手舉眉毫相汝觀我眉毫莫作壽者相願以毫端力引接諸衆生二策九節拄杖相挑起四大海以此杖頭力龍神為法故來獻祕密藏三兩手作彈指相彈指微贊歎大地師子吼衆生如夢覺皆作見佛想四側坐手捧香山相視側世界無有側者手擡須彌能住持故五執拂子相􅆆起拂子我義隨堕悲願如海無有盡故六執如意相非心非佛而况意識我法如如安心已竟七觀自在相下有猿獻果有佛與無佛不作有無想惟能空一切受此獻果供八半趺坐看經相無情説法有情藏面我破微塵出此經卷九手輪數珠相諸天未有佛要從心佛起此非第一義而能轉衆生十捧舍利塔相未嘗起此座云何湧寶塔問訊塔中佛乃先見我手十一交膝執拂相我起不定故坐作正偏相意中互賔主此義無交涉十二側坐看虎相以慈悲力生勇猛心我眼如月無有恐怖十三捧鉢相内有龍湧出稽首娑竭多金翅昔所困容以七寳鉢眷屬皆安穏十四握錫杖相坐下有一虎汝本無殺心而况有殺者黑風不能吹故還汝佛性十五垂足虚捧經卷相口掛墻壁作磨磚想忽於虚空受持此經十六趺坐入定相是定不定相名為衆生佛我從三昧起非佛非衆生疏文儀真齋僧功徳疏某伏以荷國寛恩有周嵗二萬里之往復奉親逺役負全家三十口之生成懔然性命之憂厚矣髮膚之託仰資仙䕃聊課齋功伏願終惠長塗蚤瞻先壠溫溫江瘴掃疫癘以潛消節節風灘戢波神而無聳癸巳二月四日齋僧疏衆生業力未免億刼迷塵諸佛願心務求一切苦趣恭惟無上之正覺乃是去識之資糧明晦既殊薦嚴敢昧伏願某人以平時之素履仗今日之良因沈冥不滯於闇途安養常居於樂國玉毫光裏親聞解脱之音金色界中永陪清浄之衆請正老住保福疏不忍囘頭趙州住處本無佛且煩出手大唐國裏幸有禪許時化鶴今始歸到此騎虎不得下某師定眼具足覺心光明十二世孫臨濟下不斷如線三千弟子圓悟老已親付衣矧惟三業之昔游常給十方之遺愛想往還之同日任興廢之關天紅蓼灘頭舟楫未存於東下碧蘆岸上鉗鎚請舉於西來不妨再理舊規模又是一番新厯日已曾熟識不用牢辭父母諱日功徳疏二通災患相仍倍覺念親之痛慈悲有託敢輕事佛之誠爰薦薄齋仰資厚䕃伏願先考朝請真天不昧報地轉增頓悟前緣永綏後福母憶子子憶母不隔幽明心即佛佛即心無分彼此望松楸有千里之逺對藜藿無一日之安自課齋功仰承親諱伏願先妣蹇氏安人英靈如在鑒格不違雖頭目髓腦之可捐如何補報尚身體髮膚之未毁誓竭驅馳京觀功徳疏不安巢穴自向死門大建津梁為開生路國家盡包容於逺邇佛法垂薦拔於幽明伏願孤魂䝉率土之仁朽骨被漏泉之澤三碉城下修嵗貢之獒雙澗水邊無夜吠之犬偈觀音殿偈資聖道人作觀音殿嵗月落成鄉人李石歡喜説偈大士徳如天天髙萬物下如何尋丈室收拾萬由旬天既大不容大士著何許作室道人逺先得大士心能於一毫端浩刼萬物數百花香水海妙寳莊嚴光燕坐栴檀林種種具足相大士在掌握八窻見天光願以平等心見聞薰一切是故道人逺作室藏虚空我以歡喜心為説布施法朴菴偈我觀天地初渾沌未分剖一土與一木何有於雕琢况我血肉身便乃名作佛因佛作土木口耳眼鼻具金碧朱紫青肖像如我比土木非真實血肉人更癡三業六根中潛伏諸業識欲求返其朴當見天地初土木血肉身方便亦如是贈超上人經藏偈血者人絡脈經者佛語言人血作佛經强名華嚴藏我觀此藏義天地日月光山河諸草木無數妙寳花一一諸嚴具如我所受用清浄一法身髓腦皮肉血放大光明雲便具此藏義一痛念罔極流血如江河香水黄金塗蟣虱毛髮許雷聲師子音是則佛説法是故道人超歡喜成法施阿軫為出力平地轉法輪稽首諸龍天護此華嚴藏金銀字合論偈華嚴者佛富貴境界也聚衆妙寳成一佛地金銀琉璃車渠瑪瑙珊瑚琥珀真珠等物以為校飾或曰此外境界也佛之一心自為華嚴輝光焜耀出一切竒産遍布周匝具一切受用如須彌山如大海水不假外物自然富貴其法端自布施中來以布施故得富貴相而華嚴境界具矣彭州普覺院僧法煇以清浄身入華嚴藏故得經以經故得論因求所以為富貴者初不可得且曰吾法有布施一説化貪吝為慈悲誘嗔恚為歡喜摩以嵗月寳書盈笈金光銀光如二佛相凡合論十二函奔走道路相與讃嘆作禮請紀其事隴西李石彈指説偈凡物在天地唯一具足相衆寳和合成是名佛富貴金銀琉璃珠車渠玉琅玕瑪瑙珊瑚枝煜然華嚴光此則外境界不如自心相了了光明蔵譬如慳貪子惜物甚眼睛不博奕飲酒不忍一錢費碎破終于貧我以清浄身與佛同布施頭目及髓腦地水火風大欲愛三業根我當歡喜捨作一金銀書一書千萬言日月函明星字字華嚴蔵阿煇菩薩子善友五十三外物與法身二相隨所擇吾家大長者具此無言書捨物得法身身中足富貴八萬四千偈彈指如懸河寳座華嚴師證此布施法祝文黎州謁先聖廟祝文石被命守邊茍可以施所學於民使近者悦逺者來吾夫子不鄙葉公諸梁而賜之教石得以服膺遺訓其在於此敬薦芳潔以告其來黎州謁諸廟文石所恃以行九折之險者寸心也凡視民如子夷如客仁義禮信如飢渴珍異之貨如糞土而摧折壓伏於貪淫之吏者如讎伏惟聰直之鑒克相其來敬薦芳馨始筮之禮也告廟文惟神福綏一方祀綿百世屬天子慶太上之新嵗廣推異恩凡爾大神有功吾民悉膺重祭吏奉制敢不恪恭神享急圖報稱黎州辭先聖廟祝文石向以天子學官斥為外學吏逮倅彭守黎皆以學為事廣學宮增弟子員抑其細者耳至於明先聖之道革逺士用夷之習身所至則道所在如日照臨無有間斷被㫖召還姑志其有懐於黎俾知神者則無往而不在也辭諸廟文石十年去國再召以還神賜君恩相符如一東浮萬里尚克芘助敬展薄芻以告其去祀王董二賢祠祝文文起二典止于兩京蜀吠正狺此鳳鏘鳴相如三賦鄉人已傾子雲扶衰乃收其成唐暨我宋文物後生子昂蘇氏父子弟兄蜀江濫觴流大以横嗟嗟王公揭是儀刑以董侯配自我正名右像荒寒補綴丹青此祠誰欺尚畏幽㝠神肯聯食指此新楹陋學羣嬉媚詞乞靈酌水布芻亦謂芳馨斯言不鐫有如日明彭州謁諸廟文石罪放乎此學道愛民茍可藉口於神者聰直之鑒如臨左右視事之始敢不以告諸廟祈晴祝文未雨而祈既雨而厭雖民心之所欲好惡不常諒天意之弗違慘舒可冀念此封疆土地之守豈無山川鬼神之靈一吏之責而病或及民一方之憂而害將及國尚資㝠力共保嵗功柔風初布務在發生尺雪致災豈堪摧折伸者反屈榮者反枯去嵗所入甚微新年亦望少稔常寒致罰無曰邊州土地所宜以過獲書要是聖人春秋之法吏則有罪神均其憂儻如所祈不敢忘報情有喜怒氣有慘舒變怒為喜易慘而舒人猶難之神可知矣憂心累月喜色一朝捷如鼓桴應不旋軫肇此春物臻於嵗功敢薦明禋以永終譽教官廨舍後都官祠祝文石官廨後依牆叢竹間有都官祠官廨後非祠之所宜居則當遷或曰已改祠他處則當撤然神像甚偉中更葺治蓋祠所傳甚古而靈異自全故來官此者不敢遷亦不敢撤是用築垣周之以防䙝慢且潔其丹青而掃除之神與學官道義相依安於湫隘㑹當有通衢大軌奔走香火時也敢藉芳馨告於祠下告堰廟祝文挹下流之潤以為高原之滋水或不至種且不入父老云神居水衝制水出納神曠其祀水汨其源水田無收民食半菽三年於此然神祀廢興吏之責也民何罪焉辭武威廟祝文石去朝十年再被㫖召謬典此州甫及浹嵗所未盡施於黎之政者邊虚而不知備民急而不知救此後儻可終事而為黎長久之策者神愛此州與人不相逺芳潔之意視去如來祈雨祝文比者時雨有愆吏不敢以旱言懼以為瀆也迺今日轉盛而勢未囘辭欲陳而情以迫者嵗大旱民何以生兹用不敢不告神其相之霈為三日之霖以惠此一方吏敢不敬神之休謝雨祝文日者不雨民以為旱吏亟走祠下致禱雨既至矣以為未足吏日夜祗懼今雷雨既作膏澤下敷倍費神之力以至於此敢不頓首以謝繼今雨暘以時稼穡以登終惠之休吏與民猶有望神者也敢併以告祭顔子廟祝文士有能傳世行道者言語文章政事而已後夫子而生先夫子而死未聞得志行乎中國不以政事論也自衛反魯之時公墓之木拱亦不克與六經之議論蓋無見於文章也與夫子處終日如愚言語又不可得而聞也然聖人以為好學人以為不如事之以為亞聖人以為亞聖人以為先師則士志於學必有所本矣此諸生之所願欲以從事於斯者不敢不有所獻焉府學祭井祝文石到官未幾士子以闕飲告為掘二井隨禱而獲新甃既成矣豈惟神哀其愚以罪廢來此黙有以相其衷蓋亦知朝廷惠訓仁義之澤士子不可一日無食爰薦芳甘以侈神無窮之賜祭諸葛武侯廟祝文嗚呼定中原之鹿斬海上之鯨可與共天下大事者古今一人天灰赤帝之火夜殞轅門之星馬未飲於河洛牛絶餫於褒斜天不憗遺而使已志不伸古今孺子幸而集事以叨日月之末光辱旂常之後塵伊侯之志莫與擬倫彼其據形勢之上游操徳澤之權輿故能功滿天下而惠徧於生民侯乃起僻左扶漢於衰緒間關百戰未能九州一鼎而吳魏為賓忍使八陣蕪没翠栢黯慘悲風泣雨空遺恨於蜀江之濱故不生於垂衣之世值舞羽之代賡歌都兪與舜為鄰股肱耳目使侯作臣蓋志嘗感激乎知己而心期乎致身爾能折節北面聴言不聞豈關張之見蓄而魚水之情親誠九死之不恤恐髙臥之未仁蜀西南陬既弱且貧侯能使之有勞無怨千載之下猶思詠於甘棠之春我生何艱逢天不辰恨不得親拜隆中而周旋談笑邇公威徳直所望不能郡守刺史何足辱侯之友而攀龍之鱗閔禾黍之蕭條悼江漢之淪湮既無英雄可以聞倜儻之論樵夫漁父酒巵豚蹄争求媚於明神騎箕尾於光芒弄陽律之浩蕩雖幽顯異路而忠魂烈魄不違寤寐如影響之相親儻斯言之可復特一酹而問津西歸祭甘將軍廟祝文石一紀之間再召再逐雖蹈瑕積釁固所自貽然挾讒復仇亦已太甚蛟龍風濤以水險試人之心况神平衡人心以伺其去來儒名商行隠匿於囊槖舟檝於神不容以不直欺也奉親一舟數月二萬里至祠下神能鼓三軍之怒不能直一士之寃乎敬致薄酹以明此心神生自蜀挺身事吳限以鼎峙南北則殊今一大江呉蜀同軌幽明受職臣子無貳神之受食往呉來蜀私其鄉人誰曰不得風水舟檝豈唯此行再被恩召奉親以來艱苦不忘數日有卜芳潔之意惟神綏福之
