body:
  text: 方舟集卷十九宋李石撰周易十例畧春秋有例者起於杜預易有例者起於王弼二例之作以吾夫子立一定之論如乾坤二卦則諸卦之倡謹始之例也後之學者因而例之故作十例畧无咎者有咎而卒於无咎也乾之九三曰君子終日乾乾夕惕若厲无咎者剛失中道為亢之漸坤之六四括囊无咎者陰進薄陽臣强侵主下卦之上括囊以幸免孔子繫之曰无咎者善補過過而補之可免於咎矣易爻言无咎者九十九爻而何咎者三何咎者本自无咎而猶畏之无大咎者未能無過何咎者徒自憂於咎一以乾坤為例作无咎例利有攸往者可以往而往不冒險而往也始於乾之利見大人猶曰可往見矣坤之繇曰君子有攸往者先昩所向後有所歸猶曰可以往矣乾坤為例利有攸往之卦十一繇言其八爻言其三繇言有攸往者一爻言有攸往者三繇言小利有攸往者一繇言勿用有攸往者一爻言勿用有攸往者一繇言無攸利者二爻言無攸利者八無不利者十二卦十三爻槩之以不冒險為利也乾之彖曰乾始能以美利利天下不言所利大矣哉有利不言盖無適不利也他卦爻之利不利勿用有所待者倣此作利有攸往例孚者信也始於需之有孚而訟之有孚次之需者疑也因疑而待其信可以無疑訟者爭也因爭而求其信可以止訟或曰去就從違信不信之决也需訟之外繇言孚者三爻言有孚者十三卦十八爻繇因事言孚者三爻言孚者九卦十一爻爻言匪孚者一言㒺孚者一其曰中孚者信之由中而豚魚細物亦被其賜凡信之有疑有爭者莫不釋然於此謹信之始起於需訟作孚例悔吝者君子求免於世之憂患一夲於正心誠意慮而後動迫而後應俾不由於悔吝之塗乃已然時有不免者一身萬物隨時所值因易自忘可也繫辭曰憂悔吝者存乎介介者㣲小尚可以追惟之竊嘗考悔吝為二道則悔大吝小也吝尚可追惟而悔有不及者亢龍有悔此治亂休戚天下所繫孰有大於此者哉若夫屯鹿之不得往則取吝䝉以刑為發往則取吝屯䝉二吝吝乃非悔之比大小隨卦爻所寓不可一概且以乾之悔况之豫蠱困之悔誠有間矣若乃革之悔亡則以湯武革命幾於繫天下事甚大如乾之悔也他言悔十五卦十八爻無悔無祇悔七卦八爻言悔二卦二爻言吝者自屯䝉而下十七卦十八爻小吝者二卦二爻曰小者尚有大於此者乎貞吝四卦四爻吝無咎者四卦四爻此悔吝之別君子所以自忘於憂患者如此而有大小者以乾與屯䝉為謹始作悔吝例厲者君子以人心自危而日進乎道心之㣲惴惴自畏未嘗一日不以憂患自警也乾以惕為厲訟以貞為厲皆厲也孔子於乾以危為辭獨於艮之九三曰艮其限列其夤厲薰心夤心之上下憂患有所限止文王之辭也孔子釋之曰危薫心者人心道心危㣲之兩間正如夤之上下也且言厲自乾以下二十三卦二十六爻貞厲者八卦八爻厲无咎者八卦八爻厲无咎者以乾為例貞厲者以訟為例作厲例心情者人之有心有情也以人之有心有情見天地萬物之無心無情情顯而易見心隠而難測君子以易洗濯其心雖天地之大萬物之繁如對鑑妍醜無遁形矣繫辭曰聖人以此洗心與民同患是也然此專出孔子彖辭也言天地之心者一言天地之情者一言天地萬物之情者三復則取其静以自復故能以復之心見天地之心不待觀而見之大壯則以剛大而能正不但用壮為天地之情况其在人者至於咸之虛恒之常萃之聚皆天地萬物共由斯路此甚易見者以我之情度而測之也用易君子宜以復之心為心曰咸曰恒曰萃思慮所孚可不勞矣作心情例八象者始天地大象以求其類也類乎天者天象雲雷風雨日月是也類乎地者地象山水泉澤木火是也并天地為八卦十四象剛柔奇偶各以卦爻所象為類也陰卦取天象陽卦取地象錯綜為爻變化為用文王重易而立辭孔子立大象而釋之自其八者衍之為十四也以説卦考之取象凡一百一十三而大象所象特一卦一象為主而乃衍為十四坎衍其三離衍其四㢲衍其一其寓諸爻者為九十九所用未如説卦之數而名物有不及象者用易之君子以意逆志斯得矣作眀八象例貞悔者鄭氏云内卦為貞外卦為悔卜筮所用也然伏羲三畫有内無外有貞無悔雖三墳八索以步氣迎日亦未見其為占筮之用抑亦文王所重以蓍龜所定胥變而為卜筮乎周官三易鄭氏所言盖稽諸此也且以伏羲為貞文王為悔内外奇偶剛柔以初為四以二為五以三為六始中終之義變化酬酢而卦之上下二體具矣其為貞悔互相應用不亦可乎占筮所用有以内為主有以外為主内變者為内主外變者為外主眀取其變以為吉凶則易之神化也作貞悔例彖卦名者卦一名名一字盡矣非聖人孰能説之如曰乾健坤順非聖人彖之則世有不能名之者八卦八名伏羲名之益以五十六名文王名之孔子又因彖之益以六十四名其意以釋幾㣲幽深之義以廣二聖立言之法然皆强名也曰天地止矣又强名曰乾坤乾坤止矣而又强名以八卦乾坤之變者健順具一氣之元晝夜四時代謝摩盪命之曰易而槩之曰道故曰皆强名也揚子雲作太𤣥準易曰一元之統方州部家三摸九据因氣盈縮晝夜分之九九為八十一贊以御氣之變有一卦而三名之者出三聖人所作意表易道或幾乎息矣作彖卦名例繫辭者易之詞也易之有詞自文王始繫辭爻辭均曰詞也孔子既為彖大小象以釋文王之詞謂之繫辭者以繫其辭所自不徒作也故曰繫辭焉以盡其言然則辭者言之盡而有未可盡者易之意深矣嘗試分繫辭上下未盡之意以韓康伯所注十五章上繫之章七下繫之章八盖隨意求盡饜飫思慮而有得焉可以合而一之詞之統者如中孚同人至大有七釋自咸至損十一釋此可以合之為十八釋而乃分之於上下繫何也大衍之數五十而又合之以天地之數五十有五二篇之策而為揲法矣其下又再言天地之數何也至於十三卦制器三陳九卦隔章分釋已無可疑而學者以孔子十翼之分有可疑者彖一也大象二也小象三也上繫四也下繫五也説卦六也序卦七也雜卦八也十翼幾為八翼矣得無取文王繇辭爻辭二翼併足為十翼乎竊疑文王以西伯作易王為追書之王而繇辭爻辭有稱王者曰王假之曰王假有廟曰王用享於西山曰王用享於帝吉将遂為文王乎以大象所稱之王况之似出孔子或曰文言之釋為一翼而爻辭出周公作繫辭例右十例者據王弼例畧而續之既具之論其有可立一定之説於無定之中曰體曰用二説體即易詞所謂無體之體用則勿用之用此常説也惟易主變移易不可常者於例具之如弼之例可互見矣周易互體例易者以天地五行而生數由數而生卦因三而成六貞悔内外以數通於天地五行而八卦相資為用以三而五而五行互體以六而八而八卦互體若非互體則易之變化内外上下不相應數有所窮數窮則生成之理或幾乎息矣易之有互體出漢人二鄭學易者以互體出劉牧非也因取説卦占象與卦爻相通者為互體以應天地五行之數作互體例乾下乾上乾九五風九二雲右乾上下體以乾合坤奇偶既立五行致用於天地風出於㢲之木九三也雲出於坎之水初九也從龍從虎之象成矣坤下坤下坤上六龍戰六三含章右坤上下體以坤合乾為天地之雜陰盛勝陽龍戰見血五以陰包陽故坎象為血三以陰居陽故含章震下坎上屯艮坤右屯上下體互體為艮坤九五屯膏止而不得施六二六四坤體為馬亦止於艮而不行故邅如班如為有所待坎下艮上䝉坤震右䝉上下體互體為坤震震為長子故九二克家以二陽包坤故納婦以坤止艮故六三之女勿取乾下坎上需離兌右需上下體互體為離兌兌為口舌故九二小有言為澤故需泥離中虚為穴進遇坎為血也坎下乾上訟㢲離右訟上下體互體㢲離初以柔承九四之剛順上不争故眀辨晳九二以坎剛遇乾剛臣忤君子競父掇患之道然㢲順離眀皆可無訟四陽之健而一人帶三奪之矣坎下坤上師坤震右師上下體互體坤震律聴軍聲初六伏於重坤之土不常失律九二上應六五重坤之順以陽應陰六五得震故長子帥師得坤故弟子輿尸衆主則非丈人矣坤下坎上比艮坤右比上下體艮坤互體初六上應重坤順之又順坎水在前艮止不流盈缶之吉六二比於九五以内為限不自失也重坤之順不待誡令乾下㢲上小畜離兌右小畜上下體離兌互體初九上應六四以剛畜柔而乃反已自畜於離無所附麗九三見説於六四之兌説輻不行若夫婦而反目不能正室㢲正室離側室兑下乾上履㢲離右履上下體㢲離互體離為目三寄眀於兑眇而能視二以陽居陰有震之足㢲為股弱於足跛而能履成卦之體專在六三兑居五陽之間兑為口不咥人乾下坤上泰震兑右泰上下體震兌互體九二應六五長男少女為帝乙歸妺兌為口食之象四悦以求鄰雖富不富雖交通之世反失其實坤下乾上否㢲艮右否上下體㢲艮互體二為艮以止為得故大人否㢲承乾故小人吉以㢲順處髙位苞桑之危離下乾上同人乾㢲右同人上下體㢲重乾互體九二㢲順病夏畦以求於同褊隘于族非野之同重乾之剛伏戎致敵九四應上九重乾三嵗不興乾下離上大有兌乾右大有上下體兌乾互體九二重乾應兌以車能載以臣載君六五以離體主卦以兌説主信威行於下與同人相内外他倣此也艮下坤上謙震坎右謙上下體震坎互體初六以謙柔越坎險之剛故可涉水六五以震懼處坤得衆故侵伐九三主卦曰勞坤下震上豫坎艮右豫上下體坎艮互體謙鳴於二豫鳴於初以坎險髙下而鳴以求應和艮為山為小石止靜不動故先見九四主一卦以不疑致朋簮之衆震下兑上隨㢲艮右隨上下體㢲艮互體初九悦以應四動以隨静艮得所止之官不至失節六二不能上應於五而止於㢲詞求悦係陰失陽大小不得兼得九四之㢲體長女長男得其隨矣其守在貞㢲下震上蠱兌乾右蠱上下體兌乾互體以九二之乾幹以長子之震父子㢲順蠱敝之家不足憂主之以乾悦之以兌順之以㢲其幹濟矣㢲兌二女母之象六四之裕六五之譽漸以無事兌下坤上臨坤震右臨上下體坤震互體臨陽長之卦而以兌坤為體震動不静故二陽以大臨之然羣小亦可畏矣甘者苦之對兌為口故知味長而不已則泰道也坤下㢲上觀艮坤右觀上下體艮坤互體初六應四以陰應陰穉陰應㢲㢲為寡髮童之象艮為少男坤為重坤故利女貞若不知正則醜矣㢲以求艮二以應五㢲為白眼窺女求匹不可不正震下離上噬嗑坎艮右噬嗑上下體坎艮互體初九以震動而艮止之震足滅屨不行以坎險在前以乾三陽錯坤之三陰未能除間滅鼻滅耳耳坎象金乾象黄坤土中象獄之有械猶頥中有物離下艮上賁震坎右賁上下體震坎互體震足初動而艮止之為趾坎為輿而止險故舍車六五艮山為丘坤土為園束帛質素五數曰束坤下艮上剝重坤右剝上下體重坤互體剝之一卦以上九為主剝者陰極復陽牀以置身曰足曰辨曰膚抑陰進陽三得其應重坤為順貫魚小人之象以上九為宫以芘寵可免於尤震下坤上復重坤右復上下體重坤互體復之一卦以初九為主復陰極陽復仁者重坤柔之仁四應於初為中行震下乾上无妄㢲艮右无妄上下體㢲艮互體震動而艮止之以不可妄動天命亦可畏震為稼艮山不耕不可以富以陽繫陰㢲為艮止陰牛之繫乾下艮上大畜震兑右大畜上下體震兌互體以陽畜一陰為小以陽畜二陰為大小畜則九三應上九為輿大畜則九二為輿皆脱其軸畜而有養也兌悦震動以艮而止六四為童牛六五為豶豕皆止健有待震下艮上頥重坤右頥上下體重坤互體震動艮静虚中如頥以求口實二陽初終之智以貪飲食非養也艮為山為小石附坤土為丘頥㢲下兊上大過重乾右大過上下體互體重乾九二上應九五之兌為少女老夫女妻九五下應初六之㢲為長女老婦士夫過唯謹其小不至於大藉茅於初乾乾自危也坎下坎上習坎艮震右習坎上下體艮震互體九二震動而艮止之與五險陷未出所得亦小二簋納約其中有誠坎水眀水之薦離下離上離兌㢲右離上下體兌㢲互體兌澤㢲廣顙目為涕泣離以柔順附麗兌㢲錯然之敬於始可也九四下卦之應風鼓其火而澤之猶死灰然艮下兌上咸乾㢲右咸上下體乾㢲互體艮少男兌少女乾陽㢲隂男下於女無心之感初六咸其拇拇施於足可止而静六二則上應五為腓行則凶居則吉九三㢲體應乾躁其股為艮所執矣㢲下震上恒兌乾右恒上下體兌乾互體長男長女以匹相應二五之應君臣之道五以兌體之陰委質於九二之陽則相及矣九四下應上比雖禽不獲艮下乾上遯乾㢲右遯上下體乾㢲互體以艮駸駸為㢲自厲其尾否則致災乾變為坤二應乎五黄中坤牛剛革君子固志以逺小人乾下震上大壯兌乾右大壮上下體兌乾互體重乾附兌入震初應於震説以為進壯足為趾必窮可信九三入兌觸藩必决六五之喪羊九三之羊上六之羊以兌體也坤為大輿為腹以陽包陰坤下離上晉坎艮右晉上下體坎艮互體晉進而有所摧見險而止六二之愁以險遲留王母六五之陰三陰附之九四鼫䑕艮體穴離離下坤上眀夷震坎右眀夷上下體震坎互體眀夷傷也附麗越險以求出地其傷宜矣離為雉初附於震則飛矣左股以震足越險以坤震坎皆拯馬故為壯九三越險得陽震長子故大首挾南離故南狩上六上卦之上如登天回附於四故反入地離下㢲上家人離坎右家人上下體離坎互體㢲長女離中女附麗柔媚宜家以女貞故以險為一家之閑初之應四離之又離以四陽主二陰甚嚴且節二婦一男婦子也兌下離上睽坎離右睽上下體坎離互體悅以附麗而以坎乘其交二女四男其睽乃其合也初應於四坎體為馬乘而喪之於惡人勿逐自復六三應九牛扼於輿坎為輿六五坤牛也上九應四遇坎坎豕兌澤泥塗之水坎北方鬼方車載鬼也弧矢取睽先張後脱坎為雨故遇雨反吉艮下坎上蹇離坎右蹇上下體離坎互體西南離方東北艮坎二方以艮自止於難則西南可無慮也往者重險在前来者止而有譽有喜有待六二王臣䝉難以冒重險自出於文眀之方大人者来蹇以應離體坎下震上解坎離右解上下體坎離互體東北之勢離眀而震動難之散也坎穴三陰為土田為狐故九二獲之以狐羣自散也重坎為輿陰乘陽為負乗髙墉上六應四離體為雉出險而擊為隼故射獲之兌下艮上損坤震右損上下體坤震互體震以動入坤静而艮止之損剛益柔一人則艮上九應六三為友三人則三陽兌說震動坤順以求益損一陽之友震下㢲上益艮坤右益上下體艮坤互體陽極反陰必至之理初九决可不用壮則趾之不立也九二應五勇於必進乾乾之惕莫夜之行有戎者兌陰在前三則色厲内荏雨也羊也言也以兌陰而决陰莽之在田者為莧陸㢲下乾上姤重乾右姤上下體重乾互體以柔附剛牝豕敵豭羸而用躁乾金㢲木牽於金柅以陽抑陰也魚陰類也九二以剛乗柔曰有魚四雖下比於初困於重剛失中故无魚以五陽受一陰包含如天坤下兌上萃㢲艮右萃上下體㢲艮互體萃以聚集初應於四以止以說止則號說則笑巽坤柔順三陰三陽亂次求聚為艮所限孚不克終勿恤可也萃得萬物大牲之餘二以中應五薄祭亦可㢲下坤上升震兌右升上下體震兌互體㢲震合誠皆通神明用禴可也虚邑陰幽無人之境以㢲順而說得民震以主祭岐山之享文王以此歟坎下兌上困㢲離右困上下體㢲離互體冒險懦柔困而附麗㢲兌邅廻求脱坎谷初應於四之㢲木也故株木九二應五之兌為口故飲食六三據剛應柔二女在前夫妻反目三陰三陽相反不順㢲下坎上井離兌右井上下體離兌互體水坎出也䝉養源於下井則泉於上木可汲矣初之應四水附離兌燥濕相違則泥禽且不飲九二應於五坎陷為谷鮒離網中物六四兌澤受水之谷宜修之離下兌上革乾㢲右革上下體乾巽互體初與四二剛相應柔體中堅革之難也三就乾剛也虎豹之鞹以離之文炳蔚不同也六二㢲風從虎之象㢲下離上鼎兌乾右鼎上下體兌乾互體乾為金鑄鼎也初為鼎足中窒則否㢲兌長少二女附乾子妾兌為妾也九四近君而下比於折足渥形六五居中黄耳離象盖離為雉震下震上震坎艮右震上下體坎艮互體震長子主祭以恐懼致福初應四艮山也為九陵七日六爻周而復也四遂泥坎為水水在山為泥或曰坎豕淫泥艮下艮上艮震坎右艮上下體震坎互體初應四之震為足止弱不隨震躁艮静坎心病也故二不快震厲薫心三出險自反敦之又敦静重如山艮下㢲上漸離坎右漸上下體離坎互體鴻離鳥之附坎水者㢲風而干木冒險自麗危之也九三應㢲上六艮夫巽婦附麗為大腹夫征子不育婦失其道㢲木之桷髙而免咎陵艮山也婦雖不孕止静得吉離者羽之文章兌下震上歸妺坎離右歸妺上下體坎離互體震長兌少為歸妺離其一娣也震為足冒險而上故跛六三上應上六幾成坤母為須嬃也離為目故𦕈震長子得位為帝乙坎為月得中故幾望上六下應六三為兌之羊坎附離水赤血也離下震上豐兌㢲右豐上下體兌㢲互體初九上應九四以陽應陽二體皆陰卦實離㢲兌三女不無其配豐日中之照旬則十日過旬非中則灾中之已昃也震蒲葦㢲木蔀屋蔽日兌為毁折右肱㢲股之上艮下離上旅兌㢲右旅上下體兌㢲互體艮止離麗兌㢲欲自媚説物順人而不得行旅寓之甚六二應五過信為次兌為妾故得童僕三則離火焚次童僕無留行雉者離也牛者三陰之坤也㢲下㢲上㢲離兌右㢲上下體離兌互體㢲為進退為不果初附麗求説勇扵甚武其躁於兵故重以㢲命申申為戒㢲為木牀下致恭兌為巫故用史巫兌為金故先庚後庚凡六如爻之數資斧離為戈兵兌下兌上兌㢲離右兌上下體㢲離互體初曰和二曰孚三曰來九四獨曰商者以言議之寧小介焉非病也其說物之多通不如介也澤及朋友離文眀之益也兌講習語言之益也坎下㢲上渙艮震右涣上下體艮震互體震内動而艮外止之以静止躁震巽皆為躁卦也初六用拯馬以震坎皆為馬也机者㢲之木二應五机以静止躁也艮為山冒險挺質不顧羣以渙君之難大號㢲命血者坎為血為水兌下坎上節艮震右節上下體艮震互體初說以應四之止艮以險止之兌以言議震以足動艮木之多節坎木之多心兌通艮塞艮為門闕閽寺初不出户庭是也九二既已知節安於所止不求脱險以苦失中也安者不求甚說下比於初以承上甘者口悅之味苦則衆口不悦矣兌下㢲上中孚艮震右中孚上下體艮震互體初九之虞先見之信上應於四之艮以静止動為機先之卜鳴鶴二五以陽聲同唱艮山兌澤九臯之禽信之中也六三應上九為非敵二陰二陽以㢲進退不果也六四以震為馬㢲應上六㢲雞登山以兌而鳴登天之音失中也艮下震上小過兌㢲右小過上下體兌㢲互體小過中孚之變可以復不可以小過宜下不宜上逆順之勢㢲為雞猶中孚之遺音初六之飛鳥也六二過艮遇㢲兌為妣過君遇臣西伯事紂君臣之道嚴矣九三防之以艮執法可順不可逆戕之漸可防矣離下坎上既濟離坎右既濟上下體坎離互體三陽三陰之變上下體坎離其互體離坎亂以求濟其濟猶亂初之曳輪以脫險水濡其尾可戒六二離婦䘮茀以坎盗也髙宗伐鬼方離為甲胄戈兵於北方之坎也九五下比於二二陰為牛西隣文王也離上坎下未濟坎離右未濟上下體坎離互體未濟既濟之變而互體亦坎離者數窮而亂所當辨也小狐坎隠伏之物出險而疑水濡其尾水曳坎輪震伐坎鬼濡尾濡首隂陽之極既濟猶未濟者乾坤用九用六之數君子知其數之不可涯者既猶未乎象統傳曰物生而後有象象而後有滋滋而後有數數者猶曰一二三四者此易之始肇於畫矣欲求易者自其畫欲求畫者自其滋滋者猶曰蕃滋以一成二成三者是矣而蕃其象各以其類為象天下凡物莫不皆有象類物而通其象之次序可迎刄解矣物之生者自然之天其象其滋其數因是而畫之為三衍而六之八之則人也人者人為之以其使之然以合乎天之然天人相符毫釐錙銖之不爽而易成矣此象之次序不可忽也盖嘗以物之繫於易者原之以類而推其象其變化者乃其象之通而以易為神此兎蹄魚筌如王弼之論得意忘言得言忘象端有次序可驟而語乎乾坤者天地之二象剛柔奇偶其象通於八卦自八卦通於六十四此象可以類起矣以乾為龍坤為龍震亦為龍必欲求龍所在則曰天曰田曰潜曰野象雖可類而有不盡者似未可遽悉也至曰乾為馬坤為牝馬震㢲坎皆為馬坤為牛而他卦言牛㢲為雞離為雉而他卦之言鳥者可以類求之無遁情矣譬夫味之適口者必名其物然後知味之酸鹹衣之蔽身者必名其物然後知衣之長短數之未知象之未眀而欲眀之不已僣乎繫詞曰神無方易無體又曰剛柔有體以體天地之撰故因其互體者為無體之體伸劉牧之說而與王弼辨且天地生成五行五十五之數與大衍五十之數相通此蓍龜之用易之祖也易不有四象乎言動制器卜筮皆象之變化體有不同則可以互體推也弼乃以五行汗漫取四象者合而一之未盡而忘易之所祖是欺人父祖愚而㤀之以聖賢其子孫是又其僣者故因繫辭説卦立象以互體例類而求易因孔子以知文王因文王以知伏羲所謂象者儻不至牽合遷就十可得七八其他天人之奥性命之理如弼之作眀象得意㤀象者以俟後世用易之君子作象統眀閏正月小過䝉益漸二月泰三需隨晉解三月大壯豫訟蠱革四月夬五旅師比小畜五月乾六大有内外家人井咸六月姤一鼎豐涣履閏月遯二恒内外節同人七月損否三㢲内外萃大畜八月賁觀四歸妺无妄明夷九月困剝五艮既濟噬嗑十月大過坤六未濟内外蹇頥十一月中孚復一屯内外謙睽十二月升臨二小過䝉益傳曰履端扵始舉正於中歸餘於終此置閏之法也一歳三百六十有六日以六十四卦三百八十四爻為之主以伏羲之三畫者分十二月二十四氣朔望日月弦晦之候天然之正舉囿吾易卦爻之數為一定法以嵗始為端嵗中為中嵗終為終乎或以始子午終己亥合六陰六陽為嵗乎三代異正其所履之端所舉之中所歸之餘亦異則置閏之厯三代異用眇乎不見其端茫乎不知其終其中猶是也我知之矣大抵以中氣為母以均其始中終三際一唯其厯而已余将竊取顓帝之乾象厯以建寅為厯端以合乎夏正則千嵗之統幾在兹乎且以夏時為正以孟春為厯端則置陰陽子午不問不知何以為氣之母而㑹其中或曰無中氣者為餘厯之大小餘則置閏之數也所謂乾象厯者堯舜禹相承施行至湯止以立春為節而以冬至為元首周人遂以十一月為正以正六陰六陽之氣吾夫子論四代禮樂欲行夏時於春秋盖有所歎矣謂其欲修商厯非也乃乾象厯耳按魯襄公二十七年十一月乙亥朔日有食之傳以為辰在申司厯過為再失閏以星度知之則魯厯之失自周厯之失也劉歆乃以漢厯正之以眀傳誤班固則以春秋魯厯不正故置厯之失班固劉歆皆漢儒豈能以漢厯折衷於千餘嵗之後於是七厯真偽之論更起矣魏黄初専取法乾象酌斗分麤細之中以合春秋日蝕以正朔晦朔既朔為定而杜預乃以七厯皆非王者之術何也七厯多歸咎斗分二十六日幾一月之度湯厯乃以四分一為度之一且天度經星可以意増減之乎此杜預之所以疑也經星二十八宿以緯之五星變度如春秋所謂辰在申者以水星之在申也按晉武帝因魏之景初厯更以泰始名厯如泰始之三年閏六月二十五日丁亥水星晨見乾象則閏月九日辛未見先十六日黄初則以閏月八日先十七日如春秋之辰左申者相先後三日其差氣三候有奇不知順數春秋置閏至是凡幾失乎如是則杜預之疑審矣夏正之四月周人之六月正陽建已之月雖無中氣而大小餘之積似未可閏而閏之可乎惟我宋以六月置閏凡三淳熈嵗著雍閹茂月則且置閏與晉泰始合嵗月而用易之姤以兆六陰之氣則亦六月而不在五月來則幸其速去則幸其遲至于任法咎天之日月如劉歆春秋五行之說多矣因以易一氣之遯合之以俟後世眀厯之君子
