body:
  text: 方舟集卷十三宋李石撰辯老子辯上道有嚴乎曰嚴唯其嚴故渾然大矣曰仁曰義云者因人所不同各一其道而自為散亂其大者故在不小矣韓子以老子為小仁義老子豈不知仁義與道渾然中物因其失而致其嚴以為散亂之防非小也此不可以不辯老子辯下道有通乎曰通唯其通故渾然大矣曰清淨曰寡欲云者豈唯老氏聖人宅心於虚以受萬物之託寂然自冥於無所思慮俾百姓日用以給而救其過者此吾儒之正道太史公乃始以為老氏之學自别於儒寡欲清淨於是乎在此不可以不辯列子辯上劉向以列子湯問穆王二篇非君子之言湯問則莊子湯之問棘以大椿鯤鵬變化列子作夏革晉張湛注莊子以革作棘穆王篇論西極有化人來又仲尼篇稱孔子答商太宰稱西方之聖意其說佛也然佛出漢明帝時湛乃謂列子語與佛相㕘蓋指其幻學也豈西方之佛幻已肇於列子時為穆王化人事乎必有能辯之者列子辯下孟子距楊墨以楊近墨逺為序於儒以楊為為我之學一毫不㧞於天下可也如禽滑釐對朱之言則以墨翟大禹為為人之學老􅆅關尹為為已之學似以朱况於黄帝闗尹此列子之有取也劉向云楊子之篇唯貴放逸與力命篇乖背豈放逸近道乎其何以近於儒不然力命自力命放逸自放逸耳必有能辯之者飲食鮮能知味辯子思曰人莫不飲食也鮮能知味先儒以别薪辯鮓食鷄知露棲食鵝知黒白釋之非也天之生物自五榖草木鮮蔬皆有精華苾芬具天地中和之氣資生於人特人未知之耳飽者陳方丈水陸之産於前食且厭之而饑者飲啖茹生雖麤糲草具丼之過於八珍非味之正也飢飽惑之也誰能捨去飢飽而味飲食之正乎且鹽止於醎醯止於酸椒桂止於辛食者皆能言之若以此為味則味止此耳若以此為非味之正則昔人用意於飲食之表者其必有說也神農蓄百藥而嘗之皆經口所嗜也今人食五榖草木而酸醎辛苦雜然其間取適於口失其正味往往以是死者况欲使之如神農之於味寒暑隂陽燥濕有所弗遺雖遇毒不死豈可得哉周官曰春多酸夏多苦秋多辛冬多醎夏小正各辨四時麻麥菽稻犬豕羊雞之所冝此教人知味也其益於生者則取之損於生者則去之惜乎人終日飲食而弗知也其得之以生者亦弗知也其失之以死者亦弗知也若夫先儒所以釋經特一法耳非聖人本意欲用是以教世人世人必不能寧終此世而必不知也因觀本草思及先儒之未盡故備論之月法辯三代之厯惟以夏為厯之正顓帝始作厯而後三代為遞用之乃子丑寅之相承也行夏之時杞不足徴杞雖夏之後有不足稽考也春秋之年月日則周正朔也七月陳王業周公之詩一二三四日曰日不曰月以其時之氣令有不協於月當與吾夫子之意合也如曰七八月之間雨集溝澮皆盈七八月周之五月六月也無疑以皇宋所用夏時推之氣令已正矣曰周之七八乎夏之七八乎以周之月則流火之月授衣之月進在今之五月七月進數八九之月蟄者未畢何以為火伏以為金柔火老乎此行夏之時吾夫子有不足於周而夏小正吕令以秦正㕘錯其間如曰孟春行夏令釋者曰已之氣加寅之氣此月法也不可以不辯説放生説佃漁之利天所以資人之生葢許其殺而不許其過乎殺者以其害仁也於是有暴殄之戒江湖水産魚蛤蝦蠏細大之族民忍於殺而不恤者資以生也而有過焉君子哀之恐人自愛其生以殘物之生而害於仁因取其可生者縱之非敢以小仁小恵求異於人以希惻隠之實庶幾推而放諸天下亦君子自然之志也李子去親官萬里外食不敢飽况殺乎日以俸緡作放生供自紹興二十八年二月朔始作放生説三蟲説凉秋既乆忩扉留月光摇草樹接於几席一室澹如也炷香誦書既夜分矣獨坐無人靜念感觸可喜可怪同一化物在天地間雖㣲可録也苟有聖賢仁義之質充之則人否則不如作三蟲説蟋蟀鳴竹間日聴一日初逺而漸近也一夕自投几下鳴聲聒聒驅去復來如有所訴不可止遏如所當至此不可却因感七月在野在户在牀下之句鄭氏釋之曰以漸也士君子之學自可欲之善充之可及聖神之域雖樂正子有不可驟而以其漸彼學未至於善與其至而不循其序夷居於聖人之堂以求躐等曾蟲之不如爾雅曰螢火即灼詩人謂之熠燿唐人謂之蛢䗲通釋螢也毛氏誤以䗲為燐孔氏舉牛馬血鬼火以䟽其誤䗲之非燐審矣螢亦非獨腐草出也或曰濕生之蟲多夜明余坐席下背燈處摇摇如寸金爛徹視之則蟲如蛹狀首尾銳而薄黄黒色不翼而足腹下有光其亦螢屬乎彼固胚胎於朽腐潤澤以自表見於土壤黯暗謂足為光華矣士君子不務其輝光日新憒憒中如黒漆自暗隠蔽日月曽蟲之不如禽棲竹間暝夕嘖嘖引手可接聞弹琴聲時一作振奮鳴和之音日為常略不怖也因感聖人弋不射宿之仁與夫忘機以狎海鳥者吾之仁於彼弋與忘機於殺於汝皆可保也世屯道否徃徃肉至親而食之彼固知擇於人以為依宿乎固有不擇所依網罟畢弋發於幽隠不慮昵於私而比於愛自以為永可恃也曽蟲之不如主民如主鳥説食於技者以擾鳥凡烏鵲鴿鷃慧如鸜鵒貪如竊脂皆籠飼教之陳於稠人通衢聲鉦鼓噪呼先之使不怖且狎其飛鳴隨主指顧翾羽利觜各用其伎節奏俯仰徐疾折旋主操杖次第口授如律則㣲飼以勞其成嗚呼鳥何知焉唯利飼而忘其擾之苦也周官四翟之𨽻掌養鳥而阜蕃教擾之掌與鳥言與獸言夫鳥獸之距人逺矣而與之言又以四翟官之豈以淳固鷙戾之性可邇鳥獸耶夫因物之性雖鳥獸可邇違物之性雖人有所不從况鳥獸乎羽者必不使之觸飛者必不使之蹄因性為教善術也誠使主民者如主鳥者别其教而勿傷之察其意而惠以飼之俾有以自忘其苦而服從其上化其有不行乎題䟦蘇文忠集御叙䟦臣竊聞之王安石以新説行學者尚同如聖門一貫之説僭也先正文忠公蘇軾首闢其説是為元祐學人謂蜀學云時又有洛學本程頥朔學本劉摯皆曰元祐學相羽翼以攻新説卒之不勝稔成亂階尚同之過也仰惟靖康定正國是投其徒於四裔凡悉力以尊崇元祐學者皆得為專門名家軾其倡也逮紹興至淳熈四十餘年堯父舜子授受聖學一出天縱猶夫子一貫之説無彼此異同之尚先日拒王氏説以䇿勲聖門者皆録用其後子孫蘇氏一家尤被旌眷挺挺遺習典刑相望世有人矣曰遲曰符曰籍擢用於上皇之朝特以世學為學者矩範非若他人徒然先閥之矜也今侍御公嶠以直道受知以懿文進用其施設語言自世學中出兩宫隆眷振輝九牧不特其鄉之人也邇者追錫文忠公美諡以御叙賁其集眷眷於蘇氏至矣其子孫所以報荅朝廷重意以侈耀厥世又宜如何臣假守其鄉詩書耕稼衣冠不替以道徳性命之歸為忠信孝悌之實文不浮質不塞知法而易親曉禮而易誘共知師用蘇氏者以聖學之勸也敬於郡圃作堂以元祐學榜之奉御叙與侍御公嶠之䟦刻龕之堂上與蜀士大夫共之守臣職分也具位臣李石謹記䟦蘇帖東坡初得筆意於顔湖州此帖是也蓋嘉祐中任鳯翔幕官所書子由時在陳州其次韻子由云舊隠三年别松杉好在不缺䟦潞公清獻公帖文趙二大老前後典蜀蜀人至今愛而思之惟均然潞公未滿四十為蜀遨頭有飛語中傷至遣御史何聖從㢘之獨清獻乃以一琴一鶴遺蜀人其以清為諡冝哉此帖蓋以資殿自政府出知杭州也蜀人李石獲觀於亷靜齋公三世孫藴以亷靜名江陵官寺書史之室張孝祥為書揭其顔上清下亷家法也䟦富公帖富曽再入相而清獻㕘大政此帖蓋自尹蜀日除諫院以蜀政之美為異時鼎軸張本然介甫執政晦叔入為言官諸公者皆去矣䟦謝君所収帖吾友謝君出此卷云得之岷下屈指已二十一年矣石時居先君憂王巨濟張彦清王仲衡相與撫存徃来俾得以自忘於憂患無聊而栖心塵外乃如此三人者今皆為古人獨石排擯無用奔馳宦海不復如向日為無事人可嘆也蒲山本知来舍弟自潼川牛頭寺以馬載歸今尚在知來處此山與吾兄弟㡬為三頑物以老知來出仕此本閉空屋花竹間然亦不得數見之讀詩凄然乆之因書卷尾復還謝君年月日䟦䟦范伯文所藏帖太原之戰昔人河東之䇿中興椎輪之治欽聖料敵之明將臣奉以從事乃一跌至此世有登廣武而嘆者乎范氏子多賢他日讀父書境土不難復七廟之恥不難雪仰惟在天之靈尚照臨之䟦西湖唱和詩右臨安西湖唱和詩石向備員學省率以休沐日獨游西湖時有篇什以陶寫伊欝初不敢出以示人而同舍有知之者往往假寵教以和章殆盈卷軸倉猝罷免萬里以歸水火焚溺有所不免僅餘此數詩凡十四人閒居閱故書得之因葺北田草屋刻之屋之壁雖然石去朝跨九年矣升沉出處之異用死生寵辱之殊致此理之必然者至於筆勢句法如玉如金亦足以想見一時人物之勝年月日䟦䟦王金州送贍學錢書學以養為義校以教為義養當有食而教當有書二者皆先王之成憲學官所資以立焉者也頃嵗學校徃徃有養無教食而廢書多矣故學校所至不復藏書雖曾經朝廷賜書亦復散漫不收他可知也毎三嵗取士考官所要書率科之書肆文具而已至學校兩季補試或旬日發題多隨意摸索不復檢閲無幽逺靖深之意間有粗淺凡俗傳笑士子者或曰此非學官之過學無書之過也石罪放為成都教授始因試諸生日援上庠例求觀書至無可得則以學力所及自市書既得數千卷而所闕甚多㑹金州帥節使王公送五百貫贍學則以二伯貫補書數之缺而經史子集大藏稍富於巾篋矣先是學有韓退之文板本獨缺桞子厚集板因以三伯貫刻板并韓文並行豐其本息以給膳養不足之用竊聞公典方面所至多為學官市書今成都學自此有書庶乎公之心所霑丐甚逺豈特五百貫而已哉惟公倥偬戰陣以恢復中原為已任而能玩意儒術文武並用勲名竹帛宜與國垂於無窮士子筆端但知賛美以飽公之惠於學校間也謹勒公手墨於翠琰永為學宫光寵䟦安氏教子五説厲之所以望其子者與堯同堯子固不肖厲之子亦未必不善皆天也五説皆聖賢仁孝之質學者之事豈惟安氏子所得於親者而已乎勉之題許道寧畫許道寧寒林怪石老硬殊多佳處但不甚惜水墨徃徃有斧鑿痕琳兄喜説許道寧畫更參此一轉語三十年後有味趙乆道亦學許道寧者題李道明畫出山佛先君子棄諸孤谷弟甫六嵗當不復詳記其音容試為炷香作想其端方靖重渾然紫金光聚如畫此佛出山時則可見其人矣此李道明筆石書之於天彭之東湖泫然乆之簡答杜敏教授邇日徂暑肇凉伏惟横經師席尊履佳勝未嚴召間所冀綏愛又分士而治此州師儒之尊三蘇先生其照臨之六經麗澤與天同功吾人其勉諸石預受賜矣甚幸又泮林别去嵗月如許其事則付之道塗㳺談其道則吾輩貫冬青青未之有改也石老矣行當與公細論臨書馳引又專介雙緘禮意優寵如見敬畏於他人者非朋舊所望數語為謝殊愧崖略與眉山知縣即日嚴秋向冷伏惟撫字多相台履佳勝未間珍愛伏審髙才劇邑前無全牛美最華塗未應縶驥召擢有日翹引以之又欽遲英譽積稔嵗時茲獲為僚同一城郭日有欵奉之幸預慰此情與費通判比日秋半已凉伏惟典賛藩條神人安穏台候萬福謹奉此候記𨽻又銅梁請違曠嵗不復記崦嵫餘年所得朋舊例如是要之佛氏三宿桑下滯念所感况欲臨鏡剪白而與人較量是非以益其老乎懐仰曩時竊覘風矩詞吐几席觴豆問曷勝依依又伏䝉以雙筠為賜此近世公牘之贅者至於累繭細札不知可略去乎厚意所屬以奬借為重而以凉薄罪垢之餘䝉此愧怍亦大矣下情第切感慰又石抆拭除郡尚有前日非據之憂所恃者福徳和厚坦易明白如挹眉宇秋陽中得以自洗瀹於無涯之津思過半矣石略出雍府事回即得伏謁預有欣喜與交代季侍郎邇辰秋瘴未消凉氣折暑仰惟君子四時天道已行世態冷熱有出隂陽二㓂之外者一飯自重姑如彛儀之祝又伏惟兩川桃李相接資之鄉山不能數歩徃來者説尹在口且一昨朝著飫服盛美欲一見未得乃今以郡左符為交承石區區此願破矣不勝欣喜石再召再逐分為田里廢棄之民何敢自比下塵聖恩寛宥再試名郡豈其所冝踵武君子承挹其告新之政庻可以免其戾矣幸甚又伏承新渥鼎來揚舲大江知有日矣共以懽慰石尚及稱一觴之慶於公送江入海矣小啟蓋飾説之贅非所以干匠目皇恐皇恐與蘇給事恭以斯文持世以道事君出處雍容賢名愈白即日台候萬福請外偃息不薄淮陽計已氛祲廓然朝著清明復為兩地之歸此三宫所倚重天下公論所係屬非特石之私伏乞保重又一昨䝉示照牒給事舉自代此古薦士也石至愚且賤何足以辱此昔退之舉侯喜自喜望退之間不能寸非獨喜自貶人物品級天下公議以為當然於給事不失為愛士石則自以為過且愈速其罪垢也二十餘年見仇於權者亦既甘心而猶望望未已自來通義日畏一日危行側視恐不免以去今則稍可息肩矣人知給事之舉何啻九鼎一扛石親老身亦老矣捨公道其焉依不任此情與陳大諫去秋黎卒行上状未見回程一向曠於動静苐切瞻仰比日逺惟台候萬福温凊色養晨夕告猷君親之奉兩極其美甚休石乘障且閲嵗於公無絲髮之補而親舍阻逺稔山崖之惡私計可知矣日以速譴生還為幸未間伏乞保重又今之士氣植黨以固位立監以䕶謗忌克之風勝而凌誇之俗成國家忠厚之福鍾積已深法制深嚴是𤨏𤨏者何能為然區别邪正明白是非為四海端本溯源伏惟有可言之地可行之時大諫無愛焉石曷勝為斯文願望日夕東跽禱而祈者又敬問國太夫人夀體康健新婦兒輩敬致百拜起居之禮令季大郎今官何地郎娘各計均福沉黎有委寵示李成書來已拜珍餉矣感感回資守伏辱板教下情感慰比日恭承台候萬福戒飯甚寵仰佩謙眷委曲於罪戾退藏之人至矣第石見苦赤目方熾來介具見之昨晚方掛家舅服郡齋禮法所以風示千里而不肖者向來亦濫迹儒宫彼此舉動似當愛䕶儻䝉矜從俾安迹於蓬陋與朝夕奉燕豆無異也死罪答賈子春専使辱書甚恵富於藻繢而秀於語言若欲跨人頭角而傑出其上者此豈細事但不知僕何以當吾子之意不然於禮亦過矣謂僕欲行聖人六經之道而與四方英俊共之則然矣必欲使僕如孔孟以降荀楊韓子數聖賢者髙其閈閎而推用其徒以張皇羽翼則僕有所未敢也數聖賢者皆天之所授以續堯舜三代帝王不傳之業爛漫季世又厚畀其徒而隂相之俾相與維持於萬死流浪以有立於千載者皆天也此豈人所為哉雖然僕固不敢議誠得數聖賢者復生今世僕將率平日所與共學者而㳺其門亦未敢便溟涬而列於羣弟子之下如升堂入室亦次第可學而至也僕所得於賢朋友誠多誠厚度他人未能有此僕得之亦私以此自賀自樂不知天亦有意於我者乎誠得天假以餘年未即委頓坑谷更如吾子之教雖然亦未敢侈用吾心而輕出人力以速誚取罵也近日趙鶚有書來令僕多著書意亦如吾子之教而庻幾尚可勉者太𤣥法言原道等篇如諸子不難作也易曰修詞立其誠誠立則詞立如吾子之文固佳矣凡所以望於僕者篤實用而略浮華崇理趣而省虛偽茍可施於身而立於世幸以悠乆可傳為念無貽他日不誠之戚僕終受賜矣因入城見訪閒居對客談道亦一樂也遲竢不宣答王景文九年之别一再寓書應不免浮沉頃聞從軍入蜀初亦未審徃來者亦不之及不即奉訊乃䝉教劄先辱愧悚愧悚比日具承台況佳勝慰喜乆之賢東道相處逺客可忘索寞跬歩梯級更當勉力有如修名欝欝非乆此者石杜門奉母貧甚有可營甘㫖執飽而止老矣敢更决擇他覬乎沈黎改授已出誤恩近闕入手小濡枯涸吹嘘有自知感未間厚珍重自愛又石西歸頗多暇日有易外疏論語集傳二書或可藉手故舊此外隨筆應手皆不計其文之工拙與今人之好惡愛憎所謂道學初不曾夢恐亦只如是説也景文有他文得一一見寄如何彼有可過從説學問否俊場年少多有其人至如臭味語出肺肝當自得於吾人眸子間不必僕説思之思之近文一二紙嗢噱擲去之湯朝美一再收書未有順便可作答或以此紙寄似亦佳答郭綱秀才論稱呼去秋承書来介委之而去不報非有他也便人再辱賜教詞句峭立當是深造自得否則一字説不成也喜慰喜慰志彭氏稱孺人特以范氏貴仕名門眉之彭亦如之亦猶子呼承務婦稱孺人生已過稱如此死何可廢春秋君夫人其不得稱夫人者特曰君氏其於夫人可輕稱乎唐自一品以下曰國夫人郡夫人其他郡君鄉君縣君外㪚官通稱縣君婦人不因夫子而加邑號則曰夫人所謂孺人則國之庶子之妻秩亦似優於縣君非今之所謂孺人也今之孺人乃婦人之初封頃年顯仁太母恩賚士人之母年八十皆得封之其施之范太師家諸婦不為過否韓桞誌夫人之例極是考據得出且援例異時恐不經且非正名之法如何子有子奭皆廷傑之子革父為兄弟子初槩為佳士豈可以廢學遂不士范氏子弟乎革父之書異於其伯氏更審觀之可也知邇來寓處房氏面壁功用以不倦終之勤種多穫名第在髙才無難起居比何如畏暑如疾惟君子消息常理不宣
