body:
  text: 方舟集卷十二宋李石撰啟謝解啟辛苦荆山已勞於三獻依棲楚舍忽遂於一飛初知公道之開且有親幃之慶捫心益恥賀徳有歸列棘外臺本優子弟挑囊中選粤有師儒限程較藝者止鬬七人濫進冒求者動踰十輩本是别嫌疑之地豈期成僥倖之門古詩率衍於鄒枚時務相髙於晁董百蠢動而春蠶競食九天淨而秋鶚爭飛冝多間世之英副此賔興之選如石者少雖力學志不為名地無三百㕓之禾家有五千卷之學親養未甘於藜藿衡門半掩於蓬茅自慙不是詩禮人意謂終為田舍子竊慕古人之祿仕潜驚壮志之功名軍再鼓而氣則不衰人未遇而足則有刖五陵仗劔幸喜夜㳺一榻横經何求晝卧漫棲遲於黄卷徒㳺戲於青衿但惟馬帳之風流豈有晁生之講誦一吟一酌半友半師勢雖借於王公譽盖由於鄉曲比因士論之収拾徃應有司之選掄對大手以不工畫廣眉而相似愧非士秀謬稱古學之多因預計偕偶占鄉書之數彈碁聊耳推轂有人揣分業之合宜非夤縁而奚自恭惟某官儒林師表學海老成孟軻之執徳不回伏湛之與人無競南門緩帯已髙七縱之謀東郡分符常覿一麾之政治良田而去螟螣磨石鑑而照狐狸踵躅前賢提携後進超溝中之萬木發爨下之五音致兹孱𤨏之㣲預在扳援之列念其進隗之始與其筮仕之初曲引晚生非公莫能耳不忘厚徳舍我其誰歟石敢不益勵前修勉思來效歌嘯江山之助辛勤燈火之餘用三冬之逺圖期六月之一息過禹門而成變化登漢殿而誦平生暖律已回喜透一時之氷雪飛梭欲化更煩半夜之風雷又謝解啟四科取士方程度之甚嚴三載通經媿淵源之未博能書濫及末學何堪竊以人才盛衰係國家之强弱道術純駁關文風之廢興惟聖天子欲求經明行修之人詔良有司以公鄉舉里選之法冝得專門之學以寛側席之憂豈謂謬庸誤䝉采擇伏思石性資凡下智識迂踈粗知求至道之指歸不敢議先王之制作慨念周家太平之典文固閎深或謂戰國隂謀之書談何容易妄意姬公之夢庶幾宣子之知豈期於文字語言之間少得於訓詁傳註之外偶逢宗匠不棄散才雖無顔以見鄰里鄉黨之人幸有辭以塞父母昆弟之望其徼幸至如此者非教化孰使然哉兹盖伏遇某官談笑春風胸懐雲夢舌本吐忠厚之論筆端形典雅之文昔也魯公曽許侯芭之問字今焉潘縣不妨子賤之鼓琴士知所歸人皆用勸遂令狂簡得借吹嘘石敢不益謹操修更勤學問誦杞宋之遺禮獨識所從繼齊魯之諸生庶無可媿遷博士謝祭酒啟萬里逺來誰為知者一言見借此豈偶然惟上庠教化之源有前輩薦㧞之法郭泰之於黄憲韓愈之於何蕃况乎以分守則屬僚以道義則師長兼二者之攸重處衆人之必爭自惟晚生不習時事但有念親之方寸聊復從事於斗升方將比其重輕擇所去就飯牛者豈問爵祿養鳥者當浮江湖伏遇某官端若神交油然心化魯國之雞可以伏鵠任公之犗可以得魚誘之於寂寞無涯之津収之於和易有容之地投名俊軌竊自愧於東郭之竽矢志師門未敢廢於曽㸃之瑟其如佩徳未易既言上王宣諭啟天子明見萬里寛盛時西顧之憂地官用知九州尚使節東歸之緩惟去留輕重之注意故内外彼此之無心蜀道十年其已乆矣漢庭一札尚竊遲之安敢飾泛泛稱慶之言特願致區區逺來之說石聞仁義之論至近世言之而無補財賦之路在有司取之而益深十乗啟行大將誰知力辦千金取信一日安可緩圗疲心於木牛流馬之煩巧計於水舟陸馱之苦愛民則兵匱養兵則民窮古來計通變之才竟無兼兩全之䇿豈有兵出期年如太平無事之日財歸外府無一錢意外之求智名勇功清議甚白道王權伯㣲意不傳成規粲然端可百世而不易隂徳大矣豈宜千人之必封石又聞遣使實難在古甚重於平時導逹徳意尤不可忽矧兵間指授將帥豈曰姑行近者官軍卷甲敵境可為寒心茍非王人仗節軍門立致解體此何止吾蜀之利害固多擊宗社之安危唯公智識之髙當時擾攘之際不獨裴度淮蔡三州之重要是周公春秋四海之通乆留無嫌何以為報㑹且歸矣社而稷之恭惟某官學明而氣髙才博而意逺元祐以降得南豐豫章之正傳永嘉以還有茂𢎞安石之可恃如五福太一之臨蜀若長城百萬之折衝荷槖陞榮念法從貳卿之甚眷衮衣賜服當樞衡九府之乆虚石之此來公尚幸見陪下客以學為政庶㡬一言終身之依開東閣以招賢人端欲異時九鼎之重謝執政啟逺來無補久次得遷拜命有光汗顔以愧竊以上庠謂之學省所以示臺閣班綴之未殊博士謂之清官所以明州縣走趨之有意雖秦廪品秩之㣲僅六百石而孔堂道義之樂有三千徒顧非專門輒据此坐誰是不叛北方中國之學彼曾未免西河夫子之疑石之妄庸衆所鄙笑天未絶於子思孟軻之後世有取於熈寧元祐以來本其所傳粗似有守顧行已則恐或未善於教人則誠所不能睨柱之夫方期全璧緯蕭之子敢意得珠伏遇某官心㳺六虚量受萬物此道伊周輔相之業斯文禹稷吁咈之詞主盟公朝作芘吾黨更磨嵗月尚敢圖重席之榮坐阻晨昏何以慰倚門之望答史祕校啟濫尸粉省斥守黄堂尚容老子於此行自云父執之可敬伏惟某人學知所本仁以自存雖曰此三先生駕說之鄉遺經具在尚恐有百太守與聞之政珥筆相矜一介相先雙筠下逮即行披晤未易既言答胡制置賀正啟亥豕渡河入室欣逢於改嵗申蟲伺隙杜門不礙於發春欲罄懽悰首勤慶問恭惟某官謙尊而受泰治以通惟君子之四時錫庶民之五福絲綸西掖方舊人圖任之良衮繡東歸及新年太平之慶衡門縻迹芘宇馳心答范制置賀正啟乃􅔔西顧喜桃李之一新迎春東郊先甲庚之三日薰為叶氣盡出提封恭惟某官牧司坤維君子泰内遄致新年之慶聿臻有徳之歸出頗牧於禁中即期報政復文武之境土何必言兵上王制置啟安危注意方一時多事之憂精神折衝増四方萬里之寄惟體國之心不異於内外則愛民之義豈計於去留參聽明綸倍懽逺俗石聞之今日之勢藉蜀以為緩急識者之論觀人以别重輕兵分於諸將而黙操其進退人材之權財付於有司而時問其出納金糓之數制勝樽俎之上救鬭纓被之間堅方面之長城料吾目之勁敵自非髙才足以了至煩之難偉望足以鎮易動之心則何以俾輿言之釋然惟上意之如此時惟求舊無以易公恭惟某官性資誠明氣宇博大文章先秦而下不論學術元祐大老以來發為爾雅深厚之辭蚤冠英科之首旋備明廷顧問之列直出諸公之間侍郎欲使何為尚冀折不測之敵夫子不容何病乃今伏大隱之言既已起公於近藩尚賖正席於二府奎文炳燿六閣垣乎西清齋鉞増權九圻門乎蜀道望作新於時弊用恭對於眷隆石一介晚生試吏大府竿牘惟謹敢忘乎善事上之心雲霄或披庶㡬以華終身之幸上沈制置啟吳蜀兼天下嘆一時擇帥之難頗牧出禁中資萬里折衝之重惟去留深繫於國體故内外獨簡於上心明制誕敷逺俗改觀石聞之今日之勢當視其緩急之處君子之學欲見於盤錯之時以四川不易之民當三秦甚強之敵委兵權於諸將而外無所守總財計於有司而情不相通雖合五十郡兼制其重輕然視二三邉莫知其進退頃者陜西之深入主兵專意於倖功至於徳順之引還卷甲僅収於㣲利敵勢益張而不可遏蜀憂未艾而無與謀自非識足以審未然之機才足以解至煩之難却敵於談笑不言之地出力於優㳺不廹之間則何以料敵自中出人意表寛西顧之憂而仰對隆㫖勞東征之歸以下穆僉言有識所推非公莫可恭惟某官誠明而用邃氣剛而中虚貞觀以來風流永嘉而上人物蚤提妙筆追還三代灝噩之文旋結青荷入參西漢文詞之列君子不容何病顧屢出而望益髙斯人直道而行盖得公如朕親徃豈獨子思能安穆公之側庶㡬文帝不見賈生之思矧延閣萃乎西清直奎文於祖訓而長城臨乎方面収重抦於帥權參誦綸言作新時弊盖以期月亦可豈待三年不歸石青衿晚生白髪末吏九霄在望或假此以為終身之榮二天見臨其敢無以致私意之喜深春修路䟦渉良勞全蜀萬靈奔走傾切又總十連而謀帥欲寛西顧之憂䕶諸將以籌邊益懋中權之寄惟今日之重既歸之蜀而上意所指無以易公參聽明綸倍歡逺俗竊以去天數萬里方拏兵無休息之期提封五十州又仰食有供須之急重以三路之深入致此四川之益憂自非愛養根本以深不㧞之基何以撫集瘡痍而圖善後之計上所注倚者其或在此公肯逺來者固欲安之向風知歸頓足自善恭惟某官聰明而夷粹肅括而宏深學術東遷孔孟以來人物南渡王謝而上昭回顯䇿助成西漢爾雅之淳剴切讜言夐出三代直道之懿向者乗軺不測之使屬聞造膝無疆之陳乃今利害之甚明豈惟是非之方定尚遲爰立再煩此行聖天子元年奉禮樂臨遣之寵太夫人萬福承板輿燕喜之懽矧六閣峻西清之華而元戎將北伐之舉徒得君重屈裴度親淮蔡之師無以公歸須成王正周召之位如石為生晼晚受性竒窮學省備員昔有青天披雲之幸泮林側翅今復飛鳥依人之心豈敢援嚴尹少陵之舊㳺庶㡬似東坡後山之前軌眉州交代季侍郎啟光奉綸恩改膺閫寄蟇頥西指方接武以幸交鷁首東飛悵登仙之欲别辦嚴有相繁祉具冝恭以慶慰伏惟某官學妙傳心文髙具眼馳騁古今而詣於理經緯天地而立其誠再召漢庭氣壓諸公之上長哦蜀道益知禺里之難勞歸不待於三年報政肯稽於五月請近易逺捨舊圖新不特奏廿泉之計書便可膺宣室之召對顧我為婆娑之老強作此行為公留蔽芾之隂期於勿翦回孫監茶啟半刺新除已煩申命一麾改授盡出誤恩方兹發軔之初喜有盍簮之便雙筠重問九折忘憂某官義篤吹嘘情深推挽留滯周南之迹幸此為寮招來冀北之羣期於成事答田茂實解元啟齊韓毛鄭世守一經盧駱王楊名參四傑豈特有司之塞責庶幾為國而得人伏惟祕省明公妙於師傳自有家法解頥敢抗於雄辨志目果収於雋功方慶問之未遑辱惠音之先及意切相與賢於所聞白鶴山髙如三秋之可仰青雲路穩期一旦之相逢答黄解元啟質文具美經行兼修収石室累年之功為青雲一步之始辱雋文之踵及仰喜氣於眉間天理豈在人為更宜勉力隂徳必有陽報仰副清心答李解元啟備數文衡於何塞責登名貢篚僉謂得人祕省明公義薄雲天評髙月旦豈獨収雋功於槐市盖將奉大對於楓宸固已卜吾人所得於文字之間便可以此道相期於禮法之外更佩雙筠之重如懐十襲之珍青牛入關莫忘仙家之來裔白鶴舊社尚期華表之同歸答黄解元啟四科十哲同瞻闕里之游三秀一門盡入鄉書之選祕校明公詞吐温潤氣質粹夷笑談取學校之功行藝推場屋之雋念再嵗窻户相從之益仰九霄岐路髙舉之初大詔鼎來髙文賁飾相期里閈已知江夏之無雙此去殿庭猶是潁川之第一答張知錄啟招來麾去可見宦情用行舍藏何關吾黨嗟嵗月之如許幾江湖之相忘尚幸舂容或得晤語伏惟某官持心近厚陳義甚髙直道折餘子之雷同一笑乃吾儒之瓦合雙筠拜賜十襲珍藏老子登樓已有月邊之夙約都曹入幕未成山色之賦歸願興寢間為國家重黎州與交代宇文知郡啟再試負丞安於逺次一麾假守冒此超除重惟同年兄弟之懽倍結他日子孫之好豈治嚴之敢後承入奏之云初馹召已來郵音先及遽拜雙筠之賜遂忘九折之難矧惟蜀險逺接蠻陲以博易之虚名収羈縻之實用以其虚名則宜識通變以其實用則全賴撫綏惟今昔是非不同故緩急弛張各異必資妙斷用續光塵况於斯文許其接武伏遇某官學大以給才敏而華世閥有來多二典絲綸之手科名自致有一經衣鉢之傳推三十年故人道義之情借一千里慈母㫖甘之便俾遂安輿之養敢辭叱馭之行惟是書生恐乖吏責幸舊貫之可守與前規之足憑許為雲霧之㳺益勵氷霜之操期恭乃事用答深知答資州韓知郡啟分符千里喜聞賢守之來受地一㕓𨽻預編氓之數深兹欣幸逺有傾馳恭惟某官學老而通心恕而察惟風流文獻所傳最舊故慈惠温良所至可師冝入告之未賖屢外補而不厭刓印不予方明君西顧妙選之時彈冠請行遂老子東山髙卧之日已騰來暮之頌應有行春之詩願勿薄於淮陽即召還於宣室某頃伸一紙之慶輒拜雙筠之光宛若素交俾安旅迹為誰掃榻想燕寢之凝香何日驅車過里門而必下又回資州李知郡啟九命作牧想開府之云初一㕓為氓豈望門之敢後慈祥所至茀祉具宜恭惟某官學敏而通才周而大故家人物具瞻尺五之天舊物經綸宜應半千之運尚稽迅召來屈左符矧王子淵之故居乃令狐綯之治績奏刀未幾已無全牛賣劍無庸便當佩犢報政五月喜騰霹靂之聲奏計三年應即鬼神之問某縻身官次矚目輝躔渭北論文悵望春天之隔隴西通譜尚尋他日之盟願興寢間為國家重答任判官啟郎曹再召罷逐以還郡寄冒恩揄揚有自方圖隻字之報更辱雙筠之光伏惟某官直道有容公議不茍弟兄半面不隔同年母子此心共知愛日尚憶懐黄之舊許親泛綠之游冀北張羅已重幕中之客江南飛檄足誇帳下之兒答眉山知縣啟郎曹再召罷逐以還郡寄冒恩揄揚有自方圖謝臆首辱慶緘伏惟某官直道有容公議不茍東坡故里無異過鄒魯禮義之鄉西曹舊人或許竊龔黄惠愛之譽未委頓溝坑之日冀㫖甘升斗之榮暫屈花封許親樾芘恤民則食自足愛士則刑不煩州縣一家幸彼此臭味無甚相逺君親二議尚緩急筋力可以自持答黄安國知縣啟䇿名南省兄弟不隔於同年乗興西歸父子相㸔於累月向者江潮猝猝之别付以道路悠悠之談念國之與家相視老矣而州之與縣交臂幾何尚望薦嚴助於鄉人其敢吏朱㳺於黨友回百丈馬知縣啟貳政蜀都已煩申命一麾筰郡洊出誤恩方乗障之云初喜寳鄰之有託雙筠重問九折忘憂某官義篤素交情深宻契空城仰哺慚無一夕之儲候館論心頓積三秋之恨益祈興寢以重朝家回馮縣丞啟奉天子命佩太守章戢吏愛民庶幾省事求師擇友期於得人恭遇某官學則有朋徳惟莫助自州視縣如四肢在體自令視丞如六翮欲飛循良非俗吏所能愷悌乃吾儒之職逐鹿之掎角羔羊之委蛇方涓日之有期已聞風而相悦百朋書錫十襲珍藏展驥足以髙驤如君可耳指蟇頥而自誓從我誰歟成都府學教授謝啟學省備員已從罷免泮宫濫數遽辱薦延自疑罪垢之未除幸此寂寥之足慰一言唱重十倍増髙竊惟學校興廢之由率以師儒得失為慎人非其任即有若之似有所不從道茍可傳雖蘭陵之文至今有法矧此方揚觶以觀士心向背聚散之始何敢覬重席以爭講説勝負雌雄之塗儻或得名何以塞謗石則甚謬天或見憐骫骳之丈識者謂為髙古鄙拙之性君子以為直方惟曏者収召陛對以來終坐此斥逐鄉校而去人誰見恤盖増辱天子之上庠世或為榮乃更陪諸生於下坐及今砥礪或出泥塗伏遇某官道倡羣經學關百聖清議恃之以無恐㣲言由是以有傳出處乃大類於韓公行藏肯不同於顔子尚桑榆之未晚識藨蓘之有年憐其最舊登門乃令堕衆人之後察其自新無路特為占諸公之先敢不佩司敗之夙箴聞嘲師而自警公方與弟子三十輩徃定漢儀石獨取冠者五六人共新㸃服答何道夫教授啟博士昔避秦自知㣲罪夫子中分魯仰戴誤恩襲裳未免於羣嘲袒裼豈容於獨笑恭惟某官聖域自得文場先鳴孟郊與薦士之詩盖嘗竊意伍舉有驚人之語曷亦少須計來此姑日月之淹俾拙者䝉雲霧之益未忘情於濠上猶記面於牖間粲然十襲之珍厚矣百朋之錫念四海兄弟㡬廢此道而一門父子知有吾人公能過我與阿戎談我亦待公理邯鄲歩一經專席向來士子仰望以為温故之師二老鄰牆此去逐客相須以開自新之路賀都大啟陞華延閣連東壁之圖書増重使權煥西征之禮樂上以内外迭更之異數下以士夫望用之公心弭節云初搢紳交慶竊惟朝廷專任之寵皆以兵民逺寄為憂謂摘山以通民商而國用豐於貿易有無之際市駿以壯軍實而馬政班於蕃息牧養之間外空六詔之資中益二邊之備兹事體之所係盖利害之不輕自非逹識足以明利害之機長才足以周出入之數則何以寛宵旰之慮交民夷之懽惟衆所難非公莫可恭惟某官中和裕物雅厚鎮浮出羲獻風流之餘行孔孟正大之道通明光籍早嘗驚何自為郎賦皇華詩昔亦列於選出使倣木牛流馬之遺利洗棘林肺石於不寃雖淹延萬里暫煩一行然倐忽四年頻易三節行即追鋒之召直躋清禁之遊次舍益髙風雲漸際而石竒窮罪迹流落餘生來官大府之初獲𨽻軺車之下少棲徳宇雖幸公作坤維旬月之留亟正巖瞻實欲上促天下老成之入
