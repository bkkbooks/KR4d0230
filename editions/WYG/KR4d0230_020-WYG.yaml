body:
  text: 方舟集卷二十宋李石撰左氏卦例春秋易以立例為通宜矣葢韓宣子所見二經者魯人所用周人之禮不刋之典也左氏所載於易雖周人卜筮之用無幾其所資於學者非特杜預王弼之説也然杜預所得汲冢科斗云師春作春秋所載易卦一卷今不傳石為補之作左氏卦例坤下㢲上觀坤下乾上否陳敬仲方少周史所筮之卦也至桓子五世而始大八歳而成子得政弑君其始也利用賔于王其終也山嶽配天則亦太逼矣卜筮可知目睫之近不能保八世之徃乎不然南蒯卜亂臧㑹卜亂同矣右觀六四爻變而之否曰坤土曰巽風曰乾天風為天於土上則曰山自否之六二至九四為艮之互體則艮為山也故曰山嶽配天坤為異國艮為太嶽為姜齊艮為門庭乾為金玉坤為布帛故有庭實玉帛諸侯朝王之象觀則其後之子孫期在八世之遠此説卦雜占八者之例他皆倣此震下坎上屯坤下坎上比畢萬以晉滅魏以地賞萬為大夫晉大夫辛廖所筮之卦也萬之先為畢公高晉獻公滅魏至六國魏猶列諸侯為大國此公侯子孫必復其先畢公高之始也其後六卿分而為魏則終春秋之世矣其年世遠矣哉右屯初九變而之比曰震以坤以坤故為土震為車坤為馬震變為坤故車從馬足居之以震故兄長之以震故母覆之以坤故衆歸之以坤故是為六體不易以下體之下也若曰比合屯固坤安震殺則以意取象無象之象説卦雖有例未必能盡卦變之意他皆倣此乾下離上大有乾下乾上乾魯桓公將生成季卜楚丘之父既卜又筮此卦也魯之重輕由季氏之存亡其曰季氏亡則魯不昌又執政為周社亳社之輔皆如卜之言而筮特言同復于父敬如君所而已其合卜筮蓍龜為一用乎將有詳畧乎自桓公下順數終春秋之世三家子孫旣微而魯弱如卜楚丘之父蓍龜之告右大有六五離變為乾乾為君為父曰同復于父敬如君所以臣為君之象以離麗為同者亦以意取義㢲下艮上蠱秦穆公伐晉秦掌龜卜徒父所筮之卦也秦人不通三易而以龜為筮龜卜為官而以蓍筮乎晉閉秦糴負秦曲多矣韓原之戰晉侯之馬還濘取敗執晉侯以歸故卜徒父先以千乘雄狐為告右蠱巽艮二體不變而貞悔内外之象已具杜預乃以秦人不通三易之占而以龜卜為筮乎不然卦亦易之一也巽春夏之交艮冬春之交秋落山木之實而取材以為克晉之期山木逢秋而落杜預乃以周九月夏七月為言按春秋書秦韓之戰在十一月亦歳晚之秋非九月七月之秋明矣又曰獲其雄狐以狐蠱為君蠱蟲也又皿也病也若以説卦象取之則未有以狐為君象解未濟二卦之爻雖言狐解言三狐未濟繇言小狐初六言濡尾解以坎離互體取象未濟亦坎離互體取象蠱之艮巽不變其互體者九二至六四為兑九三至六五為震不為狐象將以巽之為進退不果為臭如狐與艮為狗鼠之屬乎其必有知者以龜卜為筮與卦之不變者他皆倣此兌下震上歸妹兌下離上睽晉獻公嫁伯姬於秦史蘇所占之卦也晉侯敗于韓秦執之以歸于秦晉侯曰先君若從史蘇之占吾不及此夫易天數也一定於天數不可逃雖人謀無及如晉侯之悔吝于先君之取秦女疑有可免之理是以人勝天也可乎卜筮者天假之以權禍福使人知所避就愈於恬不知畏而欲以人勝天也穆姬晉女之適秦者晉侯得歸國賴穆姬之力太子罃洪與女簡璧晉甥履薪登臺免服衰絰以示必死右歸妹之睽歸妹上六外卦隂變為陽故為睽繇謂刲羊無血士無其功承筐無貺女失其職以震為離以妹得睽有責無償無助者秦晉姊妹甥舅相失之象以震為離故以雷為火雷車也震雷説其輻離火焚其旗睽為弧矢必戰之象姪其從姑恵公敗從穆公於秦之象高梁之死明年謂恵公死之明年謂重耳歸晉殺懷公子圉而入也史蘇之占歴獻公恵公文公凡三世協若符劵杜預曰臨時占者或取於象或取於氣或取於時日互相符㑹構虛不經非易之所當用他皆倣此以為占筮淺近於易者之戒離下震上豐離下離上離鄭伯廖告人以公子曼滿求為卿伯廖告以豐之離之卦也晉楚方爭鄭公子曼滿不能内固其國乃幸亂而貪無德而禄伯廖以意測卦而告以其祥伯廖鄭大夫之知易者智如蓍龜雖不筮而神矣曼滿卒如其言右豐之離上六變而為離以陽芘隂屋之大也以隂受芘户之蔀也説卦震離無屋户象互體㢲兌亦無屋户象剥之卦曰小人剥廬以陽芘隂也剥以艮為門闕故取陽以為隂之芘或曰離以附麗為安故為屋豐以明盛在上位而謀隠幽蔀閉塞不通如大屋翔天而暗户無人豐爻言三歳不覿凶而伯廖之言一歳而曼滿死者以豐數之極日昃之離一年之象不待三歳以二卦九六對變也坎下坤上師兌下坤上臨知莊子告人以邲之戰先縠中軍以三師敗績之卦也晉楚爭鄭為日已久晉不能勝夷狄之楚以芘鄭同姓之親旬有七日之圍守陴之哭楚退師而復圍之肉袒牽羊以九縣自比楚又退三十里而與之平楚之於鄭其亦優游不迫鄭亦窮蹙矣為晉者可以少愧而又有救鄭之師師出荀林父士㑹欲中道班師不為失䇿先縠請以中軍佐濟知莊子䇿其必敗者以其負曲於楚抱愧於鄭雖不待卜筮而吉凶判於未戰然則知莊子者春秋深於易之君子也其先見與鄭伯廖同右師之臨師之初六變而之臨以二陽而薄四隂坎險坤衆遇險失衆臨有甚此者乎否臧者不順而無律律師律也律法也或曰以聽軍聲詔吉凶也坎為川流兌為澤壅三師之令不行律竭法亡之象其互體為震為重坤以師臨對變師九二曰未順命臨九二無功則凶中吉則免於咎臨九二則八月有凶期在於此此知莊子又知先縠雖幸免於楚有大咎於晉者以此夫艮下艮上艮震下兌上隨穆姜將薨所筮之卦不言其所筮之史也穆姜成公之母淫於僑如介晉國以禍其子又禍季孟幾無魯矣賴范文子郤犫以免東宮之囚埀死之筮乃始悔悟是歳襄公之九年也襄公穆姜之適子繼成即位始四歳季孟在朝主少國疑以筮自亡疑史乃請姜速出亡而姜亦知其死之審矣僑如佞人也其奔齊又淫齊君之母所止之國以佞濟淫何獨穆姜之辱右艮之隨上下卦六爻皆變所存者互體艮㢲皆不以象為占而獨以變卦繇詞為隨之四德而以乾文王之言釋之也其曰元亨利貞者姜之自知以答史之筮也不可謂元者以人在下位而有不仁禍其子成公虎狼之不若也不可謂亨者俾僑如外結晉援以執成公止季孫魯不靖者久之誰適召之也不可謂利者通於僑如東宮之居幾於囚辱失母子之愛非所以芘其身不可謂貞者國君之母棄位而姣以淫蕩聞於國人婁豬艾豭之比也四德皆失何以為隨以卦自揣其死宜矣史謂艮之八者杜預有二疑雜用三易以七八為占一疑也史以古易不利再以周易折之二疑也余亦有二疑焉七八者或在三多之數葢三揲之所當計二四而為八也一疑也八如臨八月之八隨互體即艮體隨之六二二疑也必有能辨之者坎下兌上困㢲下兌上大過崔武子所筮筮史阿告以吉之卦也齊棠公死武子弔之窺棠公妻美而欲介其弟東郭偃以取之弔人之䘮幸人之禍挾急以攘死鬼之妻豈惟偃以齊姜同姓拒之雖死鬼亦怒矣瀆筮以求吉筮之所不告也武子欺死而得姜莊公欺生而淫姜姜以色召禍傾人家國崔子逆弑蒙千古不令之名豈獨攘鬼妻之惡哉筮史之阿告以吉者齊禍出於天數為不可逃右困之大過困六三變為㢲以坎中男娶㢲長女固已非匹陳文子所謂風隕妻風奔也隕墜也奔墜之妻冒險取之且困之繇曰入于其宮不見其妻者謂莊公入崔武子之室崔子稱疾不見之象且以卦變言之大過九二至九五為乾互體二女一夫巽長兑少本末皆弱二女者武子莊公皆嘗有是二女也一夫一婦一婦再適亦二女也武子莊公兩淫之象嗚呼武子莊公於姜皆為同姓禽獸夷狄不若哉妾不知姓則卜之況妻乎震下坤上復震下艮上頤鄭子太叔還自楚告子展測楚康王將死之卦也晉楚以鄭故不和楚矜然於晉豈復知鄭鄭小國惟大是聽命而乃以宋之盟載之言是賴夫子太叔旣知之而猶以易測之以明楚康王之不賴盟而以大屈小死不免矣楚子竟死於魯襄公之二十八年雖然子太叔不因筮史得之亦知易之君子右復之頤復上六外卦變而為頤楚迷不知復鄭既從晉楚迷而失道以求復如其願楚王必死之象也復之初也顔子得之曰不遠復無祇悔是矣其既極矣以隂反陽而猶迷而不返楚康王得之曰迷復凶反君道是矣子太叔曰楚不幾十年未能恤諸侯吾乃休吾民者以復之上六曰以其國君凶至於十年不克征而測之也是年禆竈占星亦知楚子之死與易同占者杜預曰歳星所在有福歳星當在星紀而寄於元枵失次在北對冲在南鳥謂南方朱鳥周楚分野楚康王死之歳周靈王亦死此卜筮相為用他皆倣此㢲下艮上蠱秦醫和視晉侯疾以此卦答趙孟之問也晉侯求醫於秦秦使醫和視之曰疾不可為是謂近女室疾如蠱六氣隂陽風雨晦明蠱為晦六疾之一和謂惑疾惑則沉溺女色而蠱實生之猶器皿之蠧而生蟲為蠱猶榖之朽而飛蟲亦為蠱既曰女淫為蠱非鬼非食是不可為也和之言曰女陽物而晦時晦謂昬也陽物謂巽離兌三女皆二陽一隂陽中之隂内熱之疾所自淫則内熱而蠱生矣杜預釋之曰婦人從陽非也和又曰良臣將死天命不祐謂趙孟為良臣以大夫僭諸侯力可以諫晉侯之淫於女而莫之救故和及之其曰良臣者反言之也宜趙孟以蠱為問而以良醫答和也晉平公彪即位於魯襄十六年卒於魯昭之十年噫亦沉疾矣内有同姓之四姬醫所不治欲使之受諫乎右蠱一卦醫和言之非筮所及㢲長女艮少男老婦士夫惑非其匹老隂少陽其類為偏象則蠱矣然四姬一男豈特老隂而已耶醫和之神幾以苦口為藥惜乎晉君臣不悟也是歳昭公之二年風落山木與秦卜徒父同占離下坤上明夷艮下坤上謙叔孫莊叔生穆子自筮得之卜楚丘告之以其卦之詞也初穆子辟僑如之難奔齊私客婦而生子曰牛又取齊之國氏生孟丙仲壬穆子夢天壓已弗勝夢既告之矣此先筮而得之也夢與筮皆天之定告之以未然而皆不寤魯之禍媒於穆姜而成於牛僑如出奔穆子得歸國氏之二甥以母改適遲遲其歸逮其歸也牛又間其父子殺孟而逐仲穆子二子一殺一逐叔孫思仲子不得見不食三日死仲雖歸牛又以邑賂南遺使不得入卒之昭子得立不以南遺為德而以牛為禍牛出奔而孟仲之子殺之投其首於寜風之棘上如楚丘之告右明夷之謙明夷之初九内卦變而為謙明夷者明之傷也謙者減也兩卦貞悔通筮矣明夷之象為日日入地中則明傷於地陽傷於隂君父傷於臣子其象之意也天以十日十時為度在人則十等杜預謂王公卿士皁輿𨽻臺僚圉牧也一曰王二曰公三曰卿中天為王食時為公旦日為卿以離為日夷則日傷矣以豹為卿在三之位則知穆子當為莊叔祀也其傷則謙謙則傷減以離日為鳥方故曰明夷于飛君子于行三日不食則餒矣離初九之陽變艮初六之隂以火焚山也明夷之初曰主人有言牛以讒逐孟仲叔孫不食也牛之名深目豭喙兆於夢又見於筮坤離皆牛象自莊叔穆子至牛三世以淫賈禍吁可畏哉箕子文王得明夷䝉難為聖賢叔孫得之殺身敗族震下坎上屯坤下坎上比衛襄公嬖人婤姶生子元孔成子筮之得屯又筮之遇屯之比之卦也孟縶與元皆嬖人子縶長而元次縶跛而元㓜皆屯也屯皆難也孔成子初以立長未决史朝贊以立元是為靈公初元之將生也已得於孔成子之夢康叔名之曰元使孔圉與史苟相之史朝所夢皆協以再筮襲二夢廢長立次廢病立㓜似非偶然者右屯之比屯初九内卦變而為比也且史朝之言曰繇云利建侯者嗣即非建建即非嗣使縶當嗣即不待建所建者猶二屯之難元以次當建遲疑不决故以筮决之筮不當再猶之不决之故也比之繇詞曰原筮元永貞原筮者以再筮决意於元之意雖然靈公之立失德為多以國多君子賴之以立比輔之象也然筮以襲夢與再筮之决此其例也坤下坤上坤坤下坎上比南蒯謀以費叛枚筮以示子服惠伯之卦子服告之以其事也蒯遺之子也遺逐叔孫之子仲以立昭子蒯亦立季平子幾於再世禍魯也昭子為魯卿以功加三命為季氏媢忌昭子欲與季氏訟本出南蒯間諜南蒯懼以費叛費者季氏之邑以蒯宰其地也以地叛主神所不許筮所不告子服惠伯猶告之者幸其悛止而有畏於筮也其曰吾嘗學此者以明學易有素必欲塞其不逞之謀而教之以忠信之事也春秋不書南蒯之叛杜預曰不以告廟非也費為季氏分地不主於魯久矣昭公十三年書叔弓帥師圍費者不罪費叛而罪帥師以明季氏叛魯而家臣南蒯叛季氏無怪也越明年費人逐南蒯於齊司徒老祁慮癸以地歸魯亦不書者地從主人春秋私相予奪去來非法也至公山弗擾則費再畔故孔子墮三都右坤之比坤六五外卦變而之比也坤以六順為義六五變而為坎順變為逆筮則知之曰不可占險坎之水為險其互體為艮之山山水之險非一險也坤以順為吉而比亦以相輔為吉蒯乃枚筮誤指其吉而逆圖之乎黄裳元吉者黄者中色地有主也裳者下飾上有衣也元者善長長有君也皆非逆圖也供養三德為善供養黄裳元之三德杜預釋以洪範三德曰剛柔正直非也曰參成可筮者子服惠伯欲南蒯參其三說之備而用之惜乎蒯不悟卒為齊之叛夫也乾下乾上乾蔡墨以答韓宣子龍見于絳之問非占筮所及而援卦以告之也龍者人君之象乾九五乃其位乃今見于晉郊猶之東遷以來狩於河陽與夫南征水濵此春秋之所當書不書者晉不以告也蔡墨以易之乾以釋乾坤之言龍又及其爻之變以豢龍御龍二氏明虞夏之德劉范之世服厥官以譏世衰道䘮何足以致龍右乾六爻言龍者四爻而以一陽為龍之變者四卦併坤為六何也以明五行所實而明五官之職備見於乾所變之龍也初九曰潛龍勿用其變為姤㢲下乾上姤天風之爻木澤之氣也九二曰見龍在田其變同人離下乾上同人火之氣也九五曰飛龍在天其變大有乾下離上大有金火之氣也上九亢龍有悔其變為夬乾下兌上夬亦金水之氣也坤之上六曰龍戰于野者坤上六之變其變為剥坤下艮上剥土之氣也五行以御四時而重該修熙分職四時而無曠官此眞龍之出人得以豢御而馴擾之豈特陽氣而已哉杜預釋之乃曰乾龍以象陽氣蔡墨以謂眞龍似未審也說卦八卦皆有象馬牛龍豕雉雞狗羊皆象也何獨於龍而疑之蔡墨曰重該修熙少皥四叔職金木及水修熙相代為水官顓帝之子犂為祝融共工氏之子為后土火土之職舉而社稷五祀無曠此致龍之德也乾下震上大壯史墨以此答趙簡子之卦也昭公出奔死於乾侯季氏實逐之三家之於魯猶六卿之於晉其亦太逼矣趙孟乃以季氏出其君而民服諸侯予之已似失言史墨知其指意曰王有公諸侯有卿各有二也天生季氏以貳魯侯誰能恤之又曰三后之姓於今為庶至援卦以寓其神曰天之道者定數之不可逃右大壯不以筮得之而以意測之以震主祭如副君乾王位也反屈其下故曰雷車乘乾震為諸侯乾為天子無周之象魯昭公何足道哉墨又以季文子之卜為襲至曰東門遂殺嫡立庶魯君於是乎失國乾下坤上泰乾下坎上需宋伐鄭晉趙鞅卜救鄭伐宋陽虎所筮之卦也鄭武子之嬖許瑕求邑無以予之請自圍宋雍丘因是取鄭師于雍丘又報雍丘之役故伐鄭則師之曲直可見救鄭之吉凶不難辨矣何卜筮之紛紜乎趙鞅欲動諸侯之師以占諸史趙史墨史龜三史者各答以不可伐宋而可以伐齊齊火也宋子姓水位也晉盈姓亦水名也伐齊則以水勝火請專伐齊然魯新與齊平又有呉人江淮之憂故陽虎筮之者葢徙倚觀釁於呉楚齊晉之間志不在宋幸筮意之出此此疑而筮之也右泰之需泰六五之坤變而為需九五之坎也需者疑而不進也坎者險在前也持疑冒險用兵非所以為魯之利需則有不安於泰者此陽虎之意似未可以襲晉三史之占魯自敗齊人之交日負齊曲為呉歳受兵於齊者由此也且帝乙歸妹者微子啓為帝乙之元子以互體之兌為少女以乾娶兌元子娶妹之象方得吉配天福祉於元子者未可以兵伐之也趙鞅竟用三史之卜伐齊取犂轅二城毁高唐及賴而還呉楚方爭衡鞅有所不能敵也右左氏卦例凡十七例各援其所本以明吉凶禍福所自有筮而得之者有不筮而得之者筮而得之出於筮史不筮而得出於用易君子引經據義而以義測之也春秋易聖人之經左氏親授於聖人其間見隨家國所占所用不同其為例則一此王弼杜預得以例言也傳曰卜筮不相襲以明龜䇿異用而亦有相襲者世亂道䘮寡誠敬薄信義吉凶禍福往往相反淫巫瞽史因以汗漫為説雖例亦復無用易者君子所深懼也
