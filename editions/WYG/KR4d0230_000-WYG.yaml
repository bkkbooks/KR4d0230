body:
  text: 提要方舟集二十四卷别集類三宋臣等謹案方舟集二十四卷宋李石撰石有方舟易學已著録宋史不為石立傳其集亦不見於藝文志惟書録解題載方舟集五十卷後集二十卷自明已來絶無傳本今從永樂大典採掇編次猶可得十之六七考鄧椿畫繼稱其出主石室案此指由太學博士黜為成都學官時就學者如雲閩越之士萬里而來刻石題諸生名幾千人蜀學之盛古今鮮儷李心傳建炎以來朝野雜記稱石在太學時適右學生芝草學官稱賀石獨以為兵兆由是坐斥趙雄其鄉人驟貴石不與通書及石罷官值雄秉政遂不復起是石亦學問氣節之士資川志又稱其好學能屬文少從蘇符尚書游而集中亦有為蘇嶠所作蘇文忠集御序跋知其文字淵源出於蘇氏故其文以閎肆見長雖間失之險僻而大致自為古雅諸體詩縱横跌宕亦與眉山門徑為近也謹以類排比編為詩五卷詞一卷文十一卷又浙江採進遺書中有石所撰易十例畧互體例象統左氏卦例詩如例左氏君子例聖語例詩補遺諸篇皆題門人劉伯龍編而帙首一行乃標曰方舟先生集勘騐永樂大典所録經說諸篇與浙江本無異而其前冠以方舟集字亦與浙江本同盖本附入集中後全集散亡僅存此經說今仍别為六卷附之於後以還其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5ae70c1db62207cf59a3d40cd5f2823f19ea5286a4390c5bf053415f8743328a
