body:
  text: 方舟集卷二十二宋李石撰左氏詩如例中赳赳武夫公侯干城赳赳武夫公侯腹心國風晉郤至如楚涖盟以宋華元合晉楚之成蓋前此一年矣楚子享以金奏如兩君之禮郤至辭之是矣而子反之意怖晉以一矢之遺幾於蔑晉不可保其終故郤至賦周南之詩以曉之治則武夫與公侯捍難亂則公侯資武夫以為己腹心股肱爪牙此一詩而始終二章相反治亂之反也是年冬公子罷來報郤至之聘晉侯又與楚子為赤棘之盟是嵗魯成公之十二年也至十五年楚果敗盟兆師侵鄭衛以擾晉子囊譏子反之語是矣兕觥其觩㫖酒思柔彼交匪傲萬福來求小雅苦成叔之敢傲衛君者恃大國之晉也晉受衛奔亡之臣兩見之於衛君廢衛君臣之義衛定公雖强受之晉厲公獨不自為後日之謀哉郤錡郤犫郤至死而厲公弑天道好還不君不臣之報也小雅兕觥之罰衛寗子蓋知之其以此詩為先見之兆乎立我烝民莫匪爾極周頌鄢陵之戰晉勝楚敗楚殺子反此申叔時賦詩已知楚之必敗子反之取死於未然也烝衆也極中也楚人怙衆失其中道子重子反之相惡齊秦狄三强之已服晉人以勝氣策勲之時也晉用其極楚失其極此兵家勝負之機周人皇極所由以立建也其惟哲人告之話言順徳之行小雅為酒為醴烝畀祖妣以洽百禮降福孔偕周頌婦姑尊卑不可紊也穆姜成公之母齊姜則成公之婦也穆姜為襄公之祖母齊姜則襄公之嫡母其母則姒氏也襄公即位甫四嵗襁褓之託何異此季文子之憂責主小國疑而成公與其夫人相繼而亡一年間既葬成公又葬其夫人成公五月而葬謂之書順夫人三月而葬恐其不得葬也此大臣憂責未可俱以為非既出速葬則用穆姜䘮具以葬齊姜虧姑成婦君子有感於大雅周頌之言也是年仲孫蔑會諸侯之大夫謀鄭又會諸侯之大夫城虎牢以逼鄭其速葬新君之母似可藉口然亦非禮之正也惟其有之是以似之小雅祁奚舉善君子有小雅之賦端以父子之故有之則似之無者何似焉祁奚之子則午也羊舌職之子則赤也父有此則子宜有此也詩人之意祁奚以此答晉侯之問可也杜預乃以有徳之人能舉似已者得無有未盡乎若夫讎之得舉有國之公道大臣事君以人者要當不以私害公如是而已故君子引書之無偏黨杜預釋以平正無私是矣中軍尉以其子其偏佐以其黨至公無私者能之文王大雅鹿鳴小雅之首四牡小雅皇皇者華小雅文王之三文王大明綿也鹿鳴之三鹿鳴四牡皇皇者華也三者十篇之三舉首篇言之則槩見矣魯叔孫豹聘晉以襄公初立通嗣君之禮晉侯偃然自髙輕藐魯侯僭歌文王樂詩宜穆叔之不敢當也至於鹿鳴之三一則拜二則重拜三則又重拜者以五咨之獲為五善皇皇者華之一詩亦不細矣不意韓獻子之未曉也詩人以三百之誦使四方為専對其以此乎周道挺挺我心扃扃講事不令集人來定逸詩陳受楚厄非一日諸侯力欲芘之夫以中國之衆諸侯而不能芘一小國之陳於夷狄之楚蓋陳自反覆而楚共王内自弗靖陳不知所擇楚亦不能保陳之去就其殺公子壬夫以貪陳之故也殺壬夫而陳去楚愈速此聖人之意也君子引詩交譏楚君臣之失援此詩為證以楚八年而殺三卿子反子申壬夫皆賢也集賢之多以定國而又殺之以逞非周道之正直也扃扃明察也雖然此逸詩也不名其風雅所自止以左氏之文而杜預之釋為據曰逸詩云他倣此例豈不夙夜謂行多露國風弗躬弗親庶民弗信小雅靖共爾位好是正直神之聴之介爾景福小雅三詩者韓厥長子韓穆子之賦也韓厥以老謝事欲立穆子穆子以廢疾為辭疾則不可行多露疾則不可親民事以示不欲立也小雅之賦専以韓起為才非已不才廢疾者之比也曰徳曰正曰直曰仁以此契神表韓起之三徳也厥遂告老晉侯以穆子為仁使之為公族之師曰公族大夫者既長且賢雖疾無害也退食自公委蛇委蛇召南傳曰懼而思降乃得其階君子有不盡一級者况君臣之際乎魯衛兄弟國也衛之臣猶魯之臣也今乃以臣抗衡於登階之禮不復思降孫文子敢傲魯則無衛君也故叔孫穆子責之於召南之詩有感焉委蛇者出入公私敬順之容也衡而委蛇何以能免卒之十四年林父逐衛君斯其張本云俟河之清人夀幾何逸詩謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道小雅晉楚爭鄭為日久矣晉之於鄭近在肘腋而力不足以芘之楚之於鄭長鞭馬腹而陵轢至此者以鄭人内自潰亂羣公子謀殺子駟子駟先之因弑僖公殺羣公子由是有背晉從楚之心子孔子蟜子展欲待晉子駟賦逸詩子展爭之子駟又有小雅之賦明年鄭果受諸侯之兵鄭人改圖未卒嵗楚師已至虎牢之境矣虎牢晉地也摽有梅國風角弓小雅彤弓小雅晉為鄭謀不為不善鄭人終無寧嵗者晉黨雖熾楚競已甚也范宣子來聘告魯欲伐鄭蓋曲在鄭也僖公被弑不討賊一也冒䘮侵蔡二也新與晉為邢丘之會三也不唯不能免子囊之師范匄之來晉兵且至矣然魯襄公甫冠十二歳何知焉季孫宿强挾之以如晉范匄行聘意在兵不在聘摽有梅者欲魯兵之及時季武子之賦角弓答以兄弟之義遲速唯命武子之賦彤弓以送客宣子答以晉文公受彤弓之賜于襄王其専征世職也是時晉悼公修文公霸業彤弓之賦君子以為知禮有力如虎􅆁風春秋成人之美者法也叔梁紇聖人之父也因紇而著秦堇父以秦丕兹遊聖人之門二父以勇力相尚二子以徳相髙君子因著其美者以聖人故也孔子生於魯襄公二十一年乃在十年之後或云老鄹大夫七十三嵗娶徵在生仲尼三嵗而父死計其年則紇已六十三嵗而尚筋力如此其勇何也豈聖賢天姿所禀自有異於人乎即詩如虎之賦不獨秦堇父杜預釋以二父以力相尚二子以徳相髙是矣此偪陽之滅也以遂書者春秋著其因柤之會以滅人之國傳以夷俘書者惡其會吳猶曰吳之俘也樂只君子殿天子之邦小雅樂只君子福祿攸同便蕃左右亦是帥從小雅晉悼公自以八年九合諸侯者五年戚又城棣救陳七年鄬八年邢丘九年戲十年柤伐鄭城虎牢十一年亳城北以年計之則十一以會計之則七有一年三合者戚之會與柤之會是也孔子曰桓公九合諸侯不以兵車管仲之力悼公所願效於齊侯者意欲自比於桓公而以魏絳比管仲也然管仲不以兵車晉則以兵抗楚伐鄭桓公不受賂晉乃受鄭人兵車樂師歌鐘女樂自以為樂故魏絳以小雅之賦規之欲其樂不忘憂也殿天子之邦尊周也如是則同福禄來逺人可以受便蕃之賜而君臣同樂可也惜夫晉人不悟是年果敗績於櫟以秦人之戰也儀刑文王萬邦作孚火雅大夫不均我從事獨賢小雅春秋治兵擇將未有如晉悼公之得禮且法所當然而公議所自出也上者蒐簡而求其才下者謙遜而居其位至於無其人則缺之晉悼公之霸業修矣且荀罃士魴之卒繼者難其人士匄辭以伯游韓起辭以趙武欒黶之佐至於新軍無帥則併卒乗官屬以從下軍俾欒黶魏絳兼其任上下君臣雍容進退粲然可觀雖帝王之舉不過如是况春秋之際乎大小雅二詩之賦取文王幽王為治亂之别治則文王之儀刑亂則幽王之矜伐此君子之言足以為有國馭將之戒不弔昊天亂靡有定小雅䘮者人之大戚天亦知哀之况於人乎楚共王可謂賢君矣其死也懲鄢之敗自反其過雖天命有不能揜其平生之善矣乃乘其䘮而行暮夜穿窬之舉此養由基逆料未萌三覆設竒吳卒墮其計中庸浦之敗公子黨為獲夫吳自取至此雖以狄攻狄然兵之曲直不可不論君子以不恤天道譏其伐䘮宜矣青蠅小雅堲讒殄行雖堯舜不能不震驚於此也且朝以忌媚致讒如蘇公暴公可也巷伯之倫何有焉以寺人汚腐之質可也夷狄之人何有焉言語不通嗜欲不同異氣所禀荒裔絶徼不治之治可也晉人乃剖田食之其納侮有自非戎之罪也范宣子乃因向之會而欲執之駒支青蠅之賦取君子以愷悌信讒也既曰愷悌父母之心猶是也伯奇之父曾參之母均此心也於讒不能不惑况他人之心乎匏有苦葉邶風晉侯報櫟之役非其本意何也欒黶之意也晉侯故守境上不進晉六卿帥諸侯之大夫以進者以欒黶之倡也叔向豈不之知幾與叔孫穆子目語故為邶風之賦於涇水之上也匏有苦葉者深厲淺揭於浮沈緩急無必濟之意鄭人則知之子蟜謂北宫懿子曰與人而不固取惡莫甚焉魯莒先濟鄭衛次之叔向不敢違者廹於欒黶强令無如之何涇上之毒魯莒鄭衞之人實死之既而荀偃欒黶中軍下軍二帥不和一進一退魏絳首鼠從欒黶以待荀偃此何説也哉晉人自謂遷延之役誠是也欒鍼約士鞅同死鍼先死而鞅獨生欒黶誣以殺其弟此士鞅之所以奔秦也嗚呼師惰而將貪惰則觀望貪則擇利兵家之忌也戒之哉甘棠召南欒氏之惡三世矣晉厲之弑書則階之晉政歸之晉民畏之以其久且専也黶則以虐盈則不足道仍世下軍之職士鞅乃對秦伯以召伯甘棠之子孫豈所儗乎召伯之廿棠遺愛也欒氏三世稔惡也至盈卒為范鞅所讎出奔於楚此豈甘棠之比與周匹休於八百年之久乎巧言小雅衛之君臣相失非特一食之間也獻公猜貳於孫文子有素太師歌巧言之卒章失之不密故文子得以先事為謀亦疑忌之積也不然臣朝服而君皮冠君臣相從園囿田獵未害其為禮者雖相忘可也孫文子乃悻悻於君懐怒如戚嘻亦甚矣至使其子蒯入使太師歌巧言之卒章居河之麋欲以戚地兆亂亦其不密之失乎文子果以戚地要其君先殺羣公子獻公請盟求和無所不至而卒為所逐獻公奔齊文子猶用兵以敗公徒於阿澤然衛侯所以得歸者子展子鮮蘧伯玉皆衛之君子也蘧伯玉之言曰君制其國臣敢奸之斯言也文子所宜愧也是嵗襄公之十五年孔子未生行歸于周萬民所望小雅楚人殺三大夫子反子申壬夫以其欲侵小國伐吳之舉所獲不如所亡故子囊於是得政懲前日之弊救陳伐蔡日惟凛凛也且所以敵楚者吳也晉也陳鄭魯衛實羽翼之共王之䘮吳人為庸浦之戰大敗而去吳又報之有臯舟之勝子囊之所以城郢者以遷都避吳也君子以是賦小雅之章以子囊為忠於君而信於民忠信之臣事君始終子囊兼之矣然楚人篳路藍縷以啟山林漢陽諸姬楚實吞噬而有之乃今為吳所乘附之以晉城郢之遷得之矣子庚代之即公子午也故子囊以城郢為垂死之囑嗟我懐人寘彼周行周南子庚代子囊之政其可觀者擇才而任類能而使各當其職也且自王圻以下其在五服則曰侯甸男采衛五百里一服楚以夷狄進之中國僭稱王矣其官人次叙君子比之周南而有周行之賦蓋勉而進之左氏之書亦聖人春秋之法雖文王能官人不過如是也且令尹執政柄也右尹其貳也大司馬緫戎也左右司馬楚軍之左右廣也莫敖以降箴尹連尹宫廏尹粲然有叙君子於是嘉子庚之政以周南之詩比之以明春秋進夷狄之法不一而足古詩詩言志者前乎為帝者之詩也三百五篇者後乎為王者之詩也晉侯與諸侯為温之宴使大夫舞歌詩杜預釋以歌古詩不知其孰後孰前曰古詩何也無乃三百五篇之類乎且宴者以飲酒為禮有禮則樂隨之詩亦樂也長言之則為歌聲音與人之情偽相通此晉平公新立欲以是通齊楚之使以魯故執邾莒之君意甚善矣髙厚之詩有所不類而荀偃知之不知其詩如何其不類也嗚呼禮樂之中雅道存焉昔人肄業及之何昔人為之而今人不為也揚雄曰中正則雅多哇則鄭學者其識之圻父小雅鴻雁之卒章小雅諸侯各有分地以敵王所愾魯以晉故受齊兵為日既久亦晉之所深憂也况天子所以封諸侯之分地晉平公新即位欲修悼公霸業率諸侯以尊周亦必計其撫封之職所當為者前年為温之宴髙厚逃歸魯人懼而以穆叔聘晉以晉新得諸侯足以厚芘之也未一年而受齊師者二圍桃圍防皆魯北鄙之地天子所以封魯而齊之君臣一嵗以兵再至齊侯先之髙厚繼之魯之臧堅實死之其何以為尊王之舉哉圻父鴻雁之賦雖魯人性命之急又間一嵗齊師再至然後晉人為魯會十國之師圍齊荀偃士匄皆有獲焉亦可以塞前日二詩之賦也是嵗襄公之十八年黍苗小雅六月小雅甚矣晉日驕而魯日屈也十八年報齊資晉以逞夙憾幸而勝焉季武子如晉拜師平公之享魯使亦禮之當然者賔主酬酢二詩之賦皆周天子盛時之禮胡為乎諸侯之庭哉大國益以驕小國益以屈二詩之意可見矣黍苗者宣子以召伯自比晉侯六月者季武子以尹吉甫佐天子征伐六月車徒以匡王國至齊靈公卒齊晉復平魯之有求於晉者未已前日季武子欲以林鐘銘魯功者獨不愧於臧武仲之言載馳四章􅅠風齊人䘮君新君方立内難未已也齊改轍事晉晉受之為大隧之盟晉知有齊不知有魯氣矜矜然矣穆叔乃見范宣子為柯之會見叔向而有載馳之賦雖控告之急叔向許以為齊之救者亦料齊人之盟必敗許以承命救助也魯人既城武城明年又預澶淵之盟是盟也齊魯二君同歃是年冬叔老如齊者盟會既絶之久至是復通君子以為得禮常棣小雅魚麗小雅南山有臺小雅襄公二年叔孫豹如宋十五年宋向戍報之二十年季武子又如宋報向戍之聘是將約為明年商任之盟也宋之所畏者楚與鄭合也宋華元嘗合晉楚之盟矣其於魯也無會不來無盟不與者凡以此也其使人受宋享閒閒然雍容如無事時其禮有足觀吾夫子以為殷禮吾能徴之者兹非其一乎三詩之賦蓋享禮之酬酢也常棣季武子之賦宜家之好如兄弟也宋人悦以重賄宋公享又以魚麗四章備物及時此二詩者季武子酬也南山有臺宋公之賦以厚使人也以季武子之賢不辱君命以詩専對能為國光輝也其他晉楚爭宋以為成敗自魚石以來謂之宋志者非魯之所敢知優哉游哉聊以卒嵗小雅范與欒讎也欒與羊舌黨也欒氏之禍成於欒祁之滛於外羊舌虎之禍及其兄叔向叔向得囚方以幸免不死自適或勸以奔亡叔向因有小雅之賦此雖叔向之知而亦宣子之仁所以得政於晉也或曰父子兄弟罪不相及欒黶逐范鞅而以欒祁之淫逐懐子奔楚懐子范氏甥也羊舌虎之死囚及叔向叔虎之兄也無乃罪相及乎此可為宣子惜也不如是何以為春秋之亂有覺徳行四國順之大雅恵我無疆子孫保之周頌直哉叔向之為臣也方其在難不肯求救於樂王鮒而伸於祁奚何也以樂王鮒之貪而祁奚賢也樂王鮒面伸情於叔向欲請救之不應遂反陷以不忘欒氏之親祁奚不待叔向之求救乘急驛而往救之叔向不死祁奚不求徳於叔向叔向亦不往謝而朝大雅之賦者叔向之賦言祁之正直非樂王鮒之比也周頌之賦者祁奚之賦有請於宣子言文武以恵訓不倦訓子孫向之徳不可忘十世宥之可也嗚呼三代直道庶幾見於二詩之賦乎謹爾侯度用戒不虞大雅春秋之名節掃地矣自天子以至庶人莫不皆有求賻求車求金求玉求鼎蓋貪淫之俗也甚至裂帶示褊納璧免死者其名節可稱如季文子相魯無衣帛之妾晏嬰相齊肉不掩豆鄭之公孫黒肱告老歸邑足以興㢘激懦立名節於貪淫之俗也黑肱之言曰貴而能貧民無求焉又曰生在敬戒不在富也以此為其二三子之囑此君子舉大雅之詩以為善戒也度者法度也不虞者未然也是時晉楚爭鄭鄭人奔命不暇如黑肱之敎子者足以為世戒樂只君子邦家之基小雅上帝臨女無貳爾心大雅子産之善為辭令也鄭以小國介乎大國之間所賴以立者有日矣春秋之諸侯會數則兵煩兵煩則賦重如晉國之强范宣子為政有所不免者此子産之書所為作也小雅大雅二詩之賦皆周人以此為國以此事天以此為基而立其徳以此為心而得其名不聞其大國是恃而取重幣於諸侯也宣子説其言而輕其幣辭令之不可已也如是夫我躬不閲皇恤我後小雅夙夜匪懈以事一人大雅伊尹放太甲于桐三年必俟其改過而後復之衛獻公以虐得罪國人出奔於齊至是十年今之衛侯猶昔之衛侯無復悛心也孫文子以一飯之惡逐之寗子又以一言之許而復之然公孫剽之立者甯喜也既立剽晉因而定之今又許衎之入廢置不定弑君立君天下其謂之何嗚呼太甲之復歸於亳苟非伊尹則甯喜之弑也甯喜以弑剽書衛侯以國納為文罪在甯氏也太叔儀二詩之賦其先見之明乎不恤其後不令終也以事一人臣節不固二君出入由之也衛侯衎既復甯喜死孫文子以戚召亂動諸侯之兵然書衛侯會夷儀之嵗齊人為之城郟當在二十四年乃在二十五年者起弑剽之張本先經始事之一與魯隠公傳同杜預之釋以為誤妄説也并表出之嘉樂大雅蓼蕭小雅緇衣鄭風轡之柔矣逸詩將仲子兮鄭風孫文子之不臣非特甯喜也文子有愬於晉晉趙武宋向戍因為澶淵之會以疆戚田且以三百人戍守衛侯甘心殺之以召齊晉鄭三國之君甯喜執而衛侯囚故齊鄭之請欲免之晉侯享之嘉樂之賦以周天子令徳宜人民福祿足以及諸侯主盟者之意國景子子展齊鄭之臣相其君以答賦也一則天子之澤蓼蕭也一則緇衣之賦善善之功也叔向命晉侯拜二君之貺是矣其意晉以孫林父故執其君晉肯鬱鬱䝉此名乎故以殺戍之虐藉口以明不為林父也國子逸詩之賦以寛衛望晉子展將仲子之賦以衆言可畏晉侯許歸衛侯者以子展之賦曰儉而壹者以其詩之有諷體也杜預之釋以歸美晉不及天子過矣人之云亡邦國殄瘁大雅不僭不濫不敢怠皇命于下國封建厥福商頌以人反間此兵家利害也聲子雖用此以勸子木還伍舉其實利害之急者析公雍子子靈苗賁皇皆楚亡命楚之所棄晉之所收也楚以失士懐殄瘁之憂湯以賞罰忠厚天命錫之福祿二詩之賦晉楚用兵利害之决人才去就之分不難見也於是楚人聴之請伍舉而復之仍使其子逆之伍舉世為楚臣二詩之諷宜矣相鼠􅅠風齊慶封以景公即位來聘於魯通嗣君之好也飾其車以自矜耀意在以使命夸魯故孟孫叔孫皆知惡之叔孫謂其服美不稱必以惡終叔孫又與之食不敬夫衣服飲食君子以此觀威儀省禍福也而皆惑之獨不為後日奔亡之地哉今日相鼠之刺他日茅鴟之刺其前後不悛如此夫鄭子臧奔宋而以鷸冠為夸不免維鵜之刺慶封聘魯不免相鼠之刺二詩足以謹君子威儀之戒草蟲召南鶉之賁賁􅅠風黍苗小雅隰桑小雅野有蔓草鄭風蟋蟀唐風桑扈小雅五音異聲而求同同則合矣天下之樂猶是也鄭衛之聲樂之滛也欲求其正而不滛者文武之相應君臣之相和孔子語魯太師者用此道也趙孟於七子之賦者豈知此乎其為鄭風一也七子異賦不専於鄭志志異則聲不同也而鄭之為鄭介乎晉楚二强國之間此晉趙孟以盟主强合異為同此五音之樂滛正相雜矣草蟲以晉為君子子展也鶉之賁賁自言國君之滛伯有也黍苗比趙孟為召伯子西也隰桑以見君子為樂子産也野有蔓草以喜於相遇子太叔也蟋蟀以儉禮自居印段也桑扈以禮文自保公孫段也趙孟皆因以答其詩之意且鄭伯享趙孟七子以詩相禮是以樂侑食也而伯有獨暴其國之滛樂以娛客此趙孟知良霄之不免彼其之子邦之司直鄭風何以恤我我其收之逸詩晉楚以兵敵也晉為盟主趙文子得政宋向戍欲弭諸侯之兵晉既許之因以强令廹諸侯而從之齊秦之大亦從之其餘小國靡然從風無疑矣於是有宋之會凡諸侯之大夫與邾滕曹之君無不至者大抵春秋有厭兵之實雖弭兵虛文且可息吾民於年嵗亦一幸也楚人衷甲入宋彼其君臣肯置晉於度外乎既曰成言又曰齊言亦既信矣乃又有宋之盟乎楚人衷甲不肯履齊秦他國之地則有疑於諸侯間矣諸侯亦有不與盟者弭兵虛名果何恃為久利乎宋左師乃欲以此幸賞命之曰免死之邑以書為請子罕削而投之君子於是有二詩之賦鄭風司直謂子罕也逸詩知過謂向戍也此弭兵之舉起於宋向戍趙文子主其事既醉大雅諸侯弭兵息民盛徳之舉也宋人之請晉人主盟之賜也雖楚人倔强亦將屈而受盟者周家忠厚之懿有征無戰矣爰自文王以文徳傳子孫武王繼代耀徳以廣文王之聲初無戰也楚薳罷如晉涖盟報荀盈之聘以弭兵而來晉侯享之賦既醉以晉侯為太平君子如成王之持盈守成偃武修文不失周家忠厚之懿意不薄矣故叔向知詩㫖以能養民許之夫能養民則知政矣楚政將焉歸哉賦詩盧蒲氏慶氏皆姜姓也盧蒲癸娶慶舍之女為同姓或人以為譏故有詩斷章之賦説詩章者或三或四或卒皆有其數而所謂斷章者特取其一不責其全矣春秋各以詩見意於享燕之樂者用此道也説詩者之例可以互用昭然於此雖然此盧蒲癸之厚自文飾其實非周道也傳春秋云質家娶同姓唐杜劉范何韓不容辟也文家娶異姓周人娶子氏姜氏牟氏為異姓也昭公之廢禮娶吳女起於盧蒲癸為張本云茅鴟逸詩君子無終食之間違仁説者曰此先飯之祭也設食先飯黍所以辯祭示不敢頃刻違仁也慶封何知焉酣淫貪亂召盧蒲癸而使其子慶舍臣之速死自取其無上之心與崔氏等且其嗜酒迷惑以飾其不仁之實其受叔孫穆子之食汜祭不共固其宜也雖以茅鴟之賦徒强聒之其志不在是客不足責而主人所以曉客者當如是乎茅鴟為逸章其亦相鼠無禮之比乎二詩前後如一意皆出慶封故并列之以為後日殺慶封張本行潦大雅采蘋采藻召南行潦召穆公之詩采蘋采藻國風之賦采蘋藻酌行潦之水有齊季女尸之以供祭祀此皆詩人語也魯襄公過鄭鄭伯適出故伯有迋勞魯君不敬夫魯鄭同姓諸侯也所過地主之禮可忽乎嗚呼伯有方嗜酒荒淫其死亡無日矣後二年鄭殺良霄此其張本式微邶風三家之無君復何所顧忌説者謂襄公出葬楚康王乘國之無人季武子因以取卞乃使公冶問公反誣卞人之叛襄公不難於失卞而難于復入也公賜冶冕服之賞不幾於賞僭乎式微之賦榮成伯之意亦微矣公冶辭邑絶口於季氏亦足以愧季氏無君之心其曰無以冕服斂者竟何益哉王事靡盬不遑啟處小雅周靈王死於魯襄公之二十八年之十二月至二十九年之五月公猶在楚會楚康王之葬天王之葬魯曾不知葬之月日故有缺焉鄭亦以城杞之役上卿不在子展使印段攝行伯有以為不可子展由是有小雅之賦其曰堅事晉楚以蕃王室其實知有晉楚而不知有王室天子弱而無威諸侯强以怙衆也傳書魯陳鄭許四國之君與十一國之大夫皆會楚葬四君至西門外十一國大夫皆至墓何暇問天子哉杜預言周襄卑於晉楚是矣協比其鄰婚姻孔云小雅周平王之戍許母家也晉平公之城杞母家也豈有内虛其國而外治他人之國哉平王以此失王族諸侯晉宜少懲不可效尤也晉乃以盟主自恃偃然坐役諸侯豈復知有周天子哉不知其政駸駸乎六卿之分矣子太叔見衛太叔文子援小雅之賦譏其輕近族而重逺姻鄰之不協是不鄰也婚姻可知矣是嵗晉侯又治杞田其母以司馬女叔侯取貨為怒嗚呼雖王者之後文獻有所不足終以夷禮自陷其取地亦夷禮之一也周南召南國風邶􅅠衛國風王國風鄭國風齊國風豳國風秦國風魏國風唐國風陳國風鄶國風小雅大雅頌嗚呼三百五篇之詩孔子刪之子夏定之言則其志也經也歌則其聲也樂也無以逃於一瞬目一歴耳此季札所以傳聖賢之心也是時孔子在孩提之童子夏未生其曰聖賢者堯舜文武周召之心孔子子夏刪序之意取諸此也美哉者七思深哉者一廣哉者一至矣哉者一舞樂之美哉者三至矣哉者一周公之東者二周之舊者一陳淫不君鄶小不譏後之學詩者蔑以加之矣非特以意逆志之得也至於二南始基衛之憂王之懼鄭之細齊之大豳之樂秦之舊魏之可為明主儉而易行唐則猶有遺民逺有令徳陳也鄶也曹也為甚微小雅為周衰大雅為文王嗚呼孔子子夏之所刪序聖賢之心學其備矣乎文王陟降在帝左右大雅淑慎爾止無載爾偽逸詩春秋書人者微詞也衆詞也爵則微之國則衆之此法也以其人之大小緩急麗之以法者而書之宋人以天災人䘮有訴於晉晉為主澶淵之會會者十一國齊魯衛鄭附以曹滕邾莒薛杞小邾人等大夫也而皆人之槩之於法人且衆矣果何益於事哉君子責之以信又有二詩之賦以明信之不可已也且人之所難辦者莫難於義財也晉趙武主會其力可以辦此而卒無財歸宋主會者之罪罪當在趙武然魯亦不為無責不人而名之曰叔孫豹者是也其他小國自謀不暇役役大國之間何益於恤鄰之義乎大雅者言文王以信上通於天以啟周家忠厚之業逸詩之賦則不順所止輗軏載偽不信而行此二詩之别然淑慎爾止不愆于儀見於詩而曰逸者豈疑乎又曰恭儉惟徳無載爾偽即見於書非詩也詞之輯矣民之協矣辭之繹矣民之莫矣大雅葬魯襄公之十二月即夏之十月也是月子産相鄭伯以如晉趙文子老政多偷惰重以襄公之䘮不出見鄭之君臣可乎哉子産舉晉文公之伯以責之且以銅鞮役民一也盗賊公行二也夭癘不戒三也其國内不自憂何暇憂魯䘮乎士文伯自以盟主之尊責鄭之君臣者以其壊垣納幣也以士匄為失詞則子產為善於詞矣趙文子悔悟厚禮鄭之君臣叔向於是有大雅之賦是亦直道公議民事所在非特語言得失也且晉大以欺鄭小慢其君臣外責幣入而内怯壊垣雖曰盟主不能終芘之於齊楚此又出三失之外者誰能執熱逝不以濯大雅衛北宫文子因如楚過鄭其銜命經從意在楚不責鄭以使人之禮也鄭待之其禮有加如聘客一也用郊勞之詞二也北宫文子因覘國而知鄭子産之政所以免於晉楚之爭衡於鄭者如執熱之得濯因有大雅之賦也竊謂此詩之賦以鄭之人才比熱之得濯也子産知政引類得人印段子羽馮簡子子太叔此北宫文子所知以歸復於衞侯也是時孔子生甫十嵗論語所載則文子既童而冠得見子産故有嘉其人曰禆諶草創世叔討論行人子羽修飾東里子産潤色凡四君子也左氏又廣孔子之意傳之春秋良以聞見之及也然論語所書本得之於魯史所書也并表出之杜預曰仲尼以襄公二十二年生至是年十嵗子産已代子皮知政矣靡不有初鮮克有終大雅敬慎威儀惟民之則大雅威儀棣棣不可選也􅆁風朋友攸攝攝以威儀大雅不識不知順帝之則大雅楚夷狄也春秋進之於中國爵曰子者班之於五等諸侯魯晉鄭曹之下而許莒邾之上其亦幸於超躐矣今乃自王之僭也君子以其夷狄漸被中國詩書禮義責之北宫文子五詩之賦如責賢者之備不已過乎令尹子圍無君之心見於顔色者可望而知北宫文子得其人於未然能審其吉凶禍福雖神巫之察人肝膽不過如是其曰威儀之賦者此中國詩書禮義之訓既久猶幸進之以此也圍自言共王長子圍此其無君之芽孽也卒之縊殺其君而以疾赴於諸侯北宫文子之言驗于是矣卒章文王順帝之則文王事商紂順天意以事惡人庶幾小國之意哉不僭不賊鮮不為則大雅犯上之謂僭害民之謂賊僭賊則幽隠而無信反是則信矣澶淵之會以宋故也以子木之知政猶不免衷甲况令尹圍之果於犯上虐於害良有甚於子木僭賊之尤者文子自以其仁可法則者信不信之别也其曰不為人下者晉猶欲爭衡於楚也然圍既以不信怙强文子老矣雖曰信可法則自此其小弱哉坎牲加書於牲上恐晉先㰱加書牲上其蔑晉甚矣小旻小雅七國之大夫既盟楚公子圍又相與議其後以其為臣而君圖簒逆之不終已兆於容止威儀之僭非特蒲宫二執戈也伯州犂為隠其惡以為假之寡君鄭之公子羽以為假而不反州犂又譏子羽以子晳背誕卒之圍既逆弑犂亦為圍所殺何也大抵小人情偽可敬亦可畏敬者事之以禮也畏者避之以色也終不可言語譏評此樂王鮒小旻卒章之賦取喻于暴虎馮河公子羽知其為字而敬字者慈愛不犯凶人而敬畏之也其餘國大夫或代憂或樂憂或招憂或無憂而憂皆知不免者此其善料士與北宫文子同大明大雅小宛小雅赫赫宗周襃姒滅之小雅嗚呼犯上之逆臣未有如芈圍之烈者也為楚孽子官則令尹果於犯上如此夫其享趙孟賦大明之首章不唯蔑趙孟亦以夸晉也其以文王自比者懐無君無父之心駸駸乎逆天意也趙孟賦小宛之二章其以天之所命深抑其驕大之氣然亦不敢正言其非者圍虎狼也不得不畏而奉之自此圍得志而楚强趙孟老而晉少懦矣賓主二詩之意可見襃姒之賦似為巴姬設共王無子而寵巴姬五孽之立適以兆芈圍之禍瓠葉小雅鵲巢召南采蘩召南野有死麕召南常棣小雅昭公元年十一國大夫為會者以楚公子圍娶鄭之公孫段氏女也趙孟叔孫豹曹大夫以會畢過鄭鄭伯兼享之戒者猶曰筮日筮賓先日為戒禮畢然後致享也瓠葉者義取薄物也一獻也子皮不敢乃具五獻者重客也趙孟力辭私請於子產止受一獻則已畢享禮然後受宴穆叔賦鵲巢以晉君有國而趙孟以鳩居也采蘩以趙孟不受五獻之享而受小國之蘩以為信也子皮賦野有死麕者以喻芈圍新婚印段恐其禍鄭欲託芘於趙孟也趙孟以常棣答子皮之賦以晉鄭兄弟可以相安以圍異姓婚姻猶尨之可使無吠故穆叔子皮與曹大夫興拜曰小國知免者以晉之足以抗楚也三詩粲然有章曰享曰宴並用賓主有禮學詩學禮者可以義起矣無競維人周頌莒魯附庸小國也所得分地不多魯以其亂叔弓因取鄆之田務婁瞀胡滅明二子又以大厖常儀靡奔則莒幾空國也春秋書展輿奔吳不書國爵者國非其國爵非其爵至於去疾雖自齊入莒亦以國逆為文者猶曰失地諸侯故名之也展輿以小國不量力而奪羣公子秩羣公子召去疾立之展輿奔吳君子有周頌之賦以明有國而亡乎人之義不侮鰥寡不畏强禦大雅右尹子干之奔晉以圍之簒弑也秦伯之子鍼先奔晉以車千乘子干五乘貧富多寡以車數觀之相絶矣叔向使二公子同餼者祿食之秩不害其為同后子意欲以富先子干故以臣與羇齒為愧臣者自比晉之臣羇則寓客也趙文子以為疑叔向答之以徳不以祿徳鈞年同則以尊者之國以平日晉待秦楚之序其實皆狄人因以中國禮法分别之也大雅之賦以鰥寡處子干以强禦處后子此一詩二意不可不辨
