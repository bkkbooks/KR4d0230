body:
  text: 方舟集卷十八宋李石撰雜著古漁詞楚江二負擔請濟於漁子求㨗行約償未當漁子邀市不即濟二人解衣負擔亂流以去漁子不恤也作弔古漁詞其詞曰古之漁兮命為漁而非漁今之漁兮利於漁而跖徒乘人於險兮義惠有所不受因攫而獲兮虐乃甚於穿窬楚岸倉皇兮人絶楚波杳𣺌兮日晡慘欲濟兮誰廹徒使舟繫葦兮睨來者之于于行路無數兮誰不緩急尚有鄰里請而靳兮敢薄勞而重須石齧人足兮淺不可掲蛟饜人血兮深不可踰水生稜兮沙凍風作氣兮浪粗凛凛兮白肉溜溜兮赤膚裸而負兮乍隱乍見亂中流兮輕人命於鴨鳬虣吻雖利兮私有所愛胡彼忍兮甘蟲類之不如昔人不惜引手以徇惻惻之義曷為邀數錢之市亦陷為一世之愚爾釣爾罟兮此多取而不汝吝也朝魚暮魚兮足以廪厥家而肥爾孥此江之水兮汝不盡之府小人之腹日酌幾何兮欲饜分外於有餘茫茫大江兮雖非畏塗市於不競之野貨於無人之墟豈楚俗之固然將古今之各殊漁乎漁乎尚恐有方來問津解劒之丈夫也巫山凝真仙人詞㳂峽岸以南征纜余舟兮水之湄蔓翠壁之無路捫星虹兮為梯敞晨闔以肅歩將欵事於仙之祠延絳宫兮雲衢聳玉壇兮煙霏七華兮鳯羽五色兮翟褘穆婦質以要妙中有嚴兮坤儀子萬物兮氣母矧髪膚之或遺椒桂兮瀝芳茝蘭兮餁潔君親兮危衷祇天地而有謁此意難於弗答也含素孕形擢秀太清支配位兮天干衍三書兮月蓂摩穹漢以矗立峙氷玉於帝庭星娥兮前𨗳湘配兮萃靈指岷山而羣牧受職引蜀江而海音赴節山祇兮皇皇水怪兮帖帖雲乎雨乎開闔晦明於十二峯者誰得以强名也彼塗山毓聖自我委化而江渚思匹反質含情者非不敢亦不暇而乃凡夢是踐塵慮中熱慘不畏乎震霆以漫漫衆說者何人斯夏禹楚襄君兮殊世鬻熊宋玉臣兮異德玉笈兮執瑞以佐治采章兮摛筆而蠱心人固分大小古今哉嘘陽翕陰萬籟聲沉山頭喚鶴以笑以吟聽去來於環珮爾音者其仙乎歌曰鶴來兮霞開鶴去兮日浮天扉兮海闕玉龍兮金虯從萬妃兮以息以㳺風東西兮安流迷雲雨兮我舟人福祿兮仙之休放烏詞歲庚午四月五日曉有烏自投於門視之則矢貫其腹及股㧞其矢作文放之其詞曰彼靈者烏兮伺凶以前民靈不自况兮以兆菑於厥身矢集爾目兮雋一中之為神機牙疾至兮豈意外之無因爾下啄兮敞閒野與水濵族黨匹妃兮號千萬而為羣反爾朝哺兮寧不饑於爾親翾翾不戒兮獨逢禍於未仁飲羽穴腹兮寄微命於逡廵乍翔乍止兮俄自下以闖門若訴予以急兮慘毛血於銛筠矢可立去兮視痛迹之尤新一痛且忍兮免湯火之炮薫汝速去兮無謂言之莫聞世隘道險兮弋四面以畢陳向棲執鏃兮幸汝瞑於方曛十禽並饜兮曽鳬鸞之不分爾其友鵬運於長風兮侣鴻冥於高雲學十歩以飲啄兮隨九苞而屈伸彼主雖好兮胥謂爾惡朱火兆瑞兮有聖人作縱下土之不食行日中之可託論釋奠儀注昨日上丁釋奠為贊唱所悞於儀注多不合欲鉗口不吐恐諸生安於素習以為當然以失仍失以陋就陋無有已歳二仲之祀缺然不修輒為具行禮始終之失與陋者為諸生言之一預日行事官以常服入省牲視饌以次分序立於廟門虛揖為容繋牲廟門外執事省牲告充然後入立殿下東序北面以次立㸃饌素稱在虛揖而退即齋居待事此致齋禮也今貴學乃視饌於殿西廡視牲於殿下且廟之中庭豈牲牢所繋萬一羊豕驚奔觸穢不知何以復行掃洒乎此一節不知用甚儀注一常服陞殿視牲品滌濯供張乃監祭者之職預日事也至日則獻官祭服結佩以俟質明今貴學乃於更衣之次唱云時至請行事又請執事者各入就位既已乃輒請初獻官常服陞殿唱云請初獻官常服陞視陳設此一節不知用甚儀注一罍洗盥洗當在殿户外東位西向執事以次立獻官以次就盥陞殿所謂陞殿者升歌作樂明與神接今乃以二洗陳殿之阼階之東序序出入升降之所也又有奏樂去處則既陞殿樂作矣始盥於樂作之後得無失時乎先聖以自盥而往有不欲觀今盥則失之不知何以為觀其失又甚於昔人矣此一節不知用甚儀注一獻官各就位二贊唱則相對拱立虚揖而請既事復位不復虚揖公然相逐自陞殿虚行升降往復一遭然後再請亞獻每一獻官即虚行一遭如是者三飛翔衣袂如適私室此一節又不知用甚儀注一三獻官畢獻則二贊唱者如上儀對揖於分奠十哲與兩序諸子分奠官之左右十哲官則云分奠十哲官東西序則云東西序以明禮之有升降也今乃不復對揖二贊唱一云請東序分奠官一云請西序分奠官不復為容如僕𨽻然既事不復𨗳分奠官而還此一節不知用甚儀注一酒樽所當在階阼上北面曰醴樽而三别之今乃入殿牖與俎豆雜陳於兩柱問不辨位置獻官至惝恍索摸乃得之又樽口小而勺大預酌於勺以待爵至此一節不知用甚儀注一祭器多寡有數先後有位列之側階之北簠簋為前登鉶次之籩豆又次之屈陳而下以南為上乃今先聖前設大案不復徹去如常日祭器混雜其位其數不復辨也又照饌用短燭乃今擎燭距地五六尺牲饌脯修獻官但知拜跪為謹目不復睹也此一節不知用甚儀注一望瘞畢贊唱獻官復位之廟門行事官以序立如初至之儀贊唱者降徹饌闔户畢乃各退乃今望瘞畢即就易衣入學堂諸生者攘奪酒果肴肉喧呵入耳不復禁呵此一節不知用甚儀注一受胙飲福當於阼階之東序西向所以貴神胙尊初獻明福祉冠禮亦用此位也今既贊合爵俎即降階於東廊下設位以罍洗之位而易受胙飲福之位此一節不知用甚儀注右九節皆祀事之急而禮之大天下之所通用令典諸生皆失之其𤨏細不較也不知諸生何所承受何所肄習而為此乎誰無父兄不知所以詔誰無師友不知所以教諸生安於此有日矣諸生以石為可欺可罔可掩而取乎凡官此者二仲之祀必身履之豈不知其失與陋葢畏彭士之多口挾持寧泯黙而從之婆娑其容以隨諸生而不知變鄙野其狀以隨諸生而不知改非愛諸生也蓋聾瞽彭之士而愚彭之俗先聖先師實照臨之石不敢為是也傳譏叔氏專以禮許人石固失之矣敢專諸生以為得禮乎石中外四為學官凡祀事所見如一未有如彭之所見也既畢事往往竊痛而深恨之何此身不幸而一逢諸生之至此也向任上庠日郊天為執事官博士攝監察御史行禮於學非曰能之葢粗知問俎豆之事矣間以罪斥為成都學官三年成都四孟月舊有菜禮中廢不修至為復之得與四蜀英俊習而熟行之三年間二仲之祀六習而六行之彭之士亦有二三輩常獲見此禮可說而訪之無曰我彭州自有釋奠禮執而不變如䕶瘡痏如疾膏肓朋友忠告不可則止雖聖人復起亦無如之何况石之耿耿乎向者已具公移求儀注以益耳目之未悟幸諸生無靳敬竚回教祀事私志郡國祀孔子用日出禮也是日有司行事及未明猶闇祭也欲廢火不得而燭燎不如古執事者多陋先日作篝䝉以朱碧紙内燈其中置簷廡上下熒熒猶燈市戯也往往州索諸縣縣唯充事則雜陳之與前芻狗無異學者耳目成熟不復再問是何蔑吾文物之代輕先聖之禮俾謂吾先聖不吐此而下食也哉眉山蘇公守遂寧仲月上丁先一日即學問禮掌儀生主故常以對公曰門外燎門内燭猶不知司烜火令乎且薪蒸麻葦官辦此待事無難是敢以褻器凟神乎亟撤棄之稍知禮者則驩於將事且官無甚華費易汚為潔變俚而雅寧不使後生抉目中之昧而觀禮之大全也歟向公官春官治神人和上下於禮為熟皆一意講飭必合於古而有以黙得於心又嘗隆太乙之祀謂不當降列羣祀先是止以常僚初獻公毅然自降一等為初獻君子韙之則公之素重於禮也豈唯遂寧竊謂禮嘗責於其所知而畧於其所不知鄙夫執玉服帛而㒺其名聖人蓋許其不知而不責其知不幸而亂則又與之經營覆匿以歸於禮乃已若夫其所知者而必曰不知是真亂也其經營覆匿誰復任之商之季也太師以樂祭器歸於周秦之季也孔子之後以祭器歸於張楚夫此器也而以去就為輕重則天下之禮必有謹其微者既感公之為因嗟世之未喻者書之命曰私志雖然豈其私辯謗文名者謗之根名立則謗立根立則枝葉蕃矣且我者人之敵也以我敵人有勝不勝而愛憎之心生愛憎生則毁譽立夫以天下公議彼衆我寡寧有盡知之人一人知而譽之以幸區區之名名未必是謗毁隨之謗根一萌知者且衆衆則枝葉衮衮有不勝其蕃如是則公議果何恃既曰公議容或有可恃之理然君子不以為可恃然終以為恃者向使果以名得謗公議果然無所恃雖聖賢畢世以至千萬世且不獲為全人况下流衆惡之易集哉孔子毁於武叔纍然䘮家狗耳孟子沮於臧倉從者竊履耳聖賢行道得謗果不能全名君子於此不免權其得名得謗榮辱輕重寧辭其名以執讒慝之口而免其謗何也以天下後世公議之果可恃也然可恃與不可恃尚何恤唯力於行道以待其天者定自然謗不待辯而自白也且謗之立也君子乎小人乎君子知必無謗使出君子則君子亦小人使出小人則似不必辯而天之愛道久矣道者天所靳我先得之堯舜禹湯文武周公孔子又從而畀之我之所恃者豈惟公議之果可恃恃其道之自天天既愛吾道與堯舜文武周公孔子在天之靈何忍欝欝俾行道君子久此䝉汚名之謗然謗在他人尚有可辯者曽參殺人我則以孝陳平盜嫂我則非滛顔含被劾我則以悌不疑竊金我則非盜况乎所負如九鼎如萬鈞自重自愛肯俯首一介以名易謗哉可生可殺可禍可福吾道初不損益計是皆天也借曰少忍以待其天者定君子曰諾作辯謗方舟子向坐西曹吏馳白曰謗聞乎曰聞辯乎曰烏用辯疾乎如風過河不見其迹迅乎如雷震山不睹其形如塵如冥如注如傾陰用其晦陽用其明芒乎芴乎夫又其誰與聽吏曰然則盍歸乎曰歸哉吏請買舟望潮門岸下吏白舟具乃卜日奉母束書負琴登舟駕帆倚篙舉酒酹江神而祝之曰萬里招客挈家宦寓無最可書有大逋負天子貸而不誅赫震霆乎含怒牽百丈以泝天舟飄飄而逐去指三峽於參星棹五湖之煙雨尚有神之來格𣺌莫知其死所祝未畢舟師進曰舟楫有神神各有司濆怒渤涌而羊角用觸澎湃突沸而狼牙吐威蜀鬼蜀巫請易祝誦方舟子嘆曰吾知之矣是謗鬼也素名有聞吳鬼則子胥之忠魄楚鬼則屈平之義魂負石之鬼勃勃不遇捉月之鬼聒聒申寃其他則道路之鬼為癘寒熱之鬼為瘟乘狐作媚因豕見形吾知其名是𤨏𤨏屑屑又烏足論吾將列謗鬼名仰干帝閽帝既許我矣且我之伏膺者堯舜禹湯文武周公孔子六經之道我之率履者堯舜禹湯文武周公孔子之文鬼不即去寧可復言汝神乎則周公之秩神有禮蓽路藍縷不在此秩也汝鬼乎則我孔子之祭鬼有法鶢鶋海鳥不在此祭也可薦則薦我則不䙝行潦蘋芷之味可享則享我則不謟苾芬馨香之達夫如是鬼可以已乎鬼之情狀伏羲可以知鬼之面目詩人可以察其乘車為寵耶則睽之弧可以射以陰方為拒耶則震之戈可以伐如伯有之醉窟鬼何足憑如實沈之食俎鬼何必竊且鬼以謗人為職則亦鬼之細細者耳凶如􅓇武如虎媚如魅苦如蠱吾皆知之吾將使十二惡神自甲已下禀帝命以數汝執汝斬汝斮汝折幹拉脅抽腸磔膂用鬼肉以備十二神之朝脯顧不可耶於是鬼魁者戒徒出門以返其堯所封之故鄉魑魅魍魎四裔之地是也背汗者喘流眄者淚嬰嬰者聲呀呀者氣願益巵酒請命貰死從此逝矣舟師語塞方舟子酧地一笑遣之曰所不汝恕有如白水黎州勸農文父老等沉黎為州控扼邊境居民多為客户土地盡是山田挾蕃蠻以取資交商賈以通貸不務本業專事末㳺以致衣食仰給他州鹽米困於日用今國家累聖以勸農為富足之本太守等以勸農為倡率之官方茲春耕舉行故事宣布德意具述詔條父老不得視為虚文循習舊態父兄勉力子弟究心男習耕耘女親蠶織上慈下順内睦外親共篤孝悌之風同趨禮義之俗太守專以清靜恭儉為治雖若寛恕拊存百姓然國法不可犯也宜自愛重仰副明時勸課之意毋忽眉州勸農文父老等眉為衣冠禮義之鄉士俗以詩書為耕以筆硯為富往往薄於農桑窘索於衣食者非歳之罪也頃來多事征取無藝又且雜以緇素二氏之㳺民困以工賈兩塗之末作隄防不葺災沴相乘民告病矣雖衣冠禮義何恃仰惟聖天子崇重本業勸農為務俾守令奉行詔意無曰此歲例也而忽之父老各歸教訓子弟以勤儉為本以篤實為用無鬬於隣無訟於庭無悖爾父母師長俾田與孝同力稼與學並興所謂勸農之官者守令之責塞矣若乃不穡以收禾不菑而欲穫王賦不集家事日朘饑凍切膚汨䘮廉恥以自陷為姦則有司之法在題青渠驛青渠驛記云唐開元道士觀因改渠為池為青池寺今為青渠驛其土平衍夾路斷磚古瓦出牛蹊間有雙闕隠隠豈利綿舊尚水利鑿渠引泉以溉田其曰青渠何耶巴濮二水出青蛉縣禺同山王子淵入蜀祠金馬碧鷄嶲即其地唐志云二水源出三危山下蜀地理有兩三危一出積石一出滇池昆明此豈禹所導始末出入乎抑秦漢所紀與唐郡異志也嘗歷梓以按視二水此其出積石三危為巴濮二水乎青渠恐為青蛉之寓名即爾雅蜉蝣渠畧之渠俗謂水蛉也博物志青蛉端午埋其頭土中化為青珠其以蛉名縣者以瑞應也周人祠萇𢎞之血為碧其曰青蛉者豈碧鷄之屬耶觀恐遂為𢎞祠蟲之渠水之渠不可無辨也禺同意其為魚洞今在恭南正巴水所自歲久地改名訛乎聊書此以備攷古之闕資人李石題羅僰傳羅僰蔡州人也其先燧人始以火化為不羮令庖犧治庖為膳宰其世職也神農聚蓄百藥以救民疾僰官尚藥奉御乃上書曰臣累世奕葉忝食舊德鄭圃治爨文園病渴有年於此仰惟大烹殊養旰食焦心觀頥六氣之調爽口十全之藥倚須鼎渥不戛釜羮竊謂藥之有君臣佐使也君一臣二佐之使之誰陰誰陽品對餁分各有等差度量刀圭㕮咀刲剥雜乎渾然著為方論以幸惠學者特以仁義乖裂性命爛漫違天理蔑人和氣血異劑髪膚殊證蒹葭困吾之形蓬蒿亂吾之種鷄壅豕苓君非其君若乃二臣以下佐之使之風動草靡日出葵側於以長育中和補緝造化而孝子焦然於色七族嗚嗚有不勝哭死者何耶臣僰葑菲下體蘋藻微毛每恐枵然霜露無以仰備採摘春酸夏苦秋辛冬鹹物有一㫖㫖各一味稼穡於中調四序者甘草被國老之號人參茯苓䝉君子之稱臣竊慕之况忝職奉御植立仙班醫國之誠活人之用臣僰不勝榮願帝曰可乃下制曰帝命冒下土㒺有遐遺天造利建侯宜承眷渥矧兹鼎鉉之寄盍致絲綸之褒前尚藥奉御蔡國公羅僰淡泊以養道腴潔白而富才質啓心沃朕剖析於精㣲苦口愛君薫蒸於瞑眩上以追累世之績下以濟率土之民褒錫隆名陪敦幹食滋味事朕爾則何求草芥視臣我則不暇於戲需者天位之孚宴豈一食之間哉師者國醫之寓名本三錫之寵也進班五等之秩往懋一品之勲可特封中和國師持節袁州軍州事蔡國公勲階如故羅於春秋為國與州蓼伐楚勝之來服為采邑羅氏來氏支庶叢然盛矣邠風下衰斷壺薦篚秦人㳺食看𤓰入穽有乾沒營利者有淹藏㫖蓄者慆滛渾殽真風蕩散至負薫目白鬚滑中洞下之謗墜國醫清白之傳唯東坡子玉糝羮見於世論曰聖人以道御氣以氣御物雖天地之大亦道物之一也况於一草一木之别哉善乎神農之嘗藥也日遇七十毒自非聖質體道六氣交戰外氣與内氣寒暑燥濕乘之雖五榖得以殺之矣况藥乎嗚呼識藥為上用藥次之以毒攻毒制其後害者氣有以御之也天下之醫知用藥而不知識藥曰藥之殺人者有由矣蘿蔔名萊菔根而又有蘆菔爾雅釋之通為一用至誤釋為菘而物性乖矣子思子曰中和贊天地之化育僰之所以自薦者庶幾乎贊曰國醫之師曰中曰和天地化育不偏不頗誰適左右惟師之多儻可度世來乎老坡書吕不韋傳後太史公載吕不韋說華陽夫人之詞云不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎則孝文王為安國君時也子楚質於趙秦昭王五十年吕不韋行金於邯鄲守者得脫以至子楚得立凡六七年事戰國策云王年高矣王后無子王一旦山陵子傒立士倉用事王后之門必蓬蒿是時子楚猶在趙未歸若在孝文未立之前不應稱后稱山陵也若以孝文既立所稱之王為孝文王則楚之得歸與不韋之說特一年事與太史公所載不同不韋周旋兩國之謀不應成於一年之頃也高誘註云秦王后為孝文華陽夫人至王之春秋高注云昭王年老則安國君未立昭王尚在位其子之妃乃曰王后以配其舅為稱何耶又曰陛下嘗軔車於趙注云陛下謂孝文王昔嘗質趙以為子楚之詞前昭王而後孝文王耶昭王生十九年立五十六年薨則七十五歲孝文生五十三年立一年薨則五十四歲太史公所說華陽夫人非繁華時也忍忠嘉忍忠嘉一名忍太平云成都人㓜入華山師陸修靜體生綠毛頭面及胸腹間見人自云貧子客萬里橋徐秀才家余與蘇季文同往謁之起立云我合下你兩箇來你兩箇都是八月生季文八月二日余即八月二十三日指季文云好門户可惜胸次極窄指余云一片好心來成都作官去余再三謝之云此身可以與仙翁供薪水得否渠小碟中拈一枚栗子云可喫此栗你家中生子嚼開栗子中有一圓藥後來累訪范和仲家就口贈和仲一詩云三箇孩兒是你精你身憔悴你兒榮情知損壊元陽力何不留來養你形余命之坐再三師問之就口贈余詩云揖我歸位坐禮數無乃過長生久視術看取爐中火又云還㑹得爐中火否又云無事盤龍坐書來祇讀破䝉董作一塊聰明不如過又自指云我即䝉董官人患聰明太多其人向在華山獵人以之為野人異獸作籠檻獻之州府而以烟火食飼之至是其毛稍落說累朝事知人家父母先祖自云曽見之在華山日冬月食一味木根柏葉掃落蘂置之木樹下以燒之生出木根芽子號為木䭔子至是歸成都諸司爭迎致師事之寢卧在一火焙止隔壁燒火藉其暖氣而已毎喫粥飲少酒細嚼飯咽之云五榖精華天以養人須是細嚼過始得是年一百三十六歲矣石到家乃丁巳李圓生年栗子中一圓藥如其言馮氏三鬼求葬言鬼近怪必言之以其可知也孰曰可知以其情也有鬼自言甄舒仲情至廋也鄒湛原其廋而知之死而欲葬鬼之情也欲葬不得而巧自託以說其情鬼之急也湛知以意而釋其字曰舎西土瓦中人鬼之用情也馮氏三䘮不舉不記年而舉於吾友楊伯逺之手則鬼之用廋尤其巧者且人之所甚信者莫若妻子所聽左右以入其言者莫如乳媪輩一昨馮氏三鬼以夢自列於伯逺之妻胡云必葬我則又怖撼伯逺之兒夜啼不止乳媪輩葢若有睹三鬼也畏而祝之則又夢夢覺兩言之同則以告伯逺儒者不尚鬼曰是兒女之疑也胡與乳媪言益力伯逺曰曷明告我以骨或柩所在并姓氏則信鬼巧也而區區怵吾婦兒乎於是三鬼以夢告伯逺如祝既夢之黎明有母丘久道來謁伯逺心怪與母丘生言之生慘然曰此故姊夫馮君諱某字某也初娶某氏再娶某氏皆死不葬與伯逺行覘三柩草棘間宛然與昨夢合伯逺問其後子息皆絶憫其終無歸具衣衾如禮坎而窆焉紹興十六年十月某日也墓在小溪縣某鄉某山下伯逺名深遂寧人從景陶浚卿學春秋書顔含傳後史氏不廢顔含孝友顔含以孝聞叔畿死而復甦存亡不辨含侍疾不出户十三年事寡嫂有異感其立行如此王導以含為東閣祭酒居叔父䘮嫁女為劉隗所劾史氏不以一疵掩其平昔叙含於孝友傳此史氏忠厚也然所貴乎君子者要當謹䕶細行細行之於人初若可忽君子嘗於其所忽者失之以蹈終身之悔以集不知者之謗彼素無行檢則又何足深責惟有平日素履如太清白璧一朝自輕而滓穢之豈不大可惜耶晉人蕩而廢禮以此為俗居䘮而用原壌之教如謝安朞功之慘而聽歌樂阮籍母服而飲酒食肉含居叔服而嫁女此俗豈例有所受邪隗之劾含誠是史氏不廢含素履亦是然含之自處得不為初心之愧蜀楮蜀楮今之冷金牋是也非善書者不敢使敗墨滑筆堅耐山谷老人喜使之真草多傳蜀中不貴粉牋小幅可以結字不耐收藏也前輩亦時有一二小幅往往招蠧壊凋落也長松長松東坡所賦葢出河東方書以蜀瓦屋所出為上今此所得瓦屋真産也長松四兩入檀芎茯苓甘草各一分作湯勝芎藭湯逺甚此僊方云
