body:
  text: 方舟集卷十六宋李石撰墓誌銘李隱君墓誌銘君諱騤字致逺姓李氏年六十五卒卒以隆興元年八月二十三日𦵏以乾道三年十月二十七日先𦵏期其子厚次序君狀實謁銘曰幸同出簡譜不敢以屬他自簡道資一再往返拜請愈力辭不得且厚夫婦嘗剔股肉愈母疾是宜得銘則按君與余同出唐隠太子小字芝蘭者其子諱文釋遷蜀之簡𦵏之為始祖由簡以别平泉貴平資之北門為三由資以合於平泉由平泉以合貴平世數昭穆君于余為諸父行君之猶子鼎為同年進士與平泉羣從兄弟往來知君家詩禮儒學所自盖以孝友誠實信於鄰里而聞於道塗有巖穴竒異之行而不窘險以自困有豪俠邁往之氣而不矜尚以自用士大夫之過貴平者聞君之名必欵其廬而求識君面曰此隠君子也有夜持杖入為盗人殺之里保以殺人告君以暮夜殺盗有法反以殺人論将獄及非辜力止之曰苟有坐吾任之官嵗大作禄津橋隨作隨壊君曰苟役病也與其嵗以苟役病民請以身視役庀成潦不能壊嵗役乃寛折劵以市周急之仁譲畔以平牛翁之訟至所緩急不以有無為解且曰乾餱既愆民甘於不仁吾特倡力以愧吝嗇貪鄙之心非以富沽市井名也聞者愧之曽祖世長祖交父堯封不仕娶文氏先君五年卒祔君䘮以𦵏於隆州仁夀鄉三子厚将仕郎金州司户㕘軍次曰厯曰厦皆業儒三女適士人王孜文廉能文尚能右厚狀之詞云爾狀又云八世祖諱堪節度正散将充陵州軍事押衙左一将銀青光禄大夫死事其母誄而碣之云涪江静㓂沱水遏兇譽播兩川功髙受禍自古以來名將不得其死又曰迎靈柩以歸鄉大置墳之所則八世自簡以别於貴平為鄉其乆審矣其曰節度正散將陵州押衙左一将者當是西川節度陳敬瑄牙将也佐髙仁厚與楊師立戰於涪城豈遂死師立之戰於涪沱間乎其曰不得其死者或遂以功髙併與仁厚為敬瑄所不容也唐紀載僖宗五年駕至自成都以正月改元光啟誄八月猶曰中和者蜀亂正朔隔絶未通誄文可觀特考正而表出之銘曰儒俠並用學且藝将種弗耀豈其世衆山一雲念含涕矢銘厥幽尚永裔李隠君墓誌石家本唐李氏自為兒時聞大父行言𦵏於簡之平泉其入蜀之鼻祖也雖居資而於資為孤族五世昭穆所與親親之恩不絶者視簡族為之本故簡之諸李皆得以譜通䕫中者其女兄嫁三江陳泌吾遣吾兒娶泌女則蘷中之甥故䕫中與余為兄弟行䕫中曰吾𦵏父矣請謁銘按䕫中父隠君諱某字某本太學生先世大父某進五經義天子嘉之命直講太學故君得侍大父乆留太學肄業幾十年年甫十八程藝率抗衡英俊燕雲兵起朝廷訪材武甚急君曰吾三世儒者困場屋一官幸㨗中何擇哉即習武舉亦屢中程未幾罷武舉西歸㑹靖康下詔復武舉州家以君應詔有㫖令直赴殿試至中道京城破而返卜築林泉作亭名逍遙以老焉卒年六十六娶張氏先卒再娶楊氏生二子䕫中粹中粹中亦卒五女皆適進士其一即陳泌也景徳友墓誌銘壬午夏考試臨卭景徳友適為臨卭縣因見之徳友面目有憔悴不任之憂問之則曰令以撫摩愛養為職而誅求暴横者得以擾之令以慈恵循良為心而掊克彊禦者得以勝之今将逢大吏之怒不免於此必矣語别未兩月徳友以訃聞嗚呼徳友魁然丈夫大腹長幹笑談折衝俗子間獨不能容細碎米鹽計乃以令一邑死乎徳友曏侍親官上庠學天下文章不能自致一第而以世為官是困其所學也試吏三十年以才業䇿畧所至為東閣重客卒碌碌不盡見是貶其所施也與之語色和而不暴與之處氣龎而不亂不至褊淺肝鬲謂必能寄煩任劇乃反死矣是嗇其所賦也徳友𦵏有日其子大同以其弟鑄狀乞銘徳友諱某姓景氏世普慈人曽祖某祖某父某以紹興五年郊恩補將仕郎辟川陜茶屬闗陞右從事郎江津令未滿除秦司茶屬秦司罷除瀘南帥屬未滿又改除四川茶屬以舉主改宣教郎以茶賞循通直郎潼川郪縣丞丁中奉公憂服除知中江縣覃恩轉奉議郎賜五品服循承議郎卒以隆興元年某月日𦵏以二年十月年五十七娶張氏贈孺人三子大中右廸功郎瀘川尉後一年卒大同右修職郎眉山尉大亮業進士六女長嫁右承事郎鄧樞次適楊元行餘未笄𦵏於導江長樂鄉從先域也銘曰以榖治病誠不如蓼之苦以麟為捕誠不如貓之武服膺禮義而仁以行之誠不能見人捩目而含怒嗚呼徳友死乎吾以銘其墓任承信墓誌銘君諱衍字達夫姓任氏本眉之諸任為望族侍其父黄中徙黎再世矣丞相虞雍公允文守黎黎瘴鄉以薄寒中人如瘧狀皆瘠黄上浮下弱土無藥醫得君甚喜因令診視屢效問以所得君曰人稟於天而氣血有肥瘠多寡適天之寒暑小變人以所禀感之彊為弱疾弱為彊疾以違天中和之氣為醫者或偏陽以治陰或偏陰以治陽一毫千里經絡從之是以藥殺人雍公曰此昔人醫國之説也未幾雍公當國呼與俱經所療治國醫無出其右尋命以官為承信郎幹辦官雍公進退天下士善善惡惡君宻為蜀士道地不少如與黎士置科場取士所得士與中州比人以是賢之㑹雍公宣撫四川君卒於漢中年六十四卒以乾道九年五月十一日𦵏以淳熙二年三月初九日𦵏黎之漢源縣某地二子長子某以樞府恩補登仕郎次沇承信郎二女長適進士范仁次適鄉貢進士樊􅂱余守黎得瘴疾命診之曰表腠風邪投劑即愈又曰使君於黎厚矣兩邊不聳治之寛猛猶吾之對病為藥余首肯之㑹余被召去黎君送出卭崍闗夜分呼與語知君有性理學且知佛書其通於醫信矣君孝友好義傾貲以救人緩急前後𦵏遺胔放生皆可書銘曰一棟之隆不如礎萬里之翼不如風吾學岐篇妙與天通言可醫國瑣瑣疥蟲有不足攻銘韌其窆水複山重程通判墓誌銘石嵗壬午被命倅彭與程子伯友為代先日伯友以書往來平昔相好也至期伯友坐累對移不得以倅事交手相付每每以為恨而深致嘆息者州賴伯友以濟以善其後者甚多且彭三邑廣袤百里嵗費二百萬是将安取未酤而催酒息未摘而須茶課夏秋未熟而前期探賦甚於履畆籍苗而取者自非苟且權辟為名與减舉員定賞格至無人敢令此邑民急則操吏吏急則持官摸棱齷齪幸免以去者其為員丞如我輩不武多矣伯友一事一件皆有條目可考如築芳菲館特其游戲自言如見錢流地上後來者以母權子酒本續續不絶而息亦僅集至令他人以成能名伯友乃不免官坐嗚呼誰適階此耶嗚呼使伯友不死與今之為吏者比量材具未必不過竟止此耶伯友死𦵏有日其友榮州李使君以書屬銘則按伯友姓程氏眉州人諱某伯友字也以祖寳學公廕補登仕郎以右廸功郎監雅州馬務奏差綿州推官監味江鎮税循右從事郎知威逺縣任滿舉主改右宣教郎知簡州平泉縣轉右通直郎簽書合州軍事判官轉右奉議郎以年勞賜五品服丁母碩人憂外除通判彭州轉右承議郎該今天子登極恩轉右朝奉郎通判閬州轉右朝散郎卒以某年月𦵏以某年月年五十九先娶史氏先卒追贈安人再娶王氏二子畏蚤卒次子以徳知為文以父廕當補官七女長適資州右修職郎前階州録事㕘軍何師文次適眉山故右廸功郎臨卭縣尉吕道乆次適隆州鄉貢進士陳厚次許字卭州将仕郎李某三未行君幼孤奉母孝而能順諸父以色詞性倜儻有膽畧呐呐不能出口據坐對衆閉目若欲瞑臨事則决然抵掌蹋足不少回忌此其耳目習熟天姿英敏異乎以政學者也且如論馬政以杜蕃蠻之隙焚腐茶以弛官吏之欠綿州軍變則就察首謀者陰戮之以安反側之心平泉量田則曲循有詞者少更之以全經界之令其他學校之立橋梁之建所至皆好士愛民切切有過人者攝守事凡三懐安廣安彭州初不以時暫苟於攝以快其意是又可嘉者曽祖某祖某父某伯友者張丞相浚席參政益趙待制聞皆欲交章論薦卒不賴其用自以有得於荆吳佳山水歸卜勝處作載書亭與英俊游曰此吾菟裘也銘曰借他之車或得而馳乘副之馬或縶而維挾短箠以自竭孰若抱長䇿而勿施載書亭中萬卷凛凛乎世授之師有韌其竁以詠銘詩知均州常朝奉墓誌銘常子大防與余善始余館成都范氏常子與范氏中表率蚤莫往來時常子以新進士解褐眸子炯炯慢視他人意不能趨繩墨局促相與論天下事至抵掌奮髯出語無一顧忌或時酒半面熱則雜以歌嘯仙佛文章巧出竒見無一不有或時遇俗士則斂袵下氣惘然若孺子緘口坐隅欲睡余固竒之而人莫測也一日謂余曰今天下用兵蜀大如斗吾輩豈能戢翼小啄籬落間乎吾從父方得君立朝為中執法或階此吐一語取富貴無難時江湖路梗蜀士嵗率不能一二至而時相方以吳蜀易地而仕雖名開之而實抑之蜀士寧困窮吏州縣不肯去仕一郡守或丞舍此無過望常子毅然以行至會中丞公以言不合委去居秀州之海鹽常子往拜之中丞曰固望吾子以門戶事吾方炙眉忍痛尚有言哉既至扣丞相府言事人固知常子之為蜀人中丞公姪料其必不合常子口囁嚅含機牙度不中不妄發時相亦務以常子收名聲因令盡所言常子逆知之而實不輕也因慷慨言曰相公誠愛蜀士請三言而退一曰察孝廉以厚風俗二曰容直辭以廣言路三曰謹邊防以備敵㓂時相方務文致太平自待以無事竒其言而不能用得倅閬中再倅洋川人皆以常子進不得意常子胸中蓋浩然也因著文曰榮歸録尋除均州未赴以疾卒年五十常子諱城大防其字也世居華陽為詩書聞家曽祖某故左朝議大夫贈銀青光禄大夫祖某右宣徳郎父右奉議郎常子登紹興二年進士第龍安酒官龍安縣令閬洋二州倅官至左朝奉郎其居官勤敏公廉務大體畧細故愛民戢吏有銜寃至獄具欲死者破械而申之以得活者數人其文慕退之之竒嘗注退之集藏於家娶某氏二子曰有終鄉貢進士曰有開女五人長適新政尉梁及之次適進士李光實次適将仕郎張觀餘未嫁卒以紹興二十四年十一月某日𦵏於綿州巴西之龍溪則某年月日也有終以其叔父堪狀請銘以石為知常子者不得辭則為銘銘曰鄭刀宋斤土物有善此材之良胡以蜀限豈憚於行鄙蜀以逺言吾如醫視其陰陽中則不欲外何以臧開實抑之蜀天一方麾去不留我則游戲詩書混混如水方至濡之沫之有懐未試既嗇其廩曷永厥年天意惘惘後當有傳龍溪之窆吾銘其堅鄧承直墓誌銘嵗庚申金人陷順昌以驚吳會士論皆欲迎戰時相猶執和議不變天子惑之時鄧君昻以布衣走行在所上書論天下事其言曰願陛下勿聴樊噲之空言納婁敬之逆耳蓄財養師以為後日之舉時相頗采其言奏上曰此非特某之意公議亦知出此於是和議遂决尋欲命君以官俾君出見邊将喻指君由漢汾梁洋以行盡得地形控扼虗實與軍食多寡還再上屯田八䇿即補右廸功川陜宣撫司措置屯田行㳂邊數州隙田得一千三百四十二頃有畸嵗省四十萬斛時營田使即鄭公剛中也君之説未盡施會營田司罷君去官再上増修營田二十䇿且曰今營田罷司分𨽻諸将總領財賦者抱文具而地力之盡不盡不問莫若専置一司以𨽻戶部又曰湖北有可耕之田川蜀有可耕之民可誘民以耕實寛鄉補以軍功要民均田盡乃止書屢上不報循文林郎䕫州觀察推官參議官張士襄以勢援自豪君詣鼓暴其惡㑹士㐮入為監察御史君不少回忌幸其説之或中時相雖嘉其直不能用授成都税官滿代循儒林郎以賞當轉承直郎以卒實紹興二十八年九月十四日年六十有一君系出南陽宋有諱藻者巴西令遂為資人曽祖某祖某父某皆不仕妣勾龍氏繼母謝氏封太孺人娶謝氏家本儒素才中人産而不能力學自立萬里往返襆被勇往不為宿儲計雖屢沮抑而剛介自許以抱負經濟惘惘於世冀有所用卒不盡施可哀也已文集若干卷藏於家母太孺人謝氏李氏之甥於君有中表余被丁丑召東下君來同舟余讀書君草牘盖晨夕不輟也余為太學官君被疾逆旅余日往問醫藥至卒治殯斂所貲雖枕篋遺墜捜得之納櫬西上至䕫俾其子國華㑹石於君死生之義至矣其忍辭銘銘曰哆口修幹見其人而聞其名論事發䇿儒之書而武之兵曰和曰戰孰敗孰成韌君之藏以永詩銘鄧文學墓誌銘某年月日某州文學鄧君皥暴卒於資州之客位先是朝廷以慈寧宫慶賚大恩覃及士大夫之親皆得級爵君以親年例當得爵請於州州吏以㣲文格沮君九頓首日往候太守之顔色詞益危請益急守怒至不顧君忿憤氣勃勃填咽以死州之士無賢不肖知哀其死於親而憫其蹭蹬不遇君舉進士蚤有聲場屋豈不能得一第以華其親乃冉冉七舉恩科自度其親日月且喜且懼不得已猶覬大恩之弗遺此豈人子過望而一跌至此可哀也已春秋郎之戰聖人憫童踦之死君之孝於親以死不猶愈於童乎君字熙民皥其名也鄧世資人為資望族曽祖某祖某父某娶某氏年若干子女若干君之子未艾亦鄉貢進士以其兄國華狀來乞銘以𦵏實乾道七年十一月二十五日墓域在盤石縣某山之原予嘗與君共坐棘闈時連席喜君筆詞翩翩若欲脱去舉子窠臼蓋為夙學薫染以自困踣苦海中以死寜非命乎且國華兄弟之請一再拒之不獲銘曰一杯之未辱三釜之未榮心乎於養忍取是為不知者之重輕而汲汲於此名也嗚呼附塊而生以愴其天者忍啜其羮是為君墓中之銘程隠君墓誌銘吾友程驤𦵏其親問禮於隴西李石答曰父官九品未禄以未命士禮𦵏之驤曰諾又請銘答曰昔之人子有文備論譔以華其親可也驤曰欲其傳故以請答曰所傳者為其人或其文乎驤曰人以文重故能傳敬跽以泣手出大編則其父狀實按君世書生少年有名詞場靖康禍變朝廷詔捜草萊竒偉君酒酣慷慨投筆大言曰非志功名之秋乎即游邊自効俄以扞邊補官人往賀之曰子虗上林薦材未晚司馬長卿何薄乎君竟鬱鬱雖黨友素期以所學逺到者亦為不滿或勸以少屈意州縣君曰士出處二致耳吾本世隠紫筠溪先墅松菊故在曷緼袍卧去素能詩時出佳句從名勝林泉詩酒適意每客至命驤侍曰吾傾家待士以為汝資驤登第曰吾願足矣君諱某字某姓程氏世眉人為望姓年若干卒以隆興二年五月乙酉𦵏以淳熙元年十二月壬申祔以其配某氏男一人即驤新漢州綿竹縣尉女二人長適通直郎監成都府糧料院師祖慶次適鄉貢進士韓廷圭孫男二人諾詔墓在彭山縣漢安鄉逺祖從吉隠居紫筠溪號紫筠居士曽祖可節祖資父發深於春秋悟性理而不喜佛學事繼母史氏盡孝史視之如已出一介不妄取予然亦不靳貧者倒廩負者折劵故多得道塗鄰里之譽先是眉之三蘇氏以元祐學排王氏為蜀倡天下知師之重之間有折入他門而㨗出以媚時好人謂俗學石來守眉方天子尊尚蘇氏求所以敷揚聖學以激士氣而廣風俗首得驤登門能誦説蘇氏學無一語預吾官事國人曰幸哉君子矣銘曰嗚呼蟇頥山之門有老翁仙乎泉上有臺焉而太白讀書仙乎神乎麟翊而鳯趨中開紫筠隠士之廬吾銘厥世斯為窆諸資州程使君墓誌銘資州程使君以疾卒於治寝在法終於位則以官書州之人愛使君猶曰吾州使君云李石於民之一也公子師蘷執經石門用是走使以訃至未幾以弟援狀以𦵏𦵏緩銘亦緩非他志也石嘗評公之文凡三變始以經術中以議論終以叙述經術之文淵而㫖議論之文陳而肆叙述之文理而盡凡向之以文字往來者如大蘇尚書公符小蘇博士公籍喻駕部汝礪運副范公瓚檢討邵公博石與使君日處其間其諸公之羣從子弟執門生弟子禮者多名人日沓沓説文不離口而所得於淵源有自者未論其人文可知也如公人猶以富貴功名期之公亦自負以當世意語温厚而氣寛舒學道之士君子也時固有隂忌而軋之者公不為少屈故以文自昌而卒亦不逹石被丁丑召官太學朝路多知公葉樞宻公義問都御史公民望謂石曰蜀秀如程君引重諸公俾來此而公以書來告曰誠有東下意終不能隨金帛之舟以幸㨗出既而石被罪上峽值公舟留一夕飲酒賦詩去來彼此無礙也公既得州石亦倅彭書問不間㫁如昨未幾以訃至彭矣嗚呼士有艱於一進如公而衮衮者肆焉悲夫公諱揆字端卿始祖浚儀令鐸唐末入蜀家眉之武陽曽大父賢良公諱希甫大父沂熙寧間以經學教授犍為因為犍為人父植右承事郎累贈右朝㪚大夫君宣和初以博士宋公齊愈挈之入太學補中舎與趙雍姚孝寜熊彦詩王晞亮孫汝翼為同舍生諸博士如孫逢者傾遲公以為上庠之重未幾以春秋科登建炎二年進士第任彭州司户㕘軍試中學官潼川府教授以十䇿干樞宻張公浚奏差榮州軍事推官再除成都府學教授循左文林郎以舉員改宣教郎通判瀘州轉左奉議郎丁父大夫公憂服除轉左承議郎通判成都軍府除知昌州未赴丁母夫人憂轉左朝奉郎知資州覃恩轉左朝請郎感疾致其事以卒年六十一卒以隆興二年某月日𦵏以乾道五年某月日初娶黃氏給事公哲之女先卒再娶王氏左中奉大夫咸之孫五子長師契從政郎次師稷師蘷師望師岳三女長適將仕郎何震次適承直郎張仲堅次適承直郎王子然公為政一切以推行所學為本崇大體畧細故愛民惜物為務所至有能稱崇學校以養士蓄帑廩以足兵敦儉約以革浮用清静以矯俗抗益瀘兩帥之橫則義動於色而有貳郡之禮革資中擾政之弊則權出於一而得専城之舉自筮仕至老不衰其有志未盡見於事功亦一世竒傑之氣終不没也文集五十卷通鑑發揮十卷春秋外傳十卷尚書外傳五卷史評二卷雜誌三卷佛心印三卷藏於家公疾革屬其子必欲得石銘銘曰程眉聞家如蜀之文有來犍為山之一雲雲有五色孕為斯文不亟以徐厥用將大指我如風所觸無礙文之用舍闗天成敗浩乎廓然有志永齎是碌碌者吾文曷施著書滿家父則已菑後將穫之以永銘詩先君墓誌銘惟李氏諱芝蘭者吾世所本也本而上之係唐蔣王諱惲盖四世本而下之六世無聞其無聞者盖隠也或曰無大事業史逸之石聞諸曽大父行曰家本古雍得一坊五公入蜀諱廷贊唐末五季官資之銀山縣吾族别者自銀山始也銀山生二子曰𤣥易墓在何胡壩今為何胡壩李曰𤣥詔卒於我宋之康定墓距州東北高埡今為北門李祖生惟素惟素生旦旦生仲舒娶張氏錢氏錢氏於府君為祖考妣生三子長諱佐娶王氏於府君為考妣府君幼孤幹度夙成奉孀母與女弟居惟孝惟友祖考妣老矣惸苦赤立難於色養而家緩急身任以濟履人所不堪地則安之雖阨於遇貧以老無恨也幼學不推於用乃藴積以厚其子亦不肖不孝不能媚時速科第歸悦其親俾其親終老無食息寧然府君慈於子終不鄙謂子為弗能父子啜菽飲水廓然也一日命其子以酒曰飲斯吾為父不汝負矣勉旃呼具洗易服誦觀音名危坐没紹興十四年八月二十一日享年五十七諱某字某娶蹇氏先十九年卒再娶杜氏四男子石占召谷女四人孫男七人十六年正月十八日𦵏盤石縣北五里先域也卜告繇曰坤阜衍宅塍水壬入乙主辛客伏壌如日壙中丈五尺有畸土若丹止焉窆之嗚呼人子忍沽其親之美哉先君子於書藝多通清謹混俗陰若有所封殖以待其生棄諸孤日家無夙儲鄉之君子其必有知之人未必知之知之者天也雖然死生禍福天得以權之矣先君子勤於生以不獲下夀痛哉觀堂劉望之作碣以發幽潛不肖子石忍死銜痛序卒𦵏大槩銘之銘曰我隴西李不掩厥先六世不譜别於銀山來隱北門莫名其賢惟考君子惸苦克立孝友清浄薫然成習利委於路人趨以急我則有子去而不屑子何能為堅信曰類天之於人而豈終否祖考府君水複山深三世幽宅來者可尋言誰信諸有刻墓陰穆承奉墓誌銘惟國家靖康用兵以來急於邊餉許人以輸邊補官與理選限士有艱於科舉每指為㨗徑往往階此躋顯仕而不以一進之為汚國中之士往往各挾所有折而從之銓選益廣品流益雜間有仕不得試試不得盡如吾友穆深之其人也深之幼負竒志舉九經童子至京師會科罷西歸専意禮學與弟湘俱有名場屋累舉不售尋以邊勞補廸功郎鎖闈是嵗果以周禮為運司首選既下第㑹張魏公宣撫四川深之挾文謁轅門為所稱賞辟綿州司理㕘軍又辟劔州某縣主簿欲要致幕屬會罷司不果又從總領待制趙公辟撥發船運深之蹭蹬州縣乃歎曰吾書生假此求仕况仕本為貧吾不屑此忍鬱鬱向來下第習氣乎襡衣冠隱焉俄以恩轉承奉郎牙緋致仕士論髙之世豪於貲至所自處如寒儒士與之交不厭深之藏書萬卷博學喜讀書好議論性理通貫二氏多藏法書名畫竒玩動至數千又有園亭甲乙勝處持是以交四方名輩人知深之儒者不知其富也如提刑馮時行當可侍講程敦厚子山皆其素交虞雍公入蜀聞其隱退辟深之子為屬欲因致之深之以老辭雍公曰逹人也姓穆氏世為彭望族諱某字某年六十九卒以淳熙元年正月己亥𦵏以二年三月丙戌域某縣山原深之孝友治家可法喜施不妄予毎公私借貸率為彭豪倡州縣賴以濟多得往來賔客之譽余倅彭與深之游日説學哦詩炷香啜茶出所藏縑緗評第髙下真贋歴環堵觀明牕棐几所居澹如也彭堰務本民私自出力至以水利致訟熙寧以來乃始委官督部民倚官多出緡募夫嵗夫不集益調春夫余改令民出米飯夫尅以嵗前一月辦事食水家與胥曺利於裒掠與春夫之再起争沮其説獨深之贊余説倡諸家出米至是省三十萬夫而春夫不復起矣深之嘗欲俾予書之未果故併叙其末曽祖某祖某父某娶某氏三子曰某曰璋曰璵某後數月以毁卒祔𦵏二女長適修職郎景大同次適從政郎雍夀寜孫二人紹孫重孫深之臨死屬其子璋璵曰當得方舟子銘吾𦵏且璵游學吾門友人蘇楠於牀前聞其語助其請甚力銘曰四楠堂上炷香瀹茗誰賔誰主練江分流遶於花竹樂此春莫嗚呼桑下之嗟樹下之踞吾不欣戚於其毁譽盍窆而藏銘以為固忠州文學趙君墓誌銘趙君諱樗年字難老一字子夀世為蒙陽大姓其先名驤者以卧龍賦擅名朝廷復詞賦科人猶指為卧龍趙氏父子世習此科時出其長以傾蜀士輩學者亦樂從君父子求指教為場屋繩墨君之父録事㕘軍以是登科君亦以是為鄉首選尤長於春秋其説破凡例得注以尊聖人之經嘗曰優柔厭飫用心如是足矣四薦該免恩敕補忠州文學以卒士論屈之以君負有用之學而跼於程度之文挾可施之才而躓於寂寞不試之地至其窮性命蹈仁義孝友温裕浩然㝠心於道而廓然達識於萬一不以榮辱得失累所守乃反不逮下夀豈天所以畀君者自有理而君所以自取者庸彼易此而相為乘除乎年五十五卒以紹興三十年五月𦵏以乾道二年四月某日墓在某地曽祖某祖某父某漢州録事㕘軍娶王氏賢良之孫女二子恕愿四女皆適士人石曾識録事㕘軍因得交君為文字之友時席公益典成都范公塤鮮于公翰為漕君父子與二漕中表親游諸公間甚得俊譽席公稱其文李寘欲館致之不能石來官成都則君皤然鬢矣自號廣莫野人且曰幾與故舊相忘况懐刺他謁乎家藏千卷書自丹鉛鈎提至老不衰精於古律詩多竒語至其他文皆有法成集藏於家恕以春秋世傳其學銘曰草衣提贄何必徑三年奏篇士莫聘酬未當價夫何病脱然幽棲見天性廉江東逝圭璧瑩臯如填如銘所敬趙郡王墓誌銘仰惟太宗皇帝顧念幽燕靈夏皆我舊民淪於羌狄思有以羈縻之適夏人繼捧納地來歸因賜姓得升屬籍賜名保吉保忠至於西邊能自㧞於羌落皆得援保忠故事此趙君亦得賜姓名用此例也一日君之子威州兵馬監押趙某以狀來告曰吾父死朝廷遣中使宣諭給錢百萬以𦵏父子兄弟世蒙國恩外固可畧而内不可無書則按君狀云君之先出姜姓春秋為陸渾漢為鄯善唐為吐蕃牙帳在金城為西平郡魏為鄯州隋仍為西平郡皇朝為西寧州君世寧州君之世在夲朝者為温希結生二子曰温希錫勒君曽祖曰罝勒斯賚祥符間求内屬為莽沁首領授寜逺大將軍以敗元昊功加河西節度使生三子董戩檢校工部尚書轄戩英宗時襲爵莽沁公賜推誠順化功臣元豐中封威武郡王夏人許割地以畀且間之不從神宗朝獻圖夏人之䇿詔褒其忠其子黙正獻洮河二州地賜姓名趙思忠是也贈洮岷軍節度留後其子懐義元豐八年以蘭州進討功加左藏庫副使祖曰温錫沁元豐中以圖果莊功遷𤓰州團練使考曰錫巴衮元祐六年亦以果莊功為滕州刺史賜姓名法温封西平王以子恩屢封安康王君舊名尼瑪丹怎宣和間以其世有之地至西海内屬請賜於朝賜姓趙氏名懐恩授武功大夫留京師欽宗即位加右武大夫思州觀察夏人合諸羌犯西寧王師乆不利有㫖令君往喻禍福降者數萬計光堯夀聖皇帝登極封隴右郡王加食邑先是君之母兄隆咱爾獻土賜姓名趙懐徳大觀初以招降藏希卜得功遷雄武軍節度使死贈開府儀同三司安化郡王至是金兵至陜其子忠順専兵河外全家與金人戰死君逃岷州山間烏珠訪君所在曰若歸我函谷以西可得也君曰我世受南朝厚恩義不負宋烏珠以兵脅而追之君遁走二丈溝間君泣曰我不負國死此命乎馬一躍獲免宣撫張公浚即以君節義表於朝留主管随軍機宜朝廷以君不從偽命備見忠節除熙州觀察使都總領河南兵將紹興初有㫖居成都朝議欲收復熙河制置席公某宣撫吳公某薦以君招撫以和議寝之二十三年改鼎州觀察使仍隴右郡王加食邑二十七年充成都府路兵馬鈐轄三任九年前後食邑至三千一百户實封三百戶君精騎射馬上盤兩石弓的不虗發雖起邊羌世陶中國冠帶禮義而性資忠孝故惓惓臣節雖迫以九死莫屈也先是君之造朝也賜對便殿徽宗問疆埸安否狀君曰獨苦童貫擾邊生事時貫本兵柄意務恢拓百計撫存禮意固結君以傾諸羌以張大邊勢雖陽與唯諾而内沈鷙不變宦者楊戬至奏君謗訕大臣欲徙逐之故異日訓詞有抑於權臣之語君憤夏人以本朝故為世仇必欲佐恢復以償夙恨宣撫張公得之置之腹心以所服戎服金帶贈之紹興間敵揚聲一出盧甘一出南山一出虗秦以疑我師君白吳玠以盧甘道寒不可行决來成鳯不若重屯成鳯扼褒斜已而敵至和尚原以敗玠奏君料敵之功君力辭敵再和君謂和議决不乆不若先事制勝為永利時相方大主和議有告君之言外臺觀望以君摇撼誕謾生事械致君獄賴尚書張某保全已而言者伏辜君自此絶口不言兵而専意於浮屠竺乾之書矣㑹完顔亮渝盟議者服君先見偶三路㨗至君酌酒自賀曰太平可待王師駐順徳不進敵屯鳯翔川邊摇動制置使王公剛中訪君以近事君閉目不答强之君不得已曰始併力鳯翔則五路不必下今我師已老鳯翔之屯甚堅非我之利可知所得賜賚前後散施事佛給貧餘則奉賔道塗無虗日有不願於君者曰是羌兒種習結客將何為且縻高官厚俸安用欲稍裁制减削至誣以獄乃憤憤卒卒以某年某月𦵏以某年某月年若干娶包氏馬氏楊氏先卒再娶馬氏王氏皆封碩人三子長曰某秉義郎叙州兵馬監押次安國成忠郎皆先卒次寧國敦武郎威州兵馬都監二女長適忠翊郎黃師閔次適忠翊郎王褒孫九人康朝忠翊郎慶朝昌朝顯朝皆成忠郎拱朝光朝翊朝皆該奏未出官世朝熙朝早卒孫女長適成忠郎王延章早卒次適王珏二人在室竊謂禹貢之法叙等春秋始而地中而人終而子有進無退無絶法也國家務復境土而嘉君之世其有感於君之死而給復其窀穸事甚寵石宜侈其書不得辭銘曰國之用材初不擇地金玉珠貝以遠而致一善或進有縻其類我徳無疆爾世不墜其自伊何神鑒在天其來伊何有土有田豈利爾私馮類而遷舊壌吾民一視同然材不棄遐武諝惟傑陶染一新冠帯就列我豈爾徒誰則猖獗闔門死事有全其節奕奕其氏滔滔其源籍國之屬父子弟昆爵秩惟王儀大爾門既華厥躬凡百子孫惟孝惟忠其漸未止天心雨露南北赤子跬武歸疆如隗之始誰刋吾語以告諸史孝廉先生墓誌銘孝廉先生者吾鄉錢造父也鄉人私先生故以名孝廉國舉也以私故冒所國於士以有二者之實名下彰雖私猶國也得以所舉為稱先生有懐不耀業詩書求一官不見試悠然自足田舍雖六萬粟義所不顧何愛於名而為是翦翦蓋國之人私先生也朝廷許嵗舉孝廉未有的出應此選或者名未掲於公卿鄉曲清議已竊指其如羊頭馬脯至先生則曰某事孝某事廉若干條摭實可名是宜舉不謬頃嵗李公璆制置四川首以先生應選先生憮然曰孝者不違親以狥禄廉者不輕生以貪糈使吾䝉其名而敗其實可乎識者髙之年六十二卒以某年月日𦵏以某年月日曽祖某祖某父某娶杜氏三子某某某一女適鄉貢某有文集四十卷藏於家許下劉子望之與先生交游其舉孝廉之詞曰孝友之行著見頗多狷㓗之姿一毫不苟劉子以文信於蜀人重劉子之詞於先生也又加重焉銘曰士實考素名從而榮世或溷之雜其渭涇嗟嗟孝廉忍避此名列此窆詞百世儀刑樂先生墓誌銘先生諱才字子美姓樂氏系出微子後宋公子樂以名為氏十一代祖山通禦張林叛以功授資州别駕因家於資其處蜀處卭皆其支也始日蜀之樂侯名夏者來典資訪資族與通譜得先生兄弟二人方少年秀於經業因館之使與其子弟學號大小樂君以鄉諸生出入禮法自持人不知其為太守族子也故私謁不得入而守益器其為人曰是足為吾子弟範矣未幾大樂君以舍選貢因留辟雍乆之解褐授官歸先生猶鬱鬱鄉校士論稱屈歎曰吾伯氏足任門戶責矣誠得挾卷山間水涯以樂吾年不猶愈於得失榮辱以自累一試乎時先生猶奉老府君在堂甘㫖伏臘僅給而老府君喜賔客好散施為人子未嘗顧望後日計奉其佚樂而佐其所未足公私辦治一髪不以累親心先是大樂君三游上庠裹糧送迎皆老府君為之費大樂君不幸且屬諸子曰吾既以學破家不得更希覬田業以為己分先生曰吾義門兄不以非理乾没且廉於自取吾忍使衆子長貧無一藉手以奉祀吾兄乎故老府君身後所遺悉均之衆子無留私所居營亭館水竹之勝對客觴酒笑談手未嘗一日廢書教二子親授句讀而厚於擇師故二子得以奉承儒素之業於今不墜也先生邃於書鄉曲後生尚能言其指授以法焉年五十八卒實紹興癸酉四月八日娶蹇氏後七年卒生二子蘷進武校尉益將仕郎三女長適錢某先卒次適蹇某季適蹇某孫男四人蘷益以隆興二年十一月九日舉君之䘮祔以蹇氏𦵏盤石縣之月山鄉乞銘以窆石與蘷益道誼意愛不薄且皆蹇甥也每從諸舅行時節往來致禮輒泫泫不能視三頓首以請焉嗚呼其忍辭之其忍辭之銘曰借鋤不嗔矜然於百年之親紾臂得飽傲然於一日之老孝悌以刑儒門之清如樂氏子父子兄弟一褐空山足以為世授之榮盍固其藏風吾詩銘
