body:
  text: 方舟集卷二十四宋李石撰左氏君子例君子者當世君子之論左丘明取之或孔子也然有孔子又有君子君子者似出左氏品藻似例非例凡七十三作君子例頴考叔君子曰頴考叔純孝也周鄭交惡君子曰信不由中質無益也宋殤公即位君子曰宋宣公可謂知人矣衛殺石厚君子曰石碏純臣也惡州吁而厚與焉鄭二公子敗燕師君子曰不備不虞不可以師陳桓公失鄭君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛鄭取郜防以歸魯君子曰鄭莊公扵是乎可謂正矣不貪其土鄭莊公舍許君子謂鄭莊公扵是乎有禮許服而舍之無累後人鄭莊公詛射頴考叔君子謂莊公失政刑矣邪而詛之何益鄭息有違言息伐鄭君子是以知息之將亡犯五不韙右隱公十一年凡十例祝聃射王鄭伯曰君子不欲多上人況敢陵天子乎社稷無隕多矣鄭太叔忽辭齊婚君子曰善自為謀魯平宋鄭宋辭平而盟君子曰茍信不繼盟無益也屢盟無信鄭以髙渠彌為卿弑昭公君子曰鄭昭公知所惡矣公子達曰高伯復惡已甚右桓公十八年凡四例衛侯朔入放公子黔牟寗跪乃即位君子以二公子之立黔牟為不度矣魯伐郕降齊師還君子是以善魯莊公楚以息媯故伐蔡君子曰商書所謂惡之易也如火之燎於原其如蔡哀侯乎鄭伯自櫟入刖強鉏君子謂強鉏不能衛其足鬻拳以兵諫楚子自刖為閽君子曰鬻拳可謂愛君矣自納於刑齊桓公就家飲陳敬仲酒卜晝不卜夜君子曰酒以成禮不繼以淫弗納於淫義與仁也右莊公三十二年凡六例右閔公二年闕里克殺公子卓荀息死之君子曰詩所謂斯言之玷荀息有焉隨叛楚楚伐隨取成而還君子曰隨之見伐不量力也楚子過鄭文夫人芊氏姜氏勞之楚示之俘馘君子曰非禮也戎事不邇女器鄭子臧鷸冠奔宋鄭使盗殺之君子曰服之不衷身之災也不稱也夫王子虎盟諸侯於王庭君子謂是盟也信謂晉於是役也能以徳攻攻楚也晉殺顛頡祁瞞舟之僑君子謂文公能用刑三罪而民服右僖公三十三年凡六例彭衙之戰狼瞫馳秦師死焉君子謂狼瞫於是乎君子怒不作亂可謂君子魯大事太廟躋僖公君子以為失禮逆祀也皇皇后稷君子曰禮謂其后稷親而先帝也問我諸姑君子曰禮謂其姊親而先姑也秦伯伐晉濟河焚舟封殽尸君子是以知秦穆公之為君舉人之周也魯逆婦姜卿不行君子是以知出姜不允於魯貴聘賤逆楚滅江秦伯降服出次君子曰惟彼二國其政不獲惟此四國爰究爰度秦穆之謂矣秦伯任好卒以三良殉君子曰秦穆之不為盟主宜哉邾文公卜遷於繹利民不利主以卒君子曰知命右文公十八年凡七例宋華元殺羊食士不及羊斟以敗君子謂羊斟非人也以私怨敗國邲之戰鄭石制入楚師欲分鄭而立魚臣鄭殺之君子曰史佚謂毋怙亂謂是類也晉宋衛曹四大夫盟清丘宋非其君之意君子曰清丘之盟唯宋可免焉右宣公十八年凡三例宋文公卒厚葬用殉君子謂華元樂舉於是乎不臣生則縱其惑死又益其侈蜀之盟蔡侯許男乗楚車為失位君子曰位其不可不慎也乎蔡許失位不列於諸侯蜀之盟晉辟楚畏其衆君子曰衆之不可以已也大夫為政猶以衆克況明君善用其衆乎晉侵沈獲沈子揖從知范韓也君子曰從善如流呉伐郯以夷狄入伐季文子曰吾亡無日矣君子曰知懼僑如叔孫也不書姓婦姜書姓舍族尊夫人也君子曰春秋之稱㣲而顯志而晦婉而成章盡而不汚懲惡而勸善非聖人誰能修之右成公十八年凡六例穆姜為櫬輿頌琴季文子取以葬君子曰非禮也虧姑成婦為逆楚子重伐吳呉人要擊取駕獲鄧廖君子謂子重所獲不如所亡組甲三百免者八十被練三千免者三百祁奚請老晉侯問嗣君子謂祁奚能舉善建一官而三物成定姒襄公母也賤而無櫬匠慶畧季孫蒲圃之檟季孫不能禁君子曰志所謂多行無禮必自及楚共王以陳叛而自殺其大夫公子壬夫君子謂楚共王於是為不刑不明扵法教也季文子卒無衣帛之妾君子是以知其忠於公室范宣子來聘告用師於鄭季武子賦彤弓宣子曰敢不承命君子以為知禮新軍無帥晉侯以卒乘官屬從下軍君子曰范宣子讓欒黶為汰弗敢違也吳乘楚䘮伐之養由基設三伏誘之敗呉師君子以吳為不弔吳立太子札願附曹子臧以無失節君子曰能守節君義嗣也楚公子午為令尹用公子槖師等八人以靖國人君子謂楚於是能官人官人國之急也鄭公孫黑肱將卒歸邑於公曰二三子生於亂世貴而能貧不在富也君子曰善哉鄭伯歸自晉使子西聘晉辭曰寡君懼不免於戾使夏謝不敏君子曰善事大國晉執衛侯衛以女女晉乃釋之君子是以知平公之失政也宋左師以弭兵請賞子罕削而投之君子曰邦之司直樂善之謂乎澶淵之㑹謀歸宋財失信君子曰信其可不慎乎卿不書不信也襄公薨子野毁而卒立公子禂生十九年矣猶有童心君子是以知其不能終也右襄公三十一年凡十七例莒展輿立奪羣公子秩去疾入而展輿奔吳君子曰莒展不立棄人也夫齊景公問市貨貴賤景公繁於刑有鬻踊者故對曰踊貴屨賤君子曰晏子一言齊侯省刑鄭伯如晉公孫段相禮敬而不違受賜命之策君子曰禮人之急也伯石汰不失禮猶荷其禄印段以父子豐受州田之賜初欒氏亡三卿皆欲之及文子為政其子欲取勿許君子曰弗知實難楚子合諸侯於申用召陵之禮問禮於宋鄭左師獻合諸侯禮六子産獻伯子男㑹公之禮六君子謂左師善守先代子産善相小國昭公如晉晉以為知禮女叔齊曰是儀也不可謂禮君子謂叔侯於是乎知禮鄭葬簡公弗毁游氏廟日中而塴君子謂子産知禮許悼公飲世子止之藥以卒君子曰盡力以事君舍藥物可也邾黒肱以濫來奔重地故名君子曰名之不可不慎也右昭公三十二年凡九例鄭駟歂殺鄧析而用其竹刑君子謂子然扵是不忠茍可以加於國家棄其邪可也晉人討衛之叛由涉佗殺之君子曰此之謂棄禮必不鈞為遄死右定公十五年凡二例巴伐楚子國卜之曰如志卜師王曰如志何卜遂敗巴師封子國於析君子曰惠王知志志曰聖人不煩卜筮右哀公十八年凡一例左氏聖語例左丘明於傳春秋也以吾夫子一言遂以好惡同於聖人凡傳所謂君子者或謂其尊所聞於吾夫子也而又有仲尼孔子並稱或追述所聞親見其事然後為好惡乎其曰吾夫子與君子如二例以杜預所釋三事起於踐土皆曰違凡變例以起大義危疑之理示後學以褒貶大法聖人作經之意凡三十二條附之君子如例晉文公重耳召王以諸侯見且使王狩仲尼曰以臣召君不可以訓書曰天王狩於河陽言非其地且明徳也趙穿攻晉靈公於桃園宣子未出山而復杜預曰穿趙盾之從父昆弟子也太史書曰趙盾弑其君以示於朝孔子曰董狐古之良史也書法不隐趙宣子古之良大夫也為法受惡惜也越境乃免宣子使趙穿逆文公子黑臀而立之新築人仲叔於奚救孫桓子得免衛人賞之辭邑請曲縣繁纓以朝仲尼曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已晉伐偪陽秦堇父輦重如役郰人紇抉門以出門者杜預曰堇父孟獻子家臣紇郰邑大夫仲尼父二父以力相尚堇父生秦丕兹事仲尼齊侯問臧紇欲伐晉而與之田臧孫激怒不受仲尼曰知之難也有臧武仲之智而不容扵魯國抑有由也作不順而施不恕也夏書曰念兹在兹順事恕施也宋向戍謀弭諸侯之兵享趙文子叔向為介司馬置折俎為禮仲尼使舉是禮也以為多文辭鄭然明以學校謗國政欲毁之子産曰是吾師也若之何毁之仲尼聞是語也曰以是觀之人謂子産不仁吾不信也杜預曰仲尼以二十二年生扵是始十歳長而後聞之叔孫牛囚父以死殺仲孫昭子即位不以為勞牛奔齊孟仲之子殺之仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨周穆王欲周行天下祭公謀父作祈招之詩子革為楚靈王誦之王不能自克以有乾谿之辱仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾谿晉雍子與邢侯争鄐田叔魚攝理雍子納其女邢侯殺叔魚與雍子扵朝宣子問其罪扵叔向叔向曰昏墨賊殺臯陶之刑也乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不為末減曰義也夫可謂直矣平丘之㑹數其賄也以寛衛國晉不為暴歸魯季孫稱其詐也以寛魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利殺親益榮猶義也夫郯子來朝昭子問曰少皥以鳥名官何故郯子曰吾祖也黄帝以雲炎帝以火共工以水太皥以龍少皥以鳯鳥顓頊為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信衛公孟縶狎齊豹作亂齊氏用戈擊公孟宗魯以背蔽之皆殺之琴張名開字子牢將往弔之仲尼曰齊豹之盗而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不盖不義不犯非禮齊侯田於沛招虞人以弓不進曰虞人不見皮冠故不敢進仲尼曰守道不如守官君子韙之鄭子産謂子太叔曰我死子必為政有徳能以寛服民其次莫如猛太叔不忍猛而寛故多盗仲尼曰善哉政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寛也母縦詭隨以謹無良式遏冦虐慘不畏明糾之以猛也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百禄是遒和之至也子産卒仲尼聞之出涕曰古之遺愛也韓宣子卒魏獻子為政分祁氏田為七縣羊舌氏為三縣凡十大夫仲尼聞魏子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎晉趙鞅荀寅取陸渾地賦晉國一鼓鐡以鑄刑鼎著范宣子所為刑書仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之蒐也晉國之亂制也若之何以為法魯陽虎自齊載葱靈車寢扵其中而逃自宋適晉趙氏仲尼曰趙氏其世有亂乎夾谷之㑹犂彌言扵齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥於徳為愆義於人為失禮君必不然齊侯聞之遽辟之齊人加載書曰齊師出境而不以甲車三百乗從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊人來歸鄆讙龜隂之田齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合享而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圗之夫享所以昭徳也不昭不如其已也乃不果享仲由為季氏宰將墮三都叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入於季氏費人弗克入及公側仲尼命申句須下伐二子奔齊遂墮費杜預云仲尼時為司寇定公十二年叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費書帥師者言用衆也不言伐而言墮者毁其險固也定公十五年春邾隱公來朝邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆將有死亡焉君為主其先亡乎公薨仲尼曰賜不幸言而中是使賜多言者也魯司鐸宫火踰公宫桓僖災孔子在陳聞火曰其桓僖乎杜預曰親盡而廟不毁也楚子將救陳卜戰不吉卜退不吉王曰然則死也不移疾於令尹司馬卜河為祟又不祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由已率常可矣郊之戰孟武伯帥右師冉求帥左師管周父御樊遲為右左師入齊師右師奔孟之側殿公為昭公子也與其嬖童汪錡乗皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛於齊師故能入其軍孔子曰義也孔文子之將攻太叔也訪諸仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也将止魯人以幣召之乃歸初衛太叔疾出奔宋其妻宋子朝之女孔文子使疾出其妻而妻之後疾嬖其初妻之娣文子怒欲攻之仲尼止之疾出臣向魋欲害孔子者季孫欲以田賦改法重賦也使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度扵禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冐無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽十二年春用田賦冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後勢者畢今火猶西流司厯過也九月厯官失一閏哀公十四年春西狩於大野叔孫氏之車子鉏商車子㣲者鉏鬲名獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之蒯聵入衛侯輙來奔石乞孟黶以戈擊子路結纓而死孔子聞衛亂渾良夫通孔文子妻伯姬所致也曰柴也其來由也死矣孔悝立莊公十六年夏四月己丑孔丘卒公誄之曰旻天不弔不憗遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律子貢曰君其不沒於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也君兩失之杜預曰仲尼既告老去位猶書卒者魯之君臣宗其聖徳殊而異之魯襄公二十二年生至今七十三也四月十八日乙丑無己丑己丑五月十二日日月必有誤也公羊糓梁終獲麟之一句弟子欲記聖人之卒以續夫子之經故經終於此二十二年庚戌則七十三二十三年辛亥則七十二兩説小異也詩補遺繇詞專之渝攘公之羭一薰一蕕十年尚猶有臭驪姬為夫人事在僖四年賦狐裘尨茸一國三公吾誰適從士蒍作詩也築蒲屈事僖五年童謡丙之晨龍尾伏辰均服振振取虢之旂鶉之賁賁天策焞焞火中成軍虢公其奔晉伐虢事僖五年筮詞千乘三去三去之餘獲其雄狐秦伐晋僖十五年繇詞歸妹士刲羊亦無衁也女承筐亦無貺也西鄰責言不可償也歸妹之言猶無相也震之離亦離之震為雷為火為嬴敗姬車說其輻火焚其旗不利行師敗於宗丘歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死扵高梁之虚惠公死之明年重耳入僖十五年器銘禮至滅邢之器余掖殺國子莫余敢止殺國子僖二十五年輿入誦占民言原田每每舍其舊而新是謀晉侯城濮之戰僖二十八年古人有言鄭執訊詞畏首畏尾身其餘幾又曰鹿死不擇音文十七年城者謳睅其目皤其腹棄甲而復于思于思多鬚也棄甲復來宣二年驂乘答牛則有皮犀兕尚多棄甲則那宣二年役人再謳從其有皮丹漆若何宣二年謬語楚伐蕭軍中不敢正言有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何叔展言曰目於眢井而拯之若為茅絰哭井則已宣十二年筮詞晉欲伐楚卦遇復卜者詞也南國蹙射其元王中厥目成十六年夢歌聲伯夢涉洹淚下化為珠玉盈懐三年言夢而卒濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎成十七年虞人之箴周太史辛甲命百官為箴辛甲武王太史也芒芒禹跡畫為九州經啟九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒於原獸忘其國恤而思其麀牡武不可重用不恢於夏家獸臣司原敢告僕夫襄四年國人誦臧紇救鄫敗於狐駘此逆䘮者之誦也臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾襄四年繇詞孫文子卜詞兆如山陵有夫出征而䘮其雄襄十年築者謳宋皇國父為平公築臺子罕請俟農功畢勿許澤門之晳實興我役邑中之黔實慰我心襄十七年輿人誦子産從政一年取我衣冠而褚之畜也取我田疇而伍之孰殺子産吾其與之襄三十年又誦子産從政及三年我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之襄三十年讒鼎銘叔向語晏子昧旦丕顯從世猶怠況日不悛其能久乎昭三年鼎銘正考父廟之鼎一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是鬻於是以餬余口昭七年孔子生已十八年投壺晉穆子詞穆子荀呉也有酒如淮有肉如坻寡君中此為諸侯師昭十二年齊侯舉矢答詞有酒如澠有肉如陵寡人中此與君代興齊君有弱晉君之意昭十二年鄉人歎南蒯以費叛恤恤乎湫乎攸乎深思而淺謀邇身而逺志家臣而君圗有人矣哉昭十二年鄉人歌南蒯飲鄉人酒我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎昭十二年童謡鸜鵒魯大夫師已聞之文武之世鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢逺哉遥遥禂父䘮勞宋父以驕鸜鵒鸜鵒往歌來哭昭二十五年野人歌宋人歌衛夫人南子也既定爾婁豬曷歸吾艾豭定十四年萊人歌齊景公老而無子欲立嬖人子茶寘羣公子於萊景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎景公既葬稱謚而歌哀五年三占詞趙鞅卜救鄭遇水適火史龜曰是謂沈陽可以興兵利以伐姜不利子商伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可㳺也鄭方有罪不可救也救鄭則不吉不知其他哀九年筮詞陽虎筮泰之需宋方吉不可與也㣲子啟帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止哀九年乞糧隱語呉申叔儀乞糧扵魯大夫公孫有山氏二人舊相識佩玉蘂兮余無所繫之㫖酒一盛兮余與褐之父睨之哀十三年對語有山氏梁則無矣麤則有之若登首山以呼曰庚癸乎則諾哀十三年尼父誄詞旻天不弔不憗遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律子貢以生不能用死而誄之非禮哀十六年繇詞衛侯夢渾良夫呌天無辜貞卜之詞如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰哀十七年齊歌魯人不答齊人稽首齊人責之因歌此詞魯人之臯數年不覺使我髙蹈唯其儒書以為二國憂哀二十一年右詩類共三十六事以繼詩之刪序所不及者附為詩類補六義之遺云占筮詞八賦一童謡二銘三誦四謳三答一虞箴一古人言一投壺詞二歎一歌五謬隱語三誄詞一凡三十六事
