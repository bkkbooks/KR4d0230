body:
  text: 方舟集卷五宋李石撰五言絶句題師永錫知縣畫老竹枯木二首霜雪倚巖樹霧雲秋水槎且須髙著眼上有曇鉢花水墨三十年一枝更一節工夫不爭多儘立庭下雪題李都畫枯木毫端看運斤筆老木亦老莫畫春風枝秋來厭枯槁次韻趙榮州題蘆鴈畫畢弋橫前路江湖寄此身平沙下雙鴈不見問津人水仙花二首碧雲玉搔頭對景山月皎霜靜在更深風香我先曉肌膚剪秋水垂雲出龍宫我意得子珮笑許無言中叱馭橋鸞鳳飛緣壁虹霓下飲溪一家蠻瘴裏九折夕陽西謁武侯廟此地蛟龍伏中原蛇豕多借君白羽扇萬馬飲黃河蠟梅二首黃昏淡烟晴風健香骨透煉金呈赤心山月惜孤瘦莫學卧鬢花嬌黃媚粉額仙官道家粧靜處立標格雞鳴關關路入雲平泥塗自送迎書生無馬癖客子效雞鳴次韻張當進題神君廟桂楫方東泛荷衣已出塵曲江尋相業猶是姓張人子夜春歌二絶新挑錦字書倒指嵗月逺愁眉要深黛燈花巳堪剪瘦玉薄薄衫暈燈和月冷獨夜不禁春梨花碎簾影題蘇氏巽風閣蘇楠作閣乞名李石以巽風名勉以不忘東來之意巽風起東南大地萬物小吳門共延矚匹練橫江表扇子詩雨挹春紅淺風酣晚蘂稠看花不著意何事亦關愁斯文悔少作自謂老更工不是舍人樣合住此山中芳草遞春風三山立桂叢栁條隨駕緑花蘂上林紅釧動香飄麝簮低鬢拂鴉休遮笑裏面用比庭前花火老不知秋螢飛風露下和月立梧桐幽人宜獨夜竹影月來去荷香風送迎南窗枕書卧醉眼看山橫水浸菩提坐風傳戒定香藕根金鎖骨花面玉毫光月下九九仙雲間七七泉喚起吹簫子跨鶴飛上天積雨莓苔色秋風松桂林莫隨蓬鬢改黃落見真心海濶千江輳風翻大浪隨六鼇元未足不是下鈎遲薰蒸香積厨精鑿午齊飰飰後且放參林下香一瓣黑風吹海立雲水渺三韓蓑笠漁舟裏無心下釣竿江海翺翔地舟行岸自移無心波浪裏鷗鳥不須疑引手折纎枝月邊簮玉兒好與一杯酒酒香知是誰衆水秋風徑羣鷗白雪和只宜閒坐釣湖海老烟蓑風雨樓上笛燒春寬作程眉峯須小蹙梅子彈丸青露冷蘂珠珮五湖雲水深一枝春好在先寄月邊心秋月二首夜榻近虗簷獨卧玉蟾冷梧桐氣先奪端不礙清影江草半黃落江雨催授衣衣中有斷線客子秋念歸感事一水遮金騎諸州辦甲衣書生投筆硯隨口說兵機老大年光迫纎花又一春鵲占風外嵗難唱雨中晨一徑清如掃柴門霽影多苔莓因鶴啄非是客經過三起復三眠吹花漲雨烟浮萍增采色輕壓緑池蓮苔掃彌旬雨花開數日晴蝶輕矜鬼翅鶯巧學僮聲綴綴復翹翹金絲並玉條􅙐醿與楊栁結託上青霄踏碓村舂急繅車並舍忙雀桃紅綴吻鶯粟碧成囊茶寇征商急偷生蔽緑林江湖自有備盜賊豈初心近日江西將常兵已駭聞不知蜂蠆陳敢抗虎貔軍請借三分勢仍分七路兵是兒雖乳臭莫近吕䝉營六言絶句扇子詩節節荷風驛置疏疏竹雨龍慳欹枕幾聲鼓吹捲簾數筆湖山月樹吾人傾蓋風蟬老子聞韶喚起江湖春夢幾番鼓角秋潮眼界琉璃鳥度腹中沆瀣蟬清猗蘭羲獻父子瘦竹夷齊弟兄冷著松聲似雨凍教井水成氷猛火燒天燒地清凉谷裏閒僧晴日淺深著栁暖風髙下吹花醉裏蝴蝶作夢醒後狂蜂報衙今古一場夢囈乾坤六博呼盧醉裏猩禽著屐醒後驪龍憶珠修竿其釣莫釣短艇似漁非漁欸乃一聲山水杏林夫子琴書蜂蜜新房日課燕泥舊壘年勞睡起香爐圓覺醉中山芋離騷蘄竹皮膚事業齊紈手腕工夫跳出二乘火宅直饒一段氷壺猛火橫秋如爍銀河冷浸月腳三更獨立梧桐不恨夜涼衫薄東海夜潮舂枕西湖曉雪窺窗香佩幽蘭開國褐衣明月迷邦雞蟲日得日失鵬鷃風髙風低天道先看隂隲人心何忍自欺月波半浸楊栁榖雨初勻牡丹夜酒只堪歡酌春羅不耐輕寒師資為學之規朋友為學之勸說與潤屋千金何似傳家萬卷錦暖海棠欲睡絮濃楊栁初眠蝶老鬭髙屢舞鶯雛學語如絃冷熱衰盾之日清和夷惠之風天運自有常度世態人情不同顔子見善則遷子路有過則改懶則鮎魚上竿勤則大鵬跨海茶交君子之淡酒飲聖人之清醉為天下大老睡則吾輩神兵負笈無他竒貨筆端有力躬耕僰道頗思山谷蘭陵一變荀卿舍妷叙州守學葉葉深雲湛碧花花晴日搖紅當是身薰成種不干秋水香風柏樹庭前度夏荷花池上經秋若問西來拄杖何如南去輕舟僧扇風輕匝破世界山僧如如自在箇中純白團圎洞然法香水海隱几今昔兩箇卧床左右一邊正要腳根著地莫教火焰燒天涪上拾遺今日泉聲一炷青雲㑹道傷春傷别世間惟有司勳杜謙夫扇春暖錦棠覆徑夏凉紅藕盈池九蘂東籬綻菊一花南岸梅枝功德海中遊戲菩提樹下清凉只有登山一醉嘯聲分付孫郎孫令扇竹影千林一族此中孝子門家釋老曽經抱送詩書便是生涯陳恩孫扇三召三逐去之老眼已不識路偶然得箇漁家此是桃溪西渡先睡也須先覺多文也須多學如此沒量大人不知可畏可藐達摩一字無法惠子五車著書透關九重見虎離鈎三寸求魚七言絶句黎㕔相並栽柏生意可喜一級寒階不盡登齊腰立雪我何能庭前柏樹君知否便是西來兩代僧眉州郡圃種稚柏三千三千稚翠繞池亭他日摩挲考嵗星為語邦人須耐久春紅何必似冬青彭州送花市上芳菲小洛陽誰家細馬走紅粧名花未恨東風老只恨先生兩鬢霜諸友惜别夜坐德行堂飲茶一舟海角到天涯春信江南梅欲花莫道别時無酒語與君剪燭夜烹茶東湖探梅短短青蒲淺淺沙春風不隔水仙家一枝未報江南信旋琢湖氷看雪花軟條蠟梅南衙柔軟北縈紆霜碧霜青各立株但得東皇均一笑黃梅吹蠟白吹酥蠟梅霜林作纈菊成衣只道花多緣葉稀辛苦為他成蜜後蠟蜂猶是趂花飛一株坐斷寶花臺氷雪光中眼倦開無事暗香浮鼻觀思量也自識花來題馬仲友畫花下猫二首花相春歸畫錦仙輕雲羃羃護花天莫燒髙燭三更月自有真香一炷烟黃鷅鶹鳴處處聞花開時候度重門啄花莫啄枝頭錦留與東皇覆酒樽别金顔老涪州一别十年彊君自游行幾退藏好是金顔無佛處却來鐵面坐禪牀笑傲叢林落托仙閒心不縛十方禪野狐豈是藏身處水牯真成豁鼻穿謝夏彥博知縣惠落鴈木并紫筍茶緑菜二首紫筍先期火未鑽緑芹猶及薦春盤江湖别後渾忘味忍把南烹纍長官入用定知材見伐不鳴仍以鴈遭烹漆園二物都疑著老去從軍得細評趙權可許惠笻竹山峰佳者用前韻戲之使君未怕牧蠻官游戲邊藩不作難龍竹風霆驚物化鼇山贔屭照人寒史宰北湫禱雨龍卧西山護密隂肯來北洞禮觀音便分楊栁軍持水與作商巖旱嵗霖贈釣車道人鐵彈牽絲響釣輪魚竿妙與易通神莫將瓦卜欺天眼誤看凡夫作道人釣車道人逺來再以前韻贈之泥行草屩自扶輪來上平岡問谷神要識方舟老博士盧敖元是避秦人紅梅閣二首天上佳人雲縷衣暗傳春恨入新詩樓頭玉笛關情緒不念殘香結子時試來紅閣覔飛仙花落花開不記年未問庭前幾枯樹已將身世等桑田梅花零落孤根玉雪團天孫剪月試天寒凡間諱白驕紅紫却把梅花作杏看題薛公肅問梅圖湖風吹衣笻九節瘦如梅花骨欲折詩魂别後誰與招獨立西湖樹邊月採桑籠鈎在手茜裙襦蠶老風暄日欲晡我是采桑菩薩女不煩下擔捋髭鬚寒食街頭春栁弄疏柔閉户何曽一醉謀只道將家對寒食三千風雨隔松楸荷花優曇寶樹作香林佛面輝光紫磨金峯頂蓮花髙十丈便敷妙座出花心感事輕衫輕騎雪邊州不是書生戰不侯卧枕太阿龍夜吼夢隨氷凍截河流指謂名場結淨緣修行隨處護龍天只今挽下銀河水已汚緇塵四十年大雨水憂三堰决壞且念吾挺之在病無與共此憂者因走筆為問四首秋夏之交天雨水水來不少熱更多火光焰焰毒人肺不惜一濕傾天河淫雨不止已及月扊扅供爨無宿烟池蛙齊聲振鼓吹苔蘚一色堆金錢人道西山有龍穴雷霆動江二水深龍仙且莫壞我堰我堰一决人陸沉君今已作十日病我去頗覺三秋遲俸錢不來水破竈君自不飽我忍飢墨池寂寞遺風草𤣥客載酒重來尋舊宅千年公議闃無人往往更嘲池水白北田梅亂插繁花霽影中忍教雪片掃狂風從今凖擬青梅子雨㸃梅尖醉頰紅永兄作靈照寺墨梅兩紙殊佳仍書二絶其上以為餉次韻謝之荒畦草棘暗霜秋菜飽無期那不愁去去携籃問靈照此間熟處要經由不干老眼眩生花自是詩人醉墨斜從此絳州烟水窟竹籬茅舍子真家竹間讀書携書携酒秋竹根拂石讀書橫酒樽只有梅花如我醉一枝和雪亞前村鄧通城相公舊築與雲平千載氈裘尚震驚多少金錢滿天下不知更有鄧通城史記賜鄧通嚴道銅山得專自鑄錢城在黎雅之間銅山在黎題羅漢院畫像一任猜嫌極口憎布衫裹鐡面生棱何如乞與袈裟著畫作西山十七僧贈龎玠術者難易如何是祖風却將性命問龎公向來一口西江水因甚談天不落空悟仙庵擔頭活計任推移前世生身後世知瀝血山中留語句至今橛上繫驢兒羅真人祠詩二首老木深龕閲嵗年我來何處覔飛仙葉邊蟬翳此其地根底龍蟠合上天龍舟萬騎入川來天上鮫綃水府開便與真妃充土物凌波香襪不須裁羅江舊為萬安明皇惡賊姓改焉意其以羅真人之故如羅村羅山羅公亭皆縣志所載其曰以二水相蹙成紋鄙俗甚矣再以韵謝吳美仲和篇茶樽之貺東屯花惱只顛狂五栁門前翠著行更遣大瓢來斷送忍教醒醉問漁郎題草堂百花潭上轉踈松金碧雕殘古寺空只有草堂人不見淡烟暗日馬嘶風白鹿得萱花白鹿山頭一望平歸來衣袂作風馨庭萱巖桂方爭秀總入觀音净水瓶潄玉軒為邑之佳處頃春祝寺僧少葺之重來則眼界增眀矣因拉王和叟劉曼卿相與碎建茗瀹之泉上石作觀音像通悟禪師手琢亦甚靈異賦三絶毒露炎炎海瘴浮一軒誰與聒清秋雨花天上清凉手挽取銀河作玉流泉上觀音駕海潮白芙蕖裏碧雲飄便當踏月隨天步環珮無風自動搖知是禪師琢玉工玉聲猶作水玲瓏琢成大士笑無語只在聲聞一悟中堅老師相訪誦法華經如流八十童顛抹霜雪琉璃碧眼蓮華舌不將象步蹴驢騾坐與如來過小劫道衛甥送酒親旁未敢酌貪泉白髮風燈喜懼年渠輩相誇玉蘂珮我貧正缺杖頭錢謝浩然以夢告且賦詩見贈次韻復之二首步繞西湖九里松歸來詩句有新工舊游開眼誰同夢又欲携君過浙東縛草徒然未若賢絶韋老矣定誰傳舞雩著我三千子華表須居五百年謝浩然嘗為余作異夢余再被召浩然有詩次韻復之二首舟楫風濤檜與松一堂白髮幾篙工江湖萬里吳天迥正在巴陵日本東巖棲誰似昔人賢好夢通靈莫浪傳號召我今成再往飛鳴君已及三年石過青渠壁間有何人者詩欲梓潼神君戒殺以從佛神君初以孝亷舉豈自汚於一飲一食之間為哉后稷肇祀庶無罪悔以迄于今試以此語為解嘲并賦小詩呈時發縣大夫一笑香茗粗蔬肯破慳相公日食萬羊山夫君何厚神何薄自取懸鶉一水間武侯祠風弄波濤鼓角喧蜀江猶有陳圖存綸巾羽扇人何在眼看羣兒戲棘門示郡南二孫虞初祕府六百本老子柱下五千言吾家道學天生種端有斯文示子孫立春羣兒綵勝競芳菲我向新年補舊衣五十九年蘧伯玉不知誰是更誰非青菜青絲白玉盤西湖回首憶臨安竹籬茅舍逄春日樂得梅花帶雪看瞿唐峽我行江南上峽來繫舟夜泊雲雨臺行到西川一萬里杜鵑聲急桃花開試嚴志行筆龍跳虎卧王右軍蠶頭隼尾始逼真不恨臣無二人法但恨二人不似臣題升仙穚茂陵讀賦喜虗無不是題橋便丈夫漫說歸鄉誇駟馬也曽滌器對當壚題海棠二首百鳥啼春樹樹紅輕舟掠岸往來風江南江北花多少都在先生酒盞中林光皎皎弄青枝頗怪東風解凍遲一夜前溪流雪汁餘花别岸不須吹謝王公才惠資陽梨二首老火丹田熱欲吹不妨氷雪重提携金多不用千頭橘刀割無嫌三藏梨滿盤氷玉豈虗投落筆瓊琚未易酬欲寫霜柑三百顆更尋火棗八千秋公夀送蒲萄以酒答之二首老眼黃昏眩著花鼻頭白晝夢南華一杯世味蒲萄熟薄薄分明勝煮茶一宿逡巡為酒忙暗泉傾乳聽糟牀南鄰無物酬佳伴依舊巖花釀蜜香小孤廟喚作孤姑恐未訛寄名櫟社不爭多但云龍女來行水免使牛郎暗渡河楚地牽牛分野解彭郎之嘲云彭州上元二首蜀川東抱戰聲流元夕來監舍畔州莫把華燈照人淚只堪掩面替民愁河漢無塵碧玉傾萬枝燈裏仰天庭吾皇慈儉如堯舜應有天邊退舍星夜讀韓子蒼文二首四海文章六一仙江西名派蜀人傳從今元祐無多子虎豹狐狸各斐然二河忠義雪山重元祐何由見古風一月羣星雖晚出斯人尚可殿諸公聽水琴本自無絃奏凱風水流空洞作丁東虀鹽老向伊耆氏何必聞韶肉味中周公帽周公山山頂雲合則必雨土人云周公帽山頭戴帽周公雨巖下生衣傅說霖莫道蠻州無此樣可憐老我十分心次韻孫翊尉口頭截斷不須工誰信春秋是國風筆下均調成一氣東屯喚起杜陵翁芻狗分明迹已陳鑿開七竅是天真低枝斥鷃從渠笑深水蛟龍得自神子佩青青得玉工先生老矣舞雩風仙官便擬輕藜藿我欲求為田舍翁頌古塔祖勝二首蘆花岸下蓼灘頭上得鈎時便上鈎一曲漁歌川棹撥五湖烟水月輪秋天津橋上弄猢猻女子從來不出門却被罔明穿鼻孔鬢邊香撼玉梅魂楊尉三和篇補其二以為答不敢虛盛意前時赤旱要刑鵝今日平田漲緑波不特蛟龍偏得意可知蚯蚓亦能歌湖亭飲酒對新鵝金錯杯中卷白波村鼓鼕鼕更堪憶畫船照水採菱歌栽橘封君培壅百年心准擬霜秋色更深辦取數錢收一掬此奴隨處即成林香橘二首霜餘裊裊擷秋芳露洗娟娟百寶光齒冷欲餐瓊樹玉手溫誰握洞庭香千林獨覺一林芳穠碧攙先送曉光魯酒未妨杯雪冷麝蘭半雜袖風香扇子詩無適無莫羲皇人不憂不懼擊壤民只有太平容易事更於何處費精神鼻端栩栩師南華腳步落落邱東家一春多病守窗户仰看蛛網粘楊花吐火生熱風生凉自家富貴他人忙不為求蛇熏老鼠翻成打鴨驚鴛鴦楊栁飛時春睡濃老夫無力看春紅一杯徑盡卧禪榻髙下任意吹花風梅裏尋酸却得香舌根未舉鼻先嘗算來大似輸他眼老去猶堪玩雪霜春江拍拍浴鵝兒一夜潮生水漸肥畫舫正將桃葉渡彩橋隨處栁花飛栁間坐煆嵇叔夜過眼餘子何人哉卿亦安用識我輩所見所聞無去來也不悲噫也不歌只將恬淡養天和團蒲徙倚誰呼覺夢裏分眀被佛呵黃葉鳴林捲地風一天秋色鴈橫空風狂吹作欹斜字似我遙書咄咄中機鋒相拄不爭多父舞三臺子唱歌若問一時同啐啄菩提般若六波羅一卷赤松橋上老三杯玉案甕中仙騎驢出去知何日跨鶴歸來得幾年拈花示病元來怕遇酒逃禪却未真三古絶編徒自聖二王書法恐非臣世態一日添一病好書百過消百憂羲皇已上自可樂季孟之間何足求清凉谷裏苾芻僧猛火叢中續佛燈車馬鹿羊隨大小不知何處是三乘蝶兒也解宿香叢蜂子尤能醉蜜紅幻景掃除餘結習自携茗碗潄花風無心已作不鳴鴈恃氣多慚反走雞大道三杯仙落托隨齊一鉢佛菩提鼻中出入一毫端不論春溫與夏寒十二時間無别法只將心事轉天盤王刻漏扇香積盂中玉粒圓自然肥佛勝癯仙萬金有藥元非病一笑拈花却是禪桃花流水神仙地枯木寒巖自在春錯上磨成白玉質礦中仍現紫金身君子軍中萬户侯文章經史總兼收却將我輩毛錐子奪取將軍丈二矛春來誰不看花忙裓上仙風散佛香人面何如花面好贈君一㸃下禪床夜凉紅藕六銖衣露滴銀床樹影稀醉把玉簫風鬢亂乘鸞初自月歸來白團扇子合歡裁出水菱花鏡面開好是緱山明月夜大家騎鳯上天來神農醫王七十毒金粟如來四百病未如一卷混沌書淡飯粗羮學清净醫扇芒鞋踏破江頭路日渴檀心猶未吐渾教開盡不成梅定應化作相思樹小小愚民豈易欺士夫妄論似相知業書若上天盤稱當用崑崙作稱鎚衆妙香中出佛身小兒造化不能嗔要知白塔降魔手黑鬼元來怕黑神白塔老賣黑神丸扇戰葉初收雨㸃稀入簾花影碎晴暉莫留一物遮人眼展出青天放鶴飛山隂五月雪芬芳猛火叢中雪放光比似瑞花成六出夜深更與佛燒香薝蔔花扇子美來投蜀錦坊蜀人滿口說文章卿雲已後成機杼不是無才賦海棠八尺藤床六月天林間風露飽鳴蟬手揮如意葛巾墮誰誦黃庭驚晝眠海鳥已飛空自苦池魚雖美可長欺白君鬚髮知多少是我山齊睡熟時白團扇子白紗衣怕見螢光作火吹屈指西風明日是㑹將束緼乞憐時一葉梧桐一片雲秋風江上日紛紛鴉來鴉去吾何預不向聲塵著意聞峽圍碧玉裹青天棧道凌虗迸出泉只有好山須强勉為渠開眼冒風烟止息未論山水音有絃無絃只此琴一杯山芋午茶罷膝上南風慈母心琴蚤來晚去海波生蠻觸封疆不足爭䄂手更須饒一著也知豎子要橫行棋硬黃細字不足橅積習水墨閒工夫膝上無心學李衛腕頭有訣付善奴書十日五日愁良工白團扇子月面同一螺黛墨洞房手為君小筆開眉峯畫野色橋邊緑草新小園勝絶可尋春花間蠟屐蜂隨步竹外題詩月傍人露葉涓涓泣素秋旗亭樽酒解忘憂别來頻寄加餐字莫遣新詩學四愁畜樊利口鶯成母張艾虗心雉作媒耐冷强書秋後扇餘醒更罰醉中杯六月三伏猛火燃卧龍無雨口生烟蜩蟬何事得美䕃聒聒不上髙樹顛秋扇秋風不怕寒喜攀眀月傲霜圑自知奪糈無他過造命何如活命丹術者扇寒藤霜露又經秋夢入江湖戲白鷗二十年來行腳地耆婆天上看河流手栽楊栁喚春歸喚得黃鸝語碧枝驚起南窗一覺睡滿庭花影日髙時靈樞先生出三指看盡世間人作鬼我有一把黃昏根出君五臟為君洗醫人扇春事曽看滿眼花樓髙不見玉人家峽雲夢斷無消息想像紅裙踏鴈沙行腳歸來馬簸箕重龍山上有駒兒鍬鋤底下無人問要見江湖船子師僧扇薰絃早已迓秋鴻嵗事先生逆料中前密後疏隨處改枉教楊栁怨西風三丈為樹八尺行花艷桃李葉柘桑元龍自是湖海客師德去尋田舍郎一介吾儒孰重輕青天蜀道少人行芋魁豆飯吾儒事不若歸來谷口耕嶄然頭角翁家兒兒㑹讀書兒不癡桂樹圑欒五百丈月邊引手攀髙枝三秋桂子玉舒花天上樓臺出帝家只許阿㕙操杵臼不知更有玉蝦䗫范唐卿扇飣餖蛛絲織網羅坐看牛女夜斜河只今頗怪人間巧見說天孫巧更多一葉浮蓮不動塵湖風吹水碧生鱗舟中喚鶴歸來晚手展黃庭卧白蘋缺月穿雲弄晚晴讀書燈影度微明梧桐未肯收殘雨猶作忩間打葉聲對使破琴良未達解衣撾鼓亦非真從來我輩豈同俗更遣阿戎來問津數竿修竹䕃庭宇上有真禽百般語避人飛去却匆匆驚落枝頭夜來雨秋蘂深紅勝菊黃拒霜却是最宜霜仲謀有子來江表先與喬娘醉晚粧孫生芙蓉扇洞中龍老不知年榮隱先生穩著鞭大袖長歌出天漢信乎平地有神仙白白紅紅不直錢吹風吹雨逼殘年種桃自是非君子指李渠能著老仙拙眼捫星絶漢津只知仙跡混風塵天衣自是非針線此巧如何說向人烟雨青絲百尺樓江南樹樹拂人頭此間豈是藏樽處醉裏一聲黃鷅鶹危冠廣袖楚宫粧獨步閒庭伴夜郎自把玉簪敲砌竹清歌一曲月如霜彈指花前一念差東風未老鬢先華看花只得心隨眼心倦何由眼見花春去春來嵗嵗同花開花落任東風只堪美酒酬佳景莫把閒愁料化工亂紅亂紫滿林塘旋掃苔莓一徑香寒食年年新火令落花何必恨風狂四月四日夏令新餘花更饒三日春榴紅裙子凌波襪一曲南風花笑人親見廬山面目來翻經臺上月輪開山間長物渾無用多斫雲根入蜀栽素縑咫尺十分圓淡墨濃隂畫手傳惟恐動搖天地窄只應掌上握山川􅔓艚市中漁者漁茅屋岸上居人居陽坡細草馬隨鹿烟水靜花鷗趂魚嫋嫋腰肢翠拂眉河東栁家嬌女兒江南烟雨樓百尺樓上何人題好詩黃金坐擁佛衣紅風動荷花香動風鼻觀浮香誰領㑹嫦娥夜泊水晶宫芙蓉香泛白蘋州楊栁吹花玉雪浮且喜兩邊無一事五更鼓角月當樓花自為王橘自奴便應次苐問東湖芳菲未礙滄浪色照水吟詩鑷白鬚上頭圓蓋下方盤中夾癡憨白肉圓九竅八骸渾不識更來底處覔心安誰將弱水隔蓬萊對酒思君眼倦開醉夢只堪逢故舊五更酒醒却歸來愛他國色艷傾城老衲心城百萬兵便使有情何足動幻花况是本無情未容榖雨淚胭脂且趂晴風小小吹鏡裏日髙酣睡起也須瘦了一分肌先生種栁懶低頭骯髒門前也可羞莫向東風弄霜雪且隨風勢衮成毬本來騎鶴上揚州不學老君誇白頭丈夫要活三百嵗獨在中書二十秋只教人喜莫教嗔此是天公最至仁吹落吹開俱有意閒花野草漫爭春變將冬暖作春寒葉上霜痕苦未乾菜甲麥苖須少待扶輪何日上長安洞庭波浪五湖秋縹眇雲霄帝子樓樓上故人窮骨相簫韶聲裡認仙舟嶽陽樓扇碧海鯨魚掣釣綸後生立意要求新求新未必勝如舊蘇李元來是古人蠟面吹香細細斟青梅不厭緑杯深鶯兒燕子能饒舌要問先生學醉吟栩栩齁齁睡足仙華山濃睡一千年龜兒不食龍兒蟄睡裏人間變海田一飛居憂題扇贈之南山雪色老於菟鏡裏功名鑷鬢鬚袖裹白巾渠信否樽前一擲看呼盧王真畫桃花玉頰兒扇飛上桃花玉頰兒小紅輕踏碧萎蕤莫教啄破枝頭雨怕見胭脂淚㸃垂犒蠻給衣蠻官云久不來漢聞太博是箇大人故來氈裘重譯裹風腥改襲衣冠拜舞輕不是兩階䝉聖化應將五餌笑書生德輝郎君名嘉橘其小字也書來云修嘉辰故事並䝉惠二尊悵然有感二首風髙凖擬整烏巾簮菊難逢酒主人為語閉門投轄子一般麴糵萬家春逐客佳晨省醉眠出門未辦杖頭錢却因厨釀分雙榼添入詩圖作九仙次韻季真留别即物那知身是客黃花空自委籬東淚痕已逐西風盡只有悲秋寫未窮秋夜待月白毫光裏玉魂飛留看常娥醉魄迷一任簷牙沸蝙蝠忍將明鏡照狐狸九日四首從來醒醉不關渠肯為籬邉問所須冷笑淵明癡望眼只堪把菊佩茱萸癡兒索錢要沽酒吾豈紿兒囊已羞乃翁作詩須汝和覔句共登西北樓昔人卧聽門前雪我亦坐看籬下花不是雨多門自掩情知嵗惡酒難賖典裘貿布得杯觴俗認虗名作醉鄉溪雨山風妬酒色踈籬冷蘂逐人忙大渡河魚甚美皆巨口細鱗鱖也本草以鱖為石桂魚小躍氷泉玉不如細生仍得芼春蔬莫將北海金虀鱠輕比西江石桂魚喚魚亭湖水涵空雪浸崖老龍以下聽差排從今分鉢供魚餅日與隨鐘具一齊謝韞玉送炭佛頂分明火焰髙黑醫何事助焦熬只銷一酌梅花雪我已官曹似水曹黑醫黑玉也寄題用之太丞真意閣真醫曽活水中龍三卷竒書玉笈中酒熟定應登傑閣與龍對酌海螺紅用之居龍水故以孫真人活龍事實之紅螺觴名上所賜用之者今無恙否
