body:
  text: 方舟集卷十一宋李石撰記張氏雪巖記士君子所居卜築環堵之室凡以況其德之大小大德況大小德況小窮逹利害寵辱得喪何關於我初不以是自纍一惟其學之逹綽乎其有餘裕浩乎其沛然者可以充之天下不獨虛名之取也五畝土木四壁甲乙茅茨丹堊無異用藍縷金碧無異塗緑野之比中書堂輞川之擬丞相府一竿之漁足以自娛於盤谷一杯之酒足以自適於彭澤所況大小十手十目於以審知君子所養也可乎哉顔回原憲之學不謂其不堯舜也伯夷叔齊之學不謂其不文武也豈以是自纍乎嗚呼出處語默各學其學達其達人懸之以天下權衡之公可虛辱乎然則雪巖者吾友張氏子之德有聞於國中其為學足以稱其所居也張氏子之世忠信孝友父子今幾傳矣陽施隂報凡幾事矣夫人知之天亦知之其曰雪巖者何取名況德之亷也傳曰髙山仰止景行行止又曰虛室生白吉祥止止所謂止者其亦雪巖所止之居乎不華不陋不湫隘不壅塞吾儒素業足以淡祥風而瑩白日也名之所況不已多乎哉誠未多也昔齊宣王作雪宫孟子以賢者而後樂此為譏東坡子作雪堂執耒耜拾瓦礫與向者白玉堂中無異而忠義文章垂世永久其視雪宫更何如人也冬餘則為几席光明之用庭户則為漸積氷霜之戒憂民則為牟麥豐稔之祥宦業則為臨涖潔白之懿春秋盈尺雖以大書君子其亦凜凜於此者乎惟如此他日可以充之天下無疑張氏子名煥字堯文年與豫上下同壻何氏淳熙八年二月十五日方舟子李石記廣錫堂記化城尉李君宜夀父年九十遇紹興已卯郊天霈恩敘封右承務郎致仕因托訓詞以名所居之堂曰廣錫閣曰榮封菴曰介夀屬隴西李石為記石聞之恩義兩盡者君父之美忠孝兼得者臣子之事此出於自然之天全然有不能互舉並用者上有所偏得而下有所偏失也且自一命以上至宰相三公誰非人子不過推事親以及其君極其所以為孝者移而為忠性之自如而情之所必至無有二道此其所謂天全者也且上之人所以恩録天下人子而有及其親無間於一尉之卑則人臣思所以報其上者宜何如哉一身以及一家一家以及一國一國以及天下俾無偏得偏失之患足矣且李君世儒者讀書奮布衣豈但為富貴利祿計亦欲以其所以為子者為人臣今老矣一官自效於衆人後昔人蓋有奉檄致喜者況日月所燭者逺而雨露所澤者大敢以是土木丹碧侈其私哉將假寵吾君恩意以儀形於幽遐僻陋蓬蓽田畝之微細以明孝治之所丕冒者初不限隔也昔孟孫父子皆問孝於聖人聖人答之蓋不得不異懿子僭魯禮以侈其家庭武伯之父既老幾死於郎之戰至一怒以激成之有司成叛而武伯死以不忠為孝以不孝為忠孟氏父子於聖門則有愧矣雖然李君所居水竹之勝花木之珍山林園圃之幽趣雪月風雨之交會皆人子平日所以奉親杖屨容與委蛇之地芘其親則思所以芘其君芘其身則思所以芘其民芘其家則思所以芘天下忠孝大節所以仰答明時者尚當與李君勉之安樂院飛輪藏記西州佛事簡為盛簡之諸邑各以佛祠宇相夸甘泉為盛甘泉之人以篤信於佛者甚多而楊氏饒於財非若他人妄施以徼福者其言曰吾此身此生由父母得之與其致無益之思孰若作有利之事與其竭有限之力孰若為不盡之託此安樂院寶藏之建所以專為楊氏追薦佛事也楊氏有名詵者肇其志而有貽於前其子深又率其志而有續於後父子再世如出一心寒署四時風雨不變此佛事所以日進一日有成而無壞也寶藏既建則思所以倡其教永為一方香火人天歸依之師者則又請成都超悟院僧了因為院宰住持因又勸誘士之豪秀曰羅覺民曰吳世安叔姪相與斥已田以廣卜築揮槖金以增雅飾由小以至大自狹以至廣凡楊氏父子有作而未就者皆落成於因之手此寶藏大槩也竊謂吾儒百行以孝為本而二氏亦以孝為本中不得不異而本則同者何也吾儒一髮一膚明其所受以無毀其全此樂正子春不忍一足之傷而悒悒乎三月之久矣而老氏者亦以惜身愛生流為神仙不死之説獨佛氏者以割截為布施以毀棄為寂滅其説有飼飢虎委性命血肉而不悔者此其説之異也若夫吾儒以孝為德老氏以孝為功行佛氏以為補報推已以利人盡心以及物未嘗不同本而出也吾不知楊氏父子果自吾儒出者乎方其勇於佛也以頭目髓腦茍可以致九原之痛者尚所不惜況金玉寶貨過眼土梗不啻何足計哉此楊氏之心當與佛同體而於吾儒不為背本也孟子曰逃墨必歸於楊逃楊必歸於儒此吾所以合三説而一以望於楊子者其庶乎若夫楊氏所施緡錢之數經函之目常住田頃畝多少此了因住持事不足書年月日李石記梅塢記石拙於學其施於吏亦拙也方會府多事英俊爭竭其趨走之巧於大吏之前獨隱忍自守其前之拙不變大吏者亦察其一拙外無他能不怪也故於考核文簿瑣瑣中比他人幸有曉夕須臾之隙掾舍稍僻且陋邀求者所不至獨與學宫相比鄰學中士子日集説學問庭户隘甚恐不足以辱乃撤去昔之屏伏蔽藏以為今之疏明曠逹得數席地俾客至不以隘為嫌而主人亦得以陋自安也屋簷之南有老梅株如柱軸一根别為三四股可蔭十許步環以數小竹外悉芟去之仍闢屋一角作一窗以即其蔭每每風日開闔煜然之光䔩然之聲往來几硯書帙間與靜境相接如行村塢因以塢名之又植稚柏二百周墻之隂與梅為佳伴他日淩冬霜雪愛玩之樹是又其拙之拙者也後有我輩人或不免流落一試公退燕休於此為護此梅以待其柏之成仍勿笑其拙也叢桂堂記桂生於土而云植於月中人不於土生之貴而極力於月中之植以是為桂是其未必有亦未易得然父子兄弟相語以為是可貴可求而必得之者學之於仕未易得也侈於得之日猶捫月得之噫亦貴矣懷安張氏父子兄弟學而仕也其學也食息詩書而夢寐几硯如墾而種焉其仕也得意青紫而唾手軒冕如種而刈焉是學其所當得而仕其所必至無他道也人有侈其名而問其所從得曰吾得之月中人終不以其名為紿已爭欲得其所得曰是張氏一門之榮也有劉氏之父子而無異同有鄭人之兄弟而無儒墨是其封植之高扶立之茂鬱鬱乎家霄漢間也士夫過者式其居因以叢桂揭為其堂之名而俾記其事雖然張氏之先仕九卿也老先生字登孺者為詞場名人吾昔拜其人曰審曰寧曰在廷曰過廷與石同年皆前進士固存堂記丙寅嵗大水郡譙樓不沒者三板官寺大毀水落官無所視事各即故基作新屋而録事參軍署距郡署西三十步鄧君處道至未受署間訪故基於西偏才一老屋棟桷相撑拄以立餘皆僵仆沙泥或大波捲去矣因即老屋為主向皆創新之慮指計工幾月屋落成得若干楹處道則又與客視新屋若廳事若正寢若廊廡若庖廏吏僕居皆斫削磷磷斤斧匠石初去也而一小堂獨面西前有葦竹蕭然仰視其榱楹猶故面目黧黑袍褐灰土狀蓋新進中老人大父行也處道曰物固有是哉此嚮之河伯所留老屋也浪駭湍怒龍求石鬭洶湧激薄所當無不斃壓而此屋何恃而獨全處道欣然若有當其意因以書史列左右取古今石刻依其壁公退即居之因以固存題其顔石謂成毀形器常理也特有久近此屋何恃君子當有以自存否則屋鄙也易曰成性存存孟子曰其為人也寡欲雖有不存焉者寡矣老子曰綿綿若存後之居此堂者能合三説而一存之庶無負此屋名處道成都人故家子文獻多學善最樂齋記善最樂齋者吾友趙君書室也其自名者君之意而欲揭其所自名者於他人以為記則答曰昔兩漢淳厚之化忠質之教所以大庇其子孫而納之於無過之地可謂至矣間有所不免者皆自取於結客以固其垣墻下士以借其聲援所甚可賢者雖詩書義訓薰蒸於見聞服習與白屋士子無異然亦有所不能自別於膏梁富貴之族嗚呼至漢末而漢之公族羣公子由此岌岌矣此東平王蒼所以能以善自名者非以是茍邀聲譽蓋心有所懲而以善自全也今趙君父子以科第再世取富貴人不以為過而以為當然惴惴自封殖日畏日憂降心於漢東平若慕用追逐而不可企及者何也吾知之矣衣服飲食人所共口甘而身美之至窮其所自得於衣服飲食則罔然有不知者且夫善者對惡之别聖賢入道之候也今日我不為惡是亦足為善矣而樂之焉樂之而取其最焉吾乃今知東平之所以自取者已侈而於趙君之所自名一何亷也垤澤之呼宋魯之君不謀而同蓋其聲類感召有不得不爾君何不比於蒼而亷於善也哉吾將取孟子所論樂正子可欲之善以至於不可知之神期君以益其所學而大施於世次第由一善以行不驟以須其成不速以待其化如雞鳴之卒章者果欣然有得於樂乎哉務本堂記逢掖之衣不奪於衮繡之貴環堵之室不陋於甲乙之雄士之所守有大於此者本之所在也且得之心修之身有餘矣乃欲因家以及國因國以及天下酬酢變化隨取隨有此其人豈易以外物誘怵之上之人乃設為利祿富貴以權衡錙銖為重輕士爭以其所學騖蔭而集其下噫亦迫促矣有圖榮而得辱就利而反害踉然喪其故步以失其所守者士可不知所擇哉此一節之士寧堅其所守以終其身以永其世子孫窮達死生禍福休咎不肯以彼易此彼若有所憚而不肯屈其守者本之所在也雅安胥敷道儒者也薄城郭而弗居厭市井而不接漠然思悠然忘白素垂領紅丹在頰遁食以自肥蒙飲以自潔詩書几硯圖史幛幄花竹蔥蒨以為之映帶雲月晦明以為之焜耀確乎難哉計必有道而處素位而立者也有客過之指其所築堂以夸客曰此吾纍世之守也據坐呼之了然稚子拱手出對客誦論語有子務本之詞以問客客笑曰大哉主人所守在此乎有子之於師特第二義也夫子於諸弟子豈有隱其説以待趨隅三反者蓋自得之矣曽子有子皆聖門老生曾子專其授有子泛其傳而仁與道之説始汗漫於天下者無怪也習乎口注於耳土苴醇全雕琢渾沌所學既失何以為用所用既失何以為守此吾黨之懼而學者之責也且出孝入悌馴致其文足矣聖人豈有隱於仁與道哉曾子之避席不知而自託於一唯有子蓋不得已發聖人之隱曰仁與道言之者自其所本孝弟二言充之也孟子曰未有仁而遺其親未有義而後其君學者之求孝悌宜自孟子始主人曰諾請書客語為務本堂記隆州重修超覺禪寺記隆州者今隆興天子之賜名也仰惟龍飛御宇慈儉為寶而民自化不貪而國自富其易名井監以復隆郡之舊者豈惟默契鳯厯所紀亦以作新雅俗阜成綏逺之實也矧以大丞相虞公當國道結主知功課吏治故守令必得一代才敏強濟孝道愛民者蒞其任而遞守此邦各務思所以仰稱吾君吾相眷安重意茍可以恢拓郡體俾不至沿襲簡陋不獨藻飾吾土文物之盛其贊化佐治即如二氏者亦得夤緣受賜與吾士均先是州有超覺僧舍凡歷三太守而院事甫集始也樊侯汝霖建雲章閣以奉安光堯太上皇帝御書其中也何侯耆仲請改律為禪以稱宸奎所藏至是史侯松老又大治棟宇因舊增新於以全十方氣象曰佛事如是足以望此州矣且州以跨鼇名者三嵎山也自治寺與民居如出鼇背負而欲飛此實佛地所種宜有竒傑樓觀稱一境華封聖人之祝當無甚難者而士民乃相與倡言曰是有三難地以險自障而難於取平僧以私自營而難於聚食院以貧自畏而難於致象此沿革禪律之是非分矣侯曰是有甚易者地則髙下為基而平之僧則立規矩嚴師而振之食則括隱剩田以給之舊址僅長二十丈跨山迤邐而下為屋二百楹凡六重其直衍深七十丈其廣三之一為重屋出深廣之中而陡所謂雲章閣者巍然與日月昭回於上其他像繪雕鏤丹青金碧煥然次第一新其貽無窮之傳曷有涯涘哉嘗聞之或人曰天下名山大川率為二氏所攘以居耗地力而分民心無大此者是又不然生於天地之中者必有靈氣人先得之聖賢者先受之蓋天所賦也且有宇宙便有此山今之三嵎岌然與岷爭雄其靈氣融液尚可以通海脈而輸天府國寶所儲以擅富強於天下其賦於人又宜如何也且以忠誼之著勳業之美文章之懿與夫朴願純厚之俗不藴利以自富不貪名以自勝不健訟以為能吏易於治國易於資異時竹帛所書垂範千載豈特一州之地甲乙全蜀而已哉二氏者得以仰聖世包容之度以風雨而自芘於境內者皆靈氣之餘也而又何隘於數椽之屋而已耶且史侯之政異矣愷悌所格補葺蠧弊者非一其視一土一木心巧目營休休然如善射者雋中而附汰輈也追逋粟以為食搜羡卒以為力合樊何二守之政而收其成向之所謂三難唧唧口語者乃今相與贊嘆奔走香火以為寶坊成就如佛之説從地湧出也僝工於某年月凡用日若干以某日落成寺本唐神龍所創以飛泉名乾符以超覺名國朝因之李順之亂民畏其險為盜資乃火之崇寧初復之僧百輩不少散徙後先名僧相似不必更書史侯字喬年某州人年月日記潼川運使劉公生祠記有田則有征征之多寡視地美惡此制也使良有司世守雖禹貢九等今未改也自征地相戾而制始病國家征以兩稅皆視地市於民者曰和買民預取直時以責入猶征也亦視地大小美惡難悉則視地緡曰家業猶田也惟熙豐制以五等和買三等止其二等不與嵗久避征者竄名二等而民不均是征地相戾也今天子以經界律天下田竄名者始得稅且均矣和買猶故豪民以賕幸於二等吏私蔽之株蔓不可動且遂為府五縣小縣户萬七千有畸和買户才九百比他州縣弊特甚民有詞府縣府縣理於部使者劉公公以聞符下公如律即命府縣件具所欲行與民有詞者而沮成者多詭説以誤公公以五等舊制核其盈縮出入參用經界所得於竄名者户均之察之以明濟之以勇申之以信達之以嚴向之欲以説誤公者意塞而嵗久不均之病瘳矣昔五循吏無智名勇功可書而太史公書之公用心如元氣遊行神迹不露雖大被萬物猶不求德肯顧皎皎名於遂之人然他人憒於吏案不即為為之必不終公能終為之且府縣捷於奉承此遂人德公期不忘相與作生祠請識其事俾後議政者知所考云年月日李石記北巖記巖以石居如覆屋下棲十六士唐人所作石像也先是巖壁立百仭上垂瀑如縋下為方池以受水夏秋潦集池滙趨凹十六士汨於水無復金碧顔色好事者嘗徙像他處復棲於巖何也父老言巖本洞天所芘舊時松楠翳薈不容迹有怪物衛守故作像以鎮像徙則怪見像固安於栖不容徙今太守出一彈指作拯溺手疏渠泄池以逹濁潦於外重施金碧十六士者始一解顔而笑又砌像前數函丈甃盆以受君子泉以便漱酌既成適夏大水太守與客瀹茗納涼瀑注如甚雨如海風撼潮聲可喜可愕不知㕓市火聚中有暍死人也太守成都宇文紹奕客郡簽陳鼎新普守郭郊新合守李石太守之兄紹弼攝祭酒為主人年月日石記
