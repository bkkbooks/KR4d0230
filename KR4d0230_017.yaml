body:
  text: 方舟集卷十七宋李石撰墓誌銘雲巢子墓誌銘雲巢子者故左奉議郎郪縣府君之道號也雲巢子築室資之丹神山將隠焉不得已而仕仕不進行東南以辛卯九月己丑卒於湖州之舟中自繪像授學徒牟灼權後事以旅柩西泝適其子浩奏名東去與䘮值謹具卒日以訃至蜀卒之明年春也雲巢上有母兄柩未至以衣復屋上設位如平生妻子踐蓐袒括食粥如始死奉其像成服以訃告州太守宇文侯紹奕為同年率州縣官朋舊者㑹哭親戚黨友㑹哭學徒匍匐百十㑹哭哀動里巷以雲巢為君子故愛之深哭之哀而莫知止則其母兄妻子至愛至痛又不知其如何可忘也耶雲巢幼依其兄方舟子修古學學古文行古道學則曰孔習周顔孟習孔以習為學也文則典之嚴雅之正語如先秦不陋不華左氏戰國䇿以下不問也道則曰中庸心傳皇極大法帝王作者無過不及賢不肖所共由也二氏比吾道非不學特空耳喜談經性理淹貫視俗學浮剽曰此牧豎兒糞土語行丐可耳其用心與方舟子多同兄弟窘步進取然雲巢尤不屑故舍人趙公達謂曰吾薦方舟㑹當掖君俱升大監楊公樸上殿薦其學問被㫖記姓名嘗以説干時相曰吳困於淫侈淮困於盜賊蜀困於窮匱時相韙其説取其盜賊論増兵戍守皆其倡也史公浩招至第夜與隔壁呼曰棄淮所得地人謂斯何答曰江淮版圖力戰得之尋棄之尚何言以書干蔣丞相竒其人歎其議論可用丞相虞公允文殊有意曰以近制改秩當作邑姑還蜀超擢至矣登紹興二十七年進士第初筮左迪功郎廣都簿再任永川尉關升左從政郎成都府路提刑司幹辦攝渠州學官皆有能名府委治路胔㑹有以殺相誣者即縱去不問不肯以永川捕獲理賞曰寘人於死自利耶其為憲屬多平反以舉主制置王公剛中晁公武㕘政王公之望提刑晁公公遡張公行成改左宣教郎轉左奉議郎知郪縣服緋魚袋以疾卒年五十四娶何氏先卒再娶趙氏五子浩辛卯年正奏名圻鄉貢進士彛禀出繼弟唐後毅禀㽦禀皆篤學一女未笄孫男三人永孫提孫觀孫雲巢子姓李氏諱占字知來唐隠太子小字芝蘭之後大墓在簡平泉號軍井李家為望族曽祖仲舒祖祐父嗣宗贈右朝奉大夫先妣蹇贈安人蚤世今繼母太宜人杜在堂尤所鍾愛安人之死三子一女方舟子未娶仲弟十六嵗已娶雲巢九嵗勾龍妹甫十嵗病疳翳方舟子負妹挈弟以土瓦自炬火炊陳粟雜獖肝菊葉餉之獲愈毎晨夕臨手按弟首髦髧毿毿埀肩穿縗執桐瞪目視母像見者埀涕先大夫手抄論語孝經命其兄為師教之甫冠何先生三捷授徒鄉舍壻之徃依焉尋即返丹神山以一僕一狗自隨親荷鋤種蒔時寄僧舎夜誦寺僧至誤聲曉鐘警之乃睡或時綴思行田舍至墮坑墜岸不省不喜食肉曰此脂障也壊道氣益昏睡耳然極貧婚嫁孤寡子女存立門户典書質琴未嘗以貧為靳兄弟姊妹八人時節侍飲二老側義風煒然相後先今亡矣吾家豈復有此弟哉方舟子被丁丑召命雲巢落第西歸值於峽曰兄少貶詞色向俗即已再被己丑召命罪斥西歸雲巢方東下值於荆渚拜母兄外掩泣若欲訴輒止曰兄順受而已方舟子每念此哭慟欲絶臨死寄詩清婉以雲巢之桃李為祝訃至之一日而吾漢孫死又五日而雲巢觀孫死皆竒童葬以乾道九年十二月庚午墓在丹神之左一里文集五十卷藏於家方舟子即石也抆淚為銘銘曰著書滿車雲山以為家風杉雨花寛褐以為華嗚呼巢豈真亡爾耶挽玉斗凌紫霞侍吾先君子杖屨距丹神故棲不數步一丘之窆于于乎居居乎巢乎其樂無涯小舟墓誌銘小舟子名開字去非卒以淳熙三年三月十一日越除祥之一月乃克葬其子南幼貧力未任襄事父為子縗則葬之雖緩葬禮也其父為方舟子故開以小舟自號以明世學之傳初授以元祐諸公先天皇極以拒新説為專門其季父雲巢子教以先秦古書章句開因之擷菁華去秕稗一本聖人之正絢六經之詞以為之文尤深大易春秋能合傳注變化其文嚴而通深而明機杼宛然成一家法多不駮放不流如奔海之波如逸鞅之駟砥柱不能遏其勢掣電不能方其躅鋪張叙述皇王帝霸無一不具傲乎蔑然俗學間綽綽也俾得少施於用可涯哉幼習童子舉於書無不讀人有遺忘問之應口某書某卷行綴字次無一或差然亦苦怵心肺懆懆戚戚悱憤極矣天啓其悟而嗇其成亦極矣未冠應鄉舉輒居第一舉子多蹈襲其語攘臂場屋者徃徃怙黨中傷以幸其去引親避之又多惎之坐累四舉不利方舟子三召三逐小舟徃返江湖風波患難同之方舟子西漕罷歸小舟又首薦避親析入南宫試又避妻黨嫌入别頭考官竒其文至謄誦擬置巍級有觀望疵其卷者終作末卷黜知舉憐之謀申理留以賢良科官之㑹知舉者出不果轉客諸公間雅為蘇公嶠所知㑹蘇遷臺端蜀士目語睽睽小舟懼還蜀尋侍行漢中感目疾三日喪明類有蠱之者醫者投凉劑胃損氣浮又誤服附子流汗如注猝以卒年四十二貧無衣以斂方舟僅辦一縑束其幹哀哉天資孝友不習邊幅退然若不勝衣其臨事鯁亮雷厲山壓不能奪其氣其所自期止此耶小舟姓李出唐隠太子後諱文釋遷蜀簡池大墓在焉後官資之銀山為資人以父夢五色雲而生幼名麟兒小名正禀更名方或謂慕栁仲塗之文更名開非也曽祖祐祖嗣宗贈朝請大夫妣宜人蹇氏父朝請郎前尚書都官員外郎方舟也母何氏安人娶趙氏生三子山孫四嵗而殤南孫九嵗生臨安母蓐三日浴血擁以登舟乞艘婦乳飲歸蜀眉孫未晬不育四女長適彭州蘇謙次適從政郎王舟次許婚未行次幼未字竊聞之父昭子穆世適大小之别曰祖曰禰所由以分也石之祖為適長昭也先君朝請下逮不肖子石及孫開皆繼昭而立以别支庶開不幸死自今為五世遷適别無禰矣父母為元子報服執杖斬衰以明繼祖自出禮與法惟均惟石有繼母太宜人杜氏在堂年八十餘計年而除逼禫而葬禮與法之權也方舟子有不能盡文其痛者小舟所交所訓授俾其弟圓詳甲乙姓名可以傳小舟業不畔吾門者所著書若干卷籍之左方或訝其著書太蚤惟中書舎人趙達品其文曰千聖下風正字劉望之曰可以世居徳行堂矣李氏讀易堂望之為記銘曰曰朔曰洛曰蜀折衷堯舜六經誰師嗚呼小舟文在兹乎一慟永窆豈惟父子之私右宣教郎李公墓誌銘故承奉郎致仕皇贈右宣義郎李公卒以某年月日葬以某年月日其子如晦叙父行實謁銘曰不孝不令既事而銘惟其傳之逺愈於活也請追銘資人李石與公家同出唐譜於如晦為布衣場屋交四十年為無服族弟兄則按公諱某字某文正公五世孫惟文正公再相太宗皇帝因上元召入親酌御罇以賜謂曰李卿可謂善人君子再相朕十年未嘗有傷人害物之事嗚呼天之所與於善人君子世數所歴視先徳積累則李氏子孫所藉於其先不薄而宣義公距公世未幾所得止此耶或曰宣義一官﨑嶇不進所以昌其身而傳於後善人君子之報未艾在天之語如在耳也且學問自悟而以詩文陶冩為樂道妙禪趣以調適性理至於投之閒散而不悶嬰以亂離而不苟安然有作者避世之風子孫猶恪謹靜退以篤於詩書術業用持其世永久以此較彼重輕又何如也為三舎優等進士竟以宰相張文忠公商英外孫遺澤補將仕郎非其本志初筮右迪功郎陜州刑曹以親當守蜀之合不復顧望已而陜右陷没人服其先識丁父工部公憂服除歴任合州酒官長寧司理昌州司理廣安酒官潼川税官雖簿書筦庫所至稱能其為酒官不肯以増羡理賞轉官曰網利斗筲非吾人也其為獄也不肯撓法以徇長吏意如長寧夷宻庫穆以嵗饑擾境上長吏張皇以幸邊功曰夷亦吾民也竟以失出坐免官仁孝天性其侍工部公疾不解帶逮執喪至毁瘠丁母文昌張夫人憂感腹疾因請老加右承奉郎致仕竟以此疾不起年七十有四娶畢氏宰相士安之孫仲莊之女再娶孫氏一子如晦右承議郎資州僉書軍州事判官一女適進士栁庭芬孫男五人鼐謙各預薦書鼎震艮皆業儒孫女一人曽孫五人知佛書喜與其徒游自云所得於無盡公為入室號無還居士有文集十卷有日録自紀日用動作曰不可書之事誓不可為也成帙號毛頴日識曽祖某左中大夫贈左金紫光禄大夫祖某左朝議大夫贈金紫光禄大夫父某工部員外郎自文正公逮工部凡五世進士及第盛矣哉銘曰天之報人視其所施徐計其施待其自來惟文忠公昔施已大善人君子源源未艾惟宣義公既種而收是穮是蓘世克有秋隠乎仕乎濮巖小築銘韌其藏永綏後福龎氏母墓誌銘乾道四年四月二十一日雙流李府君之配龎氏母卒先日母無疾且浴振衣洒掃中外叱避童僕若將有祭祀賔客之事既入闔户頃之子孫省之已寂矣逺邇驚愴涕淚且歎曰異哉此母化佛也生平學佛之功夀不及佛者才四嵗至是效矣越五年其孫簡州推官嘉謀以文述事代父將仕君謁銘則答曰石亦聞之女子之性自然與佛心㑹者凡三恤物愛人顰頞嗟戚者佛之慈嗇用約出自居菲陋者佛之儉户庭幄帟出入不妄跬步者佛之靜視他女子不習佛説於三者尚可彷彿况所得漸次於其學以證性悟入如龎氏母乎始也夫為太學生悉力負荷家責能使之堅意進取不惰不復顧慮其私終也夫蚤世二十三年自以未亡人紃織補綴輯睦應對俾李門儒業有盛不衰兹亦三者自然之得至於慈而能決儉而能施靜而能應有達於佛氏之權者非已一毛不肯取予無辜蚍蜉性命不忍踐躒乃自謂頭目髓腦毅然可捨了了至死不亂雖烈丈夫不及也享年七十七一子將仕郎大年五女長適左通直郎致仕費振次適進士韓紳次適忠訓郎趙伯誠次適武翼郎夏永次適進士張振内外孫若干人乙酉進士榜内外孫四人奏名拜堂下母曉之曰先世之積無以一得自驕而中輟爾學以某年某月合祔李府君諱某之兆曽祖某祖某父某世儒嘉謀兄弟皆吾泮林舊徒銘曰我居士家龎佛之派來相李門詩書未艾視他母柔其毒如蠆銘窆諸幽鞶帨之戒田氏墓誌惟我李氏在蜀出唐隠太子之裔太子曰芝蘭者其小名譜之説云爾或曰五公子入蜀眉遂恭簡資其後也吾家譜在資為孤族由太子以來世數與簡譜多合其於他族未見有合者獨於恭僅有合焉恭之族文炳者嘗從故正字劉夷叔故中書舎人趙莊叔游因二友得交其人援譜叙世數於文炳為兄弟行後過恭以子姪禮拜其親於堂如無服叔父母恭距資千里兩家老穉安否之問無歲不通以文炳故驩然也丁丑石東下至恭炳父死母病文炳遂出不及面唁之己卯冬被罪泝流過恭問訊欲致敬如前日文炳辭以母病増劇足不能良行須扶掖乃出且竊竊憂之又一年則以訃至蓋隆興改元之七月某日也文炳母姓田氏諱某字某為故李府君某之妻為第三娶祖氏先嘗為本州教授某之子名勸者以學行為丞相無盡居士深知以文字獲交於山谷老人嗚呼所鍾於田氏詩書義訓甚厚其所施惠於李氏之門相其良人而教其子再世父子為名進士藹然可知也年七十九卒通六經子史諸書晚讀佛書於性理自能悟入預告其子以死日至日危坐不亂如浮屠之教二子長曰文蔚次曰文炳其出也二女皆嫁士人葬以二年某月日於州之某山祔李府君墓嗚呼文炳足以自吐其危苦痛切以文其母之葬遽詞而請焉姑為叙其大概而納諸壙為志蘇茂母穆氏墓誌銘某者鄉貢進士蘇某之妻府學生蘇茂蘇葵之母也始茂葵來成都學宫欲從隴西李石為學且言父與其母穆遣之之意答以西蜀學之盛西蜀之士食於學宫歲無慮千輩彭之為州距成都不能兩舎止有四人入學彭豈無士可來乎或曰彭士温飽易足苟可以自用不急於師友者皆閉門坐守以須其成今二蘇子獨翩然以來亦可以卜其父兄矣未幾日不告而去繼以其母訃音且告葬期謁銘始以其人徃來之遽靳之不即答二蘇子復及門拜跽以請益勤不懈且曰無以自贖其不孝不學之罪至三請如禮按穆氏世為彭望族來嬪詩書之家相其夫為士不卒成又教其二子求師游學未效而卒是可書也婦性吝嗇算數及鄰里之雞犬而裒取至農佃之耡犂獨能推財於蘇氏父子為義舉逮於四方賔客至其門者具腆而不薄意誠而不吝又以其餘及釋老二教穀米金帛丹碧土木如布施法無算是又可書也年若干卒以隆興元年某月越明年冬十月葬子男二人即茂葵也茂官承信郎兄弟業進士益力銘曰夫射不雋婦愠見眉折箠向子笑而含飴反是二者鞶帨書詩甚樂而毅有嚴以慈再世之種爾穫不遲銘以俟之信其窆期曹氏令人墓誌銘吾友薛仲邕以書抵隴西李石曰母死請銘其葬且仲邕不孝有大恨三向奉母出蜀官都下未幾以論事忤執政意坐斥海嶠相抱持泣國門謂母子死生永訣凡八年隔晨昏省侍於蜀此其一恨今天子作新洗濯例䝉恩霈放還俾丞郡廣漢便親以養泝峽數日見母面且喜且愕如夢寐中不旬日母死不得板輿一日之養此其二恨謬以朝籍該封母為太令人告下距母死才數日跪奠捧哭欲絶無以自達於深泉此其三恨且筮日既迫守草土至以書徃一不得請再再不得請三餘生支持誓死不以勢改圖他門必得銘則按所編次太令人姓曹氏諱某字某武惠王彬之四世孫譜系先芬皆載國史曽祖某榮州刺史贈儀同三司吳王祖某任左藏庫使贈左衛大將軍考任節度使侍衛馬軍贈開府儀同三司太令人年十九歸為工部郎中薛雅州之配工部喜功名練邊務其知邠陽以一邑抗賊鋒入蜀從軍為重客以智術韜畧自任而令人贊其決其居官臨民御下持法遇事明敏以嚴而令人佐其恕工部喜客其游多四方名士潔籩豆豐肴核以具須其徃來至於投閒居官蓋如一日未嘗以闕急為解而應其倉卒之用令人蓋以儉贊其亷而以儲蓄副其求也子男二人仲邕仲侃女三人年六十八以卒乾道二年四月日殯於簡州陽安寓居之子舎越九月日葬於州之某鄉祔工部公之墓方工部公閒居資州七年築堂名餘閒資州守程揆為之記某以文字友徃來者亦堂中舊客與仲邕相處二十年於令人有升堂一拜之敬銘曰易以易簡配於至徳惟薛惟曹相匹以國有歸其宜其徳之克柔閑淑順服是壼則凡百儉易一惟厥心自梁而蜀由蜀以南萬里中外安於織絍中道孤嫠摧痛日深來歸板輿色養且㫖此意自天一見以喜如夢而覺秩命委已我銘其幽凡百有子范孺人墓誌銘孺人范氏諱某字某吾友范廷傑之妻鄉貢進士子有之母也卒以某年月日葬以某年月日隴西李石久游范氏門逮三任官成都與廷傑父子道誼相處徃來如骨肉不翅休日之范氏廷傑伯仲同居異爨環堵尋丈地户牖几案書籍圖史盡在其屏障閫奥肅然嚴君所治盥帨掃灑炷香一室茗果酒肴為客歡子弟問難學問文章侍立無敢譁雖廷傑亦若懔懔縮頸畏忌無敢忽問之廷傑則曰吾内子某君竊聽賔主語久之以某條為是某條為非且俾子有輩識之其賢如此卒年若干葬成都某縣曽祖某祖某父某廷傑名仲寶子二人子有子奭皆佳士范為蜀名門衣冠禮法人所屬目家無貧富守以詩書仕無窮達持以禮法故其羣從男女相與處睦如也僕𨽻臧獲相與言欣如也一有為非則競攻之必悛悔乃已嗚呼為婦為母如孺人者可無愧矣惜乎廷傑父子累薦送未得官孺人不得食夫子之禄而隘其所施今未艾也宜為銘銘曰石頃再過成都見范老子者白鬚學道安坐如禪人兩郎子者文益工行日進身日貧悵念徃昔則孺人所以相其夫子者無愧名門後將大之銘其存之杜氏太孺人墓誌銘許下劉望之夷叔與石善夷叔曰鄉兄陳堯文才而文今且官西鄉信夷叔久則有意交陳亦久既謁入相與刺刺説汝潁間元祐諸公之美頗怪今之士不盡如律其人亷静而學聞見有自矣一日以狀辱焉曰吾母將窆事次誰宜銘答以交友則夷叔可諉㑹夷叔有官事石敢自外狀書杜氏太孺人諱某字某世為鄢陵大姓昭憲皇太后族子也曽大父大父之諱闕書父某朝散郎河北東路提㸃刑獄公事與丞相張商英為文字友以丞相吕大防薦累持節為時名宿孺人幼嫻義訓落落有林下簡静風氣幼不茹葷妙涉理悟讀佛書笄年歸宣教公蚤卒誓志自撫二子為師慈而以儉儀其家其子克立年六十六卒以紹興十三年五月六日子男二人炳右修職郎煥右通直郎簽書資州軍州事判官㕔公事以煥陞朝封太孺人孫男若干人越十七年三月二十一日葬昌州大足縣陔山鄉華刃山下銘曰惟鄢陵杜去天尺五閨中詩書幼聽其父來歸兩髦矢志忘苦手撫二鶵一天其母人子之親誰其不慈儀儀母尊以慈為師其慈如春不病以滋視而子才可知壼彛佛書齋心妙悟此理大化大千何者生死其引虞殯此鄉故里鐫詩幽宫以風女美故宜人薛氏墓誌銘宜人薛氏者故贈右朝散大夫楊公之配今榮州使君之母也年六十一卒以紹興元年二月二十三日葬以是年九月庚申既葬使君以書告曰母氏窀穸事向者貧取具卒哭不忍廢禮越日月以何暹狀刻諸壙以葬未銘請待至今不輕屬他庶幾母子存亡心吾子盍為銘石於使君有門人之敬且春秋於法追書無嫌則按狀云宜人諱某字某甫笄歸大夫公事曽王母以及舅姑以孝於叔仲妯娌敬愛以睦相其夫以靖順潔巾帨以奉兩堂之饋祀空奩資以公一門之婚嫁至賔俎僕飯皆身親之至以母道臨其子左右大夫公之意雖不出閨壼儀然母師之道矣以子通籍贈孺人再贈安人又贈宜人皆以子及其父而以夫及其婦恩秩之序禮也曽祖某祖某父某皆不仕世嘉州人生三子曰某具官曰某曰某二女長適勾龍廷俊次適魏萬四孫某等墓在龍游縣之漢川鄉祔祖域也竊謂一婦澤被三世否則反是且男子行四方更得察父哲兄法家拂士以成其患難悱憤至呐呐婦人間宜得一恭儉禮法者為之對否則妬險賊悍以禍其良以敗其子者豈惟三世蓋足踐竈突而不知義訓者何翅比比然也且薛楊兩族為世儒者宜人生長儒門不獨女訓扵經傳子史以及子美樂天東坡語皆成誦婉約之資而以禮法為之文悟入之性而以釋老為之輔其所習逺矣哉其言曰家人利女貞而繼之以睽者以二女同居不相得嚴君御家而先以女貞一有不貞則二女之同居者為之間雖嚴君亦睽且敗矣吾特表其言為世婦訓銘曰蔓附修幹頎然質其長也莠雜嘉穀叢然傾其良也二者之澤成敗存亡也蜀固有薛而亦無他楊也秩命之渥追而碣之永永以䕶其藏也錢氏太孺人墓誌銘牛鞞漢邑治在今東津其對瀕江為佛頭山重崖複谷林樹茂密相接聨舟行江心望之鬱然一螺與煙雲俱青者佛頭也佛頭近有燕王墓僧寺與埧皆以燕王名不知自何代徃徃於其地得漢瘞錢與漢銅器意其跨深負險耕鑿漁樵殆附邑曠古一聚落如髙人幽子隠遁之居其居僅數十家半勾龍氏錢氏二族世世相婚嫁不絶皆資族之望者二家之老坐治生事了賦輸少壯者出從師游學未嘗謁公府履城市其閨門禮法族黨風義敦文以蓄用尚徳而寡怨申申然儒素樸厚登薦書齒仕版相望蓋其闢館致餼於徃來賔客自廣於聞見濡染厥有自也二族子弟從隴西李石為學問文章不少勾龍氏子惠夫者以狀告其母葬日且謁銘按狀云母姓錢氏諱某即三舎進士樑之妻而惠夫母也樑以舎法恩當補官不就惠夫舉進士甚力父子以儒相繼為善士則其婦順母慈道可知矣石以惠夫故且吾祖錢甥也自庚午迄丁丑艤舟一再訪其居因升堂致先世之敬對客諄諄一語不及他惟説教子圖功名進取凛如嚴父師燈火下諸子諸婦環侍煜然珠翠繢繡中鶴髪柴立者時呻吟以病辭於酒食杯盤間未幾果卒享年六十七二子長立夫惠夫次也孫五人淵浚溥浩渾皆業儒卒以紹興三十年三月一日葬以隆興元年十二月九日以立夫婦錢祔葬歸化鄉山原銘曰余訪勾龍氏翁媪對客舉酒諸郎爭推挽出幄帟立侍誦詩賦數僮者間吹笛擊鼓堂下以為客懽别今幾年老勾龍君白首悼亡其子亦嗚嗚哭母欣慨死生有異於前嗟夫人子所以塞責於九原者良難曷亦念母在日之言請銘諸幽有韌其鐫清僧母葬誌佛者清葬其親或謂不髪何以括不拜何以踊割愛於親何以子不子何以葬不成喪是清以所賤葬其親而吾儒諱言之李石曰是無嫌於葬也清母死昆弟亦死諸孫承重有不任喪責於親非路人泚然汗面則請以佛徒事以儒其親之喪且清辭生母走東南學佛至多與吾儒游今秘監劉子自㑹稽遣來都下問道於李子李子以博士報罷與俱西還清曰心動矣母其憂乎至則母卒俾吾書其壙李子姑以所宜葬者慰清意而書其碑之隂皇甫孺人墓誌黄瓌母死行九折坂以來泣告葬日於黎太守李石曰忍忘諸石向掌蜀學瓌與兄琮琮二子壬仲壬叔皆𨽻學弟子員至千餘春煽疫同舎畏厲鬼不肯視病石日視病琮以儒補學醫生早暮調藥不廢手而瓌為學究兄弟日左右學宫謹出入不捨士子怙衆競黨瓌挺身指遏遭詆毁擊觸則泣曰忍以此身犯羣囂貽八十母憂瓌與壬仲壬叔同壬午薦書人謂一門三秀所施力於學校之報琮病瀕死石嘗親至其牀視藥飲死則哭之葬則許銘之以示於其父子兄弟不忘其忍忘瓌母姓皇甫氏雙流人諱某字某歸黄君諱某為繼室先娶程生琮甫幼程卒母撫愛琮多於瓌門户賔客以饋以祀至屈力以佐其良雖簪珥不靳瓌家素貧課生徒朱墨以養每每與學官㑹食輟甘惜珍包去遺母瓌食頃尚念此苦痛凡兩被薦一第遲入手以孤其滫瀡所急石亦人子也忍更孤瓌念母之勤卒以年月日葬以年月日享年八十一瓌有子仲卿亦泮林髙弟未娶先卒今生子未名瓌年五十以知命名是為皇甫母適孫知榮徳吕紹謩狀其事為詳石姑書納壙中為誌袁氏墓誌銘袁氏者故王夷仲之妻也夷仲卒不數月妻竟以毁卒惟一子知方負父母大戚一身恐不任日夕雪涕視喪事卜兆域日月皆吉登門再拜起跪執書泣告隴西李石曰將合葬矣請銘若父若母難於二銘則為一銘石曰合葬非古其如一銘春秋書公及夫人與雙雙而俱來惡其詞之瀆也敢以不敏於二銘而厚人子責知方泣曰謁銘得禮雖然受賜豈惟知方銘曰袁為舜裔系出於濮温江幾傳氏望西蜀黄裳暨洙曽昭祖穆玠則其父三世幽躅二十以歸配厥詩書惟孝惟謹有嚴舅姑饋祀賔客時節物須由闑以内有閑不踰曰彼有求人所緩急雖家所無猶當悉力尚且贏餘而色於徳贊夫之良實婦之職告我妯娌人有弟兄如手如足同財共生豈無他人柔言易傾斥其私襦以燔以烹婦事有初雞鳴而盥薰香佛書梵唄齋旦先其藥醫計及薪爨僕媵走趨叙無敢亂一子女三子惟知方婚嫁云畢五孫成行五十有六齡曷不長淑靜柔睦夫死繼亡辛巳二月丁未金母是其卒日葬以壬午蜡臘將除甲子乃舉有銘其鄉沉犀在浦蔡氏母墓誌蔡氏母者彭士童君貺母也君貺自彭走資五百里告隴西李石曰母死竁穴筮日得吉將有事於窀穸不孝子庶幾焉乃拜跪飲淚呐呐若含哽徐申言之曰必得文且吾父託讀書閣記以傳今閣有遺事請併書之吾父向作閣母有疾病異人過之曰可就某地吉婦當愈且饗其世母贊之屋於練江雪峯多收書以牣其閣而寄其神明於粹美空闊以怡怡於家人母臨死執君貺手曰吾子勉卒汝父志此閣此書足饗汝子孫為宦學功名閣中當有劒氣出斗牛間可驗君貺感念吾母平生言不學不文死且有罪不自贖出所自編次曰母姓蔡氏世彭望族為童隠君之配齋於其室蘋藻修潔嬪於其家盡姑舅之孝睦於其良為詩書之助静順淑柔惟慈惟敬不媢忌於媵僕諸御而惠施於里鄰族黨無他苦惱一日呼子婦膝下謂猶子雍允婦曰而善歌歌以送我以卒以某年月葬於隠君墓南五步年七十九一子君貺孫三人敬為特書塞君貺千百哀祈俾歸刻壙中為誌仍列其事於閣記之隂祭文祭凌竹溪文維連司馬之淑𦙍兮挺竹溪而炳靈亶靈襟之春融兮系詩禮於延平克勤儉以自裕兮衍雲仍之相馨羌造端於閨房兮藹賔敬之典刑伊唱予其和汝兮爰相尊而家成嗚呼大化之迴斡兮每屈伸之相乗慨任運而履常兮見天地之常經駕靈輀於霜風兮翩雙旐之盈盈閟雙璧於真宅兮愴大夜之不晨蹇姻連於肺腑兮余何以為情陳祖奠於道周兮有淚如傾庶精爽之皎然兮尚其來歆祭趙莊叔舎人文與尊府公同壻何氏我則于公輩行道義五年之長情好兄弟唱名楓宸誰後誰先彼此歲寒豈惟官聨公則鼎貴昇于詞垣嗟我而收曰此公舉三人偕升獨我誰主中道聞訃不及一語我留上庠送公柩歸孑立無素顧念以悲我則不才有負所期罪斥西還視公在殯母老婦嫠稚子前引入門非昔哭則不忍嗚呼哀哉元祐絶派炳然蜀文誰其嗣之用以得君所施幾何負志莫伸人知貴公生死今昔我則不然感念如一豈惟其私為天下惜祭王錫祉制幹文錫祉之禍天假手河伯以逞此毒耶何至上累厥親下不遺育也一母三子併徃獨内子幸脱天欲俾之尚有覬於世絶而復續耶不然傳家著書有文幾束祭誰主而葬誰卜也嗚呼哀哉耿耿負義謂可蹈海至所狎玩於三十仞者獨不能以一葦託宿乎舉頭夾山有異楚蜀交游永已錯愕痛恨寓奠以去有未可盡其哭者嗚呼哀哉祭范和仲運使文蘇范世好兄弟雍睦靖康禍變自許歸蜀存者㡬人晨星孤鶩惟我女弟嬪公則歸十餘年間謂才是依公止此耶子孤婦嫠嗚呼哀哉石禄春官公亦抗節去國忝郡引矚鄉樾公來涪上申叙何闊既嗟以喜謂我有得我亦期公相視華髪一辭坐阻竟此永訣嗚呼哀哉器業自期逸軌屢柅泛舟之役渠寧得已江州乍濟訃音駭耳寓奠以哭老淚如洗祭舅氏文石官上庠距蜀萬里念我外氏舅存今幾時因家書訊及以喜庶幾再見别語在耳三年來歸鄰牆易徙誰衾誰棺貧甚衆子嗚呼哀哉幽幽深泉痛溢心髓我禄可將此味誰㫖嗟我舅氏不待永已迎我笑言訪我步履怒髯目張醉語中理今失舅師來拊筵几尚飲此巵血淚如洗祭雲巢子文吾與君生艱於至親一痛且忍驀如路塵隨風江湖嗟嘆甚貧敢輕其生以殞厥身嗚呼哀哉家則我躬食則我力念親所自肯任憂責百死不計既竭爾力簞瓢可營一笑親色世之他人誰不弟兄我曰朋友爾曰師生陋哉俗學蟫蠧聖經曽不遺力一門長城嗚呼哀哉萬里東南徃來㕘差再召再逐中途喜悲荆渚執手才得一詞念爾逺客誰藥誰醫嗚呼哀哉四人鴈行我獨將母斷不可續手足斤斧隻影自憐弔此遲暮痛欲叫天茹不復吐嗚呼哀哉念爾定期我適官居孀妻拊棺羣兒泣呱雲巢之山桃李成株一奠遥訣宿草莫耡嗚呼哀哉祭程端卿使君文念昔識君斯文云初自二蘇子曰交不䟱捧腹笑談岸然魁梧青雲倚竢九軌之衢飛黄驊騮不縶而趨三十年間嵗月寥闊君先我鳴一前一却我何敢望忍死溝壑晚得一官排擯留落去來萬里繋船送迎一夕之語今隔平生嗚呼哀哉我丞彭門若守我鄉夢寐見君數山相望憂時之論憤物之章如玉如金盈溢縑緗俄聞訃音舉家倉皇嗚呼哀哉情相後先義均彼此文字之樂兩家父子恩意骨肉不替終始善類吾徒零落無幾嗚呼哀哉健於詞筆書成幾車幸哉有子亦可傳家翠巖深栖吐吞雲霞死生不隔月印泥沙哭淚欲枯老眼三巴祭張子覺文先生之喪兩紀於兹後豈無人顧憐以悲行路欲掩義則我師我則老矣不忘角羈奮然其家告我窆期禮既不廢緩則可追後猶義之天或未衰嗚呼哀哉我欲臨穴吏書繋縻夢想如昨奠以寓詞嗚呼哀哉祭張氏姑文先君弟兄同氣二人兩家往來分災恤貧式好無尤有嚴而親念昔襁褓惟姑之仁先考及妣相望去世所幸有姑恩愛未替姑老多病甘㫖誰計我有㣲禄念念曷濟江湖西歸姑疾在牀省問及門拜姑於堂自云見汝不樂而良來官成都臨别淚浪到官一年俄以訃至心喪自我制以恩意豈惟吾姑鉅痛所寄一奠遥訣重泉永閟嗚呼哀哉祭陳氏婦文三江陳氏以孝名門兒婦惟陳歸吾兒圓琅玕瑩秀擢自其根中外惟孝一無間言夙夜望汝亢吾後昆嗚呼哀哉三任隨侍貧窮百艱饋祀隨宜俎實盤餐未嘗告匱諾曰有原櫛沐未明管鑰倡先童奴畏愛睦睦以歡嗚呼哀哉吾典沉黎千里瘴烟委汝吾母喜懼親年家未可將數日而遷臨别告病老稚潜然到黎聞汝寧親而奔自夏達秋訃來蠻村嗚呼哀哉四子一女羽翼飛翩汝實親哭女成男田舟死秀州歸泝蜀船漢立聰慧汝所甚憐憶母至死母柩云遄惟羣泣呱血如迸泉自云衆子今唯一存老懐甚惡摧裂膺肝嗚呼哀哉汝死郎伯圓身恫瘝以姜繼汝汝後其蕃吉竁惟卜昭穆新阡生死幻境祔以漢孫惟汝子母同歆一樽嗚呼哀哉又翁翁婆婆以庻羞之奠告於近故陳氏婦八十四孺人吾四月初别汝來守沉黎以汝之夫與汝二子行汝之病寒熱增减醫藥緩急不唯舅姑不及視而汝之夫與二子者亦復省問曠廢俾汝以死吾心痛恨有所不足嗚呼哀哉汝之死未知日辰而以嘉陽十叔書為信為汝携二子并嬭輩發哀如禮汝之夫與汝母汝弟以吾親老在堂若有所憚不敢以訃不知衣衾之陳柩殯之所齋祭之用得如禮否嗚呼哀哉汝今年生一子復喪一子於生者未必喜而於死者甚悲臨别見汝涕淚出拜吾心怪之且囑汝秋冬來官上日望汝佳不謂永已嗚呼哀哉吾二子二婦舅姑所恃以永此世汝又婉順孝敬吾許汝以終昌艾而止此夫遣人告汝殯致一齋以見舅姑哭汝痛汝之心汝二子川孫漢孫與乳母在此甚安當歸卜葬於李氏尚歆此巵無怖無忽祭簡姐文知郡李博士宜人何氏抗孫娘等以清酌素羞告於趙氏簡姐之靈汝妾於李氏嵗逾二紀勞力巨細辛苦終始自吾以布衣立門户汝則同其戚喜賔客慶弔出入綱紀有察有臨豈惟佐其饋祀乆稽汝留為汝擇配間欲去而輒止付汝以後亦云有子自黎歸資跨數百里他日葬汝法雲山下汝之幽潔長齋其終為佛法之依示不㤀平生之義嗚呼哀哉
