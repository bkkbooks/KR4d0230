body:
  text: 方舟集卷八宋李石撰論刑獄論生者易之德也易以是生天地生聖人聖人又以其德之生保天地之生又以復於易之生生生不窮易之所以不息者生德也且聖人權生物之柄以立於天地兩間烏能保其生而不殺也哉其所以殺者乃其所以生雖天地亦用此以為生之消息以時之代謝為物之榮枯也孔子曰古之聰明睿智神武而不殺者韓康伯釋之曰服萬物不以威刑其所謂神武者無刑之刑不殺之殺也大刑無刀鋸而化小刑無鞭朴而教肅然者得於不怒凛然者得於不誅凡吾之甚武者皆聰明睿知之運易道鼓舞不測之神此需訟師所由以次序相受為卦也飲食者人之所須以生民勤於求生不計所當得以至於兩競為訟其啓端甚微其取用甚細天地不禁聖人不呵凡以遂其欲生之意使不至於夭閼疵癘乃已故於訟之大象不過曰作事謀始以塞有事之爭心用獄敕法則寓之噬嗑噬嗑者猶自口吻餘食除去其間未果於殺此無刑之意非特無訟也然人之爭心寧復有既一訟不已衆訟之興衆訟則鬬矣此師之所以次於訟小刑不已必至大刑自然之理一殺不忍況衆殺乎鞭朴不忍況刀鋸乎故於師之大象不過曰容民蓄衆以見其所受之衆所生之繁爾至於萃然後除戎器於謙然後利侵伐於豫然後利行師亦未果於黷武也大抵易六十四卦而言刑獄者凡六卦皆易之生德所寓天地資其生聖人權其生其為刑獄之詞槩之曰不殺之殺生中之殺也繫詞曰生生之謂易曰生生者生天地之生生聖人之生其生之大矣乎中孚則議而致信旅則審而不留豐則折之欲其不用解則宥之欲其無過賁則明其政而已於獄有所不敢者不以刑飾政故曰六卦者易之生德也唯噬嗑一卦著之繇詞何也以明飲食所自除去口吻之間爭不至訟衆不至師則周仁之始基也文王生紂之世身被羑里之拘見炮烙之威肆虐吾民心有所弗忍著之繇詞異於他卦如是而已春秋之世失周家忠厚措刑惻怛之仁三千之刑日益煩而吕侯之刑日益甚以需致訟以訟致師何其紛如也然則孔子大象釋詞非特著文王之仁而聖人無刑不殺之仁備於此矣抑嘗論之易治天道春秋治人事以易之天治春秋之人天人之統相為用久矣而易為潔淨精微之教者孔子推易之無殺以止春秋之殺也而記禮者以其流失之於賊司馬遷至以申韓配之曰原道德之意者以道德之刻其潔淨精微流為申韓刑名之深嗚呼孔子象詞微矣抑亦史遷之誤歟鬼神論無者有之極而易為之端也君子能探其端而致其知以知無之所自所謂極者天地萬物亦各有極會其極以歸於無則鬼神之道可自無而有也且易之肇端於無者氣也太始者氣之始太素者氣之質太極者氣之無而天地萬物因其氣而有始因其始而有質因其質而有極極之於無則漠然曠然卒歸於無形而有氣者鬼神無遁形矣能於鬼神致其知則可以知人人者天地萬物之一因氣而有形有形而極於無形是氣也繫詞精氣為物遊魂為變知鬼神之情狀索之於冥漠無眹不可測識之中則遊魂之形猶人之形也由是知人之生死司命於天而統氣於易自伏羲畫卦八而索之而有三墳先儒謂人之始生騰光於天者為連山之艮艮為小石隕石則為星氣此則精氣為物也文王因八索而重之為六爻上下卦虧盈猶月之有魄魂即魄之化化分上下弦此則遊魂為變也是二聖人者皆知易變化託鬼神以妙其道以詔天下後世不曰鬼神而曰卜筮者寓其妙於蓍龜也故孔子首於乾大人之釋曰與天地合其德鬼神合其吉凶是以易之蓍龜知人之為鬼神也請以卦爻象考之曰上帝曰神道設教則神之槩也曰鬼方曰載鬼曰伐鬼則鬼之槩也曰先王曰祖考曰廟曰社稷此天人之鬼神也曰牛曰牲曰禴祭曰薦曰享曰祀此鬼神之食也曰史巫曰祭主曰二簋曰匕鬯曰用茅曰用圭此鬼神之器也凡人之有求於卜筮者則蓍龜告之以其祥使民心惕惕知所敬畏因蓍龜以信卜筮因卜筮以信鬼神因鬼神以信易而易道無餘藴矣且易之肇端於鬼神生則人之形死則鬼之氣廓廓然卦象所寓皆聖人之教易之探端也若乃子路問事鬼神而夫子答以未能事人安能事鬼諸子未能深窺聖意乃曰不語怪力亂神者不知夫子為春秋諸侯祭非其鬼逆祀郊禘非禮者設非以是為鬼神之教也因讀易知五經所以言鬼神之端皆原於此而有感焉故備論之以破世之言鬼神者之惑龍虎論象以像為義卦爻之畫莫不皆以其象像之而萬物之體具矣且伏羲之畫三畫也而具五行以立天地之數以三為五而六體已具一為竒二為偶至三為五因五而五之則天地之數也天地之數具則五行之數具或以剛乘柔或以柔乘剛初與四二與五三與六相應為用而象中之像成矣雲龍者水木之像也風虎者木金之像也乾以純陽之卦而有龍虎風雲之像以二五君臣相應精神變化隂陽竒偶之用也以二為陽中之偶乘初承三則成離以五為隂中之竒乘四承六則為坎水火之會則二五中氣混然冥乎五行之像此雲從龍風從虎所以具於乾之六畫矣以乾比坤取象猶是也坤六畫皆隂而有取于馬之牝者馬火畜也上六取龍之戰者龍陽類也以天地之雜曰龍戰隂疑於陽也以乾坤二卦取象為他卦之例皆象之變化因卦爻而寓其像鱗介飛走蠕肖翹有目有趾者無不具此乾坤卦例也乾坤取象之外他卦言馬者一繇九爻晉屯賁大畜明夷睽渙中孚八卦是也言牛者一繇七爻離無妄大畜遁革睽旅既濟八卦是也言豕者一繇三爻大畜睽姤中孚四卦是也言虎及豹者一繇五爻履頤革三卦是也言羊者四爻大壯夬二卦是也言狐者二爻解未濟是也言魚及鮒者一繇四爻剝姤中孚井四卦是也言龜者三爻頤損益三卦是也言鹿者一爻屯卦是也言鼠者一爻晉卦是也言雉者二爻旅鼎二卦是也言隼者一爻解卦是也言鴻及鶴者二爻漸中孚二卦是也凡此四十一卦乾坤龍虎馬牛以後所稱物類僅十六種因卦爻所占以别其象剛柔緩急巧譬精喻物無遁情者皆天地五行數之所囿非易孰能具之非聖人孰能知之哉尚有所可得而擬議者如説卦所載先儒幾以為占筮之學所未深悉學易者惑之有三焉何也言伏羲八索而不及文王他卦與經所引相反一也八卦所為物命凡八以震為龍不以乾為龍以乾為馬不為龍坤為牛不為馬震為馬之四種坎為馬之五種此二也兑為金而乾亦為金巽為木而乾亦為木果坎為木之多心離為木之科上稿艮為木之堅多節五行之數不定此三也施之卜筮穿鑿遷就似不可執一而巫祝得以抵牾聖説此不能不惑而先儒以其叢脞雜亂舉歸之卜筮可乎固有涉於性命氣血如坎為耳為加憂為心病震之為決躁巽之為躁卦似與素問黃帝岐伯問對相通不然伏羲用易以來黃帝堯舜禹湯所學專出於易以治身治天下豈無一語及易坐待文王孔子然後為全書併與學者辨之利涉論易以象為主象以卜筮為主卜筮所至則意所至意至則忘象可也用易君子各以已意求易卜筮先之以為已利不利之符而吉凶悔吝所繫如稟命於父母受教於師友此象得以專之而致其信以契夫人意意得則象可忘矣且利涉大川云者象以水為險也以為取需之坎乎而意不在是象以舟楫為行險利涉之用而有取於渙之坎乎而意不在是象以為坎之水凡卦之坎者皆得以利涉不利涉為言而坎之重險乃不曰利涉不利涉則其意所取于卜筮先之者端有在也以經考之繇言利涉大川者七曰需曰蠱曰大畜曰同人曰益曰渙曰中孚繇言不可涉大川者特訟之一卦耳爻言利涉大川者二曰頤之上九曰未濟六三用涉大川者一曰謙之初六不可涉大川者特頤五耳曰繇詞曰爻詞初若以象為主乃不在於坎之水不在於舟楫之用不在於重坎之險一卦一爻各有定象以寓其利與不利似各有意唯君子所以用之者何如耳曰需者取其疑而有待曰蠱者取其弊而有幹曰大畜取其蓄德以成其大曰同人取其立志而有所同曰益取其遷善以改其過曰渙取其難散而可以行曰中孚取其至信而有所格若夫訟者天水相違兩競以剛險為訟此繇意所不取也卦有六爻爻具六象則六意之寓不可槩也頤之六爻而意有可否之分頤以正為養在已者未正而拂人以為養不若上九養正得吉惕然居髙自危此二爻可不可之别也未濟則以三之過凶為憂謙則以初之得吉為福此爻詞意也大抵易者憂患之書而繇與爻皆文王之詞其曰利涉與否者擇利避險遊世以求免憂患而已卦六十四而利涉之卦七爻三百八十四而利涉可涉之爻四皆以象寓意君子茍有得夫意之所先卜筮可無而象可忘也天下之險非特水也雖行平陸安車緩轡有不免者吾將以我之無心感於卦爻之無心此聖人得意忘象之法也大人論聖人以立言為法非茍而已也大者小之積也易始於三畫八而八之三而重之以成六十四卦三百八十四爻易因是以定象立言聖人因是以制法取其變化不窮以推其所積之效非一日之力皆習而成之也傳曰性相近也習相逺也此人變化之習也繇之言大人者主一卦之義爻之言大人者主一爻之義其為大人則均其所以定象立言因言制法則有間矣乾者卦之首二五者爻之尊以乾統天則為天之大人以二五為君臣之大人以此調一天下亭毒萬物措諸事業而關諸百世皆大人職也積此以臨涖於有作者大人之聖也積此而鼓舞於不測者大人之神也凡易所謂天之隂陽人之性命以探賾索隱極深研幾者大人聖神之運則總之曰易道之變化也且以文王重易而曰以繇立言明憂患所自以為大人者始於乾之爻故夫子釋大人之辭曰天地合德日月合明四時合序鬼神合吉凶其極也先天後天天且不能違則其大之積為聖為神有不能名其大文王之説吾夫子之説唯孟子知之自可欲之善有諸已之信充實之美至於光輝之大人者已四其等矣皆積小成大之序則聖神者果易道之變化無疑矣且以文王之處憂患也皆因卦寓詞因詞寄意以為大者對小之稱也大人能容小人小人必不能包大人豈止倍蓰十百千萬之間哉否之六二曰包承小人吉大人否亨否則閉塞不出為義此大人容小人包承含忍無所不至以避其患害而已革之五則曰大人虎變上九則曰小人革面其始也大人用其大者以受小人小人自當悔罪革面聽命不暇大人特取其順上不責以全也故曰大者對小之稱也以訟則鬬以巽則順以小受大之術也其處困也守正以待時其處蹇也無終蹇不振之理此言大人能養成其大以受天下小人之託亦有時也其所謂時者處憂患消息之時天之時也若夫萃者文王受命之符也假廟用牲可以有為之時於其象曰君子以除戎器戒不虞此為文王設也於升則曰勿恤南征者文王為西伯紂猶在上太公未歸曰大人者以為紂與太公設如乾之二五不以紂為獨夫而忽之文王之以此授武王武王用十亂之佐君臣相為利見如乾二五也至釋離之象則昌言之曰大人繼明照四方以明武王為子繼其父西伯之明重光奕奕丕顯丕承以周代商易之大象言大人者異乎爻之詞唯此而已然則作易者之憂患乃文王憂患見於躬行者如此其審矣夫子潛心文王孟子願學夫子推明次序所積不可超躐而至曰聖曰神文王爻詞繇詞未嘗及之觀之彖曰聖人觀之彖曰神道而繫辭所稱聖神猶曰自畫易以來至文武相為授受以其聖聖神神妙易道於天下所以為立言制法者故曰文王之意夫子知之夫子之意孟子知之世數論易之為八卦明矣以二索六為六子此伏羲之畫三墳之書初不待文王之重而後具也文王特因其八者索其八而八之自八以下以陽從剛之竒而為陽之羣曰隂中之陽也以隂從柔之偶而為隂之羣曰陽中之隂也隂陽剛柔錯綜成文而六十四卦具矣亦初未嘗有所加減損益於三墳之書獨於連山歸藏之中取其所謂易者因乾坤而定名由八已下八八而索之為繇詞為爻詞孔子為彖詞為大小象詞以文王之易為正而定名曰周易故曰吾得坤乾焉三墳未亡乃曰贊易道以黜八索者何也且以乾坤為父母以六子為子子各有子父昭子穆傳世之法也卦之有世必自其父母者始父乾而索震坎艮子之從父也母坤而索巽離兑子之從母也要之不出八索八之數三墳同實異名雖吾夫子有取焉而説者以為專出劉牧似未通也牧之論不過以乾索乾之重為一世以乾索震之重為二世以乾索坎之重為三世以乾索艮之重為四世以乾索巽之重為五世以乾索離之重為六世以乾索坤之重為七世以乾索兑之重為八世備矣以乾六爻為例則他七卦者八之世可槩為八索之法以卦而四維之隂陽各分其羣而按之以河圖之數似且三十年為一世人之昭穆之世也若乃易之世豈止三十年而已哉大用之則大小用之則小星翁日者所不能盡知天地萬物舉不逃於乾坤二篇之策者用此世也其大者日月星辰之行璿衡律度以古況今千歲之統世傳如一其小者一歲四時寒暑代謝圭黍不違大率以卦為主而以隂陽剛柔隨其所用為世之變爻以卦變為氣一氣斡旋為易道神化之運曷有窮已哉歲月論易之有日月也由隂陽之分也六隂六陽以定一歲而各職其分隂與陽類以肇成歲功一卦職六日六十四卦之數凡三百八十四爻因以歷日月之度以測其度之所底剛柔消長吉凶禍福之變故曰易之有日月者隂陽之分也且始子終已六陽也始午終亥六隂也此一歲十二月以立日月之經而以六日一卦者為之緯或計之卦或計之爻此日月歲之次序也且言終日之卦三乾豫既濟是也言三日之卦三蠱巽明夷是也言七日之卦三復震既濟是也言月之卦一臨是也言三年之卦七同人習坎困漸豐既濟未濟是也言十年之卦三頤屯復是也言三而不曰歲月日凡八需訟師比解損革巽是也繇詞言三者二蒙晉是也嘗以次敘論之陽生於子為復之初九繇言七日來復者起於中孚之六日至復初九則七日以一卦一爻為計陽之方來以會朔迎氣此進之也至於四陽為臨則恐其已過為隂所蹶故先期而告之曰八月有凶九四之陽變為六四之隂則為八月此以卦為月也乾言終日者乾九三一爻之計不終日者豫六二一爻之計此以爻為日也蠱之三日天下事至弊如幹以克家之子尚且幹之以漸況天下之事先後甲者巽木申命猶風之振山落木也先後庚者巽木兑金兑巽易位金木更相旺囚自巽至兑此以卦為爻之日例也喪貝喪茀所喪甚輕有不足逐坐待其歸一卦六爻之變而自得也三年者或在下卦之上或在上卦之上或在初或在中或在終一卦三爻三年之例也十年者一卦六爻之變頤之守正師之自用屯之女貞復之自迷一卦四爻之例也其不以歲月計而言三者皆三爻竒偶之數可以類推也大抵易道以數為本六隂六陽分職一歲之用震離兑坎分旺四仲餘六十卦歸竒為閏三百八十四爻曰歲曰月曰日如指諸掌矣君子論易之為書也文王初為爻繇之詞吾夫子益以大象統一卦意而為之詞曰君子者謂天下後世君子公稱之也凡有三説焉一曰行道之君子二曰修身之君子三曰治世之君子而易之見於用者盡矣伏羲三畫索而八之文王六十四因而重之孔子十翼繫而翼之包六極統三才以倡其學於後世凡易之道率本三聖為五經所祖行道之君子也窮於性命達於死生洗濯德業研極幾微咸恆以息其謬用之心損益以擇其可為之事六氣以調節四敘以消息出處語默無一不在此修身之君子也五常所紀三王所尚文質不同剛柔各異禮樂法度律厯法象治亂之術安危之符愈取愈有受命如響此治世之君子也三君子者天下後世之君子其施於易甚公所以行道所以修身所以治世則有别矣吾夫子因以統一卦之體先總其數命之曰大象者六十四卦而君子用易之目特五十三而爻之所謂君子凡十爻八卦無預焉者蓋一卦以總其體一爻以散其用不可一槩莫不皆有序也禮曰潔淨精微易教也文王之淵懿孔子五十學易無大過君子先體易道之大以範圍此世斂以修身推以治世而體之為用無乎不在故大象所統君子之外有所謂先王者七有所謂后者三有所謂上者一且伏羲至周文武制作甚備所稱先王知其為周之王也告命省方亦知其為周之后也其所謂上者以上對下為義也周之衰也君子少而小人多猶剝以五隂剝一陽無難者故以君子容小人而為廬小人載君子而為輿上下相養茍於無事如春秋戰國之世孔子讀易傷周道之衰而有感於此故不復以君子統象而以上對下為言也嗚呼天下後世之君子盡矣自伏羲畫易以降五帝三王周公孔子凡有得於易者不論有位無位為君為臣皆其公稱也如詩人則以王者為君子左氏春秋則以人臣為君子或以孔子為君子論語則以子産子賤為君子此君子公稱之例也至於易之所謂君子往往間有對小人為言何也君子小人之辨亦天下後世公心之憂也文王憂之孔子亦憂之文王書之於爻繇孔子書之於大小象其於憂世之心一也其於否泰致其去來消長之勢於遁則曰君子以逺小人不惡而嚴若夫春秋筆削褒善貶惡於君子小人黑白涇渭之不啻易致其理春秋致其法此又專出吾夫子之意其憂又倍於文王也四德論道出於天以乾為體德出於道以仁義禮智為用以天而統於道則一氣隂陽之分為四時曰元亨利貞者統之以乾也以道而分於德曰仁義禮智者會之以信以肇乾道之分而四德具矣文王之言曰元者善之長一氣之運自其元者始猶之春蠢萬物之發生也亨者嘉之會品彚相見盛大之期猶之夏假萬物之亨會也利者義之和氣之揫斂肅殺不可以過猶之秋裁制而收其利也貞者事之幹貞者止於貞猶之冬終歲而畢其務也此本文王之詞孔子再釋之則知四德之為四時矣而統以乾者會於一元而人得之者為五常曰仁義禮智而合之於信也竊嘗槩之曰天者強名也又何德之可名因天為乾因四時為元亨利貞因隂陽而為道因道為德因德而為仁義禮智此近世劉牧之學也牧之學不過以道為德取其合於人心同體異用者為之名故以元為仁以禮為亨以義為利以智為貞因文王之言孔子之意敘而釋之也或曰天以其自然以合乎人之使然者故以一道為德以四德為仁義禮智之分皆強名其天與人者此説非也天之與人自然之合也人豈有外鑠之天哉孔安國之疏子思之説曰天命之謂性率性之謂道修道之謂教云者天人自然氣質無礙沖融會通無或間斷其趣一也天以隂陽為道命人以為性性即道之出於天者未逺矣天以五行分四時而寓其鼓舞不測之神囚旺乘除其來無端其去無迹也木之神生仁火之神生禮金之神生義水之神生智故率道為教此合四德以統乾合四端以統信易之中與中庸之中皆其自然非勉強矯揉至也且六十四卦具四德之卦凡七若非乾以統天以合於五行之土以元亨利貞合之於乾以仁義禮智合之於信為五常以土之中合信之中以應五行則六卦之所謂四德者皆可以抗乾德而天失其統然則乾之四德者誠異乎他卦之德矣自坤以下論之其配於乾具四德曰坤元亨利牝馬之貞而已其他卦之四德皆稱其卦之大小以為之德一氣有所分而不足於天一卦有所統而不足於人自四以降或三或二或一或無或有或先或後或吉或凶離文以取義合詞以取意皆用此例也嗚呼在天則為道在人則為神易之所謂自然者大矣哉時義論時者天之時也天可為時人不可為時人為天地之先後而奉時周旋者斯可矣且有治有亂有安有危小則一身大而天下所遭之時有不同者豈人為哉天之時也唯君子能御其時以探天之機因時移易者易之不常也所謂義者宜也無適不宜也用者通也無適不通也義而權其宜用而求其通一以適時為正猶曰天之四時也春而生之夏而長之秋而收之冬而藏之因卦取時以隨易變化者則繫之人矣故君子之於易也時先之義次之用又次之乾曰時乘六龍以御天者一唯其時而已君子涉世憂患思其義擇其用曰時者無適而不宜無適而不通轉禍為福消息盈虛之理凡繫命於天者人定得以勝之自非聖人君子疇能克此哉抑嘗論之吉人凶其凶不可謂凶凶人吉其吉不可謂吉此禍福倚伏之理唯聖人體道於易之變而知其天人之符也時義之卦凡五曰豫者恐其為逸豫之豫曰隨者恐其為詭隨之隨曰遁者恐以遁自懼曰姤者恐以姤自屈曰旅者恐以旅為處此五者皆當權其義之宜所以為大也時用之卦凡三曰坎者險之所當畏其亨之可恃者以其心也曰睽者乖之所可惡其同之可通者以其志也曰蹇者難之所當避其中之有利者以其知也此三者皆當求其用之通所以為大也若夫時之大者皆天道素定而不可易無義可宜無用可通一聽天運而已其卦凡三曰大過者無一而不過天下方亂天亂之也曰解者無一而不解大難方散天散之也曰革者無一不革天人混冥在治而亂在亂而治唯天時之定非義非用之所能拘故特曰時大而已大抵卦必有時時必繫於天而易之道出於天以神其變化而他卦者寄天之妙於一默故不以時為言而十一卦獨以時為言者吾夫子自以已之憂患同衆人之憂患宜於義者五通於用者三言時而不及其用者亦三餘五十三卦不言時者於聖人彖象自無隱詞古君臣論孔子定書斷自唐虞以及三代乃不及伏羲之書契伏羲畫易孔子作十翼而彖象言古君臣乃不及帝而獨言王者之代何也文王以憂患重易孔子傳文王之心而有得於易故取古之君臣專及王者之代以明學所授受不自他出也且先以文王明之文王以西伯重易商王受在上西伯羑里之囚故有憂患宜曰西伯不曰王也象之言君則果文王之疑也曰帝乙曰髙宗曰箕子吾知其為商之君臣曰王者知其為文王則周公之追王無疑也韓宣子適魯見易象與春秋曰周禮盡在魯吾乃知周公之德則追書西伯為王者果周公之書以子王父之禮也太史公曰人更三聖世歷三古以一聖配一古及文王而遺周公以子統父之理也曰王用亨於帝王用亨於西山孔子釋之曰順事知文王以西伯事紂以臣事君惴惴然不敢少拂紂之怒心故能以西山之業有天下而自達於亨大也孔子於易誠潛心於文王得之矣象有文王則孔子之彖言文王象有箕子則孔子之彖言箕子象有湯武則孔子之彖言湯武有其詞則述其詞有其義則思其義大抵孔子因文王之作而有述猶周公文王父子之文相先後為全經也至繫詞十三卦制器以卦寓象則伏羲神農黃帝堯舜皆有所制一卦一器五聖人者先有其器然後别之而寓諸象以形容之此孔子傳以述詞而為義也且以帝乙歸妹言之泰之六五則以五之隂下應於二之陽為震兑之互體以歸妹為言此象也若夫雷澤之歸妹則以震之長男娶兑之少女亦以二五相應曰須曰娣則因爻隂陽以寓象不專於互體也互體之學非必出劉牧自畫卦以來即具之剛柔變化交相為用易道之所以神也必欲奪取之則湯文武箕子爻彖相戾是啓昔人以箕子為箕荄之説愚故曰有其詞則述其詞有其義則思其義施於彖象聖人心傳蓋相通矣或曰卜筮者神易之道聖人用易以卜筮為始可也文王處憂患見於日用曰王用曰南征曰南狩以此取紂而得天下曰得其大首至於公用圭公用射隼則公之為周公必矣若乃復之一卦則聖學之懿性命之極其於不逺復者則文王仁得之孔子仁得之顔子之仁又得之繫詞追釋之於後豈特卜筮而已哉禦冦論易道之難行也人情或失於隱或傷於察隱者欲其不知察者欲其必用易道人情之變兩全之以求其通斯所以為難也其曰難者何也不知者欲其可知必用者欲其不用俾人之情各適於教化鼓舞不測之域君子所以神易道於天下也荀子曰害良曰賊竊貨曰盜賊盜者皆冦也且隱於不知其類有三險狠忮戾以陷害良善欲人之不知欺詐矯偽以沽掠名譽欲人之不知貪婪賄賂茍利貨財欲人之不知此三類者挾穿之姦乘扈之氣其實冦也彼以其隱我以其察彼以隱之不知我以察之必用勢必至於鬬興戎之漸召亂之由此玩易之君子所深致其憂也孔子曰不逆詐不億不信抑亦先覺者是賢乎兹神化之運孔子學易而知之久矣孟子又知之曰所過者化所存者神上下與天地同流夫唯神化鼓舞至與天地同流能使民不為盜者禦冦之利有大於此者乎且以禦冦之卦二曰蒙曰漸是也致冦之卦二曰需曰解是也蒙之上九以昏昧養冦則擊而去之漸之六二以隂長冦則順而取之此禦冦之利也需之九三據非其位以剛不中持疑而致冦解之六三取非其有下體負乘失中而致冦夫以蒙漸稔冦而長養之不能必其去又以需解誘冦而來之此必鬬之冦鬬之則天下亂矣吾易之憂也君子於此盍亦思所以解其鬬者因人情之變而神其化亦必有道矣且喜則親之怒則疏之人情之變也於是又有得於三卦焉曰屯曰睽曰賁屯之難睽之乖賁之無飾人情之至變易道之難行者吾能使之喜而不怒親而不疏仇讎之氷炭合而為姻婭之膠漆焉以冦為婚者易之神也曰匪冦而婚是矣昔季康子患盜孔子答以茍子之不欲雖賞之不竊昔之以無欲治民唯堯舜能之故能仁覆天下比屋可封豈唯不竊其賞而已哉三類者舉為可封之民矣嗚呼安得用易之君子而與為堯舜之治乎
