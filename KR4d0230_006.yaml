  - {type: page-break, offset: 0, content: '', id: KR4d0230_WYG_006-1a, image: WYG1149/WYG1149-0588a.png}
body:
  text: 方舟集卷六宋李石撰詩餘如夢令橋上水光浮雪橋下桞隂遮月夢裏去尋香露冷五更時節蝴蝶蝴蝶飛過閒紅千葉前調憶别憶被金樽勸倒燈下紅香圍繞别後有誰憐一任春殘鶯老煩惱煩惱腸斷緑楊芳草生查子春情小桃小杏紅和雨和煙瘦不是㸃胭脂素面偏宜酒也是慣傷春可惜閒時候正要畫眉人與作雙娥鬭前調新花上苑枝枝上嬌鶯語日日抱花心啄破胭脂雨鶯飛鶯去時誰與花為主守等却飛來再見花開處前調今年花發時燕子雙雙語誰與捲珠簾人在花間住眀年花發時燕語人何處且與寄書來人往江南去前調荷花人面紅月影波心見扇子倒拈來敲落紅香片窗下剪燈花今日眉深淺留得鏡中看蹙破春山逺搗練子送别斟别酒問東君一年一度一回新看百花飄舞茵斟别酒問行人莫將别淚裛羅巾蚤歸來依舊春前調佳人腰束素鬢垂雅無情笑面醉猶遮扇兒搧瞥見些雙鳯小玉叉斜芙蓉衫子藕花紗戴一枝薝蔔花長相思暮春花飛飛絮飛飛三月江南煙雨時樓臺春樹迷雙鶯兒雙燕兒橋北橋南相對啼行人猶未歸前調重午紅藕絲白藕絲艾虎衫裁金縷衣叉頭雙荔枝鬢符兒背符兒鬼在心頭符怎知相思十二時前調佳人花深紅花淺紅桃杏淺深花不同年年吹暖風鶯語中燕語中喚起碧窗春睡濃日髙花影重烏夜啼紅軟榴花臉暈緑愁楊桞眉踈日長院宇閒消遣荔子賭摴蒱瑩雪凉衣乍浴裁氷素扇新書繡香薰被梅煙潤枕簟碧紗㡡前調鸞鏡愁添眉黛羅裙瘦减腰肢一回見了一回病彈指誤佳期醉裏懵騰淚洗夢中著摸魂飛一春多少閒風雨亭院落花時前調送春繡閣和煙飛絮粉墻映日吹紅花花桞桞成隂處休恨五更風絮㸃鋪排緑水紅香收拾黃蜂留春盡道能留得長在酒杯中朝中措聞鶯飄飄仙袂縷黃金相對弄清音幾度教人誤聽當窗緑暗紅深一聲夢破槐隂轉午别院深沉試問緑楊南陌何如紫椹西林前調贈趙牧仲歌姬緑楊庭院覺深沉曽聽一鶯吟今夜却成容易雙蓮步步搖金歌聲暫駐嚬眉又去無計重尋應恨玉郎殢酒教人守到更深前調贈别凌波庭院藕香殘銀燭夜生寒兩㸃眉尖新恨别來誰畫遙山南樓皓月一般瘦影兩處憑欄莫似桃花溪畔亂隨流水人間一剪梅憶别紅映欄干緑映階閒悶閒愁獨自徘徊天涯消息幾時歸别後無書有夢來後院棠梨昨夜開雨急風忙次第催羅衣消瘦怯春寒莫管紅英一任蒼苔前調百濯香殘恨未消萬緒千絲蓮藕芭蕉臨岐猶自說前時輕剪烏雲解翠翹雨意重來風已飄南陌行人折桞橋此間無計可留連枕上今宵馬上眀朝醉落魄春雲天低日暮清商一曲行人住著人意態如飛絮才泊春衫却被風吹去朝期暮約渾無據同心結盡千千縷今宵魂夢知何處翠竹芭蕉又下黃昏雨臨江仙佳人煙桞踈踈人悄悄畫樓風外吹笙倚欄聞喚小紅聲薰香臨欲睡玉漏已三更坐待不來來又去一方眀月中庭粉墻東畔小橋橫起來花影下扇子撲飛螢前調醉飲八曲䦨干垂手處燭光花影踈踈一尊共飲記當初綵毫濃㸃雙帶要人書日暮不來朱户隔碧雲髙掛蟾蜍琴心密約總成虛醉中言語醒後憶人無前調有宅一區家四壁年年花桞深村父兄隨處燕雞豚折腰歸去何苦傍侯門擬射九烏留白日假饒立到黃昏卧龍老矣及三分不如把手堂上燕芳樽前調老母太恭人三月二十一日生是日仍遇己卯本命作千嵗㑹祝壽子孫三十八人九九之年逢降慶生年生日同時金花紫誥鬢銀絲乞身香火地日戲老萊衣渾舍集成千嵗㑹子孫三世庭闈共將春酒祝金巵蟠桃三月暮莫怪看花遲滿庭芳送别江草抽心江雲弄碧江波依舊東流别筵初散行客上蘭舟休唱陽關舊曲青青桞無限輕柔應爭記三年樂事珠翠擁鰲頭離愁知幾許花梢著雨紅淚難收看煙火吳天萬里悠悠一望珠宫絳闕蓬萊路應在皇州仍回首蜀山萬㸃明月滿南樓木蘭花轆轤軛軛門前井不道隔窗人睡醒柔絃無力玉琴寒殘麝徹心金鴨冷一鶯啼破簾櫳靜紅日漸髙槐轉影起來情緒寄遊絲飛絆翠翹風不定前調一春閒却花時候小閣幽窗長獨守晴雲南浦夢還空初月西樓眉也皺馬嘶何日門前桞脉脉盈盈相見後心頭有事不難知面上看誰真箇瘦南鄉子十月海棠十月小春天紅葉紅花半雨煙㸃滴紅酥真耐冷爭先奪取梅魂鬭雪妍坐待曉鶯遷織女機頭蜀錦川枝上緑毛么鳯子飛仙乞與雙雙作被眠前調醉飲裹帽撚吟鬚我是蓬萊舊酒徒除了茅君誰是伴麻姑洞裏仙漿不用沽弱水渺江湖醉裏笙歌醉裏扶縱飲菊潭餐菊蘂茱萸醫得人間瘦也無西江月漁父一脉分溪淺緑數枝約岸欹紅小船橫繫碧蘆叢似我江湖春夢曬網漁歸别浦舉頭鴈度晴空短蓑獨宿月眀中醉笛一聲風弄八聲甘州懷歸向吳天萬里一葉歸舟嵗月儘悠悠有清歌一曲醉中自笑酒醒還愁幾度春鸚囀午塞鴈橫秋漁笛蓑衣底依舊勾收多謝飛來雙鶴水邊林下伴我遨游笑老萊晨昏色笑為親留有向來素琴三尺枕一編周易在牀頭君知否家山夢寐渾勝瀛洲雨中花慢次宇文吏部贈黃如圭韻㶑灔雲霞空濛霧雨長堤桞色如茵問西湖何似粉面初勻盡道軟紅香土東華風月俱新舊游如夢塵緣未斷幾度逢春蓬萊閣上風流二老相携把酒論文最好是四娘桃李約近東鄰别後使君鬚鬢十分白了三分是人笑道醉中文字更要紅裙醉蓬萊望長江東去逐客西來幾逢秋杪江草江花約鬢絲俱老朝士紅萸佳人雪藕别後忍孤歡笑楚水樓臺巫山宫殿五湖煙渺又是征帆萬里行去舊恨鱸魚昔盟鷗鳥九日江南上蓬萊仙島三度劉郎黃花醉裏問我幾時來到寄語西風饒他老子莫欺烏帽漁家傲贈鼎湖官妓西去征鴻東去水幾重别恨千山裏夢繞緑窗書半紙何處是桃花溪畔人千里瘦玉倚香愁黛翠勸人須要人先醉問道眀朝行也未猶自記燈前背立偷彈淚
